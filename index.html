<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rosary Clicker | Чётки Перебор</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #020617 100%);
            --panel-bg: rgba(30, 41, 59, 0.4);
            --panel-border: rgba(255, 255, 255, 0.08);
            --neon-cyan: #06b6d4;
            --neon-blue: #3b82f6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --bead-color: #06b6d4;
            --bead-glow: rgba(6, 182, 212, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            overflow: hidden;
            padding: 20px;
        }

        /* Эффект размытия заднего плана (Glassmorphism) */
        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--panel-border);
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        header {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            text-align: center;
            margin-top: 10px;
        }

        header h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(to right, #fff, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Главная игровая зона */
        .game-container {
            position: relative;
            width: 100%;
            max-width: 450px;
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 20px 0;
        }

        /* Визуализация четок (круговая нить) */
        .rosary-loop {
            position: relative;
            width: 280px;
            height: 280px;
            border-radius: 50%;
            border: 2px dashed rgba(255, 255, 255, 0.03);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s cubic-bezier(0.1, 0.8, 0.3, 1);
        }

        .bead {
            position: absolute;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #fff 0%, var(--bead-color) 60%, rgba(0,0,0,0.4) 100%);
            box-shadow: 0 0 15px var(--bead-glow);
            transition: transform 0.1s ease, background 0.3s;
        }

        .bead.active {
            width: 30px;
            height: 30px;
            box-shadow: 0 0 25px #fff, 0 0 15px var(--bead-glow);
            border: 2px solid #fff;
            z-index: 10;
        }

        /* Центр четок с выводом информации */
        .counter-display {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .counter-number {
            font-size: 54px;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
            background: linear-gradient(to bottom, #fff 60%, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 12px rgba(0,0,0,0.5);
        }

        .counter-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: -5px;
        }

        /* Панель управления снизу */
        .controls-panel {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: var(--text-muted);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 10px;
        }

        .stats-row span strong {
            color: var(--text-main);
        }

        .buttons-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 12px;
            border-radius: 14px;
            color: var(--text-main);
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
        }

        button:active {
            transform: scale(0.98);
            background: rgba(255, 255, 255, 0.02);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-cyan));
            border: none;
            grid-column: span 2;
            font-size: 15px;
            padding: 16px;
            box-shadow: 0 4px 20px rgba(6, 182, 212, 0.25);
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        .btn-primary:hover {
            filter: brightness(1.1);
            box-shadow: 0 4px 25px rgba(6, 182, 212, 0.4);
        }

        /* Стили скинов */
        .skin-selector {
            display: flex;
            justify-content: space-around;
            background: rgba(0,0,0,0.2);
            padding: 6px;
            border-radius: 12px;
            margin-top: 5px;
        }

        .skin-option {
            font-size: 11px;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            color: var(--text-muted);
            transition: 0.2s;
        }

        .skin-option.active {
            background: rgba(255,255,255,0.1);
            color: var(--text-main);
        }

        /* Анимация клика на экране */
        .click-ripple {
            position: absolute;
            border: 2px solid rgba(255,255,255,0.4);
            border-radius: 50%;
            pointer-events: none;
            animation: ripple 0.4s linear forwards;
        }

        @keyframes ripple {
            0% { width: 0; height: 0; opacity: 1; transform: translate(-50%, -50%); }
            100% { width: 80px; height: 80px; opacity: 0; transform: translate(-50%, -50%); }
        }

        /* Анимация для цифр при переборе */
        .bump {
            animation: bumpAnim 0.1s ease-out;
        }
        @keyframes bumpAnim {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <header class="glass-panel">
        <h1>Rosary • Перебор</h1>
        <p id="mode-desc">Свободный режим размышления</p>
    </header>

    <div class="game-container" id="click-zone">
        <div class="rosary-loop" id="rosary">
            </div>
        <div class="counter-display">
            <div class="counter-number" id="counter">0</div>
            <div class="counter-label" id="counter-sub">кругов: 0</div>
        </div>
    </div>

    <div class="controls-panel glass-panel">
        <div class="stats-row">
            <span>Рекорд скорости: <strong id="best-speed">0</strong> б/сек</span>
            <span>Всего перебрано: <strong id="total-clicks">0</strong></span>
        </div>

        <div class="skin-selector">
            <div class="skin-option active" onclick="changeSkin('neon')">Кибер Неон</div>
            <div class="skin-option" onclick="changeSkin('wood')">Матовое Дерево</div>
            <div class="skin-option" onclick="changeSkin('emerald')">Изумруд</div>
        </div>

        <div class="buttons-grid">
            <button class="btn-primary" id="action-btn">Перебрать (Спейс / Тап)</button>
            <button onclick="toggleMode()" id="mode-btn">⏱️ Тайм-Аттак</button>
            <button onclick="resetStats()">🔄 Сброс</button>
        </div>
    </div>

    <script>
        // Настройки и состояние
        const TOTAL_BEADS = 33; // Классическое число четок в малом круге
        let count = 0;
        let totalCount = parseInt(localStorage.getItem('rosary_total')) || 0;
        let loops = 0;
        let bestSpeed = parseFloat(localStorage.getItem('rosary_best_speed')) || 0;
        
        let currentAngle = 0;
        let isTimeAttack = false;
        let timer = null;
        let timeLeft = 30;
        let speedClicks = 0;
        let speedInterval = null;

        const rosary = document.getElementById('rosary');
        const counterEl = document.getElementById('counter');
        const counterSubEl = document.getElementById('counter-sub');
        const totalClicksEl = document.getElementById('total-clicks');
        const bestSpeedEl = document.getElementById('best-speed');
        const actionBtn = document.getElementById('action-btn');
        const modeBtn = document.getElementById('mode-btn');
        const modeDesc = document.getElementById('mode-desc');
        const clickZone = document.getElementById('click-zone');

        // Инициализация звукового движка (Web Audio API)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playClickSound() {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'triangle';
            // Случайное небольшое изменение частоты для реалистичности "щелчка"
            osc.frequency.setValueAtTime(120 + Math.random() * 40, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.05);
            
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.04);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.05);
        }

        // Генерация бусин по кругу
        const beads = [];
        function createRosary() {
            rosary.innerHTML = '';
            const radius = 130; // Радиус расположения бусин
            for (let i = 0; i < TOTAL_BEADS; i++) {
                const bead = document.createElement('div');
                bead.classList.add('bead');
                
                const angle = (i * 2 * Math.PI) / TOTAL_BEADS;
                const x = radius * Math.sin(angle);
                const y = -radius * Math.cos(angle);
                
                bead.style.transform = `translate(${x}px, ${y}px)`;
                rosary.appendChild(bead);
                beads.push(bead);
            }
            updateActiveBead();
        }

        function updateActiveBead() {
            beads.forEach((bead, index) => {
                if (index === count % TOTAL_BEADS) {
                    bead.classList.add('active');
                } else {
                    bead.classList.remove('active');
                }
            });
        }

        // Основное действие перебора
        function pullBead(e) {
            if (isTimeAttack && timeLeft <= 0) return;

            count++;
            totalCount++;
            speedClicks++;
            
            playClickSound();

            // Визуальный сдвиг круга (вращение)
            currentAngle -= (360 / TOTAL_BEADS);
            rosary.style.transform = `rotate(${currentAngle}deg)`;

            // Вычисление кругов
            loops = Math.floor(count / TOTAL_BEADS);
            
            // Обновление интерфейса
            counterEl.textContent = count % TOTAL_BEADS;
            counterEl.classList.remove('bump');
            void counterEl.offsetWidth; // Хак для перезапуска анимации
            counterEl.classList.add('bump');

            if (isTimeAttack) {
                counterSubEl.textContent = `Осталось времени: ${timeLeft}с`;
            } else {
                counterSubEl.textContent = `кругов: ${loops}`;
            }

            totalClicksEl.textContent = totalCount;
            localStorage.setItem('rosary_total', totalCount);

            updateActiveBead();
            if (e) createRipple(e);
        }

        // Эффект волны при клике
        function createRipple(e) {
            const rect = clickZone.getBoundingClientRect();
            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const clientY = e.clientY || (e.touches && e.touches[0].clientY);
            
            if (!clientX || !clientY) return;

            const ripple = document.createElement('div');
            ripple.classList.add('click-ripple');
            ripple.style.left = `${clientX - rect.left}px`;
            ripple.style.top = `${clientY - rect.top}px`;
            
            clickZone.appendChild(ripple);
            setTimeout(() => ripple.remove(), 400);
        }

        // Переключение режимов
        function toggleMode() {
            clearInterval(timer);
            clearInterval(speedInterval);
            isTimeAttack = !isTimeAttack;
            count = 0;
            speedClicks = 0;
            counterEl.textContent = '0';

            if (isTimeAttack) {
                timeLeft = 30;
                modeBtn.textContent = '🧘 Свободный';
                modeBtn.style.borderColor = 'var(--neon-cyan)';
                modeDesc.textContent = '⏱️ Скоростной перебор на 30 секунд';
                counterSubEl.textContent = `Нажмите кнопку СТАРТ`;
                actionBtn.textContent = 'НАЧАТЬ ТЕСТ СКОРОСТИ';
            } else {
                modeBtn.textContent = '⏱️ Тайм-Аттак';
                modeBtn.style.borderColor = 'rgba(255,255,255,0.08)';
                modeDesc.textContent = 'Свободный режим размышления';
                counterSubEl.textContent = `кругов: 0`;
                actionBtn.textContent = 'Перебрать (Спейс / Тап)';
            }
            updateRosaryRotationReset();
        }

        function startSpeedTest() {
            timeLeft = 30;
            count = 0;
            speedClicks = 0;
            actionBtn.textContent = 'ПЕРЕБОР!';
            
            timer = setInterval(() => {
                timeLeft--;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    clearInterval(speedInterval);
                    endSpeedTest();
                } else {
                    counterSubEl.textContent = `Осталось времени: ${timeLeft}с`;
                }
            }, 1000);

            // Счётчик кликов в секунду в реальном времени
            speedInterval = setInterval(() => {
                let currentCPS = (speedClicks / (30 - timeLeft)).toFixed(1);
                if (isFinite(currentCPS) && currentCPS > 0) {
                    modeDesc.textContent = `Текущая скорость: ${currentCPS} б/сек`;
                }
            }, 500);
        }

        function endSpeedTest() {
            const finalSpeed = (speedClicks / 30).toFixed(2);
            actionBtn.textContent = 'ТЕСТ ЗАВЕРШЕН';
            counterSubEl.textContent = `Время вышло!`;
            modeDesc.textContent = `Ваш результат: ${finalSpeed} б/сек`;
            
            if (finalSpeed > bestSpeed) {
                bestSpeed = finalSpeed;
                bestSpeedEl.textContent = bestSpeed;
                localStorage.setItem('rosary_best_speed', bestSpeed);
                alert(`🔥 Новый рекорд скорости перебора: ${finalSpeed} бусин в секунду!`);
            }
        }

        function updateRosaryRotationReset() {
            currentAngle = 0;
            rosary.style.transform = `rotate(0deg)`;
            updateActiveBead();
        }

        // Смена тем оформления (скинов)
        function changeSkin(skin) {
            const root = document.documentElement;
            document.querySelectorAll('.skin-option').forEach(opt => opt.classList.remove('active'));
            event.target.classList.add('active');

            if (skin === 'neon') {
                root.style.setProperty('--bead-color', '#06b6d4');
                root.style.setProperty('--bead-glow', 'rgba(6, 182, 212, 0.4)');
            } else if (skin === 'wood') {
                root.style.setProperty('--bead-color', '#854d0e');
                root.style.setProperty('--bead-glow', 'rgba(133, 77, 14, 0.1)');
            } else if (skin === 'emerald') {
                root.style.setProperty('--bead-color', '#10b981');
                root.style.setProperty('--bead-glow', 'rgba(16, 185, 129, 0.4)');
            }
        }

        function resetStats() {
            if (confirm('Сбросить рекорды и счётчик кликов?')) {
                localStorage.clear();
                count = 0;
                totalCount = 0;
                bestSpeed = 0;
                totalClicksEl.textContent = '0';
                bestSpeedEl.textContent = '0';
                counterEl.textContent = '0';
                if (isTimeAttack) toggleMode();
                updateRosaryRotationReset();
            }
        }

        // Слушатели событий
        actionBtn.addEventListener('click', (e) => {
            if (isTimeAttack && timer === null && timeLeft === 30) {
                startSpeedTest();
            } else {
                pullBead(e);
            }
        });

        clickZone.addEventListener('mousedown', (e) => {
            if (isTimeAttack && timer === null && timeLeft === 30) return;
            pullBead(e);
        });

        // Управление с клавиатуры
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (isTimeAttack && timer === null && timeLeft === 30) {
                    startSpeedTest();
                } else {
                    pullBead();
                }
            }
        });

        // Старт
        totalClicksEl.textContent = totalCount;
        bestSpeedEl.textContent = bestSpeed;
        createRosary();
    </script>
</body>
</html>
