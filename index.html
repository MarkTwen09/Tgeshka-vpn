<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Svetsky Terminal v2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@2.1.0"></script>
    <style>
        :root {
            --bg-main: #050709;
            --bg-card: #0B0E11;
            --bg-field: #131A22;
            --bg-input: #1A222C;
            --text-main: #EAEEF3;
            --text-muted: #62707F;
            --accent-green: #0ECB81;
            --accent-red: #F6465D;
            --border-color: #1E2732;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            padding: 12px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .terminal-container {
            width: 100%;
            max-width: 440px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            box-shadow: 0 30px 70px rgba(0,0,0,0.8);
        }

        /* Шапка */
        .term-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 12px;
        }

        .brand-zone {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-badge {
            background: linear-gradient(135deg, #0ECB81, #00965B);
            color: #050709;
            font-weight: 800;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-size: 14px;
        }

        .title-pair h1 { font-size: 14px; font-weight: 700; }
        .title-pair span { font-size: 11px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }

        .live-badge {
            font-size: 10px;
            color: var(--accent-green);
            font-weight: 700;
            background: rgba(14, 203, 129, 0.06);
            padding: 4px 10px;
            border-radius: 4px;
            border: 1px solid rgba(14, 203, 129, 0.15);
        }

        /* Блок курса */
        .main-price-box {
            background: var(--bg-field);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 16px;
            text-align: center;
            position: relative;
        }

        .price-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 4px;
            font-weight: 600;
        }

        .price-value {
            font-size: 38px;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: -1px;
        }

        .price-direction {
            font-size: 12px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-top: 2px;
        }

        /* Панель Таймфреймов */
        .timeframes-bar {
            display: flex;
            gap: 6px;
            background: rgba(0,0,0,0.2);
            padding: 4px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .tf-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 600;
            padding: 6px 0;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .tf-btn.active {
            background: var(--bg-input);
            color: var(--accent-green);
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }

        /* График */
        .chart-box {
            position: relative;
            height: 190px;
            background: var(--bg-field);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 8px;
        }

        /* Биржевой стакан */
        .orderbook-box {
            background: rgba(20, 26, 34, 0.3);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .ob-header {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 600;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 4px;
        }

        .ob-tables {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .ob-row {
            display: flex;
            justify-content: space-between;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            margin-bottom: 3px;
        }

        /* ТОРГОВАЯ ПАНЕЛЬ С БИРЖЕВЫМ ДИЗАЙНОМ */
        .calculator-box {
            background: var(--bg-field);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        /* Вкладки переключения Купить/Продать */
        .trade-tabs {
            display: flex;
            background: #090d12;
            padding: 4px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 700;
            padding: 10px 0;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tab-btn.buy-active {
            background: #0ecb8124;
            color: var(--accent-green);
        }

        .tab-btn.sell-active {
            background: #f6465d24;
            color: var(--accent-red);
        }

        /* Карточки кошелька */
        .user-wallet-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        
        .wallet-card {
            background: rgba(26, 34, 44, 0.4);
            border: 1px solid var(--border-color);
            padding: 10px 12px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .wallet-card span { color: var(--text-muted); font-size: 10px; text-transform: uppercase; font-weight: 500; }
        .wallet-card strong { font-family: 'JetBrains Mono', monospace; color: #fff; font-size: 14px; }

        /* Поле ввода */
        .input-container-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 12px;
            align-items: center;
            justify-content: space-between;
            transition: border-color 0.15s;
        }
        .input-wrapper:focus-within {
            border-color: #3b4e63;
        }

        .input-wrapper input {
            background: transparent;
            border: none;
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            font-size: 16px;
            font-weight: 600;
            width: 70%;
            outline: none;
        }

        .input-currency { font-size: 12px; color: var(--text-muted); font-weight: 700; font-family: 'JetBrains Mono', monospace; }

        .btn-max {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            font-size: 11px;
            font-weight: 700;
            padding: 14px 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .btn-max:hover { background: #232e3c; border-color: #3b4e63; }

        /* Итоговые расчеты */
        .calc-result {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-muted);
            padding: 4px 2px;
            border-bottom: 1px dashed var(--border-color);
            padding-bottom: 10px;
        }

        /* Главная кнопка ордера */
        .btn-trade-submit {
            border: none;
            color: #050709;
            font-weight: 700;
            font-size: 14px;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            width: 100%;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.2s;
        }
        .btn-trade-submit.btn-buy { background: var(--accent-green); }
        .btn-trade-submit.btn-buy:not(:disabled):hover { background: #0bba75; }
        
        .btn-trade-submit.btn-sell { background: var(--accent-red); }
        .btn-trade-submit.btn-sell:not(:disabled):hover { background: #e13d53; }

        .btn-trade-submit:disabled {
            background: #182029 !important;
            color: #435365 !important;
            cursor: not-allowed;
            opacity: 0.8;
        }

        /* Метрики сети */
        .market-info-block {
            border-top: 1px dashed var(--border-color);
            padding-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .info-row { display: flex; justify-content: space-between; font-size: 11px; }
        .info-row .lbl { color: var(--text-muted); }
        .info-row .val { font-family: 'JetBrains Mono', monospace; }

        /* Служебное */
        .up { color: var(--accent-green); }
        .down { color: var(--accent-red); }
        .flash-green { animation: flashG 0.3s ease; }
        .flash-red { animation: flashR 0.3s ease; }

        @keyframes flashG { 0% { background: rgba(14, 203, 129, 0.12); } 100% { background: var(--bg-field); } }
        @keyframes flashR { 0% { background: rgba(246, 70, 93, 0.12); } 100% { background: var(--bg-field); } }
    </style>
</head>
<body>

<div class="terminal-container">
    <div class="term-header">
        <div class="brand-zone">
            <div class="logo-badge">S</div>
            <div class="title-pair">
                <h1>Svetsky Terminal</h1>
                <span>SVT / RUB</span>
            </div>
        </div>
        <div class="live-badge">● LIVE MARKET</div>
    </div>

    <div class="main-price-box" id="price-card">
        <div class="price-label" id="price-label-text">Текущая рыночная стоимость</div>
        <div class="price-value" id="current-price">10.00 ₽</div>
        <div class="price-direction up" id="price-change">+0.00%</div>
    </div>

    <div class="timeframes-bar">
        <button class="tf-btn active" onclick="changeTimeframe('1m', 5000)">1м</button>
        <button class="tf-btn" onclick="changeTimeframe('5m', 25000)">5m</button>
        <button class="tf-btn" onclick="changeTimeframe('1ч', 300000)">1ч</button>
        <button class="tf-btn" onclick="changeTimeframe('1д', 7200000)">1д</button>
    </div>

    <div class="chart-box">
        <canvas id="analyticsChart"></canvas>
    </div>

    <div class="orderbook-box">
        <div class="ob-header">
            <span>Заявки на покупку (SVT)</span>
            <span>Заявки на продажу (SVT)</span>
        </div>
        <div class="ob-tables">
            <div id="bids-table"></div>
            <div id="asks-table"></div>
        </div>
    </div>

    <div class="calculator-box">
        <div class="trade-tabs">
            <button class="tab-btn buy-active" id="tab-buy" onclick="setTradeMode('buy')">Купить</button>
            <button class="tab-btn" id="tab-sell" onclick="setTradeMode('sell')">Продать</button>
        </div>

        <div class="user-wallet-info">
            <div class="wallet-card">
                <span>Баланс RUB</span>
                <strong id="user-rub">100.00 ₽</strong>
            </div>
            <div class="wallet-card">
                <span>Баланс SVT</span>
                <strong id="user-svt" style="color: var(--accent-green);">0.00 SVT</strong>
            </div>
        </div>

        <div class="input-container-row">
            <div class="input-wrapper">
                <input type="number" id="trade-input" value="10" placeholder="0.00">
                <span class="input-currency" id="input-unit">RUB</span>
            </div>
            <button class="btn-max" onclick="handleMaxAction()">MAX</button>
        </div>

        <div class="calc-result">
            <span id="calc-result-label">Итого к зачислению:</span>
            <span><strong id="calc-result-value" style="color: var(--accent-green);">1.00</strong> <strong id="calc-result-unit" style="color:#fff">SVT</strong></span>
        </div>

        <button class="btn-trade-submit btn-buy" id="submit-trade-btn" onclick="executeTrade()">
            Купить SVT
        </button>
    </div>

    <div class="market-info-block">
        <div class="info-row">
            <span class="lbl">Рыночная капитализация</span>
            <span class="val" id="market-cap" style="color: #fff;">120,500,000 ₽</span>
        </div>
        <div class="info-row">
            <span class="lbl">Объем торгов (24ч)</span>
            <span class="val" id="volume-24h" style="color: #fff;">4,812,400 ₽</span>
        </div>
    </div>
</div>

<script>
    let userBalanceRUB = 100.00;
    let userBalanceSVT = 0.00;
    let tradeMode = 'buy'; 

    let basePrice = 10.00;
    let currentPrice = basePrice;
    
    let marketTrend = 0;
    let trendDuration = 0; 
    let updateSpeed = 5000; 

    const maxDataPoints = 25;
    const labels = [];
    const dataPoints = [];

    function generateHistory(stepMs) {
        labels.length = 0;
        dataPoints.length = 0;
        let now = Date.now();
        let tempPrice = currentPrice;

        let historyTrend = (Math.random() * 2 - 1);
        for (let i = maxDataPoints - 1; i >= 0; i--) {
            let t = new Date(now - i * stepMs);
            let timeStr = t.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            labels.push(timeStr);

            if (i > 0) {
                if (Math.random() < 0.2) historyTrend = (Math.random() * 2 - 1);
                let change = tempPrice * ((historyTrend * (Math.random() * 1.5 + 0.2)) / 100);
                tempPrice -= change;
                if (tempPrice < 5.00) tempPrice = 5.00;
                if (tempPrice > 55.00) tempPrice = 55.00;
            }
            dataPoints.push(i === 0 ? currentPrice : tempPrice);
        }
    }

    generateHistory(updateSpeed);

    const crosshairPlugin = {
        id: 'crosshair',
        afterDraw: (chart) => {
            if (chart.tooltip?._active?.length && chart.tooltip.opacity !== 0) {
                const activePoint = chart.tooltip._active[0];
                const ctx = chart.ctx;
                const x = activePoint.element.x;
                const topY = chart.scales.y.top;
                const bottomY = chart.scales.y.bottom;

                ctx.save();
                ctx.beginPath();
                ctx.moveTo(x, topY);
                ctx.lineTo(x, bottomY);
                ctx.lineWidth = 1;
                ctx.strokeStyle = 'rgba(98, 112, 127, 0.5)';
                ctx.setLineDash([3, 3]);
                ctx.stroke();
                ctx.restore();
            }
        }
    };

    const ctx = document.getElementById('analyticsChart').getContext('2d');
    const gradGreen = ctx.createLinearGradient(0, 0, 0, 160);
    gradGreen.addColorStop(0, 'rgba(14, 203, 129, 0.12)');
    gradGreen.addColorStop(1, 'rgba(14, 203, 129, 0.0)');

    const gradRed = ctx.createLinearGradient(0, 0, 0, 160);
    gradRed.addColorStop(0, 'rgba(246, 70, 93, 0.12)');
    gradRed.addColorStop(1, 'rgba(246, 70, 93, 0.0)');

    const chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                data: dataPoints,
                borderColor: '#0ECB81',
                borderWidth: 2,
                pointRadius: 0,
                hoverRadius: 6,
                pointHoverBackgroundColor: '#fff',
                pointHoverBorderColor: '#0ECB81',
                pointHoverBorderWidth: 3,
                fill: true,
                backgroundColor: gradGreen,
                tension: 0.35
            }]
        },
        plugins: [crosshairPlugin],
        options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: {
                mode: 'index',
                intersect: false
            },
            plugins: {
                legend: { display: false },
                tooltip: {
                    enabled: false,
                    external: function(context) {
                        const labelText = document.getElementById('price-label-text');
                        const priceDisplay = document.getElementById('current-price');
                        const tooltipModel = context.tooltip;

                        if (tooltipModel.opacity === 0) {
                            labelText.innerText = "Текущая рыночная стоимость";
                            labelText.style.color = "var(--text-muted)";
                            priceDisplay.innerText = currentPrice.toFixed(2) + ' ₽';
                            return;
                        }

                        const index = tooltipModel.dataPoints[0].dataIndex;
                        const hoveredPrice = tooltipModel.dataPoints[0].raw;
                        const hoveredTime = chart.data.labels[index];

                        labelText.innerText = `Цена в ${hoveredTime}`;
                        labelText.style.color = "var(--accent-green)";
                        priceDisplay.innerText = hoveredPrice.toFixed(2) + ' ₽';
                    }
                },
                annotation: {
                    annotations: {
                        line1: {
                            type: 'line', yMin: basePrice, yMax: basePrice,
                            borderColor: 'rgba(14, 203, 129, 0.3)', borderWidth: 1, borderDash: [4, 4]
                        }
                    }
                }
            },
            scales: {
                x: { grid: { display: false }, ticks: { display: false } },
                y: {
                    grid: { color: '#131A22' },
                    ticks: {
                        color: '#434E5A',
                        font: { family: 'JetBrains Mono', size: 10 },
                        callback: function(v) { return v.toFixed(2) + ' ₽'; }
                    }
                }
            }
        }
    });

    // Очистка и мгновенный сброс точки (Фикс зависания для тач-скринов)
    function resetActivePoint() {
        chart.setActiveElements([]); 
        chart.tooltip.setActiveElements([], {x: 0, y: 0}); 
        chart.update('none'); 
        
        document.getElementById('price-label-text').innerText = "Текущая рыночная стоимость";
        document.getElementById('price-label-text').style.color = "var(--text-muted)";
        document.getElementById('current-price').innerText = currentPrice.toFixed(2) + ' ₽';
    }

    const canvasEl = document.getElementById('analyticsChart');
    ['touchend', 'touchcancel', 'mouseleave', 'pointerout'].forEach(evtType => {
        canvasEl.addEventListener(evtType, resetActivePoint);
    });
    window.addEventListener('scroll', resetActivePoint);

    let currentInterval = null;

    function changeTimeframe(tf, speed) {
        document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        
        updateSpeed = speed;
        generateHistory(updateSpeed);
        
        chart.data.labels = [...labels];
        chart.data.datasets[0].data = [...dataPoints];
        chart.update();
        
        clearInterval(currentInterval);
        currentInterval = setInterval(tickTerminalEngine, updateSpeed);
    }

    const tradeInput = document.getElementById('trade-input');
    const calcResultLabel = document.getElementById('calc-result-label');
    const calcResultValue = document.getElementById('calc-result-value');
    const calcResultUnit = document.getElementById('calc-result-unit');
    const submitTradeBtn = document.getElementById('submit-trade-btn');

    function setTradeMode(mode) {
        tradeMode = mode;
        const tabBuy = document.getElementById('tab-buy');
        const tabSell = document.getElementById('tab-sell');
        const inputUnit = document.getElementById('input-unit');

        if (mode === 'buy') {
            tabBuy.classList.add('buy-active');
            tabSell.classList.remove('sell-active');
            inputUnit.innerText = 'RUB';
            submitTradeBtn.className = 'btn-trade-submit btn-buy';
            submitTradeBtn.innerText = 'Купить SVT';
            tradeInput.value = "10";
        } else {
            tabBuy.classList.remove('buy-active');
            tabSell.classList.add('sell-active');
            inputUnit.innerText = 'SVT';
            submitTradeBtn.className = 'btn-trade-submit btn-sell';
            submitTradeBtn.innerText = 'Продать SVT';
            tradeInput.value = userBalanceSVT > 0 ? userBalanceSVT.toFixed(2) : "0";
        }
        updateTradingCalculations();
    }

    function handleMaxAction() {
        if (tradeMode === 'buy') {
            tradeInput.value = userBalanceRUB.toFixed(2);
        } else {
            tradeInput.value = userBalanceSVT.toFixed(2);
        }
        updateTradingCalculations();
    }

    function updateTradingCalculations() {
        const value = parseFloat(tradeInput.value) || 0;

        if (tradeMode === 'buy') {
            calcResultLabel.innerText = 'Итого к зачислению:';
            const outSVT = value / currentPrice;
            calcResultValue.innerText = outSVT.toFixed(2);
            calcResultValue.style.color = 'var(--accent-green)';
            calcResultUnit.innerText = 'SVT';

            if (value > userBalanceRUB || value <= 0) {
                submitTradeBtn.disabled = true;
                submitTradeBtn.innerText = value > userBalanceRUB ? 'Недостаточно средств' : 'Укажите сумму';
            } else {
                submitTradeBtn.disabled = false;
                submitTradeBtn.innerText = 'Купить SVT';
            }
        } else {
            calcResultLabel.innerText = 'Итого к получению:';
            const outRUB = value * currentPrice;
            calcResultValue.innerText = outRUB.toFixed(2);
            calcResultValue.style.color = 'var(--accent-red)';
            calcResultUnit.innerText = 'RUB';

            if (value > userBalanceSVT || value <= 0) {
                submitTradeBtn.disabled = true;
                submitTradeBtn.innerText = value > userBalanceSVT ? 'Недостаточно SVT' : 'Укажите сумму';
            } else {
                submitTradeBtn.disabled = false;
                submitTradeBtn.innerText = 'Продать SVT';
            }
        }
    }
    tradeInput.addEventListener('input', updateTradingCalculations);

    function executeTrade() {
        const inputValue = parseFloat(tradeInput.value) || 0;
        if (inputValue <= 0) return;

        if (tradeMode === 'buy') {
            if (inputValue <= userBalanceRUB) {
                const acquiredSVT = inputValue / currentPrice;
                userBalanceRUB -= inputValue;
                userBalanceSVT += acquiredSVT;
            }
        } else {
            if (inputValue <= userBalanceSVT) {
                const acquiredRUB = inputValue * currentPrice;
                userBalanceSVT -= inputValue;
                userBalanceRUB += acquiredRUB;
            }
        }

        document.getElementById('user-rub').innerText = userBalanceRUB.toFixed(2) + ' ₽';
        document.getElementById('user-svt').innerText = userBalanceSVT.toFixed(2) + ' SVT';

        tradeInput.value = tradeMode === 'buy' ? "0" : userBalanceSVT.toFixed(2);
        updateTradingCalculations();
    }

    function refreshOrderBook() {
        const bidsTable = document.getElementById('bids-table');
        const asksTable = document.getElementById('asks-table');
        bidsTable.innerHTML = '';
        asksTable.innerHTML = '';

        for(let i=0; i<4; i++) {
            const bidPrice = currentPrice - (Math.random() * 0.15 + 0.02);
            const bidVol = (Math.random() * 900 + 40).toFixed(1);
            bidsTable.innerHTML += `<div class="ob-row"><span class="up">${Math.max(0.1, bidPrice).toFixed(2)}</span><span style="color:var(--text-muted)">${bidVol}</span></div>`;

            const askPrice = currentPrice + (Math.random() * 0.15 + 0.02);
            const askVol = (Math.random() * 900 + 40).toFixed(1);
            asksTable.innerHTML += `<div class="ob-row"><span class="down">${askPrice.toFixed(2)}</span><span style="color:var(--text-muted)">${askVol}</span></div>`;
        }
    }

    function tickTerminalEngine() {
        if (trendDuration <= 0) {
            trendDuration = Math.floor(Math.random() * 8) + 5;
            if (currentPrice <= 6.5) {
                marketTrend = Math.random() * 0.6 + 0.4; 
            } else if (currentPrice >= 48) {
                marketTrend = -(Math.random() * 0.6 + 0.4); 
            } else {
                marketTrend = (Math.random() * 2 - 1); 
            }
        }
        trendDuration--;

        let volatility = (Math.random() * 1.6 + 0.4); 
        let changePercent = (marketTrend * volatility);

        const priceDiff = currentPrice * (changePercent / 100);
        currentPrice += priceDiff;

        if (currentPrice < 5.00) currentPrice = 5.00 + (Math.random() * 0.2);
        if (currentPrice > 55.00) currentPrice = 55.00 - (Math.random() * 0.4);

        const totalChange = ((currentPrice - basePrice) / basePrice) * 100;

        if (document.getElementById('price-label-text').innerText === "Текущая рыночная стоимость") {
            document.getElementById('current-price').innerText = currentPrice.toFixed(2) + ' ₽';
        }
        
        updateTradingCalculations();

        document.getElementById('market-cap').innerText = Math.round(12050000 * currentPrice).toLocaleString('ru-RU') + ' ₽';
        document.getElementById('volume-24h').innerText = Math.round(4812400 + (Math.random()*40000 - 20000)).toLocaleString('ru-RU') + ' ₽';

        const priceCard = document.getElementById('price-card');
        const changeEl = document.getElementById('price-change');
        priceCard.classList.remove('flash-green', 'flash-red');

        if (priceDiff >= 0) {
            void priceCard.offsetWidth;
            priceCard.classList.add('flash-green');
            changeEl.innerText = (totalChange >= 0 ? '+' : '') + totalChange.toFixed(2) + '%';
            changeEl.className = 'price-direction up';
            chart.data.datasets[0].borderColor = '#0ECB81';
            chart.data.datasets[0].backgroundColor = gradGreen;
            chart.data.datasets[0].pointHoverBorderColor = '#0ECB81';
            chart.options.plugins.annotation.annotations.line1.borderColor = 'rgba(14, 203, 129, 0.3)';
        } else {
            void priceCard.offsetWidth;
            priceCard.classList.add('flash-red');
            changeEl.innerText = totalChange.toFixed(2) + '%';
            changeEl.className = 'price-direction down';
            chart.data.datasets[0].borderColor = '#F6465D';
            chart.data.datasets[0].backgroundColor = gradRed;
            chart.data.datasets[0].pointHoverBorderColor = '#F6465D';
            chart.options.plugins.annotation.annotations.line1.borderColor = 'rgba(246, 70, 93, 0.3)';
        }

        let t = new Date();
        chart.data.labels.shift();
        chart.data.labels.push(t.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit', second: '2-digit' }));

        chart.data.datasets[0].data.shift();
        chart.data.datasets[0].data.push(currentPrice);
        chart.options.plugins.annotation.annotations.line1.yMin = currentPrice;
        chart.options.plugins.annotation.annotations.line1.yMax = currentPrice;
        chart.update('none');

        refreshOrderBook();
    }

    currentInterval = setInterval(tickTerminalEngine, updateSpeed);
    tickTerminalEngine();
</script>

</body>
</html>
