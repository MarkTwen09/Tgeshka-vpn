<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SO2 Case Simulator</title>
    <style>
        body {
            background-color: #0b0e14;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .balance {
            font-size: 24px;
            margin-bottom: 20px;
            color: #ffcc00;
            text-shadow: 0 0 10px rgba(255, 204, 0, 0.5);
        }

        /* Окно рулетки */
        .roulette-container {
            position: relative;
            width: 800px;
            height: 160px;
            background: #151a21;
            border: 2px solid #2d353f;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
        }

        /* Красная линия по центру */
        .pointer {
            position: absolute;
            left: 50%;
            top: 0;
            width: 4px;
            height: 100%;
            background: #ff4747;
            z-index: 10;
            transform: translateX(-50%);
            box-shadow: 0 0 15px #ff4747;
        }

        /* Лента со скинами */
        .cases-line {
            display: flex;
            position: absolute;
            left: 0;
            top: 10px;
            transition: transform 7s cubic-bezier(0.1, 0, 0.1, 1); /* Плавное замедление */
            will-change: transform;
        }

        .skin-card {
            min-width: 140px;
            height: 140px;
            margin: 0 5px;
            background: #1c222b;
            border-bottom: 4px solid #ccc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            text-align: center;
            font-size: 12px;
        }

        /* Цвета редкостей */
        .common { border-color: #b0c3d9; }
        .uncommon { border-color: #5e98d9; }
        .rare { border-color: #4b69ff; }
        .epic { border-color: #8847ff; }
        .legendary { border-color: #d32ce6; }
        .arcane { border-color: #eb4b4b; }

        .skin-img {
            width: 90px;
            height: 70px;
            background: #252c38;
            margin-bottom: 10px;
            border-radius: 4px;
        }

        button {
            margin-top: 40px;
            padding: 15px 50px;
            background: #ffcc00;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #ffe066;
            transform: scale(1.05);
        }

        button:disabled {
            background: #555;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="balance">Баланс: <span id="money">1000</span> G</div>

    <div class="roulette-container">
        <div class="pointer"></div>
        <div class="cases-line" id="line"></div>
    </div>

    <button id="spinBtn" onclick="startSpin()">ОТКРЫТЬ КЕЙС (100 G)</button>

    <script>
        const line = document.getElementById('line');
        const moneyEl = document.getElementById('money');
        const btn = document.getElementById('spinBtn');
        
        let balance = 1000;
        const cardWidth = 150; // ширина карточки + отступы

        const skins = [
            { name: "G22 | Casual", rarity: "common" },
            { name: "P350 | Nano", rarity: "uncommon" },
            { name: "AKR | Tiger", rarity: "rare" },
            { name: "M4 | Lizard", rarity: "epic" },
            { name: "AWM | Scratch", rarity: "legendary" },
            { name: "Karambit | Gold", rarity: "arcane" }
        ];

        // Шансы (чем выше число, тем чаще падает)
        const rarityWeights = {
            common: 50,
            uncommon: 30,
            rare: 12,
            epic: 5,
            legendary: 2,
            arcane: 1
        };

        function getRandomSkin() {
            let pool = [];
            skins.forEach(skin => {
                for (let i = 0; i < rarityWeights[skin.rarity]; i++) {
                    pool.push(skin);
                }
            });
            return pool[Math.floor(Math.random() * pool.length)];
        }

        function generateSkins(count) {
            line.innerHTML = '';
            for (let i = 0; i < count; i++) {
                const skin = getRandomSkin();
                const card = document.createElement('div');
                card.className = `skin-card ${skin.rarity}`;
                card.innerHTML = `
                    <div class="skin-img"></div>
                    <div>${skin.name}</div>
                `;
                line.appendChild(card);
            }
        }

        function startSpin() {
            if (balance < 100) return alert("Недостаточно голды!");
            
            balance -= 100;
            moneyEl.innerText = balance;
            btn.disabled = true;

            // Генерируем 50 скинов для ленты
            generateSkins(50);
            
            // Сбрасываем позицию
            line.style.transition = 'none';
            line.style.transform = 'translateX(0)';
            
            // Запускаем анимацию через минимальный таймаут
            setTimeout(() => {
                const stopPos = (47 * cardWidth) - (400 - cardWidth / 2); 
                // 47 - номер выигрышного скина, 400 - центр контейнера
                const randomOffset = Math.floor(Math.random() * 100) - 50; // рандом внутри карточки
                
                line.style.transition = 'transform 7s cubic-bezier(0.1, 0, 0.1, 1)';
                line.style.transform = `translateX(-${stopPos + randomOffset}px)`;
            }, 50);

            // Когда анимация кончилась
            setTimeout(() => {
                btn.disabled = false;
                // Здесь можно добавить всплывающее окно с призом
            }, 7100);
        }

        // Первичная генерация для красоты
        generateSkins(50);
    </script>
</body>
</html>
