<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SO2: CLICKER EDITION V13.6 (FINAL FIX)</title>
    <style>
        :root {
            --bg: #0a0f1b;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #ffcc00; --silver: #b0c3d9; --blue: #00d2ff;
            --up: #00ff88; --down: #ff4d4d;
            --common: #b0c3d9; --uncommon: #5e98d9; --rare: #4b69ff; --epic: #8847ff; --legendary: #d32ce6; --arcane: #eb4b4b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body {
            background: var(--bg); background: radial-gradient(circle at 50% -10%, #1a2a4d 0%, #0a0f1b 100%);
            color: white; font-family: 'SF Pro Display', sans-serif; margin: 0; padding: 12px;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow: hidden;
        }

        .header {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); width: 100%; max-width: 480px;
            padding: 15px 20px; border-radius: 32px; border: 1px solid var(--border); margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center; width: 100%;
            cursor: pointer; transition: transform 0.1s; position: relative; overflow: hidden;
        }
        .header:active { transform: scale(0.98); background: rgba(255, 255, 255, 0.07); }
        
        .click-anim {
            position: absolute; color: var(--silver); font-weight: 900; font-size: 14px;
            pointer-events: none; animation: floatUp 0.6s ease-out forwards; z-index: 100;
        }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-40px); opacity: 0; } }

        .currency-row { display: flex; gap: 15px; }
        .balance-item { display: flex; flex-direction: column; }
        .balance-item label { font-size: 9px; opacity: 0.5; text-transform: uppercase; }
        .gold-txt { color: var(--accent); } .silver-txt { color: var(--silver); }

        .mission-panel {
            background: rgba(0, 210, 255, 0.05); border: 1px dashed var(--blue);
            width: 100%; max-width: 480px; border-radius: 20px; padding: 12px; margin-bottom: 15px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .mission-info h4 { margin: 0; font-size: 13px; color: var(--blue); }
        .m-progress { font-weight: 900; color: #fff; margin-left: 10px; }

        .tabs { display: flex; gap: 8px; width: 100%; max-width: 480px; margin-bottom: 15px; }
        .tab { 
            flex: 1; padding: 12px; background: var(--glass); border: 1px solid var(--border);
            color: #777; border-radius: 15px; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 10px; text-align: center;
        }
        .tab.active { background: var(--blue); color: #000; border: none; }

        .view { display: none; width: 100%; max-width: 480px; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding-bottom: 30px; overflow-y: auto; max-height: 50vh; width: 100%; }
        .card { background: var(--glass); padding: 15px; border-radius: 22px; text-align: center; border: 1px solid var(--border); position: relative; transition: 0.2s; cursor: pointer; }
        .card.selected { border: 2px solid var(--up); box-shadow: 0 0 15px rgba(0,255,136,0.2); }
        
        /* Стили для новых иконок (теперь они могут быть картинками) */
        .skin-icon { font-size: 40px; margin-bottom: 5px; height: 50px; display: flex; align-items: center; justify-content: center; }
        .skin-icon img { max-width: 100%; max-height: 100%; object-fit: contain; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5)); }

        .market-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .market-header .skin-icon { font-size: 20px; height: 30px; margin: 0; }
        .price-change-row { display: flex; align-items: center; gap: 4px; font-size: 10px; font-weight: 900; }
        .price-up { color: var(--up); } .price-down { color: var(--down); }

        .case-selector { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 15px; }
        .case-card { background: var(--glass); padding: 8px; border-radius: 15px; border: 1px solid var(--border); text-align: center; cursor: pointer; font-size: 10px; }
        .case-card.active { border-color: var(--blue); background: rgba(0, 210, 255, 0.1); }

        .glow-circle { 
            position: absolute; width: 320px; height: 320px; 
            background: radial-gradient(circle, var(--rarity-color) 0%, transparent 70%);
            top: 45%; left: 50%; transform: translate(-50%, -50%); opacity: 0.6; 
            filter: blur(50px); z-index: -1; animation: pulseGlow 2.5s infinite ease-in-out; 
        }
        @keyframes pulseGlow { 0%, 100% { opacity: 0.4; transform: translate(-50%, -50%) scale(1); } 50% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.25); } }
        
        .win-item-icon { margin-bottom: 20px; animation: floating 3s infinite ease-in-out; }
        .win-item-icon span { font-size: 110px; filter: drop-shadow(0 0 30px var(--rarity-color)); }
        .win-item-icon img { width: 220px; filter: drop-shadow(0 0 30px var(--rarity-color)); }
        @keyframes floating { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-25px) rotate(5deg); } }

        .roulette-container { height: 130px; background: rgba(0,0,0,0.4); border-radius: 25px; position: relative; overflow: hidden; margin-bottom: 15px; border: 1px solid var(--border); }
        .track { display: flex; position: absolute; left: 0; top: 10px; transition: transform 6s cubic-bezier(0.1, 0, 0, 1); }
        .t-item { min-width: 110px; height: 110px; margin: 0 6px; background: var(--glass); border-radius: 20px; display: flex; align-items: center; justify-content: center; border-bottom: 5px solid #333; }
        .t-item span { font-size: 40px; }
        .t-item img { width: 80px; height: 60px; object-fit: contain; }
        .pointer { position: absolute; left: 50%; width: 3px; height: 100%; background: #ff3e3e; z-index: 10; transform: translateX(-50%); }

        .btn-main { width: 100%; padding: 18px; border: none; border-radius: 20px; font-weight: 900; cursor: pointer; background: var(--accent); color: #000; text-transform: uppercase; font-size: 13px; }
        .btn-main:disabled { opacity: 0.2; pointer-events: none; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5,7,12,0.98); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(20px); }
        .modal { background: #121929; padding: 25px; border-radius: 30px; border: 1px solid var(--border); width: 85%; max-width: 380px; text-align: center; }
    </style>
</head>
<body>

    <div class="header" onclick="clicker(event)">
        <div class="currency-row">
            <div class="balance-item"><label>Gold</label><b class="gold-txt"><span id="money">0</span> G</b></div>
            <div class="balance-item"><label>Silver</label><b class="silver-txt"><span id="silver">0</span> S</b></div>
        </div>
        <div style="font-size: 10px; opacity: 0.4; text-align: right;">ТАПАЙ ТУТ<br>V13.6 (AUTONOMOUS) • kaoface</div>
    </div>

    <div class="mission-panel" id="missionBox">
        <div class="mission-info"><h4 id="mTitle">Миссии</h4><p id="mDesc" style="margin:2px 0; font-size:11px; opacity:0.7;">Фарми валюту</p></div>
        <div style="display:flex; align-items:center; gap:10px;"><span class="m-progress" id="mProgress">0/0</span><button id="mClaimBtn" onclick="claimMission()" style="background:var(--up); border:none; border-radius:10px; padding:8px 12px; font-weight:bold; display:none; color:#000;">Взять</button></div>
    </div>

    <div class="tabs">
        <div id="t-shop" class="tab active" onclick="tab('shop')">Кейсы</div>
        <div id="t-inv" class="tab" onclick="tab('inv')">Инв</div>
        <div id="t-market" class="tab" onclick="tab('market')">Рынок</div>
        <div id="t-craft" class="tab" onclick="tab('craft')">Крафт</div>
    </div>

    <div id="shop" class="view" style="display: block;">
        <div class="case-selector">
            <div id="c0" class="case-card" onclick="setCase(0)">🔘 100S</div>
            <div id="c1" class="case-card active" onclick="setCase(1)">📦 250G</div>
            <div id="c2" class="case-card" onclick="setCase(2)">📦 500G</div>
            <div id="c3" class="case-card" onclick="setCase(3)">🔪 1500G</div>
        </div>
        <div class="roulette-container"><div class="pointer"></div><div id="track" class="track"></div></div>
        <button id="spinBtn" class="btn-main" onclick="openCase()">Открыть</button>
    </div>

    <div id="inv" class="view"><div id="invGrid" class="grid"></div></div>
    <div id="market" class="view"><div id="marketGrid" class="grid"></div></div>
    <div id="craft" class="view">
        <button id="craftBtn" class="btn-main" style="margin-bottom:15px;" disabled onclick="doCraft()">Начать крафт (10 шт)</button>
        <div id="craftGrid" class="grid"></div>
    </div>

    <div id="winOverlay" class="overlay">
        <div style="text-align:center; position:relative;">
            <div id="winIcon" class="win-item-icon"></div>
            <h2 id="winName" style="margin:0; font-size: 28px;">Item</h2>
            <p id="winRarity" style="font-weight:900; letter-spacing:4px; margin:15px 0 40px; font-size: 14px;"></p>
            <button class="btn-main" onclick="takeWin()" style="margin-bottom: 12px;">В инвентарь</button>
            <button class="btn-main" style="background:none; color:rgba(255,255,255,0.3); border: 1px solid var(--border);" id="sellBtnWin" onclick="sellWin()">Продать</button>
        </div>
    </div>

    <div id="confirmOverlay" class="overlay">
        <div class="modal">
            <h3>Продать предмет?</h3>
            <p id="confirmText" style="opacity:0.7; margin-bottom:20px;"></p>
            <div style="display:flex; gap:10px;">
                <button class="btn-main" style="background:#222; color:#fff;" onclick="closeConfirm()">Отмена</button>
                <button class="btn-main" id="confirmOk" style="background:var(--up);">Продать</button>
            </div>
        </div>
    </div>
