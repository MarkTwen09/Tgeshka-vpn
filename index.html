<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>РАДАР ВРВ | Мониторинг угроз (Telegram)</title>
    <!-- Leaflet CSS + JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            background: #000;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: fixed;
        }
        #map {
            height: 100%;
            width: 100%;
            z-index: 1;
        }
        /* Статус-бар */
        .status-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            z-index: 1000;
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255, 50, 50, 0.4);
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 8px;
        }
        .status-title {
            font-weight: 700;
            font-size: 1rem;
            color: #ff3a3a;
            background: rgba(0,0,0,0.6);
            padding: 4px 10px;
            border-radius: 40px;
        }
        .status-badge {
            font-size: 0.75rem;
            color: #ddd;
            background: #1a1a1a;
            padding: 4px 12px;
            border-radius: 30px;
            font-family: monospace;
        }
        .last-update {
            font-size: 0.7rem;
            color: #88ff88;
            background: #1a2a1a;
            padding: 4px 10px;
            border-radius: 30px;
            font-family: monospace;
        }
        /* Панель угроз */
        .threat-panel {
            position: fixed;
            bottom: 20px;
            left: 12px;
            right: 12px;
            max-height: 35%;
            background: rgba(10, 10, 15, 0.92);
            backdrop-filter: blur(16px);
            border-radius: 28px;
            border: 1px solid rgba(255, 60, 60, 0.5);
            z-index: 1000;
            padding: 14px 12px;
            overflow-y: auto;
            font-size: 0.85rem;
        }
        .threat-panel h3 {
            color: #ff5e5e;
            font-size: 0.9rem;
            margin-bottom: 10px;
            border-left: 3px solid #ff3333;
            padding-left: 10px;
        }
        .threat-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .threat-item {
            background: rgba(25, 25, 35, 0.8);
            border-radius: 20px;
            padding: 10px 12px;
            border-left: 4px solid #ff4444;
        }
        .threat-region {
            font-weight: bold;
            color: #ff8888;
            display: flex;
            justify-content: space-between;
        }
        .threat-time {
            font-family: monospace;
            background: #00000066;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
            color: #ffaa88;
        }
        .threat-message {
            color: #e0e0e0;
            margin-top: 5px;
            font-size: 0.7rem;
            word-break: break-word;
        }
        .empty-list {
            color: #aaa;
            text-align: center;
            padding: 12px;
        }
        /* Лог-панель */
        .log-panel {
            position: fixed;
            bottom: 20px;
            right: 12px;
            max-width: 280px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            border-radius: 12px;
            padding: 8px 12px;
            font-size: 0.7rem;
            font-family: monospace;
            color: #0f0;
            z-index: 1000;
            border-left: 3px solid #ff4444;
            pointer-events: none;
            max-height: 150px;
            overflow-y: auto;
        }
        .log-panel div {
            margin: 2px 0;
            word-break: break-word;
        }
        @media (min-width: 600px) {
            .threat-panel { max-width: 320px; right: auto; left: 16px; bottom: 20px; max-height: 50%; }
            .log-panel { bottom: 20px; right: 20px; }
        }
        /* Анимация свечения для опасных регионов */
        @keyframes redGlow {
            0% { filter: drop-shadow(0 0 2px red) drop-shadow(0 0 4px #ff4444); }
            100% { filter: drop-shadow(0 0 12px red) drop-shadow(0 0 8px #ff6666); }
        }
        .danger-glow {
            animation: redGlow 1s ease-in-out infinite alternate;
        }
        /* Маркер */
        .custom-warning-icon {
            background: #ff3333;
            border-radius: 50%;
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 22px;
            color: white;
            border: 2px solid rgba(255,255,255,0.9);
            box-shadow: 0 0 0 0 rgba(255,0,0,0.7);
            animation: markerPulse 1.5s infinite;
        }
        @keyframes markerPulse {
            0% { box-shadow: 0 0 0 0 rgba(255,0,0,0.7); transform: scale(1); }
            70% { box-shadow: 0 0 0 12px rgba(255,0,0,0); transform: scale(1.05); }
            100% { box-shadow: 0 0 0 0 rgba(255,0,0,0); transform: scale(1); }
        }
    </style>
</head>
<body>
<div id="map"></div>
<div class="status-bar">
    <span class="status-title">⚡ РАДАР ВРВ (Telegram)</span>
    <div style="display: flex; gap: 8px;">
        <span class="status-badge" id="updateStatus">🟢 ОБНОВЛЯЕТСЯ...</span>
        <span class="last-update" id="lastUpdateTime">—:—:—</span>
    </div>
</div>
<div class="threat-panel" id="threatPanel">
    <h3>⚠️ АКТИВНЫЕ УГРОЗЫ</h3>
    <ul class="threat-list" id="threatList"><li class="empty-list">Нет активных тревог</li></ul>
</div>
<div class="log-panel" id="logPanel">
    <div>📡 Инициализация...</div>
</div>

<script>
    // ---------- 1. КАРТА ----------
    const map = L.map('map').setView([54.5, 37.5], 6);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; CartoDB',
        subdomains: 'abcd',
        minZoom: 4,
        maxZoom: 10
    }).addTo(map);

    // ---------- 2. ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ----------
    let geoJsonLayer;               // слой GeoJSON
    let regionLayers = new Map();   // полное название региона -> объект слоя Leaflet
    let regionCenters = new Map();  // центр региона для маркеров
    let activeMarkers = [];         // массив маркеров
    let activeThreats = new Map();  // регион -> { message, time }

    // Словарь соответствия: короткое упоминание -> полное название (как в GeoJSON)
    const regionMapping = new Map([
        ["Белгород", "Белгородская область"],
        ["Курск", "Курская область"],
        ["Воронеж", "Воронежская область"],
        ["Ростов", "Ростовская область"],
        ["Брянск", "Брянская область"],
        ["Ставрополь", "Ставропольский край"],
        ["Краснодар", "Краснодарский край"],
        ["Харьков", "Харьковская область"],
        ["Сумы", "Сумская область"],
        ["Киев", "Киевская область"]
    ]);

    // Стили
    const defaultStyle = {
        color: "#666",
        weight: 1.5,
        fillColor: "#222",
        fillOpacity: 0.4,
        opacity: 0.7
    };
    const alertStyle = {
        color: "#ff0000",
        weight: 3,
        fillColor: "red",
        fillOpacity: 0.5,
        opacity: 1
    };

    // ---------- 3. ЛОГИРОВАНИЕ ----------
    const logPanel = document.getElementById('logPanel');
    function addLog(msg) {
        const div = document.createElement('div');
        div.textContent = `> ${new Date().toLocaleTimeString()} ${msg}`;
        logPanel.appendChild(div);
        logPanel.scrollTop = logPanel.scrollHeight;
        // ограничим 30 сообщениями
        while (logPanel.children.length > 30) logPanel.removeChild(logPanel.firstChild);
        console.log(msg);
    }

    // ---------- 4. ЗАГРУЗКА GEOJSON (реальные границы) ----------
    async function loadGeoJson() {
        addLog("Загрузка GeoJSON...");
        const url = 'https://raw.githubusercontent.com/codeforgermany/click_dummy_topolevel/master/russia_geojson_with_regions.json';
        try {
            const resp = await fetch(url);
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            const data = await resp.json();

            if (geoJsonLayer) map.removeLayer(geoJsonLayer);
            regionLayers.clear();
            regionCenters.clear();

            geoJsonLayer = L.geoJSON(data, {
                style: defaultStyle,
                onEachFeature: (feature, layer) => {
                    // Определяем название региона
                    let name = feature.properties.name || feature.properties.NAME_1 || feature.properties.region;
                    if (!name) name = feature.properties.NAME || feature.properties.admin;
                    if (name) {
                        name = name.trim();
                        regionLayers.set(name, layer);
                        layer.properties = { name };
                        layer.bindTooltip(name, { sticky: true });
                        // Сохраняем центр
                        try {
                            const center = layer.getBounds().getCenter();
                            regionCenters.set(name, center);
                        } catch(e) {}
                    }
                }
            }).addTo(map);

            if (geoJsonLayer.getBounds().isValid()) map.fitBounds(geoJsonLayer.getBounds());
            addLog(`GeoJSON загружен, регионов: ${regionLayers.size}`);
            return true;
        } catch (err) {
            addLog(`❌ Ошибка GeoJSON: ${err.message}`);
            document.getElementById('updateStatus').innerHTML = "❌ Ошибка карты";
            return false;
        }
    }

    // ---------- 5. ФУНКЦИИ ОБНОВЛЕНИЯ СТИЛЯ И МАРКЕРОВ ----------
    function applyRegionStyle(regionFullName, isDanger) {
        const layer = regionLayers.get(regionFullName);
        if (!layer) return false;
        if (isDanger) {
            layer.setStyle(alertStyle);
            // Добавляем класс свечения
            if (layer._path) layer._path.classList.add('danger-glow');
        } else {
            layer.setStyle(defaultStyle);
            if (layer._path) layer._path.classList.remove('danger-glow');
        }
        return true;
    }

    function addMarkerForRegion(regionFullName) {
        const center = regionCenters.get(regionFullName);
        if (!center) return null;
        const icon = L.divIcon({
            className: 'custom-warning-icon',
            html: '!',
            iconSize: [34, 34],
            popupAnchor: [0, -15]
        });
        const marker = L.marker(center, { icon }).addTo(map);
        marker.bindTooltip(`⚠️ ${regionFullName} · УГРОЗА`, { sticky: true });
        return marker;
    }

    function removeAllMarkers() {
        activeMarkers.forEach(m => map.removeLayer(m));
        activeMarkers = [];
    }

    // Обновление карты на основе activeThreats
    function updateMapFromThreats() {
        // Сначала сбрасываем стили и маркеры для всех
        for (let [name, layer] of regionLayers.entries()) {
            applyRegionStyle(name, false);
        }
        removeAllMarkers();

        // Затем применяем для активных угроз
        for (let [region, threat] of activeThreats.entries()) {
            applyRegionStyle(region, true);
            const marker = addMarkerForRegion(region);
            if (marker) activeMarkers.push(marker);
        }
    }

    // Обновление боковой панели
    function updateSidebar() {
        const listEl = document.getElementById('threatList');
        if (activeThreats.size === 0) {
            listEl.innerHTML = '<li class="empty-list">Нет активных тревог</li>';
            return;
        }
        let html = '';
        for (let [region, threat] of activeThreats.entries()) {
            html += `
                <li class="threat-item">
                    <div class="threat-region">
                        <span>🔴 ${escapeHtml(region)}</span>
                        <span class="threat-time">${escapeHtml(threat.time)}</span>
                    </div>
                    <div class="threat-message">${escapeHtml(threat.message)}</div>
                </li>
            `;
        }
        listEl.innerHTML = html;
    }

    function escapeHtml(s) {
        if (!s) return '';
        return s.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // ---------- 6. ПАРСИНГ TELEGRAM ----------
    async function fetchTelegramMessages() {
        const statusSpan = document.getElementById('updateStatus');
        statusSpan.innerHTML = "🟡 ЗАПРОС...";
        const timestamp = Date.now();
        const sourceUrl = `https://t.me/s/vrv_radar?t=${timestamp}`;
        const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(sourceUrl)}`;
        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 12000);
            const resp = await fetch(proxyUrl, { signal: controller.signal });
            clearTimeout(timeoutId);
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            const html = await resp.text();
            if (!html || html.length < 100) throw new Error("Пустой ответ");
            // Парсим последние 5 сообщений
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            const messageBlocks = doc.querySelectorAll('.tgme_widget_message_text');
            const messages = [];
            for (let block of messageBlocks) {
                const text = block.innerText.trim();
                if (text) messages.push(text);
            }
            const last5 = messages.slice(0, 5);
            addLog(`Получено сообщений: ${messages.length}, обработано: ${last5.length}`);
            statusSpan.innerHTML = "✅ ОБНОВЛЕНО";
            document.getElementById('lastUpdateTime').innerText = new Date().toLocaleTimeString();
            return last5;
        } catch (err) {
            clearTimeout();
            addLog(`❌ Ошибка Telegram: ${err.message}`);
            statusSpan.innerHTML = "❌ Ошибка связи";
            return [];
        }
    }

    // Извлечение времени из сообщения (или текущее)
    function extractTime(text) {
        const match = text.match(/(?:в\s*)?(\d{1,2}[:.]\d{2})/i);
        if (match) return match[1].replace('.', ':');
        return new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
    }

    // Обработка сообщений: определение опасности/отбоя
    function processMessages(messages) {
        const newThreats = new Map(); // регион -> { message, time }
        for (let msg of messages) {
            addLog(`Сообщение: ${msg.substring(0, 60)}...`);
            // Ищем регион из mapping
            let foundRegion = null;
            for (let [shortName, fullName] of regionMapping.entries()) {
                if (msg.includes(shortName)) {
                    foundRegion = fullName;
                    break;
                }
            }
            if (!foundRegion) continue;

            const lowerMsg = msg.toLowerCase();
            const isCancel = lowerMsg.includes("отбой");
            const time = extractTime(msg);

            if (isCancel) {
                // Отбой: удаляем регион из активных угроз
                if (activeThreats.has(foundRegion)) {
                    activeThreats.delete(foundRegion);
                    addLog(`🔴 Отбой: ${foundRegion} снята угроза`);
                }
                // также не добавляем в newThreats
            } else {
                // Новая угроза
                newThreats.set(foundRegion, { message: msg.substring(0, 120), time });
                addLog(`⚠️ Опасность в: ${foundRegion}`);
            }
        }

        // Объединяем: сохраняем старые угрозы, если они не были отменены в этой итерации,
        // и добавляем новые. Но чтобы избежать гонки, лучше полностью перестроить на основе
        // новых + старых, но с учётом, что если в новых есть регион, он заменяет старый.
        // Также если в новых нет региона, а он был активен, но не было отбоя – он остаётся активным.
        // Однако по логике мониторинга, если за последние 5 сообщений нет упоминания региона,
        // то он считается неактивным. Поэтому правильнее: activeThreats = newThreats.
        // Но это может сбросить угрозы, которые не попали в последние 5, но ещё актуальны.
        // Так как канал публикует только актуальные угрозы, будем заменять.
        activeThreats.clear();
        for (let [region, threat] of newThreats.entries()) {
            activeThreats.set(region, threat);
        }
        // Дополнительно: если был отбой в сообщении, мы уже удалили из activeThreats.
        // Всё корректно.
    }

    // ---------- 7. ГЛАВНЫЙ ЦИКЛ ОБНОВЛЕНИЯ ----------
    let intervalId = null;

    async function refresh() {
        addLog("Проверка Telegram...");
        const messages = await fetchTelegramMessages();
        if (messages.length > 0) {
            processMessages(messages);
            updateMapFromThreats();
            updateSidebar();
        } else {
            addLog("Нет новых сообщений");
        }
    }

    async function start() {
        const geoOk = await loadGeoJson();
        if (geoOk) {
            await refresh();
            intervalId = setInterval(refresh, 30000);
        } else {
            addLog("❌ Не удалось загрузить карту, мониторинг остановлен");
        }
    }

    // Запуск
    document.addEventListener('DOMContentLoaded', start);
</script>
</body>
</html>
