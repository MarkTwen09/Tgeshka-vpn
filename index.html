<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SO2 CASE SIMULATOR: STABLE FIX</title>
    <style>
        :root {
            --bg: #0b0e14;
            --card: rgba(30, 35, 45, 0.8);
            --accent: #ffcc00;
            --blue: #00e6ff;
            --stattrak: #ff8000;
            --common: #b0c3d9; --uncommon: #5e98d9; --rare: #4b69ff; --epic: #8847ff; --legendary: #d32ce6; --arcane: #eb4b4b;
        }

        body {
            background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center; margin: 0; padding: 10px;
        }

        /* HEADER */
        .header {
            background: var(--card); width: 100%; max-width: 600px; padding: 20px;
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 15px;
        }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; font-size: 10px; color: #aaa; text-transform: uppercase; }
        .stats b { color: #fff; display: block; font-size: 12px; }

        /* TABS */
        .tabs { display: flex; gap: 5px; width: 100%; max-width: 600px; margin-bottom: 15px; }
        .tab { flex: 1; padding: 12px; background: var(--card); border: none; color: #888; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .tab.active { background: var(--blue); color: #000; }

        .view { display: none; width: 100%; max-width: 600px; }
        .view.active { display: block; }

        /* CASE SELECT */
        .cases-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .case-btn { background: var(--card); padding: 15px; border-radius: 15px; border: 2px solid transparent; text-align: center; cursor: pointer; }
        .case-btn.active { border-color: var(--blue); }

        /* ROULETTE */
        .window { height: 140px; background: #000; border-radius: 15px; position: relative; overflow: hidden; margin-bottom: 15px; border: 1px solid #333; }
        .line { position: absolute; left: 50%; width: 3px; height: 100%; background: red; z-index: 10; transform: translateX(-50%); }
        .track { display: flex; position: absolute; left: 0; top: 10px; transition: transform 6s cubic-bezier(0.1, 0, 0.1, 1); }
        .item { min-width: 120px; height: 110px; margin: 0 5px; background: #1a1f26; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-bottom: 4px solid #444; }

        /* GRID */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
        .card { background: var(--card); padding: 15px; border-radius: 15px; text-align: center; position: relative; border: 1px solid rgba(255,255,255,0.05); }
        .st { position: absolute; top: 5px; right: 5px; background: var(--stattrak); color: #000; font-size: 8px; padding: 2px 4px; border-radius: 4px; font-weight: bold; }

        /* MODAL */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 100; }
        .modal { background: #1a1f26; padding: 30px; border-radius: 20px; text-align: center; width: 300px; border: 1px solid var(--blue); }
        
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; background: var(--accent); margin-top: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <b id="lvl">LVL 1</b>
            <b style="color: var(--accent); font-size: 20px;"><span id="money">1000</span> G</b>
        </div>
        <div class="stats">
            <div>Кейсов <b id="statOpened">0</b></div>
            <div>Лучший лут <b id="statBest">---</b></div>
            <div>Прибыль <b id="statProfit">0 G</b></div>
        </div>
    </div>

    <div class="tabs">
        <button class="tab active" onclick="show('cases')">КЕЙСЫ</button>
        <button class="tab" onclick="show('market')">РЫНОК</button>
        <button class="tab" onclick="show('inv')">ИНВЕНТАРЬ</button>
    </div>

    <div id="cases" class="view active">
        <div class="cases-grid">
            <div id="case0" class="case-btn active" onclick="setCase(0)">📦<br>FURIOUS</div>
            <div id="case1" class="case-btn" onclick="setCase(1)">📦<br>REVENGE</div>
            <div id="case2" class="case-btn" onclick="setCase(2)">📦<br>EMPIRE</div>
        </div>
        <div class="window"><div class="line"></div><div id="track" class="track"></div></div>
        <button id="spinBtn" class="btn" onclick="spin()">ОТКРЫТЬ КЕЙС</button>
    </div>

    <div id="market" class="view"><div id="marketGrid" class="grid"></div></div>
    <div id="inv" class="view"><div id="invGrid" class="grid"></div></div>

    <div id="winModal" class="modal-overlay">
        <div class="modal">
            <div id="winIcon" style="font-size: 60px;">🔫</div>
            <h3 id="winName">Weapon Name</h3>
            <p id="winRarity" style="font-weight: bold;"></p>
            <button class="btn" onclick="saveWin()">В ИНВЕНТАРЬ</button>
            <button class="btn" style="background: none; color: #888;" onclick="sellWin()">ПРОДАТЬ ЗА <span id="winPrice">0</span> G</button>
        </div>
    </div>

    <script>
        const skins = [
            { name: "G22 | Casual", rar: "common", p: 10, i: "🔫" },
            { name: "USP | Genesis", rar: "uncommon", p: 40, i: "🔫" },
            { name: "M4 | Tiger", rar: "rare", p: 150, i: "🔫" },
            { name: "AKR | Necro", rar: "epic", p: 500, i: "🔫" },
            { name: "AWM | Scratch", rar: "legendary", p: 1300, i: "🎯" },
            { name: "Karambit | Gold", rar: "arcane", p: 15000, i: "🔪" },
            { name: "Butterfly | Legacy", rar: "arcane", p: 14000, i: "🦋" }
        ];

        const caseData = [
            { name: "Furious", cost: 100, drop: [0,0,0,1,1,2,3,4,5] },
            { name: "Revenge", cost: 250, drop: [1,1,2,2,3,3,4,5,6] },
            { name: "Empire", cost: 500, drop: [3,3,4,4,4,5,5,6,6] }
        ];

        let money = parseInt(localStorage.getItem('g_money')) || 2000;
        let inv = JSON.parse(localStorage.getItem('g_inv')) || [];
        let opened = parseInt(localStorage.getItem('g_opened')) || 0;
        let profit = parseInt(localStorage.getItem('g_profit')) || 0;
        let best = localStorage.getItem('g_best') || "---";
        let bestP = parseInt(localStorage.getItem('g_bestp')) || 0;
        let selectedCase = 0;
        let lastItem = null;

        function update() {
            document.getElementById('money').innerText = money;
            document.getElementById('statOpened').innerText = opened;
            document.getElementById('statProfit').innerText = profit + " G";
            document.getElementById('statBest').innerText = best;

            const iGrid = document.getElementById('invGrid'); iGrid.innerHTML = '';
            inv.forEach((item, index) => {
                const d = document.createElement('div');
                d.className = 'card';
                d.style.borderColor = `var(--${item.rar})`;
                if(item.st) d.innerHTML += `<div class="st">ST</div>`;
                d.innerHTML += `<div>${item.i}</div><small>${item.name}</small><br><b>${item.p} G</b>`;
                d.onclick = () => { money += item.p; profit += item.p; inv.splice(index, 1); update(); };
                iGrid.appendChild(d);
            });

            const mGrid = document.getElementById('marketGrid'); mGrid.innerHTML = '';
            skins.forEach(s => {
                const d = document.createElement('div');
                d.className = 'card';
                d.innerHTML = `<div>${s.i}</div><small>${s.name}</small><br><b>${s.p} G</b>`;
                mGrid.appendChild(d);
            });

            localStorage.setItem('g_money', money);
            localStorage.setItem('g_inv', JSON.stringify(inv));
            localStorage.setItem('g_opened', opened);
            localStorage.setItem('g_profit', profit);
            localStorage.setItem('g_best', best);
            localStorage.setItem('g_bestp', bestP);
        }

        function spin() {
            const c = caseData[selectedCase];
            if(money < c.cost) return alert("Мало голды!");
            
            money -= c.cost;
            opened++;
            document.getElementById('spinBtn').disabled = true;

            const track = document.getElementById('track');
            track.innerHTML = ''; track.style.transition = 'none'; track.style.transform = 'translateX(0)';

            let winItem;
            for(let i=0; i<40; i++) {
                const randIndex = c.drop[Math.floor(Math.random() * c.drop.length)];
                const s = skins[randIndex];
                if(i === 35) {
                    winItem = {...s, st: Math.random() < 0.1};
                    if(winItem.st) winItem.p *= 2;
                }
                const d = document.createElement('div'); d.className = 'item';
                d.style.borderBottomColor = `var(--${s.rar})`;
                d.innerHTML = `<div>${s.i}</div><small>${s.name}</small>`;
                track.appendChild(d);
            }

            setTimeout(() => {
                track.style.transition = 'transform 6s cubic-bezier(0.1, 0, 0.1, 1)';
                track.style.transform = 'translateX(-4300px)';
            }, 50);

            setTimeout(() => {
                document.getElementById('spinBtn').disabled = false;
                lastItem = winItem;
                if(winItem.p > bestP) { bestP = winItem.p; best = winItem.name; }
                
                document.getElementById('winName').innerText = winItem.name;
                document.getElementById('winRarity').innerText = winItem.rar.toUpperCase();
                document.getElementById('winRarity').style.color = `var(--${winItem.rar})`;
                document.getElementById('winPrice').innerText = winItem.p;
                document.getElementById('winModal').style.display = 'flex';
                update();
            }, 6100);
        }

        function saveWin() { inv.unshift(lastItem); document.getElementById('winModal').style.display = 'none'; update(); }
        function sellWin() { money += lastItem.p; profit += lastItem.p; document.getElementById('winModal').style.display = 'none'; update(); }
        function show(id) { document.querySelectorAll('.view, .tab').forEach(el => el.classList.remove('active')); document.getElementById(id).classList.add('active'); event.target.classList.add('active'); }
        function setCase(i) { selectedCase = i; document.querySelectorAll('.case-btn').forEach(b => b.classList.remove('active')); document.getElementById('case'+i).classList.add('active'); }

        update();
    </script>
</body>
</html>
