<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KRAKEN | Premium Digital Syndicate</title>
    <style>
        :root {
            --bg-main: #060913;
            --panel-titanium: linear-gradient(145deg, #121826, #090d15);
            --gold-premium: linear-gradient(135deg, #c5a880 0%, #e6d3b8 50%, #b39266 100%);
            --gold-glow: #d4af37;
            --carbon-border: rgba(197, 168, 128, 0.12);
            --text-muted: #64748b;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; padding: 0; 
            font-family: '-apple-system', BlinkMacSystemFont, "SF Pro Display", Roboto, sans-serif;
            user-select: none; 
            -webkit-tap-highlight-color: transparent;
        }
        
        body { 
            background: var(--bg-main); 
            color: #f1f5f9; 
            min-height: 100vh; 
            padding: 15px; 
            background-image: 
                radial-gradient(circle at 50% -40deg, rgba(197, 168, 128, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 50% 120%, rgba(15, 23, 42, 0.8) 0%, transparent 100%);
            background-attachment: fixed;
            overflow-x: hidden;
        }

        /* Премиум Хедер */
        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 20px 24px; 
            background: rgba(9, 13, 21, 0.85); 
            border-bottom: 1px solid var(--carbon-border);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 24px; 
            margin-bottom: 30px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }

        .logo { 
            font-size: 22px; 
            font-weight: 800; 
            letter-spacing: 7px; 
            background: var(--gold-premium);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase; 
            filter: drop-shadow(0 4px 12px rgba(197, 168, 128, 0.2));
        }

        .balance-box { 
            background: rgba(0, 0, 0, 0.4); 
            padding: 12px 24px; 
            border-radius: 16px; 
            font-weight: 700; 
            font-size: 17px;
            border: 1px solid var(--carbon-border); 
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.4);
        }

        .balance-box span {
            background: var(--gold-premium);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container { 
            display: flex; 
            flex-direction: column; 
            gap: 35px; 
            max-width: 430px; 
            margin: 0 auto; 
        }

        /* Карточки в стиле Матового Титана */
        .card { 
            background: var(--panel-titanium);
            border: 1px solid var(--carbon-border); 
            border-radius: 32px; 
            padding: 35px 24px; 
            box-shadow: 
                0 40px 80px -15px rgba(0,0,0,0.9), 
                inset 0 1px 1px rgba(255,255,255,0.03);
            position: relative;
        }

        .card-title { 
            font-size: 13px; 
            font-weight: 800; 
            margin-bottom: 30px; 
            color: var(--text-muted); 
            text-transform: uppercase; 
            letter-spacing: 4px;
            text-align: center;
        }

        /* КИНЕМАТОГРАФИЧЕСКИЕ СЛОТЫ */
        .slots-viewport {
            background: #04060b;
            padding: 15px;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.02);
            box-shadow: inset 0 15px 40px rgba(0,0,0,0.9);
            margin-bottom: 30px;
            overflow: hidden;
            height: 130px;
            display: flex;
            justify-content: center;
            gap: 14px;
        }

        .reel-container {
            width: 90px;
            height: 100px;
            position: relative;
            background: #080c14;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.03);
        }

        .reel-strip {
            position: absolute;
            top: -300px; /* Начальное положение ленты */
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .slot-tile {
            height: 100px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.1));
        }

        /* Физика прокрутки с отскоком (Естественный инерционный дофамин) */
        .spin-animation {
            animation: cubicSpin 2.2s cubic-bezier(0.15, 0.85, 0.35, 1.05) forwards;
        }
        .blur-effect {
            filter: blur(6px) scaleY(1.1);
        }

        @keyframes cubicSpin {
            0% { transform: translateY(0); }
            90% { transform: translateY(2950px); }
            100% { transform: translateY(3000px); } /* Мягкий докрут и микро-отскок */
        }

        /* НАСТОЯЩИЕ 3D КУБИКИ */
        .dice-board {
            display: flex;
            justify-content: center;
            gap: 45px;
            margin: 15px 0 35px 0;
            perspective: 600px; /* Глубина 3D сцены */
            height: 90px;
        }

        /* 3D Контейнер кубика */
        .cube-wrapper {
            width: 80px;
            height: 80px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 1.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .cube-face {
            position: absolute;
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #171f30 0%, #0c121e 100%);
            border: 1.5px solid rgba(197, 168, 128, 0.3);
            border-radius: 18px;
            font-size: 34px;
            font-weight: 900;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.6), 0 0 20px rgba(197,168,128,0.05);
            backface-visibility: hidden;
        }

        /* Позиционирование граней куба в 3D пространстве */
        .face-1 { transform: rotateY(0deg) translateZ(40px); color: #fff; }
        .face-2 { transform: rotateY(90deg) translateZ(40px); color: #cbd5e1; }
        .face-3 { transform: rotateX(90deg) translateZ(40px); color: #94a3b8; }
        .face-4 { transform: rotateX(-90deg) translateZ(40px); color: #64748b; }
        .face-5 { transform: rotateY(-90deg) translateZ(40px); color: #475569; }
        .face-6 { transform: rotateY(180deg) translateZ(40px); color: #d4af37; text-shadow: 0 0 10px rgba(212,175,55,0.4); }

        /* Бешеная физика полета кубика */
        @keyframes rollPhysic1 {
            0% { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg) translateY(0); }
            30% { transform: rotateX(360deg) rotateY(180deg) rotateZ(90deg) translateY(-40px); }
            60% { transform: rotateX(720deg) rotateY(540deg) rotateZ(270deg) translateY(-10px); }
            100% { transform: var(--target-rotation); }
        }

        /* Управление Ставками */
        .bet-widget {
            background: #04060b;
            border: 1px solid rgba(255,255,255,0.02);
            padding: 8px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
        }

        .bet-trigger {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.02);
            color: #94a3b8;
            width: 50px;
            height: 50px;
            border-radius: 14px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .bet-trigger:active { background: rgba(255,255,255,0.08); }

        .bet-value {
            font-size: 22px;
            font-weight: 800;
            color: #fff;
            letter-spacing: 1px;
        }

        /* Кнопка Броска - Тяжёлый Премиум */
        .btn-premium {
            width: 100%;
            background: var(--gold-premium);
            border: none;
            border-radius: 20px;
            padding: 20px;
            color: #090d16;
            font-size: 14px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            box-shadow: 0 15px 30px rgba(197, 168, 128, 0.15);
            transition: transform 0.1s, filter 0.2s;
        }
        .btn-premium:active { transform: scale(0.97); }
        .btn-premium:disabled { background: #1e293b; color: #475569; box-shadow: none; cursor: not-allowed; }

        .feedback-log {
            margin-top: 25px;
            font-size: 13px;
            min-height: 18px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            text-align: center;
            color: var(--text-muted);
        }

        /* ЭКРАН ТРИУМФА */
        .overlay-win {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(4, 6, 11, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .overlay-win.show { opacity: 1; pointer-events: auto; }

        .victory-panel {
            text-align: center;
            transform: scale(0.8);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .overlay-win.show .victory-panel { transform: scale(1); }

        .vic-title {
            font-size: 14px; font-weight: 900; color: var(--gold-glow); letter-spacing: 6px; margin-bottom: 10px;
        }
        .vic-payout {
            font-size: 52px; font-weight: 900; color: #fff; margin-bottom: 30px; letter-spacing: -1px;
        }
        .vic-btn {
            background: #fff; color: #000; border: none; padding: 14px 40px; border-radius: 40px; font-weight: 900; text-transform: uppercase; font-size: 12px; letter-spacing: 1px;
        }

        .status-win { color: #10b981; text-shadow: 0 0 15px rgba(16,185,129,0.3); }
        .status-lose { color: #475569; }
    </style>
</head>
<body>

    <!-- ВСПЛЫВАЮЩИЙ КУШ -->
    <div class="overlay-win" id="win-screen">
        <div class="victory-panel">
            <div class="vic-title">СИНДИКАТ НАГРАЖДАЕТ</div>
            <div class="vic-payout" id="win-amount">+0 🪙</div>
            <button class="vic-btn" onclick="claimPayout()">Забрать капитал</button>
        </div>
    </div>

    <header>
        <div class="logo">Kraken</div>
        <div class="balance-box"><span>🪙</span>&nbsp;<div id="balance">10,000</div></div>
    </header>

    <div class="container">
        <!-- СЛОТЫ: СИНДИКАТ -->
        <div class="card">
            <div class="card-title">Автомат Класса Люкс</div>
            <div class="slots-viewport">
                <div class="reel-container"><div class="reel-strip" id="strip1"></div></div>
                <div class="reel-container"><div class="reel-strip" id="strip2"></div></div>
                <div class="reel-container"><div class="reel-strip" id="strip3"></div></div>
            </div>
            
            <div class="bet-widget">
                <button class="bet-trigger" onclick="alterBet('slot-bet', -100)">-</button>
                <div class="bet-value" id="slot-bet-view">100</div>
                <button class="bet-trigger" onclick="alterBet('slot-bet', 100)">+</button>
            </div>

            <button class="btn-premium" id="slot-btn" onclick="spinSyndicateSlots()">Запустить ротацию</button>
            <div class="feedback-log" id="slot-log">Готов к ставкам</div>
        </div>

        <!-- 3D КУБИКИ -->
        <div class="card">
            <div class="card-title">Трёхмерные Кости Бездны</div>
            <div class="dice-board">
                <div class="cube-wrapper" id="cube1">
                    <div class="cube-face face-1">1</div>
                    <div class="cube-face face-2">2</div>
                    <div class="cube-face face-3">3</div>
                    <div class="cube-face face-4">4</div>
                    <div class="cube-face face-5">5</div>
                    <div class="cube-face face-6">6</div>
                </div>
                <div class="cube-wrapper" id="cube2">
                    <div class="cube-face face-1">1</div>
                    <div class="cube-face face-2">2</div>
                    <div class="cube-face face-3">3</div>
                    <div class="cube-face face-4">4</div>
                    <div class="cube-face face-5">5</div>
                    <div class="cube-face face-6">6</div>
                </div>
            </div>

            <div class="bet-widget">
                <button class="bet-trigger" onclick="alterBet('dice-bet', -100)">-</button>
                <div class="bet-value" id="dice-bet-view">100</div>
                <button class="bet-trigger" onclick="alterBet('dice-bet', 100)">+</button>
            </div>

            <button class="btn-premium" id="dice-btn" onclick="roll3DDice()">Бросить кости</button>
            <div class="feedback-log" id="dice-log">Ожидание броска</div>
        </div>
    </div>

    <script>
        let wallet = parseInt(localStorage.getItem('k_syndicate_wallet')) || 10000;
        const pool = ['💎', '🪙', '🔱', '👑', '⚔️', '👁️'];
        
        let bets = { 'slot-bet': 100, 'dice-bet': 100 };

        // Генерация бесконечной ленты для имитации физического вращения
        function buildStrips() {
            for(let s=1; s<=3; s++) {
                const strip = document.getElementById(`strip${s}`);
                let content = '';
                // Генерируем 40 иконок вверх, чтобы было куда крутить вниз
                for(let i=0; i<45; i++) {
                    const item = pool[Math.floor(Math.random() * pool.length)];
                    content += `<div class="slot-tile">${item}</div>`;
                }
                strip.innerHTML = content;
            }
        }
        buildStrips();

        function syncWallet() {
            document.getElementById('balance').textContent = wallet.toLocaleString();
            localStorage.setItem('k_syndicate_wallet', wallet);
        }
        syncWallet();

        function alterBet(key, amount) {
            bets[key] += amount;
            if(bets[key] < 100) bets[key] = 100;
            if(bets[key] > 10000) bets[key] = 10000;
            document.getElementById(`${key}-view`).textContent = bets[key].toLocaleString();
        }

        function triggerWinPanel(sum) {
            document.getElementById('win-amount').textContent = `+${sum.toLocaleString()} 🪙`;
            document.getElementById('win-screen').classList.add('show');
        }

        function claimPayout() {
            document.getElementById('win-screen').classList.remove('show');
        }

        // ФИЗИКА СЛОТОВ
        function spinSyndicateSlots() {
            const currentBet = bets['slot-bet'];
            if(currentBet > wallet) { alert("Недостаточно средств в кошельке"); return; }
            
            wallet -= currentBet; syncWallet();
            
            const btn = document.getElementById('slot-btn'); btn.disabled = true;
            document.getElementById('slot-log').innerHTML = "Автоматы запущены...";

            const finalResults = [
                pool[Math.floor(Math.random() * pool.length)],
                pool[Math.floor(Math.random() * pool.length)],
                pool[Math.floor(Math.random() * pool.length)]
            ];

            for(let s=1; s<=3; s++) {
                const strip = document.getElementById(`strip${s}`);
                
                // Ставим финальный выигрышный символ ровно на финальную позицию вверху ленты
                strip.children[2].textContent = finalResults[s-1]; 
                
                // Сбрасываем анимацию
                strip.style.transition = 'none';
                strip.style.transform = 'translateY(0)';
                strip.classList.add('blur-effect');

                // Плавная инерционная остановка (каждый барабан чуть дольше предыдущего для саспенса)
                setTimeout(() => {
                    strip.style.transition = `transform ${1.5 + (s * 0.4)}s cubic-bezier(0.1, 0.85, 0.25, 1)`;
                    strip.style.transform = 'translateY(300px)'; // Крутим ровно на 3 элемента вниз
                }, 50);
            }

            // Обработка результатов после завершения полной инерции третьего барабана
            setTimeout(() => {
                for(let s=1; s<=3; s++) {
                    document.getElementById(`strip${s}`).classList.remove('blur-effect');
                }

                const log = document.getElementById('slot-log');
                if(finalResults[0] === finalResults[1] && finalResults[1] === finalResults[2]) {
                    let win = currentBet * 12; wallet += win; syncWallet();
                    triggerWinPanel(win);
                    log.innerHTML = `<span class="status-win">Тройной Альянс x12!</span>`;
                } else if(finalResults[0] === finalResults[1] || finalResults[1] === finalResults[2] || finalResults[0] === finalResults[2]) {
                    let win = currentBet * 2.5; wallet += win; syncWallet();
                    log.innerHTML = `<span class="status-win">Парное совпадение x2.5!</span>`;
                } else {
                    log.innerHTML = `<span class="status-lose">Комбинация не совпала</span>`;
                }
                btn.disabled = false;
            }, 2800);
        }

        // НАСТОЯЩАЯ 3D-ФИЗИКА КУБИКОВ
        // Массив углов поворота в 3D для отображения нужной грани куба строго вперед к игроку
        const cubeRotations = {
            1: 'rotateX(0deg) rotateY(0deg)',
            2: 'rotateX(0deg) rotateY(-90deg)',
            3: 'rotateX(-90deg) rotateY(0deg)',
            4: 'rotateX(90deg) rotateY(0deg)',
            5: 'rotateX(0deg) rotateY(90deg)',
            6: 'rotateX(180deg) rotateY(0deg)'
        };

        function roll3DDice() {
            const currentBet = bets['dice-bet'];
            if(currentBet > wallet) { alert("Недостаточно средств в кошельке"); return; }
            
            wallet -= currentBet; syncWallet();
            const btn = document.getElementById('dice-btn'); btn.disabled = true;
            document.getElementById('dice-log').innerHTML = "Кости в воздухе...";

            const r1 = Math.floor(Math.random() * 6) + 1;
            const r2 = Math.floor(Math.random() * 6) + 1;

            const c1 = document.getElementById('cube1');
            const c2 = document.getElementById('cube2');

            // Запускаем безумное случайное вращение в полёте
            c1.style.animation = 'rollPhysic1 0.7s infinite linear';
            c2.style.animation = 'rollPhysic1 0.7s infinite linear';

            setTimeout(() => {
                // Выключаем анимацию полета и жестко фиксируем финальные 3D координаты грани
                c1.style.animation = 'none';
                c2.style.animation = 'none';

                // Добавляем случайные полные круги (360 град), чтобы кубики останавливались не одинаково
                const extraTurns1 = `rotateX(${360 * 2}deg) rotateY(${360 * 2}deg) `;
                const extraTurns2 = `rotateX(${-360 * 2}deg) rotateY(${-360 * 2}deg) `;

                c1.style.transform = extraTurns1 + cubeRotations[r1];
                c2.style.transform = extraTurns2 + cubeRotations[r2];

                const sum = r1 + r2;
                const log = document.getElementById('dice-log');

                if (sum >= 7) {
                    let win = Math.floor(currentBet * 1.9); wallet += win; syncWallet();
                    if(sum === 12) triggerWinPanel(win); // Дофаминовый джекпот за дубль шестерок
                    log.innerHTML = `<span class="status-win">Победа! Выпало: ${sum} (7+)</span>`;
                } else {
                    log.innerHTML = `<span class="status-lose">Поражение. Сумма: ${sum}</span>`;
                }
                btn.disabled = false;
            }, 1000); // 1 секунда чистого полёта
        }
    </script>
</body>
</html>
