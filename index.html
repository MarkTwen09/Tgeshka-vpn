<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tgeshka VPN — Официальный сайт</title>
    <style>
        /* Строгая минималистичная база */
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0A0A0C; /* Глубокий премиальный графит */
            color: #E4E4E7;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        a { 
            text-decoration: none; 
            color: inherit; 
        }

        /* Контейнер по центру */
        .main-container {
            width: 100%;
            max-width: 400px;
            padding: 60px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        /* Серьезная минималистичная шапка без иконок */
        .brand-header {
            text-align: center;
            margin-bottom: 48px;
        }

        .brand-name {
            font-size: 32px;
            font-weight: 700;
            color: #FFFFFF;
            margin: 0 0 8px 0;
            letter-spacing: -0.5px;
        }

        .brand-status {
            font-size: 14px;
            font-weight: 500;
            color: #00E676; /* Аккуратный зеленый индикатор работы */
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(0, 230, 118, 0.1);
            padding: 4px 12px;
            border-radius: 100px;
        }

        .brand-status::before {
            content: '';
            width: 6px;
            height: 6px;
            background-color: #00E676;
            border-radius: 50%;
        }

        /* Минималистичные строгие карточки тарифов */
        .tariffs-wrapper {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 40px;
        }

        .tariff-item {
            background: #16161A; /* Однотонный плотный фон */
            border: 1px solid #232329;
            border-radius: 14px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: border-color 0.2s ease, background 0.2s ease;
        }

        /* Аккуратное выделение без неона */
        .tariff-item:hover {
            border-color: #3F3F46;
            background: #1C1C21;
        }

        .tariff-left {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .tariff-period {
            font-size: 17px;
            font-weight: 600;
            color: #FFFFFF;
        }

        .tariff-features {
            font-size: 13px;
            color: #A1A1AA;
        }

        .tariff-price {
            font-size: 18px;
            font-weight: 700;
            color: #FFFFFF;
        }

        /* Строгая, солидная кнопка действия */
        .action-button {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 54px;
            background-color: #FFFFFF; /* Чисто белый, как у Apple */
            color: #000000;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            transition: opacity 0.2s ease;
        }

        .action-button:hover {
            opacity: 0.9;
        }

        /* Лаконичный футер */
        .brand-footer {
            margin-top: auto;
            text-align: center;
            font-size: 12px;
            color: #52525B;
            padding-top: 40px;
        }
    </style>
</head>
<body>

    <div class="main-container">
        
        <div class="brand-header">
            <h1 class="brand-name">Tgeshka VPN</h1>
            <span class="brand-status">Серверы работают стабильно</span>
        </div>

        <div class="tariffs-wrapper">
            
            <a href="https://t.me/Tgeshkavpn" target="_blank">
                <div class="tariff-item">
                    <div class="tariff-left">
                        <span class="tariff-period">План на 1 месяц</span>
                        <span class="tariff-features">Высокая скорость, без лимитов</span>
                    </div>
                    <div class="tariff-price">99 ₽</div>
                </div>
            </a>

            <a href="https://t.me/Tgeshkavpn" target="_blank">
                <div class="tariff-item">
                    <div class="tariff-left">
                        <span class="tariff-period">План на 3 месяца</span>
                        <span class="tariff-features">Оптимальный вариант подписки</span>
                    </div>
                    <div class="tariff-price">249 ₽</div>
                </div>
            </a>

            <a href="https://t.me/Tgeshkavpn" target="_blank">
                <div class="tariff-item">
                    <div class="tariff-left">
                        <span class="tariff-period">План на 6 месяцев</span>
                        <span class="tariff-features">Максимальная выгода</span>
                    </div>
                    <div class="tariff-price">449 ₽</div>
                </div>
            </a>

        </div>

        <a href="https://t.me/Tgeshkavpn" target="_blank" class="action-button">
            Оформить подписку
        </a>

        <div class="brand-footer">
            © 2026 Tgeshka VPN. Безопасность и конфиденциальность.
        </div>

    </div>

</body>
</html>
