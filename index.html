<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Telegram - тестовый макет (не рабочий)</title>
    <style>
        body {
            background: #0f0f0f;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-box {
            background: #1f1f1f;
            padding: 40px;
            border-radius: 20px;
            width: 320px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .login-box h2 {
            color: #fff;
            margin-bottom: 10px;
        }
        .login-box img {
            width: 60px;
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #2b2b2b;
            border: 1px solid #3e3e3e;
            border-radius: 10px;
            color: white;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #2a9d8f;
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .warning {
            margin-top: 20px;
            font-size: 12px;
            color: #e76f51;
        }
    </style>
</head>
<body>
<div class="login-box">
    <img src="https://telegram.org/img/t_logo.svg" alt="Telegram">
    <h2>Вход в Telegram</h2>
    <p style="color:#aaa; font-size:14px;">Это тестовый макет — данные никуда не отправляются</p>
    <form id="testForm">
        <input type="text" placeholder="Номер телефона" id="phone" value="">
        <input type="password" placeholder="Пароль (если есть)" id="password">
        <button type="button" onclick="showTest()">Войти (тест)</button>
    </form>
    <div class="warning">⚠️ Это не настоящий фишинг. Данные никуда не уходят.</div>
</div>
<script>
    function showTest() {
        let phone = document.getElementById('phone').value;
        let pwd = document.getElementById('password').value;
        if(phone.trim() === "" && pwd.trim() === "") {
            alert("Тестовый режим: поля пусты, ничего не произошло.");
        } else {
            alert("ТЕСТОВЫЙ РЕЖИМ: Вы ввели номер '" + phone + "' и пароль. Это сообщение появляется только локально. Данные никуда не отправлены.");
        }
        // Очищаем поля для демонстрации безопасности (опционально)
        // document.getElementById('phone').value = "";
        // document.getElementById('password').value = "";
    }
</script>
</body>
</html>
