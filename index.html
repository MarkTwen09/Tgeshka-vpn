<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>EURASIA: TOTAL WAR [STABLE V3]</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #05080c; color: white; font-family: sans-serif; overflow: hidden; }
        
        /* Интерфейс (Лево) */
        .panel-left {
            position: absolute; top: 20px; left: 20px; width: 280px;
            background: rgba(15, 25, 35, 0.95); border: 1px solid #223344;
            border-radius: 8px; z-index: 100; padding: 15px; box-shadow: 0 0 20px #000;
        }
        .res { display: flex; gap: 20px; font-size: 20px; font-weight: bold; margin: 10px 0; }
        .orange { color: #ff9900; }
        
        .btn {
            width: 100%; padding: 10px; margin-bottom: 8px; border: none; border-radius: 4px;
            color: white; font-weight: bold; cursor: pointer; font-size: 12px;
        }
        .btn-econ { background: linear-gradient(180deg, #2b9348, #1a6d1a); }
        .btn-war { background: linear-gradient(180deg, #007bff, #0056b3); }
        
        .log { background: #000; height: 120px; margin-top: 10px; padding: 8px; font-size: 11px; overflow-y: auto; border: 1px solid #223344; color: #00ffcc; }

        /* Интерфейс (Право) */
        .panel-right {
            position: absolute; top: 20px; right: 20px; width: 220px;
            background: rgba(15, 25, 35, 0.95); border-radius: 8px; z-index: 100; padding: 15px;
            border-top: 4px solid #00ccff;
        }

        /* КАРТА (SVG) */
        .map-container {
            width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        svg { width: 80%; height: 80%; }
        .land { fill: #1a2634; stroke: #00ccff; stroke-width: 2; cursor: pointer; transition: 0.3s; }
        .land:hover { fill: #253545; }
        .land.my { fill: #0a4d0a; stroke: #00ff00; } /* Твоя страна - Зеленая */
        .land.enemy { fill: #4d0a0a; stroke: #ff0000; } /* Враг - Красный */

        /* Меню действий */
        #menu {
            display: none; position: absolute; background: #0d1722; border: 2px solid #00ccff;
            padding: 10px; border-radius: 8px; z-index: 200;
        }
    </style>
</head>
<body>

    <div class="panel-left">
        <b style="color:#00ccff">ДЕЙСТВИЯ И ЧАТ</b>
        <div class="res">
            <span class="orange">🔥 <span id="gold">1000</span></span>
            <span>⚔️ <span id="army">150</span></span>
        </div>
        <button class="btn btn-econ" onclick="addGold()">📈 РАЗВИТЬ ЭКОНОМИКУ (-200)</button>
        <button class="btn btn-war" onclick="msg('Выберите цель на карте!')">🚀 ВТОРЖЕНИЕ</button>
        <div class="log" id="log">SYSTEM: Выберите свою страну на карте.</div>
    </div>

    <div class="panel-right">
        <div style="color:#00ccff; font-size:10px;">YOUR NETWORK ID</div>
        <div style="font-size:20px; font-weight:bold;">987654321</div>
        <div style="color:#00ccff; font-size:10px; margin-top:10px;">ЮЮ ДРУГА</div>
        <input type="text" style="width:100%; background:#000; border:1px solid #234; color:#fff;" placeholder="friend_id">
    </div>

    <div id="menu">
        <b id="m-name"></b><br><br>
        <button class="btn btn-war" onclick="doWar()">🚀 АТАКОВАТЬ</button>
        <button class="btn btn-econ" onclick="closeM()">ОТМЕНА</button>
    </div>

    <div class="map-container">
        <svg viewBox="0 0 800 400">
            <path id="eu" class="land" d="M100,100 L250,50 L300,150 L150,250 Z" onclick="cell('ЕВРОПА', 'eu')"/>
            <path id="ru" class="land" d="M250,50 L550,30 L650,150 L300,150 Z" onclick="cell('РОССИЯ', 'ru')"/>
            <path id="as" class="land" d="M300,150 L600,150 L550,300 L350,320 Z" onclick="cell('АЗИЯ', 'as')"/><path id="cn" class="land" d="M600,150 L750,120 L720,300 L550,300 Z" onclick="cell('КИТАЙ', 'cn')"/>
            
            <text x="150" y="130" fill="white" style="pointer-events:none">ЕВРОПА</text>
            <text x="400" y="80" fill="white" style="pointer-events:none">РОССИЯ</text>
            <text x="420" y="230" fill="white" style="pointer-events:none">АЗИЯ</text>
            <text x="620" y="210" fill="white" style="pointer-events:none">КИТАЙ</text>
        </svg>
    </div>

    <script>
        let myId = null;
        let targetId = null;
        let g = 1000;

        function msg(t) {
            const l = document.getElementById('log');
            l.innerHTML += <div>> ${t}</div>;
            l.scrollTop = l.scrollHeight;
        }

        function cell(name, id) {
            if (!myId) {
                myId = id;
                document.getElementById(id).classList.add('my');
                msg("Вы выбрали столицу: " + name);
            } else if (id !== myId) {
                targetId = id;
                const m = document.getElementById('menu');
                m.style.display = 'block';
                m.style.left = event.pageX + "px";
                m.style.top = event.pageY + "px";
                document.getElementById('m-name').innerText = name;
            }
        }

        function doWar() {
            document.getElementById(targetId).classList.add('enemy');
            msg("Война объявлена! Территория захвачена.");
            closeM();
        }

        function closeM() { document.getElementById('menu').style.display='none'; }

        function addGold() {
            if (g >= 200) {
                g -= 200;
                document.getElementById('gold').innerText = g;
                msg("Экономика +10%. Золото потрачено.");
            } else {
                msg("Недостаточно золота!");
            }
        }
    </script>
</body>
</html>
