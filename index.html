<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVT Terminal Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-main: #080A0C;
            --bg-card: #11151A;
            --bg-field: #171D24;
            --text-main: #EAECEF;
            --text-muted: #707A8A;
            --accent-green: #0ECB81;
            --accent-red: #F6465D;
            --border-color: #1F2630;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            padding: 15px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .terminal-container {
            width: 100%;
            max-width: 480px; /* Идеально под мобильные экраны */
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }

        /* Шапка */
        .term-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        .brand-zone {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-badge {
            background: linear-gradient(135deg, #0ECB81, #00A669);
            color: #000;
            font-weight: 900;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-size: 14px;
        }

        .title-pair h1 {
            font-size: 16px;
            font-weight: 700;
        }

        .title-pair span {
            font-size: 12px;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        .live-pulse {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: var(--accent-green);
            font-weight: 600;
            background: rgba(14, 203, 129, 0.1);
            padding: 4px 10px;
            border-radius: 20px;
        }

        .pulse-dot {
            width: 6px;
            height: 6px;
            background-color: var(--accent-green);
            border-radius: 50%;
            animation: blink 1.5s infinite;
        }

        /* Главный тикер цены */
        .main-price-box {
            background: var(--bg-field);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 15px;
            text-align: center;
        }

        .price-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .price-value {
            font-size: 34px;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: -1px;
            transition: color 0.3s;
        }

        .price-direction {
            font-size: 14px;
            font-weight: 600;
            margin-top: 4px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        /* Компактная сетка экстремумов */
        .stats-mini-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .stat-mini-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 10px;
        }

        .stat-mini-label {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 2px;
        }

        .stat-mini-value {
            font-size: 14px;
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
        }

        /* График */
        .chart-box {
            position: relative;
            height: 220px;
            background: var(--bg-field);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 10px;
        }

        /* Дополнительная статика для реализма */
        .market-info-block {
            border-top: 1px dashed var(--border-color);
            border-bottom: 1px dashed var(--border-color);
            padding: 12px 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
        }

        .info-row .lbl { color: var(--text-muted); }
        .info-row .val { font-family: 'JetBrains Mono', monospace; font-weight: 500; }

        /* Лента сделок */
        .tape-box {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            padding: 12px;
            font-size: 11px;
        }

        .tape-title {
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
            font-size: 10px;
            letter-spacing: 0.5px;
        }

        .tape-row {
            display: flex;
            justify-content: space-between;
            font-family: 'JetBrains Mono', monospace;
            margin-bottom: 4px;
            animation: fadeIn 0.5s ease;
        }

        /* Кнопка */
        .btn-buy-crypto {
            background: var(--accent-green);
            color: #000;
            text-decoration: none;
            font-weight: 700;
            font-size: 15px;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 20px rgba(14, 203, 129, 0.2);
        }

        .btn-buy-crypto:hover {
            opacity: 0.95;
            box-shadow: 0 6px 24px rgba(14, 203, 129, 0.3);
        }

        /* Служебные классы */
        .up { color: var(--accent-green); }
        .down { color: var(--accent-red); }

        @keyframes blink {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-3px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="terminal-container">
    <div class="term-header">
        <div class="brand-zone">
            <div class="logo-badge">S</div>
            <div class="title-pair">
                <h1>Svetsky Terminal</h1>
                <span>SVT / RUB</span>
            </div>
        </div>
        <div class="live-pulse">
            <div class="pulse-dot"></div>
            <span>LIVE торги</span>
        </div>
    </div>

    <div class="main-price-box">
        <div class="price-label">Текущая рыночная стоимость</div>
        <div class="price-value" id="current-price">10.00 ₽</div>
        <div class="price-direction up" id="price-change">+0.00%</div>
    </div>

    <div class="stats-mini-grid">
        <div class="stat-mini-card">
            <div class="stat-mini-label">Макс. за сессию</div>
            <div class="stat-mini-value" id="max-price">10.00 ₽</div>
        </div>
        <div class="stat-mini-card">
            <div class="stat-mini-label">Мин. за сессию</div>
            <div class="stat-mini-value" id="min-price">10.00 ₽</div>
        </div>
    </div>

    <div class="chart-box">
        <canvas id="analyticsChart"></canvas>
    </div>

    <div class="market-info-block">
        <div class="info-row">
            <span class="lbl">Рыночная капитализация</span>
            <span class="val" id="market-cap">120,500,000 ₽</span>
        </div>
        <div class="info-row">
            <span class="lbl">Объем торгов (24ч)</span>
            <span class="val" style="color: #fff;">4,185,920 ₽</span>
        </div>
        <div class="info-row">
            <span class="lbl">Циркулирующее предложение</span>
            <span class="val">12,050,000 SVT</span>
        </div>
    </div>

    <div class="tape-box">
        <div class="tape-title">Потоковая лента ордеров</div>
        <div id="orders-tape">
            </div>
    </div>

    <a href="https://t.me/markplau" target="_blank" class="btn-buy-crypto">
        <span>Открыть ордер на закупку SVT</span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
    </a>
</div>

<script>
    // Стартовая экономика
    let basePrice = 10.00;
    let currentPrice = basePrice;
    let maxPrice = basePrice;
    let minPrice = basePrice;
    
    // Переменная для создания плавных трендов (направление рынка)
    let marketTrend = 0; 

    const maxDataPoints = 25;
    const labels = Array(maxDataPoints).fill('');
    const dataPoints = Array(maxDataPoints).fill(basePrice);

    // График
    const ctx = document.getElementById('analyticsChart').getContext('2d');
    const gradient = ctx.createLinearGradient(0, 0, 0, 200);
    gradient.addColorStop(0, 'rgba(14, 203, 129, 0.15)');
    gradient.addColorStop(1, 'rgba(14, 203, 129, 0.0)');

    const chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                data: dataPoints,
                borderColor: '#0ECB81',
                borderWidth: 2,
                pointRadius: 0,
                fill: true,
                backgroundColor: gradient,
                tension: 0.3
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
                x: { grid: { display: false }, ticks: { display: false } },
                y: {
                    grid: { color: '#171D24' },
                    ticks: {
                        color: '#5E6673',
                        font: { family: 'JetBrains Mono', size: 10 },
                        callback: function(value) { return value.toFixed(2) + ' ₽'; }
                    }
                }
            }
        }
    });

    // Умный алгоритм реалистичного изменения курса
    function simulateCryptoMarket() {
        // Раз в несколько шагов меняем глобальное микронаправление тренда
        if (Math.random() > 0.7) {
            marketTrend = (Math.random() * 2 - 1); // от -1 (падаем) до +1 (растем)
        }

        // Базовый шум: очень маленькое колебание (до 0.4%)
        let changePercent = (Math.random() * 0.4 - 0.2); 
        
        // Добавляем влияние тренда
        changePercent += marketTrend * 0.15; 

        const priceDiff = currentPrice * (changePercent / 100);
        currentPrice += priceDiff;

        // Защита от ухода в ноль
        if (currentPrice < 0.1) currentPrice = 0.1;

        // Процент изменения от начальных 10 рублей
        const totalChange = ((currentPrice - basePrice) / basePrice) * 100;

        if (currentPrice > maxPrice) maxPrice = currentPrice;
        if (currentPrice < minPrice) minPrice = currentPrice;

        // Вывод на экран
        document.getElementById('current-price').innerText = currentPrice.toFixed(2) + ' ₽';
        document.getElementById('max-price').innerText = maxPrice.toFixed(2) + ' ₽';
        document.getElementById('min-price').innerText = minPrice.toFixed(2) + ' ₽';

        // Капитализация привязана к курсу
        const currentCap = Math.round(12050000 * currentPrice);
        document.getElementById('market-cap').innerText = currentCap.toLocaleString('ru-RU') + ' ₽';

        const changeEl = document.getElementById('price-change');
        if (totalChange >= 0) {
            changeEl.innerText = '+' + totalChange.toFixed(2) + '%';
            changeEl.className = 'price-direction up';
            chart.data.datasets[0].borderColor = '#0ECB81';
        } else {
            changeEl.innerText = totalChange.toFixed(2) + '%';
            changeEl.className = 'price-direction down';
            chart.data.datasets[0].borderColor = '#F6465D';
        }

        chart.data.datasets[0].data.shift();
        chart.data.datasets[0].data.push(currentPrice);
        chart.update('none');

        // Генерируем фейковую сделку в ленту для интерактивности
        generateTapeOrder(priceDiff >= 0);
    }

    // Генератор сделок в реальном времени
    const tapeContainer = document.getElementById('orders-tape');
    function generateTapeOrder(isBuy) {
        const amount = (Math.random() * 450 + 10).toFixed(1);
        const typeText = isBuy ? 'Купить' : 'Продать';
        const typeClass = isBuy ? 'up' : 'down';
        
        const row = document.createElement('div');
        row.className = 'tape-row';
        row.innerHTML = `
            <span class="${typeClass}">${typeText} ${amount} SVT</span>
            <span style="color: var(--text-muted);">${currentPrice.toFixed(2)} ₽</span>
        `;

        tapeContainer.insertBefore(row, tapeContainer.firstChild);

        // Ограничиваем историю ленты 3 строчками, чтобы не перегружать экран
        if (tapeContainer.children.length > 3) {
            tapeContainer.removeChild(tapeContainer.lastChild);
        }
    }

    // Стартовая инициализация ленты
    for(let i=0; i<3; i++) generateTapeOrder(Math.random() > 0.5);

    // Частота обновления рынка — каждые 3 секунды (3000ms). Движения плавные и реалистичные.
    setInterval(simulateCryptoMarket, 3000);
</script>

</body>
</html>
