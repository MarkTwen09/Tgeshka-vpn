<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GLOBAL CONQUEST: EURASIA [FINAL]</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #05080c; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100vw; z-index: 1; background: #05080c; }

        /* Левая панель управления */
        .panel-left {
            position: absolute; top: 20px; left: 20px; width: 300px;
            background: rgba(13, 22, 34, 0.95); border: 1px solid #1f2d3d;
            border-radius: 8px; z-index: 1000; padding: 18px; box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }
        .res-row { display: flex; gap: 25px; margin-bottom: 15px; font-size: 20px; font-weight: bold; }
        .orange { color: #ff9900; }

        .btn {
            width: 100%; padding: 12px; margin-bottom: 8px; border: none; border-radius: 5px;
            color: white; font-weight: bold; cursor: pointer; text-align: left; font-size: 13px;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.2); transition: 0.1s;
        }
        .btn-green { background: linear-gradient(180deg, #2b9348, #1a6d1a); }
        .btn-blue { background: linear-gradient(180deg, #007bff, #0056b3); text-transform: uppercase; }
        .btn:hover { filter: brightness(1.2); }

        .log-box {
            background: rgba(0,0,0,0.5); border: 1px solid #1f2d3d; height: 160px;
            margin-top: 15px; padding: 10px; overflow-y: auto; font-size: 12px; font-family: monospace;
        }

        /* Правая панель ID */
        .panel-right {
            position: absolute; top: 20px; right: 20px; width: 240px;
            background: rgba(13, 22, 34, 0.95); border-radius: 8px; z-index: 1000; padding: 15px;
            border-top: 4px solid #00ccff;
        }
        .id-val { font-size: 22px; font-weight: bold; margin: 5px 0 15px 0; }

        /* Стиль захваченных стран */
        .my-country { fill: #00ff00 !important; fill-opacity: 0.4 !important; stroke: #00ff00 !important; stroke-width: 2; }
        .war-country { fill: #ff0000 !important; fill-opacity: 0.5 !important; stroke: #ff0000 !important; stroke-width: 2; }
    </style>
</head>
<body>

    <div class="panel-left">
        <div style="color:#00ccff; font-weight:bold; margin-bottom:10px;">ДЕЙСТВИЯ И ЧАТ</div>
        <div class="res-row">
            <div class="orange">🔥 <span id="gold">1000</span></div>
            <div>⚔️ <span id="army">150</span></div>
        </div>
        <button class="btn btn-green" onclick="updateEcon()">📈 РАЗВИТЬ ЭКОНОМИКУ (-200)</button>
        <button class="btn btn-blue" onclick="startWar()">🚀 ВТОРЖЕНИЕ (ВЫБЕРИТЕ ЦЕЛЬ)</button>

        <div class="log-box" id="log">
            <div><span style="color:#ffcc00">SYSTEM:</span> Выберите свою страну на карте...</div>
        </div>
    </div>

    <div class="panel-right">
        <div style="color:#00ccff; font-size:11px;">YOUR NETWORK ID: ...</div>
        <div class="id-val">987654321</div>
        <div style="color:#00ccff; font-size:11px;">ID ДРУГА</div>
        <input type="text" style="width:100%; background:#0a1118; border:1px solid #253545; color:white; padding:8px; margin-top:5px;" placeholder="friend_id_456">
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', { center: [50, 40], zoom: 3, zoomControl: false, attributionControl: false });
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        let myCountry = null;
        let isWarMode = false;
        let gold = 1000;
        let army = 150;

        function addLog(txt, color = "#00ffcc") {
            const log = document.getElementById('log');
            log.innerHTML += <div><span style="color:${color}">></span> ${txt}</div>;
            log.scrollTop = log.scrollHeight;
        }Мfunction updateEcon() {
            if (gold >= 200) {
                gold -= 200;
                document.getElementById('gold').innerText = gold;
                addLog("Экономика улучшена! Доход +10%.");
            } else {
                addLog("Недостаточно золота!", "red");
            }
        }

        function startWar() {
            isWarMode = true;
            addLog("РЕЖИМ ВТОРЖЕНИЯ: Кликните по цели!", "red");
        }

        // Загрузка РЕАЛЬНЫХ границ стран
        fetch('https://raw.githubusercontent.com/datasets/geo-boundaries-world-110m/master/countries.geojson')
            .then(res => res.json())
            .then(data => {
                L.geoJSON(data, {
                    style: { color: '#00ccff', weight: 1, fillOpacity: 0.1, fillColor: '#1a2634' },
                    onEachFeature: (feature, layer) => {
                        layer.on('click', () => {
                            const name = feature.properties.name;
                            if (!myCountry) {
                                myCountry = name;
                                layer.setStyle({ className: 'my-country' });
                                addLog(Вы выбрали столицу: ${name}, "#00ff00");
                            } else if (isWarMode) {
                                layer.setStyle({ className: 'war-country' });
                                addLog(ВТОРЖЕНИЕ В ${name} ЗАВЕРШЕНО!, "red");
                                isWarMode = false;
                            } else {
                                addLog(Информация: ${name});
                            }
                        });
                    }
                }).addTo(map);
            });
    </script>
</body>
</html>
