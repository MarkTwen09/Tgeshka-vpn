<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SO2 Case Simulator + Inventory</title>
    <style>
        body {
            background-color: #0d1117;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .balance {
            font-size: 28px;
            color: #ffcc00;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 204, 0, 0.3);
        }

        /* РУЛЕТКА */
        .roulette-wrapper {
            position: relative;
            width: 100%;
            max-width: 800px;
            height: 180px;
            background: #161b22;
            border: 3px solid #30363d;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .pointer {
            position: absolute;
            left: 50%;
            top: 0;
            width: 4px;
            height: 100%;
            background: #ff4747;
            z-index: 10;
            transform: translateX(-50%);
            box-shadow: 0 0 20px #ff4747;
        }

        .cases-line {
            display: flex;
            position: absolute;
            left: 0;
            top: 15px;
            will-change: transform;
        }

        .skin-card {
            min-width: 150px;
            height: 150px;
            margin: 0 5px;
            background: #21262d;
            border-bottom: 5px solid #ccc;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 13px;
            transition: 0.3s;
        }

        /* РЕДКОСТИ */
        .common { border-color: #b0c3d9; }
        .uncommon { border-color: #5e98d9; }
        .rare { border-color: #4b69ff; }
        .epic { border-color: #8847ff; }
        .legendary { border-color: #d32ce6; }
        .arcane { border-color: #eb4b4b; text-shadow: 0 0 5px red; }

        .skin-img-stub {
            width: 100px;
            height: 70px;
            background: rgba(255,255,255,0.05);
            margin-bottom: 10px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        /* КНОПКА */
        .main-btn {
            padding: 15px 60px;
            background: linear-gradient(180deg, #ffcc00, #ff9900);
            border: none;
            border-radius: 8px;
            color: #000;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 153, 0, 0.4);
            transition: 0.2s;
        }

        .main-btn:active { transform: scale(0.95); }
        .main-btn:disabled { background: #484f58; color: #8b949e; cursor: not-allowed; }

        /* ИНВЕНТАРЬ */
        .inventory-section {
            width: 100%;
            max-width: 900px;
            margin-top: 50px;
        }

        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px;
            background: #0d1117;
            padding: 20px;
            border-top: 2px solid #30363d;
        }

        .inv-item {
            background: #161b22;
            padding: 10px;
            border-radius: 8px;
            border-bottom: 3px solid;
            text-align: center;
            font-size: 11px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="header">
        <h1>SO2 CASE SIMULATOR</h1>
        <div class="balance">Баланс: <span id="balanceText">1000</span> G</div>
    </div>

    <div class="roulette-wrapper">
        <div class="pointer"></div>
        <div id="line" class="cases-line"></div>
    </div>

    <button id="spinBtn" class="main-btn" onclick="openCase()">ОТКРЫТЬ КЕЙС (100 G)</button>

    <div class="inventory-section">
        <h3>МОЙ ИНВЕНТАРЬ</h3>
        <div id="inventory" class="inventory-grid">
            </div>
    </div>

    <script>
        // БАЗА ДАННЫХ СКИНОВ
        const skins = [
            { name: "G22 | Casual", rarity: "common", icon: "🔫" },
            { name: "USP | Genesis", rarity: "uncommon", icon: "🔫" },
            { name: "M4 | Tiger", rarity: "rare", icon: "🔫" },
            { name: "AKR | Necromancer", rarity: "epic", icon: "🔫" },
            { name: "AWM | Scratch", rarity: "legendary", icon: "🎯" },
            { name: "M9 | Universe", rarity: "arcane", icon: "🔪" },
            { name: "Karambit | Gold", rarity: "arcane", icon: "🔪" }
        ];

        const rarityWeights = { common: 60, uncommon: 25, rare: 10, epic: 3, legendary: 1.5, arcane: 0.5 };

        let balance = parseInt(localStorage.getItem('so2_balance')) || 1000;
        let myItems = JSON.parse(localStorage.getItem('so2_inventory')) || [];

        function updateUI() {
            document.getElementById('balanceText').innerText = balance;
            localStorage.setItem('so2_balance', balance);
            
            const invDiv = document.getElementById('inventory');
            invDiv.innerHTML = '';
            myItems.forEach(item => {
                const div = document.createElement('div');
                div.className = `inv-item ${item.rarity}`;
                div.innerHTML = `<div style="font-size:30px">${item.icon}</div><div>${item.name}</div>`;
                invDiv.appendChild(div);
            });
            localStorage.setItem('so2_inventory', JSON.stringify(myItems));
        }

        function getWeightedRandomSkin() {
            let totalWeight = 0;
            for (let r in rarityWeights) totalWeight += rarityWeights[r];
            let random = Math.random() * totalWeight;
            
            let currentWeight = 0;
            for (let r in rarityWeights) {
                currentWeight += rarityWeights[r];
                if (random < currentWeight) {
                    const filtered = skins.filter(s => s.rarity === r);
                    return filtered[Math.floor(Math.random() * filtered.length)];
                }
            }
        }

        function openCase() {
            if (balance < 100) return alert("Мало голды!");
            
            balance -= 100;
            const btn = document.getElementById('spinBtn');
            const line = document.getElementById('line');
            btn.disabled = true;
            
            // Генерируем ленту
            line.innerHTML = '';
            const totalCards = 60;
            const winningIndex = 55; // 55-й скин будет победным
            let winSkin;

            for(let i=0; i < totalCards; i++) {
                let s = getWeightedRandomSkin();
                if(i === winningIndex) winSkin = s;
                const card = document.createElement('div');
                card.className = `skin-card ${s.rarity}`;
                card.innerHTML = `<div class="skin-img-stub">${s.icon}</div><div>${s.name}</div>`;
                line.appendChild(card);
            }

            // Анимация
            line.style.transition = 'none';
            line.style.transform = 'translateX(0)';
            
            setTimeout(() => {
                const cardWidth = 160; 
                const offset = (winningIndex * cardWidth) - (window.innerWidth / 2) + (cardWidth / 2);
                line.style.transition = 'transform 7s cubic-bezier(0.1, 0, 0.1, 1)';
                line.style.transform = `translateX(-${offset}px)`;
            }, 50);

            // Финал
            setTimeout(() => {
                btn.disabled = false;
                myItems.unshift(winSkin); // Добавляем в начало инвентаря
                updateUI();
            }, 7200);
        }

        updateUI(); // Загрузка при старте
    </script>
</body>
</html>
