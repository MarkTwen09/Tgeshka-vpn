<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SO2: MARKET & BALANCE FIX</title>
    <style>
        :root {
            --bg: #0b0e14;
            --panel: #1a1f26;
            --accent: #ffcc00;
            --blue: #00e6ff;
            --common: #b0c3d9; --uncommon: #5e98d9; --rare: #4b69ff; --epic: #8847ff; --legendary: #d32ce6; --arcane: #eb4b4b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: var(--bg); color: white; font-family: -apple-system, sans-serif;
            margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center;
        }

        .header {
            background: var(--panel); width: 100%; max-width: 450px; padding: 15px;
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 10px;
        }
        .bal-row { display: flex; justify-content: space-between; align-items: center; }
        .bal-row b { font-size: 22px; color: var(--accent); }

        .tabs { display: flex; gap: 8px; width: 100%; max-width: 450px; margin-bottom: 15px; }
        .tab { flex: 1; padding: 12px; background: var(--panel); border: none; color: #666; border-radius: 12px; font-weight: bold; font-size: 12px; }
        .tab.active { background: var(--blue); color: #000; }

        .view { display: none; width: 100%; max-width: 450px; }
        .view.active { display: block; }

        /* ROULETTE */
        .case-sel { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .c-card { background: var(--panel); padding: 10px; border-radius: 15px; text-align: center; border: 2px solid transparent; font-size: 11px; }
        .c-card.active { border-color: var(--blue); }

        .window { height: 110px; background: #000; border-radius: 15px; position: relative; overflow: hidden; margin-bottom: 15px; }
        .line { position: absolute; left: 50%; width: 2px; height: 100%; background: red; z-index: 10; transform: translateX(-50%); }
        .track { display: flex; position: absolute; left: 0; top: 10px; transition: transform 6s cubic-bezier(0.1, 0, 0.1, 1); }
        .t-item { min-width: 90px; height: 90px; margin: 0 5px; background: #151921; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-bottom: 4px solid #333; font-size: 9px; }

        /* GRID */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding-bottom: 40px; }
        .card { background: var(--panel); padding: 15px; border-radius: 15px; text-align: center; position: relative; border: 1px solid rgba(255,255,255,0.05); }
        .rarity { height: 3px; width: 50%; margin: 8px auto; border-radius: 5px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; background: var(--accent); margin-top: 8px; font-size: 12px; }

        /* MODAL */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 100; }
        .modal { background: #1a1f26; padding: 25px; border-radius: 20px; text-align: center; width: 80%; max-width: 320px; border: 1px solid var(--blue); }
    </style>
</head>
<body>

    <div class="header">
        <div class="bal-row">
            <span style="color: #888; font-weight: bold;">БАЛАНС</span>
            <b><span id="money">0</span> G</b>
        </div>
    </div>

    <div class="tabs">
        <button class="tab active" onclick="tab('cases')">КЕЙСЫ</button>
        <button class="tab" onclick="tab('market')">РЫНОК</button>
        <button class="tab" onclick="tab('inv')">ИНВЕНТАРЬ</button>
    </div>

    <div id="cases" class="view active">
        <div class="case-sel">
            <div id="c0" class="c-card active" onclick="sel(0)">📦<br>FURIOUS<br>80 G</div>
            <div id="c1" class="c-card" onclick="sel(1)">📦<br>REVENGE<br>180 G</div>
            <div id="c2" class="c-card" onclick="sel(2)">📦<br>EMPIRE<br>450 G</div>
        </div>
        <div class="window"><div class="line"></div><div id="track" class="track"></div></div>
        <button id="spinBtn" class="btn" style="padding: 18px; font-size: 14px;" onclick="spin()">ОТКРЫТЬ КЕЙС</button>
    </div>

    <div id="market" class="view"><div id="marketGrid" class="grid"></div></div>
    <div id="inv" class="view"><div id="invGrid" class="grid"></div></div>

    <div id="winModal" class="overlay">
        <div class="modal">
            <div id="winIcon" style="font-size: 60px;">🔫</div>
            <h3 id="winName" style="margin: 10px 0;">Item</h3>
            <div id="winRarity" style="font-weight: bold; font-size: 11px; margin-bottom: 15px;"></div>
            <button class="btn" onclick="take()">В ИНВЕНТАРЬ</button>
            <button class="btn" style="background:none; color:#777;" onclick="sellNow()">ПРОДАТЬ ЗА <span id="winPrice">0</span> G</button>
        </div>
    </div>

    <script>
        const skins = [
            { name: "G22 | Casual", rar: "common", p: 10, i: "🔫" },
            { name: "USP | Genesis", rar: "uncommon", p: 30, i: "🔫" },
            { name: "M4 | Tiger", rar: "rare", p: 110, i: "🔫" },
            { name: "AKR | Necro", rar: "epic", p: 400, i: "🔫" },
            { name: "AWM | Scratch", rar: "legendary", p: 950, i: "🎯" },
            { name: "Karambit | Gold", rar: "arcane", p: 14000, i: "🔪" },
            { name: "Butterfly | Star", rar: "arcane", p: 12000, i: "🦋" }
        ];

        const config = [
            { cost: 80, drop: [0, 0, 0, 1, 1, 2] },
            { cost: 180, drop: [1, 1, 2, 2, 3, 4] },
            { cost: 450, drop: [3, 4, 4, 5, 6] }
        ];

        let bal = parseInt(localStorage.getItem('s_bal')) || 2000;
        let inv = JSON.parse(localStorage.getItem('s_inv')) || [];
        let curCase = 0;
        let lastWin = null;

        function update() {
            document.getElementById('money').innerText = bal.toLocaleString();
            localStorage.setItem('s_bal', bal);
            localStorage.setItem('s_inv', JSON.stringify(inv));

            // Рынок (теперь с покупкой!)
            const mG = document.getElementById('marketGrid'); mG.innerHTML = '';
            skins.forEach(s => {
                const d = document.createElement('div');
                d.className = 'card';
                // Цена покупки на рынке выше на 20%
                const buyPrice = Math.floor(s.p * 1.2);
                d.innerHTML = `<div style="font-size:35px">${s.i}</div><div style="font-size:11px">${s.name}</div><div class="rarity" style="background:var(--${s.rar})"></div><button class="btn" onclick="buySkin('${s.name}', ${buyPrice}, '${s.rar}', '${s.i}')">КУПИТЬ: ${buyPrice} G</button>`;
                mG.appendChild(d);
            });

            // Инвентарь
            const iG = document.getElementById('invGrid'); iG.innerHTML = '';
            inv.forEach((it, idx) => {
                const d = document.createElement('div');
                d.className = 'card';
                d.innerHTML = `<div style="font-size:35px">${it.i}</div><div style="font-size:11px">${it.name}</div><div class="rarity" style="background:var(--${it.rar})"></div><button class="btn" style="background:#ff4747; color:white;" onclick="sellFromInv(${idx})">ПРОДАТЬ: ${it.p} G</button>`;
                iG.appendChild(d);
            });
        }

        function buySkin(name, pr, rar, icon) {
            if(bal < pr) return alert("Мало голды!");
            bal -= pr;
            // В инвентарь сохраняем базовую цену продажи
            const basePrice = skins.find(s => s.name === name).p;
            inv.unshift({name, p: basePrice, rar, i: icon});
            update();
        }

        function sellFromInv(idx) {
            bal += inv[idx].p;
            inv.splice(idx, 1);
            update();
        }

        function spin() {
            const c = config[curCase];
            if(bal < c.cost) return alert("Мало голды!");
            bal -= c.cost; update();
            document.getElementById('spinBtn').disabled = true;

            const track = document.getElementById('track');
            track.innerHTML = ''; track.style.transition = 'none'; track.style.transform = 'translateX(0)';

            let win;
            for(let i=0; i<45; i++) {
                const s = skins[c.drop[Math.floor(Math.random() * c.drop.length)]];
                if(i === 40) win = s;
                track.innerHTML += `<div class="t-item" style="border-bottom-color:var(--${s.rar})"><div style="font-size:30px">${s.i}</div>${s.name}</div>`;
            }

            setTimeout(() => {
                track.style.transition = 'transform 6s cubic-bezier(0.1, 0, 0.1, 1)';
                const shift = 40 * 100 - (window.innerWidth / 2 - 50);
                track.style.transform = `translateX(-${shift}px)`;
            }, 50);

            setTimeout(() => {
                lastWin = win;
                document.getElementById('winName').innerText = win.name;
                document.getElementById('winRarity').innerText = win.rar.toUpperCase();
                document.getElementById('winRarity').style.color = `var(--${win.rar})`;
                document.getElementById('winPrice').innerText = win.p;
                document.getElementById('winIcon').innerText = win.i;
                document.getElementById('winModal').style.display = 'flex';
                document.getElementById('spinBtn').disabled = false;
                update();
            }, 6200);
        }

        function take() { inv.unshift(lastWin); document.getElementById('winModal').style.display = 'none'; update(); }
        function sellNow() { bal += lastWin.p; document.getElementById('winModal').style.display = 'none'; update(); }
        function tab(id) { document.querySelectorAll('.view, .tab').forEach(e => e.classList.remove('active')); document.getElementById(id).classList.add('active'); event.target.classList.add('active'); }
        function sel(i) { curCase = i; document.querySelectorAll('.c-card').forEach(e => e.classList.remove('active')); document.getElementById('c'+i).classList.add('active'); }

        update();
    </script>
</body>
</html>
