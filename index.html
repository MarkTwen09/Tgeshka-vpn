<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>LUM: Planetary System</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght=500;800;900&family=Rajdhani:wght=600;700&display=swap');

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }

        body, html {
            background: #020105;
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        #game-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }

        /* ИНТЕРФЕЙС ГЛАВНОГО МЕНЮ */
        #menu-screen {
            position: absolute;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 40px 20px;
            z-index: 10;
            background: linear-gradient(to bottom, rgba(2,1,5,0.3), rgba(15,10,30,0.1));
        }

        #game-screen {
            position: absolute;
            width: 100%; height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 20px;
            z-index: 10;
            pointer-events: none;
        }

        .header-brand {
            text-align: center;
            width: 100%;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            font-weight: 900;
            color: #00ffcc;
            text-shadow: 0 0 25px rgba(0, 255, 204, 0.6);
            letter-spacing: 8px;
            margin-bottom: 10px;
            text-indent: 8px;
        }

        .balance-box {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.01));
            border: 1px solid rgba(0, 255, 204, 0.25);
            padding: 15px;
            border-radius: 20px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            width: 100%; max-width: 350px;
            margin: 0 auto 15px auto;
        }

        .balance-box p {
            font-size: 0.75rem;
            color: #8c82b3;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .balance-box .val {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            font-weight: 900;
            color: #fff;
        }
        .balance-box .val span {
            color: #00ffcc;
            text-shadow: 0 0 15px rgba(0, 255, 204, 0.4);
        }

        /* СИСТЕМА ВЫБОРА ПЛАНЕТ (СТИЛЬ CLASH ROYALE) */
        .planet-slider {
            width: 100%; max-width: 350px;
            margin: 10px auto;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 12px 15px;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .slide-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            width: 38px; height: 38px;
            border-radius: 50%;
            font-size: 1rem;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s;
        }
        .slide-btn:active { background: #00ffcc; color: #000; }

        .planet-info { flex-grow: 1; text-align: center; padding: 0 5px; }
        .planet-name { font-family: 'Orbitron', sans-serif; font-size: 1.3rem; font-weight: 800; }
        .planet-lock { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

        /* ИГРОВАЯ СТАТИСТИКА И ХАБ */
        .hub-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%; max-width: 350px;
            margin-bottom: 10px;
        }

        .hub-node {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 12px;
            backdrop-filter: blur(10px);
        }
        .hub-node.full { grid-column: span 2; display: flex; align-items: center; justify-content: space-between; }
        .hub-node .lbl { font-size: 0.7rem; color: #766b9c; text-transform: uppercase; }
        .hub-node .num { font-family: 'Orbitron', sans-serif; font-size: 1.1rem; font-weight: 700; margin-top: 2px; }

        .claim-btn {
            font-family: 'Orbitron', sans-serif;
            background: rgba(0, 179, 255, 0.15);
            border: 1px solid #00b3ff; color: #00b3ff;
            padding: 6px 12px; border-radius: 10px; font-size: 0.75rem; font-weight: 800; cursor: pointer;
        }
        .claim-btn:active { background: #00b3ff; color: #000; }

        .status-msg { min-height: 35px; font-size: 0.9rem; font-weight: 700; text-align: center; margin-top: 5px; color: #00ffcc; }

        /* КНОПКА СТАРТА */
        .btn-container { width: 100%; max-width: 350px; }
        .play-btn {
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(135deg, #00ffcc, #00b3ff);
            color: #020105; border: none;
            padding: 16px; font-size: 1.3rem; font-weight: 900;
            border-radius: 18px; cursor: pointer;
            box-shadow: 0 8px 25px rgba(0, 255, 204, 0.3);
            width: 100%; letter-spacing: 2px;
        }
        .play-btn:active:not(:disabled) { transform: scale(0.98); }
        .play-btn:disabled { background: #1a1724; color: #4e495c; box-shadow: none; cursor: not-allowed; }

        /* ИГРОВОЙ HUD */
        .game-hud {
            display: flex; width: 100%; max-width: 400px;
            justify-content: space-between; pointer-events: auto;
        }

        .hud-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 16px; border-radius: 14px;
            backdrop-filter: blur(10px); min-width: 110px; text-align: center;
        }
        .hud-lbl { font-size: 0.7rem; color: #8c82b3; text-transform: uppercase; }
        .hud-val { font-family: 'Orbitron', sans-serif; font-size: 1.3rem; font-weight: 900; }
    </style>
</head>
<body>

    <canvas id="game-canvas"></canvas>

    <div id="menu-screen">
        <div class="header-brand">
            <h1>LUM</h1>
            
            <div class="balance-box">
                <p>Баланс токенов</p>
                <div class="val"><span id="balance-num">0.00</span> $LUM</div>
            </div>

            <div class="planet-slider">
                <button class="slide-btn" onclick="changePlanet(-1)">◀</button>
                <div class="planet-info">
                    <div class="planet-name" id="p-name">Луна</div>
                    <div class="planet-lock" id="p-status" style="color: #00ffcc;">Доступно</div>
                </div>
                <button class="slide-btn" onclick="changePlanet(1)">▶</button>
            </div>

            <div class="hub-grid">
                <div class="hub-node full">
                    <div style="text-align: left;">
                        <div class="lbl">Пассивный доход</div>
                        <div class="num" id="farm-num" style="color: #00b3ff;">0.0000</div>
                    </div>
                    <button class="claim-btn" onclick="collectFarm()">CLAIM</button>
                </div>
                <div class="hub-node">
                    <div class="lbl">Энергия</div>
                    <div class="num">⚡ 7/7</div>
                </div>
                <div class="hub-node">
                    <div class="lbl">Квесты</div>
                    <div class="num" style="color: #00ffcc;">3/3 ✓</div>
                </div>
            </div>

            <div id="status-report" class="status-msg"></div>
        </div>

        <div class="btn-container">
            <button class="play-btn" id="start-btn" onclick="launchGame()">ИГРАТЬ</button>
        </div>
    </div>

    <div id="game-screen">
        <div class="game-hud">
            <div class="hud-card">
                <div class="hud-lbl">Собрано</div>
                <div class="hud-val" id="game-score" style="color: #00ffcc;">0</div>
            </div>
            <div class="hud-card">
                <div class="hud-lbl">Таймер</div>
                <div class="hud-val" id="game-timer" style="color: #ff3366;">30</div>
            </div>
        </div>
    </div>

    <script>
        // ДАННЫЕ О ПЛАНЕТАХ (СИСТЕМА КУБКОВ/ОСТРОВОВ)
        const PLANETS = [
            { name: 'Луна', req: 0, color: '#8899a6', spaceBg: '#030208', speed: 1.0, size: 140 },
            { name: 'Марс', req: 15, color: '#cc5533', spaceBg: '#120202', speed: 1.2, size: 160 },
            { name: 'Юпитер', req: 50, color: '#d4a373', spaceBg: '#120d02', speed: 1.4, size: 190 },
            { name: 'Нептун', req: 100, color: '#3366cc', spaceBg: '#020514', speed: 1.6, size: 170 },
            { name: 'LUM Prime', req: 250, color: '#00ffcc', spaceBg: '#010f0b', speed: 2.0, size: 210 }
        ];

        let selectedPlanet = 0;
        let activeMatchPlanet = 0;

        // СОСТОЯНИЕ ИГРОКА
        let balance = parseFloat(localStorage.getItem('lum_val_bal')) || 0;
        let farmAccum = parseFloat(localStorage.getItem('lum_val_farm')) || 0;
        let gameActive = false, score = 0, secondsLeft = 30;
        let itemsArray = [];

        // CANVAS НАСТРОЙКИ
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        
        let stars = [];
        let planetRotationAngle = 0;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            if (stars.length === 0) generateStars();
        }
        window.addEventListener('resize', resizeCanvas);

        function generateStars() {
            stars = [];
            for (let i = 0; i < 150; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 1.5 + 0.5,
                    speed: Math.random() * 0.5 + 0.1
                });
            }
        }

        // КЛИК ПО ЭКРАНУ И ПРОВЕРКА ПОПАДАНИЯ ЧЁТКО ПО ФИГУРАМ
        canvas.addEventListener('pointerdown', (e) => {
            if (!gameActive) return;
            
            const rect = canvas.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const clickY = e.clientY - rect.top;

            for (let i = itemsArray.length - 1; i >= 0; i--) {
                let item = itemsArray[i];
                // Рассчитываем расстояние от центра объекта до клика
                let dist = Math.hypot(clickX - item.x, clickY - item.y);
                
                if (dist < item.radius + 15) { // Берем небольшой хитбокс-запас для удобства на смартфонах
                    handleItemCollect(item);
                    itemsArray.splice(i, 1);
                    return;
                }
            }
        });

        function handleItemCollect(item) {
            if (item.type === 'bomb') {
                score -= 30; if (score < 0) score = 0;
            } else if (item.type === 'gold') {
                score += 25;
            } else {
                score += 10;
            }
            document.getElementById('game-score').textContent = score;
        }

        // СПАВН КРИСТАЛЛОВ И БОМБ
        function spawnObject() {
            if (!gameActive) return;
            let typeRand = Math.random();
            let type = 'crystal';
            let color = PLANETS[activeMatchPlanet].color; // Цвет кристаллов под цвет планеты!

            if (typeRand < 0.15) {
                type = 'bomb';
                color = '#ff3366';
            } else if (typeRand < 0.30) {
                type = 'gold';
                color = '#ffcc00';
            }

            itemsArray.push({
                x: Math.random() * (canvas.width - 60) + 30,
                y: -40,
                type: type,
                color: color,
                radius: type === 'bomb' ? 18 : 16,
                speed: (Math.random() * 2 + 3) * PLANETS[activeMatchPlanet].speed,
                angle: 0,
                rotSpeed: Math.random() * 0.04 - 0.02
            });
        }

        // СУПЕР КРАСИВАЯ ОТРИСОВКА КРИСТАЛЛОВ С НЕОНОВЫМИ ГРАНЯМИ (КВАЗИ-3Д)
        function drawGem(x, y, r, color, angle) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);
            
            ctx.shadowBlur = 15;
            ctx.shadowColor = color;

            ctx.fillStyle = color;
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 1.5;

            // Рисуем красивый ограненный октаэдр
            ctx.beginPath();
            ctx.moveTo(0, -r);   // Верх
            ctx.lineTo(r, 0);    // Право
            ctx.lineTo(0, r);    // Низ
            ctx.lineTo(-r, 0);   // Лево
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            // Внутренние грани для объема
            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.moveTo(-r, 0);
            ctx.lineTo(r, 0);
            ctx.moveTo(0, -r);
            ctx.lineTo(0, r);
            ctx.strokeStyle = 'rgba(255,255,255,0.4)';
            ctx.stroke();

            ctx.restore();
        }

        function drawBomb(x, y, r) {
            ctx.save();
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#ff3366';
            
            // Тело бомбы
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.fillStyle = '#1c1724';
            ctx.strokeStyle = '#ff3366';
            ctx.lineWidth = 2;
            ctx.fill();
            ctx.stroke();

            // Сердцевина неоновая
            ctx.beginPath();
            ctx.arc(x, y, r * 0.4, 0, Math.PI * 2);
            ctx.fillStyle = '#ff3366';
            ctx.fill();

            ctx.restore();
        }

        // ГЛАВНЫЙ КОР-ЦИКЛ ДВИЖКА (ОТРИСОВКА И АНИМАЦИЯ)
        function engineRenderLoop() {
            // Очистка экрана фоновым цветом текущей планеты
            ctx.fillStyle = PLANETS[selectedPlanet].spaceBg;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 1. Рисуем фоновые звезды
            ctx.fillStyle = '#ffffff';
            stars.forEach(star => {
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
                if (gameActive) {
                    star.y += star.speed * PLANETS[activeMatchPlanet].speed * 2;
                    if (star.y > canvas.height) star.y = 0;
                }
            });

            // 2. Рисуем фоновую гигантскую неоновую планету
            planetRotationAngle += 0.003;
            let currentPlanetInfo = PLANETS[gameActive ? activeMatchPlanet : selectedPlanet];
            
            ctx.save();
            // Позиция: в меню по центру, в игре опускается вниз как огромная сфера
            let targetY = gameActive ? canvas.height + 50 : canvas.height * 0.65;
            ctx.translate(canvas.width / 2, targetY);
            ctx.rotate(planetRotationAngle);

            ctx.shadowBlur = 30;
            ctx.shadowColor = currentPlanetInfo.color;

            // Внешняя сфера-атмосфера
            ctx.beginPath();
            ctx.arc(0, 0, currentPlanetInfo.size, 0, Math.PI * 2);
            ctx.strokeStyle = currentPlanetInfo.color;
            ctx.lineWidth = 1;
            ctx.stroke();

            // Кибернетическая сетка планеты
            ctx.shadowBlur = 0;
            ctx.strokeStyle = 'rgba(255,255,255,0.06)';
            for(let i = -currentPlanetInfo.size; i <= currentPlanetInfo.size; i += 30) {
                ctx.beginPath();
                ctx.arc(0, 0, Math.abs(i), 0, Math.PI * 2);
                ctx.stroke();
            }
            ctx.restore();

            // 3. Рисуем падающие игровые предметы
            if (gameActive) {
                for (let i = itemsArray.length - 1; i >= 0; i--) {
                    let item = itemsArray[i];
                    item.y += item.speed;
                    item.angle += item.rotSpeed;

                    if (item.type === 'bomb') {
                        drawBomb(item.x, item.y, item.radius);
                    } else {
                        drawGem(item.x, item.y, item.radius, item.color, item.angle);
                    }

                    // Если улетел за экран
                    if (item.y > canvas.height + 40) {
                        itemsArray.splice(i, 1);
                    }
                }
            }

            requestAnimationFrame(engineRenderLoop);
        }

        // ЛОГИКА ТАЙМЕРОВ СЕССИИ
        let gameCountdownInterval;
        let gameSpawnInterval;

        function launchGame() {
            score = 0; secondsLeft = 30; itemsArray = [];
            activeMatchPlanet = selectedPlanet;

            document.getElementById('game-score').textContent = "0";
            document.getElementById('game-timer').textContent = "30";

            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';

            gameActive = true;

            gameCountdownInterval = setInterval(() => {
                secondsLeft--;
                document.getElementById('game-timer').textContent = secondsLeft;
                if (secondsLeft <= 0) stopGameSession();
            }, 1000);

            gameSpawnInterval = setInterval(spawnObject, 400);
        }

        function stopGameSession() {
            gameActive = false;
            clearInterval(gameCountdownInterval);
            clearInterval(gameSpawnInterval);

            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('menu-screen').style.display = 'flex';

            let prize = score * 0.01;
            balance += prize;
            localStorage.setItem('lum_val_bal', balance.toFixed(2));
            
            updateUI();
            document.getElementById('status-report').innerHTML = `РАУНД ЗАВЕРШЕН!<br><span style="color:#00ffcc;">+${prize.toFixed(2)} $LUM</span>`;
        }

        // СЛАЙДЕР ВЫБОРА ПЛАНЕТ
        function changePlanet(direction) {
            selectedPlanet += direction;
            if (selectedPlanet < 0) selectedPlanet = PLANETS.length - 1;
            if (selectedPlanet >= PLANETS.length) selectedPlanet = 0;
            updatePlanetUI();
        }

        function updatePlanetUI() {
            const planet = PLANETS[selectedPlanet];
            document.getElementById('p-name').textContent = planet.name;
            
            const status = document.getElementById('p-status');
            const startBtn = document.getElementById('start-btn');

            if (balance >= planet.req) {
                status.textContent = "Доступно";
                status.style.color = "#00ffcc";
                startBtn.disabled = false;
                startBtn.textContent = "ИГРАТЬ";
            } else {
                status.textContent = `Блок: Нужно ${planet.req} $LUM`;
                status.style.color = "#ff3366";
                startBtn.disabled = true;
                startBtn.textContent = "ЗАБЛОКИРОВАНО";
            }
        }

        // АВТО-ФАРМИНГ ХАБА
        setInterval(() => {
            if (!gameActive) {
                farmAccum += 0.0003;
                document.getElementById('farm-num').textContent = farmAccum.toFixed(4);
                localStorage.setItem('lum_val_farm', farmAccum);
            }
        }, 1000);

        function collectFarm() {
            if (farmAccum <= 0) return;
            balance += farmAccum;
            farmAccum = 0;
            localStorage.setItem('lum_val_bal', balance.toFixed(2));
            localStorage.setItem('lum_val_farm', farmAccum);
            updateUI();
        }

        function updateUI() {
            document.getElementById('balance-num').textContent = balance.toFixed(2);
            updatePlanetUI();
        }

        // СТАРТ ПРИ ЗАГРУЗКЕ СТРАНИЦЫ
        window.onload = () => {
            resizeCanvas();
            updateUI();
            requestAnimationFrame(engineRenderLoop);
        };
    </script>
</body>
</html>
