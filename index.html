<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>EURO-ASIA CONQUEST: REAL MAP EDITION</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        :root { --bg: #0d1117; --panel: #161b22; --accent: #238636; --war: #f85149; --text: #c9d1d9; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* UI */
        #ui-left { position: absolute; top: 15px; left: 15px; width: 280px; z-index: 10; display: flex; flex-direction: column; gap: 10px; }
        #ui-right { position: absolute; top: 15px; right: 15px; width: 250px; z-index: 10; }
        .glass { background: rgba(22, 27, 34, 0.9); border: 1px solid #30363d; padding: 15px; border-radius: 12px; backdrop-filter: blur(5px); }
        
        /* Карта */
        #map-container { width: 100vw; height: 100vh; background: #05070a; cursor: grab; }
        .country { fill: #21262d; stroke: #30363d; stroke-width: 0.5; transition: 0.2s; }
        .country:hover { fill: #30363d; filter: brightness(1.2); }
        .owned-me { fill: #1f6feb !important; stroke: #58a6ff; }
        .owned-enemy { fill: #da3633 !important; stroke: #f85149; }
        .highlight { stroke: #f1e05a; stroke-width: 1.5; }

        /* Чат и логи */
        #chat-box { height: 150px; overflow-y: auto; font-size: 12px; background: #0d1117; padding: 5px; border-radius: 4px; margin-top: 10px; }
        input[type="text"] { width: 70%; background: #0d1117; border: 1px solid #30363d; color: white; padding: 5px; border-radius: 4px; }
        
        button { background: var(--accent); border: none; color: white; padding: 10px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; margin-bottom: 5px; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
        .btn-war { background: var(--war); }
        
        /* Армия анимация */
        .army-dot { width: 12px; height: 12px; background: #f1e05a; border-radius: 50%; position: absolute; pointer-events: none; z-index: 100; box-shadow: 0 0 10px #f1e05a; transition: all 1.5s ease-in-out; }
    </style>
</head>
<body>

<div id="ui-left" class="glass">
    <h2 id="current-country" style="margin:0; font-size: 18px;">Выберите страну</h2>
    <div style="display:flex; justify-content: space-between; margin: 10px 0;">
        <span>💰 <b id="gold">1000</b></span>
        <span>⚔️ <b id="army">100</b></span>
    </div>
    <button onclick="updateStat('gold', 300)">📈 Экономика (-$200)</button>
    <button onclick="updateStat('army', 50)">🎖 Нанять войска (-$300)</button>
    <button id="attack-btn" class="btn-war" disabled onclick="initAttack()">🚀 ВТОРЖЕНИЕ</button>
    
    <div id="chat-box"><b>Система:</b> Ожидание подключения...</div>
    <div style="margin-top:5px;">
        <input type="text" id="chat-input" placeholder="Сообщение...">
        <button style="width:25%; display:inline;" onclick="sendChat()">></button>
    </div>
</div>

<div id="ui-right" class="glass">
    <div style="font-size: 11px;">
        Ваш сетевой ID: <b id="my-id" style="color:#58a6ff">...</b><br><br>
        <input type="text" id="target-id" style="width:60%" placeholder="ID друга">
        <button style="width:30%; display:inline; padding:5px;" onclick="connect()">ОК</button>
    </div>
</div>

<div id="army-unit" class="army-dot" style="display:none"></div>
<div id="map-container"></div>

<script>
    let resources = { gold: 1000, army: 100 };
    let selectedCountry = null;
    let peer, conn;

    // Отрисовка настоящей карты
    const width = window.innerWidth, height = window.innerHeight;
    const projection = d3.geoMercator().scale(250).translate([width / 3, height / 1.5]);
    const path = d3.geoPath().projection(projection);
    const svg = d3.select("#map-container").append("svg").attr("width", width).attr("height", height);// Загрузка реальных границ стран мира
    d3.json("https://raw.githubusercontent.com/holtzy/D3-graph-gallery/master/DATA/world.geojson").then(data => {
        svg.selectAll("path")
            .data(data.features)
            .enter().append("path")
            .attr("d", path)
            .attr("class", "country")
            .attr("id", d => d.properties.name.replace(/\s+/g, ''))
            .on("click", function(e, d) {
                d3.selectAll(".country").classed("highlight", false);
                d3.select(this).classed("highlight", true);
                selectedCountry = { id: this.id, name: d.properties.name, el: this };
                document.getElementById('current-country').innerText = d.properties.name;
                document.getElementById('attack-btn').disabled = false;
            });
    });

    // Сетевой код (PeerJS)
    peer = new Peer();
    peer.on('open', id => document.getElementById('my-id').innerText = id);
    peer.on('connection', c => { conn = c; setupChat(); log("Друг вошел в игру!"); });

    function connect() {
        conn = peer.connect(document.getElementById('target-id').value);
        setupChat();
        log("Подключаемся к штабу...");
    }

    function setupChat() {
        conn.on('data', data => {
            if(data.type === 'msg') log(<b>Друг:</b> ${data.val});
            if(data.type === 'war') remoteWar(data.id);
        });
    }

    function sendChat() {
        const val = document.getElementById('chat-input').value;
        if(conn) conn.send({type: 'msg', val});
        log(<b>Вы:</b> ${val});
        document.getElementById('chat-input').value = "";
    }

    // Механика войны
    function initAttack() {
        if(resources.army < 40) return alert("Мало войск!");
        resources.army -= 40;
        updateUI();
        
        const rect = selectedCountry.el.getBoundingClientRect();
        const dot = document.getElementById('army-unit');
        dot.style.display = "block";
        dot.style.left = "20px"; dot.style.top = "80%";
        
        setTimeout(() => {
            dot.style.left = (rect.left + rect.width/2) + "px";
            dot.style.top = (rect.top + rect.height/2) + "px";
        }, 100);

        setTimeout(() => {
            dot.style.display = "none";
            selectedCountry.el.classList.add('owned-me');
            log(Захвачена территория: ${selectedCountry.name});
            if(conn) conn.send({type: 'war', id: selectedCountry.id});
        }, 1600);
    }

    function remoteWar(id) {
        document.getElementById(id).classList.add('owned-enemy');
        log(ВРАГ ЗАХВАТИЛ ${id}!);
    }

    function updateStat(type, val) {
        if(type === 'gold' && resources.gold >= 200) { resources.gold += val - 200; }
        if(type === 'army' && resources.gold >= 300) { resources.army += val; resources.gold -= 300; }
        updateUI();
    }

    function updateUI() {
        document.getElementById('gold').innerText = resources.gold;
        document.getElementById('army').innerText = resources.army;
    }

    function log(m) {
        const b = document.getElementById('chat-box');
        b.innerHTML += <div>${m}</div>;
        b.scrollTop = b.scrollHeight;
    }
</script>
</body>
</html>
