<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shaman Coin Slot PRO</title>
    <style>
        :root {
            --bg-color: #0b0d13;
            --card-bg: rgba(25, 28, 36, 0.8);
            --accent-gold: #ffb703;
            --mana-blue: #3a86ff;
            --text-main: #ffffff;
            --border-glass: rgba(255, 255, 255, 0.08);
            /* Высота одного символа внутри барабана */
            --slot-height: 120px; 
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background-color: #000;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .game-container {
            width: 100%;
            max-width: 412px;
            height: 850px;
            background: radial-gradient(circle at top, #161922 0%, var(--bg-color) 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
        }

        /* Шапка */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 50px;
        }

        .wallet-btn, .profile {
            width: 42px;
            height: 42px;
            background: var(--card-bg);
            border: 1px solid var(--border-glass);
            border-radius: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            cursor: pointer;
        }

        .balance-container {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        /* Шаман */
        .shaman-container {
            display: flex;
            justify-content: center;
            margin-top: 10px;
        }
        .shaman-img {
            width: 180px;
            height: auto;
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.7));
            animation: float 4s ease-in-out infinite;
        }

        /* Слот Машина */
        .slot-machine {
            background: rgba(20, 22, 31, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: 28px;
            padding: 30px 16px 20px 16px;
            position: relative;
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.1), 0 15px 35px rgba(0,0,0,0.6);
        }

        .bet-badge {
            position: absolute;
            top: -14px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #ffb703, #fb8500);
            padding: 6px 22px;
            border-radius: 14px;
            font-weight: 900;
            font-size: 13px;
            color: #000;
            box-shadow: 0 5px 20px rgba(255, 183, 3, 0.4);
            letter-spacing: 0.5px;
        }

        /* БАРАБАНЫ И РУЛЕТКА */
        .slots-container {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-top: 10px;
            margin-bottom: 25px;
        }

        .slot-window {
            flex: 1;
            height: var(--slot-height);
            background: #06070a;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 8px 16px rgba(0,0,0,0.85), inset 0 -8px 16px rgba(0,0,0,0.85);
        }

        /* Движущаяся лента внутри каждого слота */
        .slot-track {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .slot-tile {
            height: var(--slot-height);
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 45px;
            transform: translateZ(0); /* Аппаратное ускорение */
        }

        /* КЛАССЫ ДЛЯ РЕАЛИСТИЧНОЙ АНИМАЦИИ */
        .spinning {
            /* Крутится бесконечно со смазыванием */
            animation: spinContinuous 0.25s linear infinite;
            filter: blur(3px) contrast(1.2);
        }

        .stopping {
            /* Плавный останов с красивым отскоком назад в конце (cubic-bezier) */
            animation: stopBounce 1.2s cubic-bezier(0.15, 0.85, 0.3, 1.15) forwards;
        }

        /* Энергия / Мана */
        .mana-section {
            margin-bottom: 22px;
            text-align: center;
        }

        .mana-bar-container {
            width: 100%;
            height: 26px;
            background: rgba(0,0,0,0.7);
            border-radius: 13px;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.06);
        }

        .mana-bar {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #00b4d8, var(--mana-blue));
            box-shadow: 0 0 14px rgba(58, 134, 255, 0.6);
            transition: width 0.3s ease;
        }

        .mana-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 13px;
            font-weight: 800;
            text-shadow: 0 1px 4px rgba(0,0,0,1);
        }

        .mana-label {
            font-size: 12px;
            color: #797c87;
            margin-top: 6px;
        }

        /* Кнопки управления */
        .control-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }

        .side-btn {
            width: 54px;
            height: 54px;
            border-radius: 18px;
            background: rgba(30, 33, 45, 0.8);
            border: 1px solid var(--border-glass);
            color: white;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .spin-btn {
            flex: 1;
            height: 56px;
            background: linear-gradient(135deg, #ffe47e, var(--accent-gold));
            border: none;
            border-radius: 18px;
            font-size: 24px;
            font-weight: 900;
            color: #0c0e14;
            cursor: pointer;
            box-shadow: 0 6px 25px rgba(255, 183, 3, 0.4);
            transition: transform 0.05s, box-shadow 0.05s;
            letter-spacing: 0.5px;
        }

        .spin-btn:active {
            transform: scale(0.96);
            box-shadow: 0 2px 8px rgba(255, 183, 3, 0.2);
        }

        .spin-btn:disabled {
            background: linear-gradient(135deg, #2a2c35, #1e2026);
            color: #525665;
            box-shadow: none;
            cursor: not-allowed;
        }

        /* Нижнее меню */
        .bottom-nav {
            display: flex;
            justify-content: space-between;
            background: rgba(9, 10, 15, 0.95);
            padding: 14px 10px;
            border-top: 1px solid var(--border-glass);
            margin: 0 -20px -20px -20px;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 20px;
            color: #525665;
            cursor: pointer;
        }

        .nav-item span {
            font-size: 11px;
            margin-top: 5px;
            font-weight: 600;
        }

        .nav-item.active {
            color: var(--accent-gold);
        }

        /* --- КРУТЫЕ АНИМАЦИИ ДВИЖЕНИЯ БАРАБАНОВ --- */
        
        /* 1. Бесконечный быстрый цикл (пока крутится) */
        @keyframes spinContinuous {
            0% { transform: translateY(0); }
            100% { transform: translateY(calc(-1 * var(--slot-height) * 3)); }
        }

        /* 2. Остановка с крутым эффектом торможения и финального отскока назад */
        @keyframes stopBounce {
            0% { 
                transform: translateY(0);
                filter: blur(2px);
            }
            70% {
                filter: blur(0px);
            }
            /* Прокручивается до целевого финального смещения */
            100% { 
                transform: translateY(var(--final-y)); 
                filter: blur(0px);
            }
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body>

    <div class="game-container">
        <header class="header">
            <div class="wallet-btn">👛</div>
            <div class="balance-container">
                <span style="color: var(--accent-gold);">🪙</span>
                <span id="balance">300</span>
            </div>
            <div class="profile">😎</div>
        </header>

        <div class="shaman-container">
            <img src="https://api.dicebear.com/7.x/bottts/svg?seed=shaman&backgroundColor=transparent" alt="Shaman" class="shaman-img">
        </div>

        <div class="slot-machine">
            <div class="bet-badge">СТАВКА X1 ⚡</div>
            
            <div class="slots-container">
                <div class="slot-window">
                    <div class="slot-track" id="track1"></div>
                </div>
                <div class="slot-window">
                    <div class="slot-track" id="track2"></div>
                </div>
                <div class="slot-window">
                    <div class="slot-track" id="track3"></div>
                </div>
            </div>

            <div class="mana-section">
                <div class="mana-bar-container">
                    <div class="mana-bar" id="manaBar"></div>
                    <span class="mana-text" id="manaText">50/50</span>
                </div>
                <div class="mana-label">Фулл мана</div>
            </div>

            <div class="control-panel">
                <button class="side-btn">🎯</button>
                <button class="spin-btn" id="spinBtn">SPIN</button>
                <button class="side-btn">🧪</button>
            </div>
        </div>

        <nav class="bottom-nav">
            <div class="nav-item">📋<span>Задания</span></div>
            <div class="nav-item">👥<span>Друзья</span></div>
            <div class="nav-item active">☀️<span>Спин</span></div>
            <div class="nav-item">⚡<span>Бусты</span></div>
            <div class="nav-item">⭐<span>Рейтинг</span></div>
        </nav>
    </div>

    <script>
        // Набор красивых символов
        const symbols = ['💎', '🔮', '🍒', '🌟', '👺'];
        
        let balance = 300;
        let mana = 50;
        const maxMana = 50;
        const slotHeight = 120; // Соответствует --slot-height в CSS

        const spinBtn = document.getElementById('spinBtn');
        const balanceText = document.getElementById('balance');
        const manaBar = document.getElementById('manaBar');
        const manaText = document.getElementById('manaText');
        
        const tracks = [
            document.getElementById('track1'),
            document.getElementById('track2'),
            document.getElementById('track3')
        ];

        // Генерируем стартовые ленты символов для каждого барабана
        function initSlots() {
            tracks.forEach(track => {
                track.innerHTML = '';
                // Создаем длинную ленту (например, 15 элементов), чтобы было куда крутить
                for (let i = 0; i < 15; i++) {
                    const tile = document.createElement('div');
                    tile.className = 'slot-tile';
                    // Заполняем случайными символами
                    tile.innerText = symbols[Math.floor(Math.random() * symbols.length)];
                    track.appendChild(tile);
                }
            });
        }

        initSlots();

        spinBtn.addEventListener('click', () => {
            if (mana < 1) {
                alert('Энергия на нуле!');
                return;
            }

            mana--;
            updateManaUI();
            spinBtn.disabled = true;

            // 1. Запускаем бешеное бесконечное кручение (анимация .spinning)
            tracks.forEach(track => {
                track.style.animation = 'none'; // Сброс
                track.offsetHeight; // Хакаем перерисовку браузера
                track.classList.remove('stopping');
                track.classList.add('spinning');
            });

            // Массив финальных результатов
            const finalResults = [
                Math.floor(Math.random() * symbols.length),
                Math.floor(Math.random() * symbols.length),
                Math.floor(Math.random() * symbols.length)
            ];

            // 2. Останавливаем барабаны по очереди с небольшой задержкой (как в казино)
            tracks.forEach((track, index) => {
                setTimeout(() => {
                    // Убираем бесконечный спин
                    track.classList.remove('spinning');
                    
                    // Перестраиваем ленту: на целевую позицию (индекс 2) ставим выигрышный символ
                    const tiles = track.querySelectorAll('.slot-tile');
                    
                    // Символ, который игрок увидит по центру
                    const targetSymbol = symbols[finalResults[index]];
                    tiles[2].innerText = targetSymbol; 
                    
                    // Задаем смещение через CSS переменную для анимации stopBounce
                    // Смещаем ровно на 2 элемента вниз, чтобы увидеть tiles[2]
                    const finalY = -2 * slotHeight;
                    track.style.setProperty('--final-y', `${finalY}px`);
                    
                    // Включаем физичное торможение с отскоком
                    track.classList.add('stopping');

                    // Когда остановился ПОСЛЕДНИЙ барабан — проверяем результат
                    if (index === 2) {
                        setTimeout(() => {
                            checkWin(finalResults);
                            spinBtn.disabled = false;
                        }, 1200); // Время совпадает с длиной анимации stopBounce
                    }

                }, 600 + index * 400); // Первый встает через 0.6с, второй через 1.0с, третий через 1.4с
            });
        });

        function checkWin(results) {
            // Три одинаковых в ряд
            if (results[0] === results[1] && results[1] === results[2]) {
                balance += 300;
                triggerWinUI();
            } 
            // Два одинаковых в ряд
            else if (results[0] === results[1] || results[1] === results[2] || results[0] === results[2]) {
                balance += 40;
            }
            balanceText.innerText = balance;
        }

        function updateManaUI() {
            const pct = (mana / maxMana) * 100;
            manaBar.style.width = `${pct}%`;
            manaText.innerText = `${mana}/${maxMana}`;
        }

        function triggerWinUI() {
            tracks.forEach(track => {
                track.style.transform = 'translateY(-240px) scale(1.08)';
                setTimeout(() => track.style.transform = 'translateY(-240px) scale(1)', 200);
            });
        }

        // Регенерация маны
        setInterval(() => {
            if (mana < maxMana) {
                mana++;
                updateManaUI();
            }
        }, 4000);
    </script>
</body>
</html>
