<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Lum Crypto Drop Game</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800;900&family=Rajdhani:wght@500;600;700&display=swap');

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }

        body {
            background: #040209;
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        /* КИБЕР-ГРАДИЕНТЫ НА ФОНЕ МЕНЮ */
        .bg-glow-1, .bg-glow-2 {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.25;
            z-index: 0;
            pointer-events: none;
            animation: pulseGlow 8s ease-in-out infinite alternate;
        }
        .bg-glow-1 {
            background: #00ffcc;
            top: -50px;
            left: -50px;
        }
        .bg-glow-2 {
            background: #9900ff;
            bottom: 50px;
            right: -50px;
            animation-delay: -4s;
        }

        @keyframes pulseGlow {
            0% { transform: scale(1) translate(0, 0); opacity: 0.2; }
            100% { transform: scale(1.3) translate(30px, 20px); opacity: 0.35; }
        }

        /* ЭКРАН ХАБА / МЕНЮ */
        #menu-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 50px 24px 40px 24px;
            z-index: 10;
            overflow-y: auto;
        }

        #game-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 40px 24px;
            z-index: 10;
            pointer-events: none;
        }

        .brand-section {
            text-align: center;
            width: 100%;
            z-index: 2;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 4.8rem;
            font-weight: 900;
            color: #00ffcc;
            text-shadow: 0 0 25px rgba(0, 255, 204, 0.5), 0 0 50px rgba(0, 255, 204, 0.2);
            letter-spacing: 12px;
            margin-bottom: 25px;
            text-indent: 12px;
        }

        /* ДИЗАЙН БАЛАНСА */
        .crypto-balance {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.01));
            border: 1px solid rgba(0, 255, 204, 0.25);
            padding: 26px 20px;
            border-radius: 28px;
            text-align: center;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.6), inset 0 1px 2px rgba(255,255,255,0.15);
            width: 100%;
            max-width: 350px;
            margin: 0 auto;
        }

        .crypto-balance p {
            font-size: 0.85rem;
            color: #7b70a2;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 6px;
            font-weight: 700;
        }

        .crypto-balance .amount {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.4rem;
            font-weight: 900;
            color: #fff;
            letter-spacing: -1px;
        }

        .crypto-balance .amount span {
            color: #00ffcc;
            text-shadow: 0 0 20px rgba(0, 255, 204, 0.6);
        }

        /* КРИПТО ФАРМИНГ */
        .farming-container {
            width: 100%;
            max-width: 350px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.005));
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 16px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        .farming-info p {
            font-size: 0.75rem;
            color: #6c5f93;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 700;
        }

        .farming-info .farm-amount {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.25rem;
            font-weight: 800;
            color: #00b3ff;
            margin-top: 2px;
        }

        .claim-btn {
            font-family: 'Orbitron', sans-serif;
            background: rgba(0, 255, 204, 0.1);
            border: 1px solid rgba(0, 255, 204, 0.3);
            color: #00ffcc;
            padding: 8px 16px;
            border-radius: 14px;
            font-size: 0.8rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s;
        }

        .claim-btn:active {
            background: rgba(0, 255, 204, 0.3);
            transform: scale(0.95);
        }

        /* БЛОК СТАТИСТИКИ */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
            max-width: 350px;
            margin-top: 16px;
        }

        .stat-card {
            background: rgba(255,255,255,0.01);
            border: 1px solid rgba(255,255,255,0.04);
            border-radius: 20px;
            padding: 14px;
            text-align: left;
            position: relative;
        }

        .stat-card .label {
            font-size: 0.75rem;
            color: #6c5f93;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-card .val {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            color: #fff;
            margin-top: 4px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* СТИЛЬ ДЛЯ МИНИ ТАЙМЕРА БИЛЕТОВ */
        .ticket-timer {
            font-size: 0.7rem;
            color: #ff3366;
            font-weight: 500;
            letter-spacing: 0px;
            opacity: 0.85;
        }

        .game-status-text {
            color: #ff3366;
            font-size: 1.1rem;
            font-weight: 700;
            min-height: 50px;
            text-align: center;
            letter-spacing: 1px;
            margin-top: 25px;
            line-height: 1.4;
        }

        /* КНОПКА С НЕОНОВЫМ БЛИКОМ */
        .btn-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 2;
        }

        .btn {
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(135deg, #00ffcc, #00b3ff);
            color: #040209;
            border: none;
            padding: 22px;
            font-size: 1.4rem;
            font-weight: 900;
            border-radius: 26px;
            cursor: pointer;
            box-shadow: 0 15px 40px rgba(0, 255, 204, 0.35), inset 0 -4px 0 rgba(0,0,0,0.15);
            transition: all 0.3s ease;
            width: 100%;
            max-width: 350px;
            letter-spacing: 3px;
            position: relative;
            overflow: hidden;
        }

        .btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -60%;
            width: 30%;
            height: 200%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.5) 50%, rgba(255,255,255,0) 100%);
            transform: rotate(25deg);
            animation: shimmer 3.5s infinite linear;
        }

        @keyframes shimmer {
            0% { left: -60%; }
            100% { left: 140%; }
        }

        .btn:active:not(:disabled) {
            transform: scale(0.96);
            box-shadow: 0 8px 20px rgba(0, 255, 204, 0.2);
        }

        .btn:disabled {
            background: linear-gradient(135deg, #2a2635, #15131c);
            color: #554e68;
            border: 1px solid rgba(255,255,255,0.05);
            cursor: not-allowed;
            box-shadow: none;
        }
        .btn:disabled::after {
            display: none;
        }

        .btn .sub-timeout {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            margin-top: 4px;
            color: #ff3366;
            font-family: 'Orbitron', sans-serif;
        }

        /* ИНТЕРФЕЙС ИГРЫ */
        .hud {
            display: flex;
            width: 100%;
            max-width: 500px;
            justify-content: space-between;
            align-items: center;
            background: rgba(4, 2, 9, 0.7);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 16px 24px;
            border-radius: 22px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 12;
            pointer-events: auto;
        }

        .hud-box {
            font-size: 0.9rem;
            color: #6c5f93;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
        }

        .hud-box div {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            font-weight: 800;
            color: #fff;
            margin-top: 4px;
        }

        #score { color: #00ffcc; text-shadow: 0 0 10px rgba(0,255,204,0.3); }
        #timer { color: #ff3366; text-shadow: 0 0 10px rgba(255,51,102,0.3); }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            display: block;
        }

        .shake {
            animation: shakeScreen 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shakeScreen {
            10%, 90% { transform: translate3d(-2px, 1px, 0); }
            20%, 80% { transform: translate3d(4px, -3px, 0); }
            30%, 50%, 70% { transform: translate3d(-6px, 5px, 0); }
            40%, 60% { transform: translate3d(6px, -4px, 0); }
        }
    </style>
</head>
<body id="body">

    <div id="glow1" class="bg-glow-1"></div>
    <div id="glow2" class="bg-glow-2"></div>

    <canvas id="gameCanvas"></canvas>

    <div id="menu-screen">
        <div class="brand-section">
            <h1>LUM</h1>
            
            <div class="crypto-balance">
                <p>Баланс токенов</p>
                <div class="amount"><span id="total-balance">0.00</span> $LUM</div>
            </div>

            <div class="farming-container">
                <div class="farming-info">
                    <p>Пассивный фарминг</p>
                    <div class="farm-amount" id="farm-display">0.0000</div>
                </div>
                <button class="claim-btn" onclick="claimFarming()">CLAIM</button>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="label">Билеты</div>
                    <div class="val">
                        <span id="tickets-count">⚡ 7/7</span>
                        <span id="tickets-timer-container" class="ticket-timer"></span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="label">Квесты</div>
                    <div class="val" style="color: #00ffcc;">✓ 4 готово</div>
                </div>
            </div>

            <div id="last-score" class="game-status-text"></div>
        </div>

        <div class="btn-wrapper">
            <button class="btn" id="play-btn" onclick="tryStartGame()">ИГРАТЬ</button>
        </div>
    </div>

    <div id="game-screen">
        <div class="hud">
            <div class="hud-box">Токены<div><span id="score">0</span></div></div>
            <div class="hud-box" style="text-align: right;">Время<div><span id="timer">30</span>с</div></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const body = document.getElementById('body');
        const menuScreen = document.getElementById('menu-screen');
        const gameScreen = document.getElementById('game-screen');
        const scoreDisplay = document.getElementById('score');
        const timerDisplay = document.getElementById('timer');
        const totalBalanceDisplay = document.getElementById('total-balance');
        const lastScoreDisplay = document.getElementById('last-score');
        const glow1 = document.getElementById('glow1');
        const glow2 = document.getElementById('glow2');
        const farmDisplay = document.getElementById('farm-display');
        const ticketsCount = document.getElementById('tickets-count');
        const ticketsTimerContainer = document.getElementById('tickets-timer-container');
        const playBtn = document.getElementById('play-btn');

        // Логика кошелька
        let cryptoBalance = parseFloat(localStorage.getItem('lum_balance')) || 0;
        totalBalanceDisplay.textContent = cryptoBalance.toFixed(2);

        // Пассивный фарминг
        let activeFarmAccum = parseFloat(localStorage.getItem('lum_farm_accum')) || 0;
        setInterval(() => {
            if (!gameActive) {
                activeFarmAccum += 0.0003;
                farmDisplay.textContent = activeFarmAccum.toFixed(4);
                localStorage.setItem('lum_farm_accum', activeFarmAccum);
            }
        }, 1000);
        farmDisplay.textContent = activeFarmAccum.toFixed(4);

        function claimFarming() {
            if (activeFarmAccum <= 0) return;
            cryptoBalance += activeFarmAccum;
            activeFarmAccum = 0;
            localStorage.setItem('lum_balance', cryptoBalance.toFixed(2));
            localStorage.setItem('lum_farm_accum', activeFarmAccum);
            totalBalanceDisplay.textContent = cryptoBalance.toFixed(2);
            farmDisplay.textContent = "0.0000";
        }

        // ТАКТИЛЬНАЯ ВИБРАЦИЯ (HAPTIC) С ЗАЩИТОЙ
        function triggerHaptic(type) {
            if (typeof navigator !== 'undefined' && navigator.vibrate) {
                if (type === 'tap') {
                    navigator.vibrate(20); // Короткий элитный клик на алмазы
                } else if (type === 'bomb') {
                    navigator.vibrate([150, 80, 100]); // Двойной тяжелый взрыв бомбы
                }
            }
        }

        // СИСТЕМА БИЛЕТОВ (3 МИНУТЫ РЕГЕНЕРАЦИЯ + ТАЙМЕР РЯДОМ)
        const MAX_TICKETS = 7;
        const REGEN_TIME = 3 * 60 * 1000; 

        let tickets = parseInt(localStorage.getItem('lum_tickets'));
        if (isNaN(tickets)) tickets = MAX_TICKETS;
        
        let lastRegenTime = parseInt(localStorage.getItem('lum_last_regen_time')) || Date.now();

        function updateTicketsSystem() {
            let now = Date.now();
            
            if (tickets < MAX_TICKETS) {
                let elapsed = now - lastRegenTime;
                if (elapsed >= REGEN_TIME) {
                    let generated = Math.floor(elapsed / REGEN_TIME);
                    tickets = Math.min(MAX_TICKETS, tickets + generated);
                    lastRegenTime = lastRegenTime + (generated * REGEN_TIME);
                    
                    localStorage.setItem('lum_tickets', tickets);
                    localStorage.setItem('lum_last_regen_time', lastRegenTime);
                }
            } else {
                lastRegenTime = now;
                localStorage.setItem('lum_last_regen_time', lastRegenTime);
            }

            // Рендер количества тикетов
            ticketsCount.textContent = `⚡ ${tickets}/${MAX_TICKETS}`;

            // Рассчитываем время до следующего тикета
            let nextTicketIn = REGEN_TIME - (now - lastRegenTime);
            let mins = Math.floor(nextTicketIn / 60000);
            let secs = Math.floor((nextTicketIn % 60000) / 1000);
            let formatSecs = secs < 10 ? '0' + secs : secs;

            // Выводим таймер РЯДОМ с билетами, если их меньше максимума
            if (tickets < MAX_TICKETS) {
                ticketsTimerContainer.textContent = `(${mins}:${formatSecs})`;
            } else {
                ticketsTimerContainer.textContent = ""; // Если фулл, таймер исчезает
            }

            if (gameActive) return;

            // Состояние кнопки ИГРАТЬ
            if (tickets > 0) {
                playBtn.disabled = false;
                playBtn.innerHTML = "ИГРАТЬ";
            } else {
                playBtn.disabled = true;
                playBtn.innerHTML = `НЕТ БИЛЕТОВ <span class="sub-timeout">+1 ТИКЕТ ЧЕРЕЗ ${mins}:${formatSecs}</span>`;
            }
        }

        setInterval(updateTicketsSystem, 500);

        function tryStartGame() {
            if (tickets > 0) {
                tickets--;
                if (tickets < MAX_TICKETS && tickets === MAX_TICKETS - 1) {
                    lastRegenTime = Date.now(); 
                }
                localStorage.setItem('lum_tickets', tickets);
                localStorage.setItem('lum_last_regen_time', lastRegenTime);
                updateTicketsSystem();
                startGame();
            }
        }

        // Игровой движок
        let score = 0;
        let timeLeft = 30;
        let gameActive = false;
        let isFrozen = false;
        let freezeAlpha = 0; 
        let snowParticles = []; 
        let isStunned = false;
        let lastTime = 0;
        let spawnTimer = 0;
        let secondTimer = 0;

        let isEndingStage = false;
        let endStageAlpha = 0;
        let timeScale = 1.0; 

        let items = [];
        let particles = [];
        let stars = [];
        let floatingTexts = [];
        let shockwaves = [];

        const SPAWN_RATE = 350;
        const TYPES = {
            CRYSTAL: { id: 'crystal', color: '#00ffcc', points: 10, chance: 0.85 },
            BOMB: { id: 'bomb', color: '#ff3366', points: -50, chance: 0.12 },
            FREEZE: { id: 'freeze', color: '#00b3ff', points: 5, chance: 0.03 } 
        };

        function resizeCanvas() {
            canvas.width = window.innerWidth * window.devicePixelRatio;
            canvas.height = window.innerHeight * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function initStars() {
            stars = [];
            for(let i=0; i<60; i++) {
                stars.push({
                    x: Math.random() * window.innerWidth,
                    y: Math.random() * window.innerHeight,
                    size: Math.random() * 1.5 + 0.5,
                    speed: Math.random() * 0.3 + 0.1
                });
            }
        }
        initStars();

        function initSnow() {
            snowParticles = [];
            for(let i=0; i<35; i++) {
                snowParticles.push({
                    x: Math.random() * window.innerWidth,
                    y: Math.random() * window.innerHeight - window.innerHeight,
                    size: Math.random() * 2 + 1,
                    speedY: Math.random() * 1 + 0.5,
                    speedX: Math.random() * 0.4 - 0.2,
                    drift: Math.random() * 0.02
                });
            }
        }

        function startGame() {
            score = 0;
            timeLeft = 30;
            isFrozen = false;
            freezeAlpha = 0;
            isStunned = false;
            isEndingStage = false;
            endStageAlpha = 0;
            timeScale = 1.0;
            
            items = [];
            particles = [];
            floatingTexts = [];
            shockwaves = [];
            snowParticles = [];
            
            scoreDisplay.textContent = score;
            timerDisplay.textContent = timeLeft;
            
            menuScreen.style.display = 'none';
            glow1.style.display = 'none';
            glow2.style.display = 'none';
            
            gameScreen.style.display = 'flex';
            gameActive = true;
            lastTime = performance.now();
            
            requestAnimationFrame(gameLoop);
        }

        function drawCrystal(ctx, x, y, size, angle) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#00ffcc';
            ctx.strokeStyle = '#00ffcc';
            ctx.lineWidth = 3;
            ctx.fillStyle = 'rgba(0, 255, 204, 0.2)';
            ctx.beginPath();
            ctx.moveTo(0, -size);
            ctx.lineTo(size * 0.7, -size * 0.2);
            ctx.lineTo(size * 0.5, size * 0.8);
            ctx.lineTo(0, size);
            ctx.lineTo(-size * 0.5, size * 0.8);
            ctx.lineTo(-size * 0.7, -size * 0.2);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(0, -size);
            ctx.lineTo(0, size);
            ctx.moveTo(-size * 0.7, -size * 0.2);
            ctx.lineTo(size * 0.7, -size * 0.2);
            ctx.stroke();
            ctx.restore();
        }

        function drawBomb(ctx, x, y, size, pulse) {
            ctx.save();
            ctx.translate(x, y);
            ctx.shadowBlur = 15 + pulse * 10;
            ctx.shadowColor = '#ff3366';
            ctx.fillStyle = '#1a0510';
            ctx.strokeStyle = '#ff3366';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(0, 0, size * 0.8, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            ctx.fillStyle = `rgba(255, 51, 102, ${0.4 + pulse * 0.6})`;
            ctx.beginPath();
            ctx.arc(0, 0, size * 0.4, 0, Math.PI * 2);
            ctx.fill();
            ctx.lineWidth = 2;
            for(let i=0; i<8; i++) {
                ctx.rotate(Math.PI / 4);
                ctx.beginPath();
                ctx.moveTo(0, -size * 0.8);
                ctx.lineTo(0, -size * 1.1);
                ctx.stroke();
            }
            ctx.restore();
        }

        function drawFreeze(ctx, x, y, size, angle) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#00b3ff';
            ctx.strokeStyle = '#00b3ff';
            ctx.lineWidth = 2.5;
            ctx.fillStyle = 'rgba(0, 179, 255, 0.15)';
            ctx.beginPath();
            for (let i = 0; i < 6; i++) {
                ctx.lineTo(size * Math.cos(i * Math.PI / 3), size * Math.sin(i * Math.PI / 3));
            }
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
            ctx.beginPath();
            for(let i=0; i<3; i++) {
                ctx.rotate(Math.PI / 3);
                ctx.moveTo(0, -size);
                ctx.lineTo(0, size);
            }
            ctx.stroke();
            ctx.restore();
        }

        function gameLoop(time) {
            if (!gameActive) return;

            let dt = time - lastTime;
            lastTime = time;

            ctx.fillStyle = '#030108';
            ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

            ctx.shadowBlur = 0;
            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            stars.forEach(star => {
                if (!isFrozen) star.y += star.speed * timeScale;
                if (star.y > window.innerHeight) star.y = -5;
                ctx.fillRect(star.x, star.y, star.size, star.size);
            });

            if (isFrozen && freezeAlpha < 1) {
                freezeAlpha += 0.05;
            } else if (!isFrozen && freezeAlpha > 0) {
                freezeAlpha -= 0.05;
            }

            if (freezeAlpha > 0.01) {
                ctx.save();
                ctx.shadowBlur = 8;
                ctx.shadowColor = 'rgba(0, 179, 255, 0.6)';
                ctx.fillStyle = `rgba(135, 220, 255, ${freezeAlpha * 0.7})`;
                snowParticles.forEach(p => {
                    p.y += p.speedY * timeScale;
                    p.x += (p.speedX + Math.sin(time * p.drift) * 0.2) * timeScale;
                    if (p.y > window.innerHeight) {
                        p.y = -10;
                        p.x = Math.random() * window.innerWidth;
                    }
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                });
                ctx.restore();
            }

            if (!isFrozen && !isEndingStage) {
                spawnTimer += dt;
                if (spawnTimer >= SPAWN_RATE) {
                    spawnItem();
                    spawnTimer = 0;
                }

                secondTimer += dt;
                if (secondTimer >= 1000) {
                    timeLeft--;
                    timerDisplay.textContent = timeLeft;
                    secondTimer = 0;
                    if (timeLeft <= 0) { 
                        triggerEndStage(); 
                    }
                }
            }

            if (isEndingStage) {
                if (timeScale > 0.05) timeScale -= 0.02; 
                if (endStageAlpha < 1) endStageAlpha += 0.02; 
                if (endStageAlpha >= 1) {
                    executeEndGame(); 
                    return;
                }
            }

            let pulseValue = Math.sin(time * 0.01);
            for (let i = items.length - 1; i >= 0; i--) {
                let item = items[i];
                if (!isFrozen) {
                    item.y += item.speed * timeScale;
                    item.angle += item.rotSpeed * timeScale;
                }
                if (item.y > window.innerHeight + 50) {
                    items.splice(i, 1);
                    continue;
                }
                if (item.type === 'crystal') drawCrystal(ctx, item.x, item.y, item.size, item.angle);
                if (item.type === 'bomb') drawBomb(ctx, item.x, item.y, item.size, pulseValue);
                if (item.type === 'freeze') drawFreeze(ctx, item.x, item.y, item.size, item.angle);
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx * timeScale;
                p.y += p.vy * timeScale;
                p.vy += 0.1 * timeScale;
                p.alpha -= 0.02;
                if (p.alpha <= 0) {
                    particles.splice(i, 1);
                    continue;
                }
                ctx.save();
                ctx.globalAlpha = p.alpha;
                ctx.shadowBlur = 10;
                ctx.shadowColor = p.color;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
                ctx.restore();
            }

            for(let i = shockwaves.length - 1; i >= 0; i--) {
                let sw = shockwaves[i];
                sw.radius += 8 * timeScale;
                sw.alpha -= 0.03;
                if(sw.alpha <= 0) {
                    shockwaves.splice(i, 1);
                    continue;
                }
                ctx.save();
                ctx.globalAlpha = sw.alpha;
                ctx.lineWidth = 4;
                ctx.strokeStyle = '#ff3366';
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#ff3366';
                ctx.beginPath();
                ctx.arc(sw.x, sw.y, sw.radius, 0, Math.PI * 2);
                ctx.stroke();
                ctx.restore();
            }

            for(let i = floatingTexts.length - 1; i >= 0; i--) {
                let ft = floatingTexts[i];
                ft.y -= 1.5 * timeScale;
                ft.alpha -= 0.02;
                if(ft.alpha <= 0) {
                    floatingTexts.splice(i, 1);
                    continue;
                }
                ctx.save();
                ctx.globalAlpha = ft.alpha;
                ctx.font = "bold 1.6rem 'Orbitron', sans-serif";
                ctx.fillStyle = ft.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = ft.color;
                ctx.textAlign = 'center';
                ctx.fillText(ft.text, ft.x, ft.y);
                ctx.restore();
            }

            if (freezeAlpha > 0.01) {
                ctx.save();
                ctx.fillStyle = `rgba(0, 140, 255, ${freezeAlpha * 0.08})`;
                ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

                let width = window.innerWidth;
                let height = window.innerHeight;
                let radialGrad = ctx.createRadialGradient(
                    width / 2, height / 2, Math.min(width, height) * 0.2, 
                    width / 2, height / 2, Math.max(width, height) * 0.75
                );
                
                radialGrad.addColorStop(0, 'rgba(0, 179, 255, 0)');
                radialGrad.addColorStop(0.5, `rgba(0, 179, 255, ${freezeAlpha * 0.15})`);
                radialGrad.addColorStop(0.85, `rgba(135, 225, 255, ${freezeAlpha * 0.45})`);
                radialGrad.addColorStop(1, `rgba(200, 245, 255, ${freezeAlpha * 0.75})`);

                ctx.fillStyle = radialGrad;
                ctx.fillRect(0, 0, width, height);
                ctx.restore();
            }

            if (endStageAlpha > 0.01) {
                ctx.save();
                let endGrad = ctx.createLinearGradient(0, 0, 0, window.innerHeight);
                endGrad.addColorStop(0, `rgba(4, 2, 9, ${endStageAlpha * 0.85})`);
                endGrad.addColorStop(1, `rgba(15, 5, 28, ${endStageAlpha * 0.95})`);
                ctx.fillStyle = endGrad;
                ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

                ctx.font = "900 2.8rem 'Orbitron', sans-serif";
                ctx.fillStyle = '#ff3366';
                ctx.shadowBlur = 25;
                ctx.shadowColor = '#ff3366';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.letterSpacing = '6px';
                ctx.fillText("TIME OVER", window.innerWidth / 2, window.innerHeight / 2 - 20);
                ctx.restore();
            }

            requestAnimationFrame(gameLoop);
        }

        function spawnItem() {
            let rand = Math.random();
            let type = 'crystal';

            if (rand < TYPES.FREEZE.chance) {
                type = 'freeze';
            } else if (rand < TYPES.FREEZE.chance + TYPES.BOMB.chance) {
                type = 'bomb';
            }

            items.push({
                x: Math.random() * (window.innerWidth - 60) + 30,
                y: -40,
                size: 26,
                speed: Math.random() * 2 + 3,
                angle: Math.random() * Math.PI,
                rotSpeed: Math.random() * 0.04 - 0.02,
                type: type
            });
        }

        function checkHit(clientX, clientY) {
            if (!gameActive || isStunned || isEndingStage) return;

            for (let i = items.length - 1; i >= 0; i--) {
                let item = items[i];
                let dist = Math.hypot(clientX - item.x, clientY - item.y);

                if (dist < item.size + 15) {
                    createParticles(item.x, item.y, TYPES[item.type.toUpperCase()].color);
                    
                    if (item.type === 'bomb') {
                        triggerHaptic('bomb'); // Сильная вибрация на взрыв
                        triggerBomb(item.x, item.y);
                    } else {
                        triggerHaptic('tap'); // Легкий приятный клик на сбор предмета
                        if (item.type === 'freeze') triggerFreeze();
                        
                        let points = TYPES[item.type.toUpperCase()].points;
                        score += points;
                        if(score < 0) score = 0;
                        scoreDisplay.textContent = score;

                        floatingTexts.push({
                            x: item.x, y: item.y,
                            text: `+${points}`,
                            color: TYPES[item.type.toUpperCase()].color,
                            alpha: 1
                        });
                    }
                    items.splice(i, 1);
                    break; 
                }
            }
        }

        window.addEventListener('mousedown', (e) => checkHit(e.clientX, e.clientY));
        window.addEventListener('touchstart', (e) => {
            checkHit(e.touches[0].clientX, e.touches[0].clientY);
        });

        function createParticles(x, y, color) {
            let amount = color === '#ff3366' ? 35 : 12;
            for(let i=0; i<amount; i++) {
                let angle = Math.random() * Math.PI * 2;
                let speed = Math.random() * 4 + 1;
                particles.push({
                    x: x, y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    size: Math.random() * 3 + 2,
                    color: color,
                    alpha: 1
                });
            }
        }

        function triggerBomb(x, y) {
            isStunned = true;
            shockwaves.push({ x: x, y: y, radius: 10, alpha: 1 });
            body.classList.add('shake');

            score -= 50;
            if (score < 0) score = 0;
            scoreDisplay.textContent = score;

            floatingTexts.push({ x: x, y: y - 20, text: '-50 $LUM', color: '#ff3366', alpha: 1 });

            setTimeout(() => {
                body.classList.remove('shake');
                isStunned = false;
            }, 400);
        }

        function triggerFreeze() {
            if (isFrozen) return;
            isFrozen = true;
            initSnow();
            setTimeout(() => { isFrozen = false; }, 3000);
        }

        function triggerEndStage() {
            isEndingStage = true;
        }

        function executeEndGame() {
            gameActive = false;
            let earnedCrypto = score * 0.01;
            cryptoBalance += earnedCrypto;

            localStorage.setItem('lum_balance', cryptoBalance.toFixed(2));
            totalBalanceDisplay.textContent = cryptoBalance.toFixed(2);

            lastScoreDisplay.innerHTML = `РАУНД ЗАВЕРШЕН!<br><span style="color:#00ffcc; font-family:'Orbitron'; font-size:1.4rem;">+${earnedCrypto.toFixed(2)} $LUM</span>`;

            gameScreen.style.display = 'none';
            
            menuScreen.style.display = 'flex';
            glow1.style.display = 'block';
            glow2.style.display = 'block';
            
            updateTicketsSystem(); 
        }
    </script>
</body>
