<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SO2 CASE SIMULATOR: MARKET TRADER</title>
    <style>
        :root {
            --bg: #05070a;
            --card: rgba(25, 30, 40, 0.6);
            --accent: #ffcc00;
            --blue: #00e6ff;
            --red: #ff4747;
            --green: #00ff88;
            --common: #b0c3d9; --uncommon: #5e98d9; --rare: #4b69ff; --epic: #8847ff; --legendary: #d32ce6; --arcane: #eb4b4b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% 50%, #1a1f2b 0%, #05070a 100%);
            color: white; font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex; flex-direction: column; align-items: center; margin: 0; padding: 10px; min-height: 100vh;
        }

        /* АНИМАЦИИ */
        @keyframes glow { 0% { box-shadow: 0 0 5px var(--arcane); } 50% { box-shadow: 0 0 20px var(--arcane); } 100% { box-shadow: 0 0 5px var(--arcane); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* HEADER */
        .header-panel {
            background: var(--card); backdrop-filter: blur(10px);
            width: 100%; max-width: 800px; padding: 15px 25px;
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;
        }
        .balance-val { font-size: 26px; font-weight: 900; color: var(--accent); }

        /* TABS */
        .tabs { display: flex; gap: 8px; margin-bottom: 15px; width: 100%; max-width: 800px; }
        .tab-btn {
            flex: 1; padding: 12px; background: var(--card); border: 1px solid rgba(255,255,255,0.05);
            color: #8b949e; border-radius: 12px; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .tab-btn.active { background: var(--blue); color: #000; box-shadow: 0 0 15px rgba(0,230,255,0.4); }

        .view-section { display: none; width: 100%; max-width: 800px; animation: slideUp 0.4s ease; }
        .view-section.active { display: block; }

        /* MARKET GRID */
        .market-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
        .market-card {
            background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1);
            text-align: center; transition: 0.3s; position: relative;
        }
        .market-card:hover { border-color: var(--blue); transform: translateY(-3px); }
        .price-trend { font-size: 11px; font-weight: bold; margin-left: 5px; }
        .trend-up { color: var(--green); }
        .trend-down { color: var(--red); }

        /* ROULETTE */
        .roulette-box { height: 150px; background: rgba(0,0,0,0.3); border-radius: 15px; overflow: hidden; position: relative; margin-bottom: 15px; border: 1px solid #222; }
        .pointer { position: absolute; left: 50%; top: 0; width: 4px; height: 100%; background: var(--red); z-index: 5; transform: translateX(-50%); box-shadow: 0 0 15px var(--red); }
        .track { display: flex; position: absolute; left: 0; top: 10px; transition: transform 7s cubic-bezier(0.1, 0, 0.1, 1); }

        /* BUTTONS */
        .action-btn {
            width: 100%; padding: 16px; border: none; border-radius: 15px; font-size: 18px; font-weight: bold;
            cursor: pointer; background: linear-gradient(180deg, var(--accent), #e6b800);
            box-shadow: 0 4px 15px rgba(255, 204, 0, 0.2); transition: 0.2s;
        }
        .action-btn:active { transform: scale(0.98); }

        /* INV & ITEMS */
        .item-skin { width: 80px; height: 60px; margin: 0 auto 10px; display: block; }
        .rarity-line { height: 4px; width: 40px; margin: 5px auto; border-radius: 2px; }
        .arcane-glow { animation: glow 2s infinite; }

        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); display:none; align-items:center; justify-content:center; z-index:100; backdrop-filter: blur(5px); }
        .modal { background: #151921; padding: 25px; border-radius: 20px; border: 1px solid var(--blue); text-align: center; width: 280px; }
    </style>
</head>
<body>

    <div class="header-panel">
        <div>
            <div id="lvlTxt" style="font-weight: bold; color: var(--blue);">LVL 1</div>
            <div style="font-size: 10px; color: #555;">TRADER RANK</div>
        </div>
        <div class="balance-val"><span id="money">1000</span> G</div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('cases')">КЕЙСЫ</button>
        <button class="tab-btn" onclick="switchTab('market')">РЫНОК</button>
        <button class="tab-btn" onclick="switchTab('inventory')">ИНВЕНТАРЬ</button>
        <button class="tab-btn" onclick="switchTab('contracts')">КРАФТ</button>
    </div>

    <div id="cases-view" class="view-section active">
        <div class="roulette-box"><div class="pointer"></div><div id="track" class="track"></div></div>
        <button id="spinBtn" class="action-btn" onclick="spin()">ОТКРЫТЬ FURIOUS (100 G)</button>
    </div>

    <div id="market-view" class="view-section">
        <h3 style="margin-top:0; color: var(--blue);">LIVE MARKET</h3>
        <div id="marketGrid" class="market-grid"></div>
    </div>

    <div id="inventory-view" class="view-section">
        <div id="invGrid" class="market-grid"></div>
    </div>

    <div id="contracts-view" class="view-section">
        <div style="background: var(--card); padding: 20px; border-radius: 20px; text-align: center;">
            <h3>КОНТРАКТ (10 предметов)</h3>
            <button class="action-btn" style="background: var(--blue);" onclick="runContract()">НАЧАТЬ ОБМЕН</button>
        </div>
    </div>

    <div id="modal" class="modal-overlay">
        <div class="modal">
            <h3 id="mTitle"></h3>
            <p id="mPrice" style="color:var(--accent); font-size: 20px; font-weight: bold;"></p>
            <button class="action-btn" id="mActionBtn" onclick="modalAction()"></button>
            <button onclick="closeM()" style="background:transparent; border:none; color:#555; margin-top:10px; cursor:pointer;">Отмена</button>
        </div>
    </div>

    <script>
        const skinsDB = [
            { id: 0, name: "G22 | Casual", rarity: "common", basePrice: 10, icon: "🔫" },
            { id: 1, name: "USP | Genesis", rarity: "uncommon", basePrice: 35, icon: "🔫" },
            { id: 2, name: "M4 | Tiger", rarity: "rare", basePrice: 120, icon: "🔫" },
            { id: 3, name: "AKR | Necro", rarity: "epic", basePrice: 450, icon: "🔫" },
            { id: 4, name: "AWM | Scratch", rarity: "legendary", basePrice: 1200, icon: "🎯" },
            { id: 5, name: "Karambit | Gold", rarity: "arcane", basePrice: 15000, icon: "🔪" }
        ];

        let money = parseInt(localStorage.getItem('s3_money')) || 2000;
        let inv = JSON.parse(localStorage.getItem('s3_inv')) || [];
        let marketPrices = {}; 
        let selItem = null;
        let actionMode = ''; // 'buy' or 'sell'

        // Инициализация цен
        skinsDB.forEach(s => marketPrices[s.id] = { price: s.basePrice, trend: 0 });

        // ФУНКЦИЯ ИЗМЕНЕНИЯ ЦЕН (РЫНОК)
        function updateMarket() {
            skinsDB.forEach(s => {
                let change = (Math.random() * 0.1 - 0.05); // ±5%
                let oldPrice = marketPrices[s.id].price;
                marketPrices[s.id].price = Math.max(2, Math.round(oldPrice * (1 + change)));
                marketPrices[s.id].trend = change > 0 ? 1 : -1;
            });
            renderMarket();
            renderInventory();
        }
        setInterval(updateMarket, 5000); // Обновление каждые 5 сек

        function renderMarket() {
            const grid = document.getElementById('marketGrid');
            grid.innerHTML = '';
            skinsDB.forEach(s => {
                let pData = marketPrices[s.id];
                const d = document.createElement('div');
                d.className = 'market-card';
                d.onclick = () => openM(s, 'buy');
                d.innerHTML = `
                    <div style="font-size:30px">${s.icon}</div>
                    <div style="font-size:11px; font-weight:bold">${s.name}</div>
                    <div style="color:var(--accent)">${pData.price} G 
                        <span class="price-trend ${pData.trend > 0 ? 'trend-up' : 'trend-down'}">
                            ${pData.trend > 0 ? '↑' : '↓'}
                        </span>
                    </div>
                `;
                grid.appendChild(d);
            });
        }

        function renderInventory() {
            const grid = document.getElementById('invGrid');
            grid.innerHTML = '';
            inv.forEach((item, index) => {
                let curPrice = marketPrices[item.id].price;
                const d = document.createElement('div');
                d.className = `market-card ${item.rarity === 'arcane' ? 'arcane-glow' : ''}`;
                d.style.borderColor = `var(--${item.rarity})`;
                d.onclick = () => openM(item, 'sell', index);
                d.innerHTML = `
                    <div style="font-size:30px">${item.icon}</div>
                    <div style="font-size:11px">${item.name}</div>
                    <div style="color:var(--accent)">${curPrice} G</div>
                `;
                grid.appendChild(d);
            });
            localStorage.setItem('s3_money', money);
            localStorage.setItem('s3_inv', JSON.stringify(inv));
            document.getElementById('money').innerText = money;
        }

        function switchTab(t) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(t + '-view').classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function openM(item, mode, index = null) {
            selItem = item;
            actionMode = mode;
            selItem.invIndex = index;
            document.getElementById('mTitle').innerText = mode === 'buy' ? 'Купить скин?' : 'Продать скин?';
            document.getElementById('mPrice').innerText = marketPrices[item.id].price + " G";
            document.getElementById('mActionBtn').innerText = mode === 'buy' ? 'КУПИТЬ' : 'ПРОДАТЬ';
            document.getElementById('modal').style.display = 'flex';
        }

        function closeM() { document.getElementById('modal').style.display = 'none'; }

        function modalAction() {
            let p = marketPrices[selItem.id].price;
            if (actionMode === 'buy') {
                if (money >= p) {
                    money -= p; inv.unshift({...selItem});
                } else alert("Мало голды!");
            } else {
                money += p; inv.splice(selItem.invIndex, 1);
            }
            closeM(); renderInventory();
        }

        function spin() {
            if (money < 100) return alert("Мало голды!");
            money -= 100;
            const track = document.getElementById('track');
            track.innerHTML = '';
            track.style.transition = 'none';
            track.style.transform = 'translateX(0)';
            
            let win;
            for(let i=0; i<60; i++) {
                let s = skinsDB[Math.floor(Math.random() * (skinsDB.length - 1))]; // Рандом без ножа
                if (Math.random() > 0.98) s = skinsDB[5]; // Шанс на нож
                if(i === 55) win = s;
                let d = document.createElement('div');
                d.style = `min-width:140px; height:130px; border-bottom:4px solid var(--${s.rarity}); text-align:center; padding:20px;`;
                d.innerHTML = `<div style="font-size:30px">${s.icon}</div><div style="font-size:10px">${s.name}</div>`;
                track.appendChild(d);
            }

            setTimeout(() => {
                track.style.transition = 'transform 7s cubic-bezier(0.1, 0, 0.1, 1)';
                track.style.transform = `translateX(-${55 * 140 - (window.innerWidth/2 - 70)}px)`;
            }, 50);

            document.getElementById('spinBtn').disabled = true;
            setTimeout(() => {
                document.getElementById('spinBtn').disabled = false;
                inv.unshift({...win}); renderInventory();
            }, 7200);
        }

        updateMarket();
        renderInventory();
    </script>
</body>
</html>
