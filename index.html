<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GLOBAL CONQUEST: EURASIA FINAL</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #05080c; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100vw; background: #05080c; z-index: 1; }

        /* Левая панель "Действия и чат" */
        .panel-left {
            position: absolute; top: 20px; left: 20px; width: 300px;
            background: rgba(13, 22, 34, 0.96); border: 1px solid #1f2d3d;
            border-radius: 8px; z-index: 1000; padding: 18px; box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }
        .title { color: #00ccff; font-weight: bold; font-size: 16px; margin-bottom: 12px; border-bottom: 1px solid #2c3e50; padding-bottom: 6px; }
        .res-row { display: flex; gap: 25px; margin-bottom: 15px; font-size: 20px; font-weight: bold; }
        .orange-fire { color: #ff9900; }

        /* Кнопки как на скриншоте */
        .btn {
            width: 100%; padding: 12px; margin-bottom: 8px; border: none; border-radius: 5px;
            color: white; font-weight: bold; cursor: pointer; text-align: left; font-size: 13px;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.2); transition: 0.1s;
        }
        .btn-green { background: linear-gradient(180deg, #2b9348, #1a6d1a); }
        .btn-mobilize { background: linear-gradient(180deg, #519151, #366336); }
        .btn-war { background: linear-gradient(180deg, #007bff, #0056b3); text-transform: uppercase; }
        .btn:hover { filter: brightness(1.2); }

        .log-box {
            background: rgba(0,0,0,0.5); border: 1px solid #1f2d3d; height: 180px;
            margin-top: 15px; padding: 10px; overflow-y: auto; font-size: 12px; font-family: monospace;
        }
        .input-chat { width: 100%; background: #0d141b; border: 1px solid #253545; color: white; padding: 10px; margin-top: 10px; border-radius: 4px; box-sizing: border-box; }

        /* Правая панель ID */
        .panel-right {
            position: absolute; top: 20px; right: 20px; width: 240px;
            background: rgba(13, 22, 34, 0.96); border-radius: 8px; z-index: 1000; padding: 15px;
            border-top: 4px solid #00ccff;
        }
        .id-label { color: #00ccff; font-size: 11px; font-weight: bold; }
        .id-num { font-size: 22px; font-weight: bold; margin: 5px 0 15px 0; }
        .ok-btn { background: #28a745; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }

        /* Анимация линии фронта */
        .war-line { stroke: #ff4444; stroke-width: 3; stroke-dasharray: 8, 8; animation: move 1s linear infinite; }
        @keyframes move { to { stroke-dashoffset: -16; } }
    </style>
</head>
<body>

    <div class="panel-left">
        <div class="title">Действия и чат</div>
        <div class="res-row">
            <div class="orange-fire">🔥 1000</div>
            <div>⚔️ 150</div>
        </div>
        <button class="btn btn-green" onclick="addMsg('Экономика улучшена.')">📈 Развить экономику (-$200)</button>
        <button class="btn btn-mobilize" onclick="addMsg('Дивизии готовы.')">🎖️ Мобилизовать армию (-$300)</button>
        <button class="btn btn-war" onclick="enableWar()">🚀 ВТОРЖЕНИЕ (ВЫБЕРИТЕ ЦЕЛЬ)</button>

        <div class="log-box" id="log">
            <div><span style="color:#ffcc00">SYSTEM:</span> Карта Евразии загружена.</div>
            <div><span style="color:#00ffcc">Dmitry:</span> Мой ID: 987654321</div>
        </div>
        <input type="text" class="input-chat" placeholder="Сообщение...">
    </div>

    <div class="panel-right">
        <div class="id-label">YOUR NETWORK ID: ...</div><div class="id-num">987654321</div>
        <div class="id-label">ЮЮ ДРУГА</div>
        <div style="display:flex; gap:5px; margin-top:5px;">
            <input type="text" style="background:#0a1118; border:1px solid #253545; color:white; padding:8px; flex:1;" placeholder="friend_id">
            <button class="ok-btn" onclick="addMsg('Связь установлена.')">OK</button>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Инициализация карты с фокусом на Евразию
        const map = L.map('map', { center: [50, 60], zoom: 3.5, zoomControl: false, attributionControl: false });

        // Подключаем настоящий темный слой карты
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        let warMode = false;
        let capital = [55, 37]; // Базовая точка (Москва)

        function addMsg(txt) {
            const log = document.getElementById('log');
            log.innerHTML += <div><span style="color:#00ffcc">Dmitry:</span> ${txt}</div>;
            log.scrollTop = log.scrollHeight;
        }

        function enableWar() {
            warMode = true;
            addMsg("<span style='color:red'>ВТОРЖЕНИЕ: Нажмите на страну для атаки!</span>");
        }

        // Загрузка настоящих границ стран Евразии (GeoJSON)
        fetch('https://raw.githubusercontent.com/datasets/geo-boundaries-world-110m/master/countries.geojson')
        .then(res => res.json())
        .then(data => {
            L.geoJSON(data, {
                style: { color: '#00ccff', weight: 1, fillColor: '#121a24', fillOpacity: 0.4 },
                onEachFeature: (feature, layer) => {
                    layer.on('mouseover', () => layer.setStyle({ fillOpacity: 0.7, weight: 2 }));
                    layer.on('mouseout', () => layer.setStyle({ fillOpacity: 0.4, weight: 1 }));
                    layer.on('click', (e) => {
                        if(warMode) {
                            invasion(feature.properties.name, e.latlng, layer);
                        } else {
                            layer.setStyle({fillColor: '#00ccff'});
                            addMsg("Выбран регион: " + feature.properties.name);
                        }
                    });
                }
            }).addTo(map);
        });

        function invasion(name, target, layer) {
            warMode = false;
            addMsg("Войска выдвинулись на " + name);
            
            // Красная линия атаки
            const line = L.polyline([capital, target], {className: 'war-line'}).addTo(map);
            
            setTimeout(() => {
                layer.setStyle({ fillColor: '#ff0000', fillOpacity: 0.6, color: '#ff4444' });
                addMsg("<span style='color:red'>ЗАХВАЧЕНО: " + name + "</span>");
                map.removeLayer(line);
                capital = [target.lat, target.lng]; // Армия переходит в новую точку
            }, 1200);
        }
    </script>
</body>
</html>
