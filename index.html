<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>РАДАР ВРВ | Мониторинг БПЛА и ракетных угроз</title>
    <!-- Leaflet CSS + JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            background: #000;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: fixed;
        }

        #map {
            height: 100%;
            width: 100%;
            z-index: 1;
        }

        .status-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 1000;
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255, 50, 50, 0.4);
            box-shadow: 0 2px 12px rgba(0,0,0,0.5);
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 8px;
        }

        .status-title {
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 1px;
            color: #ff3a3a;
            text-shadow: 0 0 4px rgba(255,0,0,0.5);
            background: rgba(0,0,0,0.6);
            padding: 4px 10px;
            border-radius: 40px;
        }

        .status-badge {
            font-size: 0.75rem;
            color: #ddd;
            background: #1a1a1a;
            padding: 4px 12px;
            border-radius: 30px;
            font-family: monospace;
        }

        .last-update {
            font-size: 0.7rem;
            color: #88ff88;
            background: #1a2a1a;
            padding: 4px 10px;
            border-radius: 30px;
            font-family: monospace;
        }

        .threat-panel {
            position: fixed;
            bottom: 20px;
            left: 12px;
            right: 12px;
            max-height: 40%;
            background: rgba(10, 10, 15, 0.92);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 28px;
            border: 1px solid rgba(255, 60, 60, 0.5);
            z-index: 1000;
            padding: 14px 12px;
            overflow-y: auto;
            transition: all 0.2s ease;
            box-shadow: 0 8px 28px rgba(0,0,0,0.6);
            font-size: 0.85rem;
        }

        .threat-panel h3 {
            color: #ff5e5e;
            font-size: 0.9rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-left: 3px solid #ff3333;
            padding-left: 10px;
            letter-spacing: 0.5px;
        }

        .threat-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .threat-item {
            background: rgba(25, 25, 35, 0.8);
            border-radius: 20px;
            padding: 10px 12px;
            border-left: 4px solid #ff4444;
            transition: 0.1s linear;
            font-size: 0.8rem;
        }

        .threat-region {
            font-weight: bold;
            color: #ff8888;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .threat-time {
            font-family: monospace;
            background: #00000066;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
            color: #ffaa88;
        }

        .threat-message {
            color: #e0e0e0;
            margin-top: 5px;
            font-size: 0.7rem;
            word-break: break-word;
            opacity: 0.9;
        }

        .empty-list {
            color: #aaa;
            text-align: center;
            padding: 12px;
            font-style: italic;
        }

        @media (min-width: 600px) {
            .threat-panel {
                max-width: 320px;
                right: auto;
                left: 16px;
                bottom: 20px;
                max-height: 55%;
            }
            .status-bar {
                padding: 12px 24px;
            }
        }

        .threat-panel::-webkit-scrollbar {
            width: 4px;
        }
        .threat-panel::-webkit-scrollbar-track {
            background: #1e1e2a;
            border-radius: 4px;
        }
        .threat-panel::-webkit-scrollbar-thumb {
            background: #ff5a5a;
            border-radius: 4px;
        }

        /* Анимация пульсации для полигонов (свечение) */
        @keyframes threatPulse {
            0% {
                filter: drop-shadow(0 0 2px #ff0000) drop-shadow(0 0 4px #ff0000);
                stroke-width: 2;
            }
            100% {
                filter: drop-shadow(0 0 12px #ff0000) drop-shadow(0 0 8px #ff6600);
                stroke-width: 3.5;
            }
        }

        .pulse-geometry {
            animation: threatPulse 0.9s ease-in-out infinite alternate;
            transition: filter 0.2s;
        }

        /* НЕОНОВЫЙ КРУГЛЫЙ МАРКЕР С ПУЛЬСАЦИЕЙ */
        .custom-warning-icon {
            background: #ff3333;
            border-radius: 50%;
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 22px;
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7);
            text-align: center;
            line-height: 1;
            font-family: monospace;
            animation: markerPulse 1.5s infinite;
        }

        @keyframes markerPulse {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7);
                transform: scale(1);
            }
            70% {
                box-shadow: 0 0 0 12px rgba(255, 0, 0, 0);
                transform: scale(1.05);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(255, 0, 0, 0);
                transform: scale(1);
            }
        }
    </style>
</head>
<body>
<div id="map"></div>

<div class="status-bar">
    <span class="status-title">⚡ МОНИТОРИНГ: РАДАР ВРВ</span>
    <div style="display: flex; gap: 8px;">
        <span class="status-badge" id="updateStatus">🟢 ОБНОВЛЯЕТСЯ...</span>
        <span class="last-update" id="lastUpdateTime">—:—:—</span>
    </div>
</div>

<div class="threat-panel" id="threatPanel">
    <h3>⚠️ АКТИВНЫЕ УГРОЗЫ</h3>
    <ul class="threat-list" id="threatList">
        <li class="empty-list">Нет активных тревог</li>
    </ul>
</div>

<script>
    // ---------------------- 1. КАРТА (Dark Matter) -------------------------
    const map = L.map('map').setView([51.0, 36.0], 6);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; CartoDB',
        subdomains: 'abcd',
        minZoom: 4,
        maxZoom: 10
    }).addTo(map);

    // ---------------------- 2. GEOJSON РЕГИОНОВ ----------------------------
    const regionsGeoJson = {
        "type": "FeatureCollection",
        "features": [
            { "type": "Feature", "properties": { "name": "Белгородская область" }, "geometry": { "type": "Polygon", "coordinates": [[[36.0, 50.3], [37.8, 50.3], [37.8, 51.2], [36.0, 51.2], [36.0, 50.3]]] } },
            { "type": "Feature", "properties": { "name": "Курская область" }, "geometry": { "type": "Polygon", "coordinates": [[[34.8, 51.0], [36.7, 51.0], [36.7, 52.0], [34.8, 52.0], [34.8, 51.0]]] } },
            { "type": "Feature", "properties": { "name": "Воронежская область" }, "geometry": { "type": "Polygon", "coordinates": [[[38.2, 49.8], [41.0, 49.8], [41.0, 51.5], [38.2, 51.5], [38.2, 49.8]]] } },
            { "type": "Feature", "properties": { "name": "Ставропольский край" }, "geometry": { "type": "Polygon", "coordinates": [[[41.0, 44.0], [44.0, 44.0], [44.0, 46.0], [41.0, 46.0], [41.0, 44.0]]] } },
            { "type": "Feature", "properties": { "name": "Харьковская область" }, "geometry": { "type": "Polygon", "coordinates": [[[35.2, 49.0], [37.2, 49.0], [37.2, 50.5], [35.2, 50.5], [35.2, 49.0]]] } },
            { "type": "Feature", "properties": { "name": "Сумская область" }, "geometry": { "type": "Polygon", "coordinates": [[[33.5, 50.5], [35.8, 50.5], [35.8, 52.2], [33.5, 52.2], [33.5, 50.5]]] } },
            { "type": "Feature", "properties": { "name": "Краснодарский край" }, "geometry": { "type": "Polygon", "coordinates": [[[37.0, 44.2], [39.5, 44.2], [39.5, 46.5], [37.0, 46.5], [37.0, 44.2]]] } },
            { "type": "Feature", "properties": { "name": "Ростовская область" }, "geometry": { "type": "Polygon", "coordinates": [[[38.5, 46.5], [41.5, 46.5], [41.5, 49.0], [38.5, 49.0], [38.5, 46.5]]] } },
            { "type": "Feature", "properties": { "name": "Киевская область" }, "geometry": { "type": "Polygon", "coordinates": [[[29.5, 49.5], [31.5, 49.5], [31.5, 51.2], [29.5, 51.2], [29.5, 49.5]]] } }
        ]
    };

    const regionCenters = {
        "Белгородская область": [50.8, 36.9],
        "Курская область": [51.5, 35.7],
        "Воронежская область": [50.7, 40.2],
        "Ставропольский край": [45.05, 42.9],
        "Харьковская область": [49.8, 36.2],
        "Сумская область": [51.2, 34.5],
        "Краснодарский край": [45.3, 38.2],
        "Ростовская область": [47.7, 40.0],
        "Киевская область": [50.4, 30.5]
    };

    let geoJsonLayer;
    let activeMarkers = [];
    let currentHighlights = new Set();

    // Новый стиль для опасного региона: полупрозрачная тёмная заливка + неоновое свечение (добавится через класс)
    const alertStyle = {
        color: "#ff6666",       // яркая обводка
        weight: 3,
        fillColor: "#330000",   // тёмно-красная заливка
        fillOpacity: 0.35,
        opacity: 1
    };

    const defaultStyle = {
        color: "#666",
        weight: 1.5,
        fillColor: "#222",
        fillOpacity: 0.45,
        opacity: 0.7
    };

    function initGeoJson() {
        if (geoJsonLayer) map.removeLayer(geoJsonLayer);
        geoJsonLayer = L.geoJSON(regionsGeoJson, {
            style: defaultStyle,
            onEachFeature: function(feature, layer) {
                layer.feature = feature;
                layer.bindTooltip(feature.properties.name, { sticky: true, className: "region-tooltip" });
            }
        }).addTo(map);
    }

    function resetAllHighlights() {
        if (geoJsonLayer) {
            geoJsonLayer.eachLayer(layer => {
                layer.setStyle(defaultStyle);
                const pathEl = layer._path;
                if (pathEl && pathEl.classList) pathEl.classList.remove('pulse-geometry');
            });
        }
        activeMarkers.forEach(marker => map.removeLayer(marker));
        activeMarkers = [];
        currentHighlights.clear();
    }

    function applyThreatsToMap(activeRegionsList) {
        resetAllHighlights();
        if (!geoJsonLayer) return;

        geoJsonLayer.eachLayer(layer => {
            const regionName = layer.feature?.properties?.name;
            if (regionName && activeRegionsList.includes(regionName)) {
                layer.setStyle(alertStyle);
                currentHighlights.add(regionName);
                const svgElem = layer._path;
                if (svgElem && svgElem.classList) {
                    svgElem.classList.add('pulse-geometry');
                }
                const centerCoord = regionCenters[regionName];
                if (centerCoord) {
                    const warningIcon = L.divIcon({
                        className: 'custom-warning-icon',
                        html: '!',
                        iconSize: [34, 34],
                        popupAnchor: [0, -15]
                    });
                    const marker = L.marker(centerCoord, { icon: warningIcon }).addTo(map);
                    marker.bindTooltip(`⚠️ ${regionName} · УГРОЗА`, { sticky: true });
                    activeMarkers.push(marker);
                }
            }
        });
    }

    // ---------------------- 3. ПАРСИНГ ИСТОЧНИКА С АНТИКЕШИРОВАНИЕМ ----------------------------
    const triggerKeywords = ["БПЛА", "Ракетная опасность", "Тревога", "Взрывы", "удар", "атака", "прилёт"];
    const targetRegions = ["Белгородская область", "Курская область", "Воронежская область", "Ставропольский край", "Харьковская область", "Сумская область", "Краснодарский край", "Ростовская область", "Киевская область"];

    function normalizeRegionName(text) {
        for (let reg of targetRegions) {
            if (text.includes(reg)) return reg;
            if (reg === "Белгородская область" && (text.includes("Белгород") || text.includes("Белгородская"))) return reg;
            if (reg === "Курская область" && (text.includes("Курск") || text.includes("Курская"))) return reg;
            if (reg === "Воронежская область" && (text.includes("Воронеж") || text.includes("Воронежская"))) return reg;
            if (reg === "Ставропольский край" && (text.includes("Ставрополь") || text.includes("Ставропольский"))) return reg;
            if (reg === "Харьковская область" && (text.includes("Харьков") || text.includes("Харьковская"))) return reg;
            if (reg === "Сумская область" && (text.includes("Сумы") || text.includes("Сумская"))) return reg;
        }
        return null;
    }

    function extractTimeFromText(message) {
        const timeRegex = /(?:в\s*)?(\d{1,2}[:.]\d{2})/i;
        const match = message.match(timeRegex);
        if (match) return match[1].replace('.', ':');
        const now = new Date();
        return `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
    }

    function parseThreatsFromHtml(htmlString) {
        const threats = [];
        const parser = new DOMParser();
        const doc = parser.parseFromString(htmlString, 'text/html');
        const possibleContainers = doc.querySelectorAll('div.message, div.alert, div.news-item, p, li, .post, .entry');
        let textsToScan = [];
        if (possibleContainers.length === 0) {
            const bodyText = doc.body?.innerText || htmlString;
            textsToScan = bodyText.split(/\n/);
        } else {
            possibleContainers.forEach(el => textsToScan.push(el.innerText));
        }

        for (let rawText of textsToScan) {
            if (!rawText || rawText.length < 5) continue;
            const lowerText = rawText.toLowerCase();
            const hasTrigger = triggerKeywords.some(kw => lowerText.includes(kw.toLowerCase()));
            if (!hasTrigger) continue;

            let matchedRegion = null;
            for (let reg of targetRegions) {
                if (rawText.includes(reg)) {
                    matchedRegion = reg;
                    break;
                }
                const short = reg.split(' ')[0];
                if (short.length > 3 && rawText.includes(short)) {
                    matchedRegion = reg;
                    break;
                }
            }
            if (matchedRegion) {
                const threatTime = extractTimeFromText(rawText);
                threats.push({
                    region: matchedRegion,
                    time: threatTime,
                    rawMessage: rawText.substring(0, 120).trim()
                });
            }
        }
        return threats;
    }

    function getDemoThreats() {
        return [
            { region: "Белгородская область", time: "19:42", rawMessage: "⚠️ БПЛА в районе Белгородской области. Сирены!" },
            { region: "Курская область", time: "20:05", rawMessage: "Ракетная опасность в Курской области. Будьте укрыты." },
            { region: "Воронежская область", time: "21:17", rawMessage: "Взрывы слышны в Воронеже, работа ПВО." }
        ];
    }

    // Добавляем timestamp к URL источника, чтобы обойти кеширование прокси
    async function fetchAlerts() {
        const statusSpan = document.getElementById('updateStatus');
        statusSpan.innerHTML = "🟡 ЗАПРОС...";
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 12000);

        try {
            // Уникальный параметр t=Date.now() для принудительного обновления
            const sourceUrl = 'https://max.ru/vrv_radar?t=' + Date.now();
            const proxyUrl = 'https://api.allorigins.win/get?url=' + encodeURIComponent(sourceUrl);
            const response = await fetch(proxyUrl, { signal: controller.signal });
            clearTimeout(timeoutId);

            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            const htmlContent = data.contents;

            if (!htmlContent || htmlContent.length < 50) throw new Error("Пустой ответ от источника");

            let threats = parseThreatsFromHtml(htmlContent);
            if (threats.length === 0) {
                console.warn("Реальных угроз не найдено, используем демо-данные.");
                threats = getDemoThreats();
                statusSpan.innerHTML = "⚠️ ДЕМО-ДАННЫЕ";
            } else {
                statusSpan.innerHTML = `✅ ОБНОВЛЕНО`;
                // обновляем время последнего успешного получения
                const now = new Date();
                const timeStr = now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                document.getElementById('lastUpdateTime').innerText = timeStr;
            }
            return threats;
        } catch (err) {
            clearTimeout(timeoutId);
            console.error("Ошибка при загрузке данных:", err);
            statusSpan.innerHTML = "❌ Ошибка связи";
            return getDemoThreats(); // всё равно показываем демо, чтобы интерфейс работал
        }
    }

    async function refreshMonitoring() {
        try {
            const threats = await fetchAlerts();
            const uniqueThreats = new Map(); // region -> threat
            for (const t of threats) {
                const existing = uniqueThreats.get(t.region);
                if (!existing || (t.time > existing.time)) {
                    uniqueThreats.set(t.region, t);
                }
            }
            const activeRegionNames = Array.from(uniqueThreats.keys());
            applyThreatsToMap(activeRegionNames);

            const threatListEl = document.getElementById('threatList');
            if (activeRegionNames.length === 0) {
                threatListEl.innerHTML = '<li class="empty-list">Нет активных тревог</li>';
            } else {
                let itemsHtml = '';
                for (let [region, threat] of uniqueThreats.entries()) {
                    itemsHtml += `
                        <li class="threat-item">
                            <div class="threat-region">
                                <span>🔴 ${region}</span>
                                <span class="threat-time">${escapeHtml(threat.time)}</span>
                            </div>
                            <div class="threat-message">${escapeHtml(threat.rawMessage)}</div>
                        </li>
                    `;
                }
                threatListEl.innerHTML = itemsHtml;
            }
        } catch (globalErr) {
            console.error("refreshMonitoring fatal:", globalErr);
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // ---------------------- 4. АВТООБНОВЛЕНИЕ ----------------------------
    let intervalId = null;

    function startAutoRefresh() {
        if (intervalId) clearInterval(intervalId);
        refreshMonitoring();
        intervalId = setInterval(() => {
            refreshMonitoring();
        }, 30000);
    }

    function init() {
        initGeoJson();
        startAutoRefresh();
        const panel = document.querySelector('.threat-panel');
        if (panel) panel.addEventListener('click', (e) => e.stopPropagation());
        window.addEventListener('resize', () => setTimeout(() => map.invalidateSize(), 100));
        map.invalidateSize();
    }

    document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
