<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TGESHKA VPN | Прокси-браузер</title>
    <!-- Ultraviolet CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@titaniumnetwork-dev/ultraviolet@3.0.6/dist/uv.bundle.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@titaniumnetwork-dev/ultraviolet@3.0.6/dist/uv.config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@titaniumnetwork-dev/ultraviolet@3.0.6/dist/uv.sw.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* футуристичный эффект */
        }

        body {
            background: radial-gradient(ellipse at 20% 30%, #0a0f1f, #010101);
            font-family: 'Segoe UI', 'Orbitron', 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Сетка и глитч-эффекты */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,255,255,0.03) 0px, rgba(0,255,255,0.03) 2px, transparent 2px, transparent 6px);
            pointer-events: none;
            z-index: 0;
        }

        .vpn-container {
            position: relative;
            z-index: 2;
            width: 95%;
            max-width: 1300px;
            background: rgba(8, 12, 20, 0.75);
            backdrop-filter: blur(15px);
            border-radius: 3rem;
            border: 1px solid rgba(0, 255, 255, 0.5);
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.2), inset 0 0 30px rgba(0, 255, 255, 0.05);
            padding: 2rem;
            transition: all 0.4s ease;
        }

        /* Неоновая кнопка */
        .magic-btn {
            display: block;
            width: 320px;
            margin: 1rem auto 2rem auto;
            padding: 1.2rem 2rem;
            font-size: 1.6rem;
            font-weight: bold;
            text-align: center;
            text-transform: uppercase;
            background: linear-gradient(135deg, #0ff, #0a4);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            border: 2px solid #0ff;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 8px #0ff, 0 0 20px #0ff;
            letter-spacing: 3px;
            backdrop-filter: blur(4px);
            text-shadow: 0 0 5px cyan;
            font-family: 'Orbitron', monospace;
        }

        .magic-btn:hover {
            transform: scale(1.03);
            box-shadow: 0 0 20px cyan, 0 0 40px cyan;
            border-color: #f0f;
        }

        /* Эффект взлома */
        .hack-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: monospace;
            font-size: 2rem;
            color: #0f0;
            text-align: center;
            backdrop-filter: blur(8px);
            transition: opacity 0.5s;
            opacity: 0;
            pointer-events: none;
        }

        .hack-text {
            background: rgba(0,0,0,0.8);
            padding: 2rem;
            border-radius: 20px;
            border: 1px solid #0f0;
            box-shadow: 0 0 40px #0f0;
            animation: blink 1s steps(2) infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        /* Панель управления (после активации) */
        .dashboard {
            display: none;
            animation: fadeSlideUp 0.7s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Поисковая строка */
        .search-area {
            margin: 2rem 0 1.5rem;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .search-input {
            flex: 3;
            min-width: 250px;
            background: #0a0f1c;
            border: 1px solid #0ff;
            border-radius: 60px;
            padding: 1rem 1.8rem;
            font-size: 1rem;
            font-family: 'Courier New', monospace;
            color: #0ff;
            outline: none;
            transition: 0.2s;
            letter-spacing: 1px;
        }

        .search-input:focus {
            box-shadow: 0 0 15px cyan;
            background: #000;
        }

        .search-btn {
            background: rgba(0, 255, 255, 0.2);
            border: 1px solid #0ff;
            border-radius: 60px;
            padding: 0 2rem;
            font-weight: bold;
            font-size: 1.2rem;
            color: cyan;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
        }

        .search-btn:hover {
            background: rgba(0, 255, 255, 0.5);
            box-shadow: 0 0 12px cyan;
        }

        /* iframe (прокси-браузер) */
        .browser-window {
            width: 100%;
            height: 65vh;
            min-height: 500px;
            border: 2px solid rgba(0, 255, 255, 0.6);
            border-radius: 28px;
            background: #0a0e18;
            margin-top: 1rem;
            overflow: hidden;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.3);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }

        /* Анимация "зашифрованное соединение" */
        .encryption-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin: 1rem 0;
            flex-wrap: wrap;
        }

        .glowing-text {
            background: rgba(0,0,0,0.6);
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-family: monospace;
            border-left: 3px solid cyan;
            color: #0ff;
            letter-spacing: 2px;
        }

        .radar {
            width: 30px;
            height: 30px;
            background: radial-gradient(circle, rgba(0,255,255,0.3) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            animation: pulseRadar 1.2s infinite;
        }

        @keyframes pulseRadar {
            0% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(0,255,255,0.4);}
            100% { transform: scale(1.2); box-shadow: 0 0 0 10px rgba(0,255,255,0);}
        }

        footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.7rem;
            opacity: 0.7;
            color: #0ff;
        }

        @media (max-width: 700px) {
            .vpn-container { padding: 1rem; }
            .magic-btn { width: 260px; font-size: 1.2rem; }
            .browser-window { height: 55vh; }
        }
    </style>
</head>
<body>
<div class="vpn-container">
    <div style="text-align: center; font-size: 2rem; font-weight: bold; text-shadow: 0 0 12px cyan;">⚡ TGESHKA VPN ⚡</div>
    <button id="activateBtn" class="magic-btn">АКТИВИРОВАТЬ МАГИЮ TGESHKA</button>
    
    <div id="dashboard" class="dashboard">
        <div class="encryption-badge">
            <div class="radar"></div>
            <div class="glowing-text">🔒 ЗАЩИТА: AES-256 + ULTRAVIOLET 🔒</div>
            <div class="glowing-text" id="statusMsg">СОЕДИНЕНИЕ АКТИВНО</div>
        </div>
        <div class="search-area">
            <input type="text" id="urlInput" class="search-input" placeholder="Введите адрес: google.com / youtube.com / любой сайт" value="https://google.com">
            <button id="goBtn" class="search-btn">ПЕРЕЙТИ</button>
        </div>
        <div class="browser-window">
            <iframe id="proxyFrame" src="about:blank" title="Tgeshka VPN Browser"></iframe>
        </div>
        <footer>🔥 Трафик через прокси-движок Ultraviolet | Блокировки сняты | Анонимно и безопасно</footer>
    </div>
</div>

<div id="hackOverlay" class="hack-overlay">
    <div class="hack-text">🔓 БЛОКИРОВКИ СНЯТЫ 🔓<br>⚡ ДОСТУП АКТИВИРОВАН ⚡</div>
</div>

<script>
    // ------------------- Ultraviolet Прокси Инициализация -------------------
    // Конфигурация Ultraviolet (полностью локальная, без сервера)
    const uv = new Ultraviolet();
    const uvConfig = {
        prefix: '/service/',
        encodeUrl: Ultraviolet.codec.xor.encode,
        decodeUrl: Ultraviolet.codec.xor.decode,
        handler: '/uv/uv.handler.js',
        client: '/uv/uv.client.js',
        bundle: '/uv/uv.bundle.js',
        config: '/uv/uv.config.js',
        sw: '/uv/uv.sw.js'
    };
    
    // Зарегистрируем service worker после загрузки страницы
    let swRegistered = false;
    let isActive = false; // флаг активности vpn-режима (показываем интерфейс)

    async function initUltraviolet() {
        if (swRegistered) return true;
        try {
            // Создаём виртуальные пути для скриптов UV (будем использовать ссылки из CDN)
            // Ultraviolet требует, чтобы его файлы были доступны по указанным путям.
            // Чтобы всё работало на GitHub Pages, мы динамически создадим блоб-ссылки или просто используем CDN
            // Самый надёжный способ: переопределить пути на реальные CDN-файлы
            uvConfig.handler = 'https://cdn.jsdelivr.net/npm/@titaniumnetwork-dev/ultraviolet@3.0.6/dist/uv.handler.js';
            uvConfig.client = 'https://cdn.jsdelivr.net/npm/@titaniumnetwork-dev/ultraviolet@3.0.6/dist/uv.client.js';
            uvConfig.bundle = 'https://cdn.jsdelivr.net/npm/@titaniumnetwork-dev/ultraviolet@3.0.6/dist/uv.bundle.js';
            uvConfig.config = 'https://cdn.jsdelivr.net/npm/@titaniumnetwork-dev/ultraviolet@3.0.6/dist/uv.config.js';
            uvConfig.sw = 'https://cdn.jsdelivr.net/npm/@titaniumnetwork-dev/ultraviolet@3.0.6/dist/uv.sw.js';
            
            // Регистрируем service worker
            const swUrl = uvConfig.sw;
            const registration = await navigator.serviceWorker.register(swUrl);
            console.log('Ultraviolet SW зарегистрирован', registration);
            swRegistered = true;
            return true;
        } catch (err) {
            console.error('Ошибка регистрации SW:', err);
            return false;
        }
    }

    // Функция для получения прокси-URL через Ultraviolet
    function getProxyUrl(rawUrl) {
        if (!rawUrl) return '';
        let url = rawUrl.trim();
        if (!url.startsWith('http://') && !url.startsWith('https://')) {
            url = 'https://' + url;
        }
        // Используем encode метод Ultraviolet
        const encoded = uvConfig.encodeUrl(url);
        return uvConfig.prefix + encoded;
    }

    // Загрузка сайта в iframe через прокси
    function loadSiteInProxy(url) {
        if (!isActive) return;
        const proxyUrl = getProxyUrl(url);
        const iframe = document.getElementById('proxyFrame');
        iframe.src = proxyUrl;
        console.log(`[TGESHKA] Загружаем через UV: ${proxyUrl}`);
    }

    // Эффект взлома (анимация)
    function showHackEffect() {
        const overlay = document.getElementById('hackOverlay');
        overlay.style.opacity = '1';
        overlay.style.pointerEvents = 'none';
        setTimeout(() => {
            overlay.style.opacity = '0';
        }, 1800);
    }

    // Активация всего сервиса
    async function activateVPN() {
        if (isActive) return;
        
        // Показываем эффект взлома
        showHackEffect();
        
        // Инициализируем Ultraviolet (service worker)
        const success = await initUltraviolet();
        if (!success) {
            alert('⚠️ Не удалось активировать прокси-движок. Возможно, браузер не поддерживает Service Worker. Попробуйте другой браузер.');
            return;
        }
        
        isActive = true;
        // Показываем панель
        document.getElementById('dashboard').style.display = 'block';
        // Меняем кнопку
        const btn = document.getElementById('activateBtn');
        btn.textContent = '⚡ МАГИЯ АКТИВНА ⚡';
        btn.style.borderColor = '#f0f';
        btn.style.boxShadow = '0 0 20px #f0f';
        
        // Загружаем стартовую страницу (по умолчанию из поля)
        const defaultUrl = document.getElementById('urlInput').value;
        if (defaultUrl) loadSiteInProxy(defaultUrl);
    }

    // Деактивация (скрыть панель, но прокси продолжит работать? Мы просто скроем, но SW останется)
    // По условию нужно только включение, но можно сделать выключение через кнопку? В задании: нажал -> ввел сайт -> смотришь.
    // Сделаем, что повторное нажатие выключает интерфейс (но не дерегистрирует SW, просто скрывает)
    function deactivateVPN() {
        if (!isActive) return;
        isActive = false;
        document.getElementById('dashboard').style.display = 'none';
        const btn = document.getElementById('activateBtn');
        btn.textContent = 'АКТИВИРОВАТЬ МАГИЮ TGESHKA';
        btn.style.borderColor = '#0ff';
        btn.style.boxShadow = '0 0 8px #0ff, 0 0 20px #0ff';
        // Очищаем iframe
        document.getElementById('proxyFrame').src = 'about:blank';
    }

    // Обработка кнопки (вкл/выкл)
    const toggleBtn = document.getElementById('activateBtn');
    toggleBtn.addEventListener('click', () => {
        if (isActive) {
            deactivateVPN();
        } else {
            activateVPN();
        }
    });

    // Кнопка "Перейти"
    const goButton = document.getElementById('goBtn');
    const urlField = document.getElementById('urlInput');
    goButton.addEventListener('click', () => {
        if (!isActive) {
            alert('Сначала активируйте VPN, нажав на кнопку!');
            return;
        }
        const target = urlField.value;
        if (target) loadSiteInProxy(target);
        else alert('Введите адрес сайта');
    });

    // Enter в поле ввода
    urlField.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            if (!isActive) {
                alert('Активируйте VPN перед использованием');
                return;
            }
            loadSiteInProxy(urlField.value);
        }
    });

    // Проверка поддержки service worker
    if (!('serviceWorker' in navigator)) {
        alert('Ваш браузер не поддерживает Service Worker, прокси-функция недоступна. Используйте современный браузер.');
        toggleBtn.disabled = true;
    }

    // Небольшой глитч-эффект для текста (доп. крутость)
    setInterval(() => {
        const statusSpan = document.getElementById('statusMsg');
        if (statusSpan && isActive) {
            const glitch = ['СОЕДИНЕНИЕ АКТИВНО', '🔒 ЗАЩИЩЕНО', '⚡ АНОНИМНО', '🌐 ПРОКСИ ОНЛАЙН'];
            let idx = Math.floor(Math.random() * glitch.length);
            if (Math.random() > 0.9) statusSpan.innerText = glitch[idx];
        }
    }, 2000);
</script>
</body>
</html>
