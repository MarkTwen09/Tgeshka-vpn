<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE EMPIRE: Глобальная Стратегия</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --main-red: #ff3333; --main-green: #00ff88; --bg: #050505; --ui-bg: rgba(10,10,15,0.9); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: #fff; overflow: hidden; height: 100vh; }
        #map { height: 100%; width: 100%; z-index: 1; filter: saturate(1.3) contrast(1.1); }
        
        /* Панель игрока */
        .player-panel {
            position: fixed; bottom: 20px; left: 20px; width: 320px;
            background: var(--ui-bg); border: 2px solid rgba(255,51,51,0.3);
            border-radius: 15px; padding: 15px; z-index: 1000;
            backdrop-filter: blur(10px); color: #fff;
        }
        .stat-item { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
        .stat-value { font-weight: bold; color: var(--main-green); }

        /* Лента событий */
        .log-panel {
            position: fixed; top: 20px; right: 20px; width: 300px;
            max-height: 250px; background: rgba(0,0,0,0.8);
            border-radius: 8px; padding: 10px; font-size: 11px;
            font-family: monospace; color: #aaa; z-index: 1000;
            border-left: 3px solid var(--main-red); overflow-y: hidden;
        }
        .log-entry { margin-bottom: 4px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        /* Стили карты Leaflet */
        @keyframes zonePulse { 0% { fill-opacity: 0.1; } 100% { fill-opacity: 0.4; } }
        .map-danger-zone { animation: zonePulse 1.2s infinite alternate; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="player-panel">
    <div style="font-size: 18px; font-weight: 900; color: var(--main-red); margin-bottom: 12px; letter-spacing: 1px;">МОЯ ИМПЕРИЯ</div>
    <div class="stat-item"><span>Лидер:</span> <span class="stat-value">Игрок #1</span></div>
    <div class="stat-item"><span>Казна (Золото):</span> <span class="stat-value" id="gold">10,000$</span></div>
    <div class="stat-item"><span>Армия (Солдаты):</span> <span class="stat-value" id="army">1,000 чел.</span></div>
    <div class="stat-item"><span>Уровень Экономики:</span> <span class="stat-value" id="economy">1</span></div>
    <div class="stat-item"><span>Доход (Ход):</span> <span class="stat-value" id="income">+100$</span></div>
</div>

<div class="log-panel" id="log-box">
    <div class="log-entry">> [15:00:00] Старт Сессии. Выберите страну на карте.</div>
</div>
