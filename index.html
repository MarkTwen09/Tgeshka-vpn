<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>РАДАР ВРВ | ФИНАЛЬНЫЙ МОНИТОРИНГ</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #000;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: fixed;
        }
        #map { height: 100%; width: 100%; z-index: 1; }
        .status-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            z-index: 1000;
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255,50,50,0.4);
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }
        .status-title {
            font-weight: 700;
            font-size: 1rem;
            color: #ff3a3a;
            background: rgba(0,0,0,0.6);
            padding: 4px 10px;
            border-radius: 40px;
        }
        .status-badge, .last-update {
            font-size: 0.75rem;
            background: #1a1a1a;
            padding: 4px 12px;
            border-radius: 30px;
            font-family: monospace;
            color: #ddd;
        }
        .last-update { color: #88ff88; background: #1a2a1a; }
        .threat-panel {
            position: fixed;
            bottom: 20px;
            left: 12px;
            right: 12px;
            max-height: 35%;
            background: rgba(10,10,15,0.92);
            backdrop-filter: blur(16px);
            border-radius: 28px;
            border: 1px solid rgba(255,60,60,0.5);
            z-index: 1000;
            padding: 14px 12px;
            overflow-y: auto;
        }
        .threat-panel h3 {
            color: #ff5e5e;
            font-size: 0.9rem;
            margin-bottom: 10px;
            border-left: 3px solid #ff3333;
            padding-left: 10px;
        }
        .threat-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
        .threat-item {
            background: rgba(25,25,35,0.8);
            border-radius: 20px;
            padding: 10px 12px;
            border-left: 4px solid #ff4444;
        }
        .threat-region { font-weight: bold; color: #ff8888; display: flex; justify-content: space-between; }
        .threat-time { font-family: monospace; background: #00000066; padding: 2px 8px; border-radius: 20px; font-size: 0.7rem; }
        .threat-message { color: #e0e0e0; margin-top: 5px; font-size: 0.7rem; word-break: break-word; }
        .empty-list { color: #aaa; text-align: center; padding: 12px; }
        .log-panel {
            position: fixed;
            bottom: 20px;
            right: 12px;
            max-width: 320px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            border-radius: 12px;
            padding: 8px 12px;
            font-size: 0.7rem;
            font-family: monospace;
            color: #0f0;
            z-index: 1000;
            border-left: 3px solid #ff4444;
            pointer-events: none;
            max-height: 180px;
            overflow-y: auto;
        }
        .log-panel div { margin: 2px 0; word-break: break-word; }
        .test-button {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 2000;
            background: #ff0000;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 8px 16px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.8rem;
            box-shadow: 0 0 10px rgba(255,0,0,0.5);
            transition: transform 0.1s;
        }
        .test-button:hover { transform: scale(1.05); background: #cc0000; }
        @media (min-width: 600px) {
            .threat-panel { max-width: 320px; right: auto; left: 16px; bottom: 20px; max-height: 50%; }
            .log-panel { bottom: 20px; right: 20px; }
        }
        @keyframes redPulse {
            0% { filter: drop-shadow(0 0 2px rgba(255,0,0,0.5)) drop-shadow(0 0 4px rgba(255,0,0,0.5)); }
            100% { filter: drop-shadow(0 0 15px rgba(255,0,0,0.9)) drop-shadow(0 0 8px rgba(255,0,0,0.8)); }
        }
        .danger-glow { animation: redPulse 1s ease-in-out infinite alternate; }
        .custom-warning-icon {
            background: #ff3333;
            border-radius: 50%;
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 22px;
            color: white;
            border: 2px solid rgba(255,255,255,0.9);
            box-shadow: 0 0 0 0 rgba(255,0,0,0.7);
            animation: markerPulse 1.5s infinite;
        }
        @keyframes markerPulse {
            0% { box-shadow: 0 0 0 0 rgba(255,0,0,0.7); transform: scale(1); }
            70% { box-shadow: 0 0 0 12px rgba(255,0,0,0); transform: scale(1.05); }
            100% { box-shadow: 0 0 0 0 rgba(255,0,0,0); transform: scale(1); }
        }
    </style>
</head>
<body>
<div id="map"></div>
<div class="status-bar">
    <span class="status-title">⚡ РАДАР ВРВ (Прямой мониторинг)</span>
    <div style="display: flex; gap: 8px;">
        <span class="status-badge" id="updateStatus">🟢 ОБНОВЛЯЕТСЯ...</span>
        <span class="last-update" id="lastUpdateTime">—:—:—</span>
    </div>
</div>
<div class="threat-panel" id="threatPanel">
    <h3>⚠️ АКТИВНЫЕ УГРОЗЫ</h3>
    <ul class="threat-list" id="threatList"><li class="empty-list">Нет активных тревог</li></ul>
</div>
<div class="log-panel" id="logPanel"><div>📡 Запуск...</div></div>
<button class="test-button" id="testButton">🔴 ТЕСТ: ЗАЖЕЧЬ 2 ОБЛАСТИ</button>

<script>
    // ==================== 1. КАРТА ====================
    const map = L.map('map').setView([52.0, 38.0], 6);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; CartoDB',
        subdomains: 'abcd',
        minZoom: 4,
        maxZoom: 10
    }).addTo(map);

    // ==================== 2. ВСТРОЕННЫЕ ПОЛИГОНЫ (10 основных областей) ====================
    // Координаты: [lng, lat] прямоугольники
    const regionsData = {
        "Белгородская область": { coords: [[35.6,50.0],[37.2,50.0],[37.2,51.3],[35.6,51.3],[35.6,50.0]], center: [50.8,36.4] },
        "Курская область":      { coords: [[34.5,51.0],[36.3,51.0],[36.3,52.0],[34.5,52.0],[34.5,51.0]], center: [51.5,35.4] },
        "Воронежская область":  { coords: [[38.5,49.7],[41.0,49.7],[41.0,51.5],[38.5,51.5],[38.5,49.7]], center: [50.7,39.8] },
        "Ростовская область":   { coords: [[38.5,46.5],[41.5,46.5],[41.5,49.0],[38.5,49.0],[38.5,46.5]], center: [47.7,40.0] },
        "Ставропольский край":  { coords: [[41.0,44.0],[45.5,44.0],[45.5,46.0],[41.0,46.0],[41.0,44.0]], center: [45.0,43.2] },
        "Краснодарский край":   { coords: [[36.5,44.0],[41.5,44.0],[41.5,47.0],[36.5,47.0],[36.5,44.0]], center: [45.3,39.0] },
        "Брянская область":     { coords: [[32.5,52.0],[34.5,52.0],[34.5,53.5],[32.5,53.5],[32.5,52.0]], center: [52.7,33.5] },
        "Калужская область":    { coords: [[34.0,53.5],[37.0,53.5],[37.0,55.0],[34.0,55.0],[34.0,53.5]], center: [54.5,35.5] },
        "Крым":                 { coords: [[33.0,44.5],[36.0,44.5],[36.0,46.0],[33.0,46.0],[33.0,44.5]], center: [45.2,34.5] },
        "Харьковская область":  { coords: [[35.5,49.0],[37.5,49.0],[37.5,50.5],[35.5,50.5],[35.5,49.0]], center: [49.8,36.5] },
        "Сумская область":      { coords: [[33.5,50.5],[35.8,50.5],[35.8,52.2],[33.5,52.2],[33.5,50.5]], center: [51.2,34.6] }
    };

    let regionLayers = new Map();
    let regionCenters = new Map();
    let activeMarkers = [];
    let activeThreats = new Map();   // регион -> { message, time }

    const defaultStyle = { color: "#ff0000", weight: 2, fillColor: "red", fillOpacity: 0, opacity: 0 };
    const alertStyle   = { color: "#ff0000", weight: 3, fillColor: "red", fillOpacity: 0.6, opacity: 1 };

    // Инициализация полигонов (изначально невидимые)
    for (const [name, data] of Object.entries(regionsData)) {
        const polygon = L.polygon(data.coords, defaultStyle).addTo(map);
        polygon.bindTooltip(name, { sticky: true });
        regionLayers.set(name, polygon);
        regionCenters.set(name, data.center);
    }

    function setRegionStyle(regionName, isActive) {
        const layer = regionLayers.get(regionName);
        if (!layer) return false;
        if (isActive) {
            layer.setStyle(alertStyle);
            if (layer._path) layer._path.classList.add('danger-glow');
        } else {
            layer.setStyle(defaultStyle);
            if (layer._path) layer._path.classList.remove('danger-glow');
        }
        return true;
    }

    function addMarkerForRegion(regionName) {
        const center = regionCenters.get(regionName);
        if (!center) return null;
        const icon = L.divIcon({ className: 'custom-warning-icon', html: '!', iconSize: [34,34], popupAnchor: [0,-15] });
        const marker = L.marker(center, { icon }).addTo(map);
        marker.bindTooltip(`⚠️ ${regionName} · УГРОЗА`, { sticky: true });
        return marker;
    }

    function clearAllMarkers() {
        activeMarkers.forEach(m => map.removeLayer(m));
        activeMarkers = [];
    }

    function updateMap() {
        for (let [name] of regionLayers.entries()) setRegionStyle(name, false);
        clearAllMarkers();
        for (let [region] of activeThreats.entries()) {
            setRegionStyle(region, true);
            const marker = addMarkerForRegion(region);
            if (marker) activeMarkers.push(marker);
        }
    }

    // ==================== 3. ТЕСТОВАЯ КНОПКА (проверка работоспособности полигонов) ====================
    document.getElementById('testButton').addEventListener('click', () => {
        addLog("🧪 ТЕСТ: Зажигаем Белгородскую область и Ставропольский край на 10 секунд");
        // Сохраняем текущие угрозы, чтобы потом восстановить
        const savedThreats = new Map(activeThreats);
        // Временно активируем две области
        const testRegions = ["Белгородская область", "Ставропольский край"];
        for (let reg of testRegions) {
            if (regionLayers.has(reg)) {
                activeThreats.set(reg, { message: "Тестовое зажигание", time: new Date().toLocaleTimeString() });
                setRegionStyle(reg, true);
                const marker = addMarkerForRegion(reg);
                if (marker) activeMarkers.push(marker);
            }
        }
        updateSidebar(); // обновить боковую панель для теста
        setTimeout(() => {
            // Восстанавливаем предыдущее состояние
            activeThreats.clear();
            for (let [k,v] of savedThreats) activeThreats.set(k,v);
            updateMap();
            updateSidebar();
            addLog("✅ Тест завершён, карта вернулась к реальным угрозам");
        }, 10000);
    });

    // ==================== 4. БАЗА ГОРОДОВ И РЕГИОНОВ ====================
    const cityToRegion = new Map();
    function addCity(city, region) { cityToRegion.set(city.toLowerCase(), region); }

    // Ставропольский край
    ["Ставрополь","Невинномысск","Пятигорск","Минеральные Воды","Кисловодск","Ессентуки","Невинка"].forEach(c => addCity(c, "Ставропольский край"));
    // Белгородская область
    ["Белгород","Шебекино","Валуйки","Грайворон","Строитель","Алексеевка"].forEach(c => addCity(c, "Белгородская область"));
    // Курская область
    ["Курск","Суджа","Рыльск","Глушково","Коренево","Льгов","Курчатов"].forEach(c => addCity(c, "Курская область"));
    // Воронежская область
    ["Воронеж","Острогожск","Лиски","Россошь","Борисоглебск"].forEach(c => addCity(c, "Воронежская область"));
    // Ростовская область
    ["Ростов-на-Дону","Ростов","Таганрог","Азов","Шахты","Новошахтинск"].forEach(c => addCity(c, "Ростовская область"));
    // Краснодарский край
    ["Краснодар","Новороссийск","Сочи","Анапа","Ейск","Темрюк","Крымск","Кубань"].forEach(c => addCity(c, "Краснодарский край"));
    // Брянская область
    ["Брянск","Клинцы","Новозыбков","Стародуб"].forEach(c => addCity(c, "Брянская область"));
    // Калужская область
    ["Калуга","Обнинск","Малоярославец"].forEach(c => addCity(c, "Калужская область"));
    // Крым
    ["Симферополь","Севастополь","Керчь","Феодосия","Ялта","Джанкой","Крым"].forEach(c => addCity(c, "Крым"));
    // Украинские области
    ["Харьков","Чугуев","Изюм"].forEach(c => addCity(c, "Харьковская область"));
    ["Сумы","Ахтырка","Конотоп"].forEach(c => addCity(c, "Сумская область"));
    // Прямые названия областей
    for (let name of Object.keys(regionsData)) addCity(name, name);
    addCity("Ставрополье", "Ставропольский край");
    addCity("Белгородчина", "Белгородская область");
    addCity("Костромская", "Костромская область"); // пример для логики

    // ==================== 5. ТРИГГЕРЫ (строго по заданию) ====================
    const START_TRIGGERS = ["Опасность по БПЛА", "Фиксация БПЛА", "Угроза БПЛА", "Ракетная опасность"];
    const END_TRIGGERS   = ["Отбой", "Чисто"];

    // ==================== 6. ПРОКСИ С АНТИКЭШЕМ ====================
    const logPanel = document.getElementById('logPanel');
    function addLog(msg) {
        const div = document.createElement('div');
        div.textContent = `> ${new Date().toLocaleTimeString()} ${msg}`;
        logPanel.appendChild(div);
        logPanel.scrollTop = logPanel.scrollHeight;
        while (logPanel.children.length > 40) logPanel.removeChild(logPanel.firstChild);
        console.log(msg);
    }

    async function fetchTelegramMessages() {
        const statusSpan = document.getElementById('updateStatus');
        statusSpan.innerHTML = "🟡 ЗАПРОС...";
        const url = `https://t.me/s/vrv_radar?t=${Date.now()}`;
        // Используем стабильный прокси codetabs
        const proxyUrl = `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`;
        try {
            const resp = await fetch(proxyUrl);
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            const html = await resp.text();
            if (!html || html.length < 100) throw new Error("Пустой ответ");
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            const blocks = doc.querySelectorAll('.tgme_widget_message_text');
            const messages = Array.from(blocks).slice(0, 5).map(b => b.innerText.trim()).filter(t => t);
            addLog(`📩 Получено сообщений: ${messages.length}`);
            if (messages.length > 0) addLog(`Последний пост: ${messages[0].substring(0, 80)}...`);
            statusSpan.innerHTML = "✅ ОБНОВЛЕНО";
            document.getElementById('lastUpdateTime').innerText = new Date().toLocaleTimeString();
            return messages;
        } catch (err) {
            addLog(`❌ Ошибка прокси: ${err.message}`);
            statusSpan.innerHTML = "❌ Ошибка связи";
            return [];
        }
    }

    function extractTime(text) {
        const match = text.match(/(?:в\s*)?(\d{1,2}[:.]\d{2})/i);
        return match ? match[1].replace('.',':') : new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
    }

    function processMessages(messages) {
        addLog("Анализ текста...");
        const newActive = new Map();
        for (let msg of messages) {
            const lowerMsg = msg.toLowerCase();
            let foundRegion = null;
            // Поиск региона (по городу или прямому названию)
            for (let [city, region] of cityToRegion.entries()) {
                if (lowerMsg.includes(city)) {
                    foundRegion = region;
                    addLog(`🔍 Найдено упоминание: "${city}" -> регион "${region}"`);
                    break;
                }
            }
            if (!foundRegion) continue;

            // Проверка триггеров
            const isStart = START_TRIGGERS.some(t => lowerMsg.includes(t.toLowerCase()));
            const isEnd   = END_TRIGGERS.some(t => lowerMsg.includes(t.toLowerCase()));

            if (isEnd) {
                if (activeThreats.has(foundRegion)) {
                    activeThreats.delete(foundRegion);
                    addLog(`🔴 ОТБОЙ: ${foundRegion} — статус: ТРЕВОГА СНЯТА`);
                }
                continue;
            }
            if (isStart) {
                const startWord = START_TRIGGERS.find(t => lowerMsg.includes(t.toLowerCase()));
                const time = extractTime(msg);
                newActive.set(foundRegion, { message: msg.substring(0, 120), time });
                addLog(`🔥 ОБЛАСТЬ ${foundRegion} НАЙДЕНА. СТАТУС: ТРЕВОГА (триггер: "${startWord}")`);
            } else {
                addLog(`ℹ️ Регион ${foundRegion} найден, но нет триггеров начала/отбоя`);
            }
        }
        // Обновляем активные угрозы: добавляем новые, старые без отбоя остаются
        for (let [reg, data] of newActive.entries()) {
            activeThreats.set(reg, data);
        }
    }

    function updateSidebar() {
        const listEl = document.getElementById('threatList');
        if (activeThreats.size === 0) {
            listEl.innerHTML = '<li class="empty-list">Нет активных тревог</li>';
            return;
        }
        let html = '';
        for (let [region, data] of activeThreats.entries()) {
            html += `<li class="threat-item">
                        <div class="threat-region"><span>🔴 ${escapeHtml(region)}</span><span class="threat-time">${escapeHtml(data.time)}</span></div>
                        <div class="threat-message">${escapeHtml(data.message)}</div>
                     </li>`;
        }
        listEl.innerHTML = html;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;');
    }

    // ==================== 7. ЗАПУСК МОНИТОРИНГА ====================
    let intervalId = null;

    async function refresh() {
        addLog("Попытка подключения к Telegram...");
        const messages = await fetchTelegramMessages();
        if (messages.length > 0) {
            addLog("Посты получены успешно");
            processMessages(messages);
            updateMap();
            updateSidebar();
        } else {
            addLog("Нет новых сообщений или ошибка");
        }
    }

    function startMonitoring() {
        refresh();
        intervalId = setInterval(refresh, 30000);
    }

    startMonitoring();
</script>
</body>
</html>
