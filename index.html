<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RADAR VRV | ULTIMATE</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --danger: #ff3333; --safe: #00ff66; --bg: #050505; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; overflow: hidden; height: 100vh; }
        #map { height: 100%; width: 100%; filter: brightness(0.7) contrast(1.2); }
        
        .ui { position: fixed; z-index: 1000; pointer-events: none; }
        .top-bar { top: 0; width: 100%; padding: 20px; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); display: flex; justify-content: space-between; pointer-events: auto; }
        .brand { color: var(--danger); font-weight: 900; letter-spacing: 3px; text-shadow: 0 0 15px var(--danger); }
        
        .threat-panel { bottom: 20px; left: 20px; width: 320px; background: rgba(10,10,15,0.95); border: 1px solid rgba(255,51,51,0.4); border-radius: 12px; padding: 15px; pointer-events: auto; backdrop-filter: blur(10px); }
        .threat-item { background: rgba(255,51,51,0.1); border-left: 5px solid var(--danger); padding: 10px; margin-top: 10px; border-radius: 4px; animation: flash 0.5s ease; }
        
        #console { top: 70px; right: 20px; width: 280px; max-height: 200px; background: rgba(0,0,0,0.8); border-radius: 8px; font-family: 'Consolas', monospace; font-size: 11px; padding: 10px; overflow: hidden; border-right: 3px solid var(--danger); }
        .log { margin-bottom: 5px; opacity: 0.8; border-bottom: 1px solid rgba(255,255,255,0.05); }

        @keyframes flash { from { background: rgba(255,51,51,0.5); } to { background: rgba(255,51,51,0.1); } }
        .pulse { animation: p 1.5s infinite alternate; }
        @keyframes p { from { fill-opacity: 0.3; } to { fill-opacity: 0.7; } }
    </style>
</head>
<body>

<div id="map"></div>

<div class="ui top-bar">
    <div class="brand">SYSTEM RADAR VRV</div>
    <div id="status"><span style="color:var(--safe)">●</span> КАНАЛ СВЯЗИ: OK</div>
</div>

<div class="ui threat-panel">
    <div style="font-size: 11px; color: #777;">МОНИТОРИНГ УГРОЗ:</div>
    <div id="threat-list"><div style="color:#555; padding: 10px 0;">Сектор чист</div></div>
</div>

<div class="ui" id="console"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', { center: [48.5, 42.0], zoom: 6, zoomControl: false });
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    const activeThreats = new Map();
    const layers = new Map();

    const REGIONS = {
        "Ставрополье": { coords: [[43.5, 41.0], [46.2, 46.0]], keys: ["невинка", "невинномысск", "ставрополь", "ставропольский"] },
        "Белгород": { coords: [[50.0, 35.5], [51.3, 39.0]], keys: ["белгород", "шебекино"] },
        "Курск": { coords: [[50.8, 33.8], [52.4, 36.5]], keys: ["курск", "суджа"] },
        "Воронеж": { coords: [[49.5, 38.0], [52.2, 43.0]], keys: ["воронеж"] },
        "Ростов": { coords: [[46.0, 38.0], [50.0, 44.0]], keys: ["ростов", "таганрог"] }
    };

    function log(msg, color = "#aaa") {
        const c = document.getElementById('console');
        const e = document.createElement('div');
        e.className = 'log';
        e.style.color = color;
        e.innerHTML = `> ${new Date().toLocaleTimeString()} ${msg}`;
        c.prepend(e);
        if (c.children.length > 8) c.lastChild.remove();
    }

    async function fetchData() {
        const sources = [
            `https://api.allorigins.win/get?url=${encodeURIComponent('https://t.me/s/vrv_radar?cb=' + Date.now())}`,
            `https://worker-proud-sun-5835.cors-proxy.workers.dev/?url=https://t.me/s/vrv_radar`
        ];

        for (let url of sources) {
            try {
                log("Запрос данных...");
                const res = await fetch(url);
                if (!res.ok) continue;
                const data = await res.json();
                return new DOMParser().parseFromString(data.contents || data, 'text/html');
            } catch (e) { continue; }
        }
        throw new Error("Все каналы перегружены");
    }

    async function update() {
        try {
            const doc = await fetchData();
            const msgs = Array.from(doc.querySelectorAll('.tgme_widget_message_text')).slice(-5);
            
            if (msgs.length === 0) { log("Нет новых постов", "#555"); return; }

            msgs.forEach(m => {
                const text = m.innerText.toLowerCase();
                for (let r in REGIONS) {
                    const isAlert = ["опасность", "внимание", "угроза", "ракетная", "пуск"].some(w => text.includes(w));
                    const isClear = ["отбой", "чисто", "снята"].some(w => text.includes(w));
                    const isTarget = REGIONS[r].keys.some(k => text.includes(k));

                    if (isTarget) {
                        if (isClear) {
                            activeThreats.delete(r);
                            log(`ОТБОЙ: ${r}`, "#00ff66");
                        } else if (isAlert) {
                            activeThreats.set(r, m.innerText.substring(0, 60) + "...");
                            log(`⚠️ УГРОЗА: ${r}`, "#ff3333");
                        }
                    }
                }
            });
            render();
        } catch (e) {
            log("ОШИБКА СВЯЗИ - ПЕРЕЗАПУСК", "#ffcc00");
        }
    }

    function render() {
        const list = document.getElementById('threat-list');
        list.innerHTML = activeThreats.size === 0 ? '<div style="color:#555;">Сектор чист</div>' : "";
        
        layers.forEach(l => map.removeLayer(l));
        layers.clear();

        activeThreats.forEach((info, region) => {
            const poly = L.rectangle(REGIONS[region].coords, {
                color: '#ff3333', weight: 2, fillColor: '#ff3333', fillOpacity: 0.5, className: 'pulse'
            }).addTo(map);
            layers.set(region, poly);

            const item = document.createElement('div');
            item.className = 'threat-item';
            item.innerHTML = `<b>${region.toUpperCase()}</b><br><small>${info}</small>`;
            list.appendChild(item);
        });
    }

    setInterval(update, 15000);
    update();

    // Тест кликом
    map.on('click', () => {
        log("ТЕСТ: Запуск Невинки", "#ffcc00");
        activeThreats.set("Ставрополье", "ТЕСТОВАЯ ПРОВЕРКА СИСТЕМЫ");
        render();
        setTimeout(() => { activeThreats.delete("Ставрополье"); render(); }, 10000);
    });
</script>
</body>
</html>
