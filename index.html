<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SlowMail — Professional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&display=swap');
        body { font-family: 'Google Sans', sans-serif; background-color: #f6f8fc; overflow: hidden; }
        .sidebar-item:hover { background-color: #e1e3e1; border-radius: 0 100px 100px 0; }
        .sidebar-active { background-color: #d3e3fd; color: #041e49; font-weight: 500; border-radius: 0 100px 100px 0; }
        .mail-content { transition: transform 0.2s; cursor: pointer; }
        .mail-content:hover { background-color: #f2f6fc; box-shadow: inset 1px 0 0 #dadce0; }
        .modal-shadow { box-shadow: 0 24px 38px 3px rgba(0,0,0,0.14), 0 9px 46px 8px rgba(0,0,0,0.12); }
    </style>
</head>
<body class="h-screen flex flex-col">

    <header class="h-16 flex items-center justify-between px-4 bg-[#f6f8fc] z-50">
        <div class="flex items-center gap-3 min-w-[250px]">
            <i class="material-icons-outlined p-2 hover:bg-gray-200 rounded-full cursor-pointer">menu</i>
            <img src="https://i.ibb.co/LzdS0mK/1000140751.png" class="w-9 h-9 rounded-lg" alt="SlowMail">
            <span class="text-[22px] text-[#5f6368] tracking-tight">SlowMail</span>
        </div>
        <div class="flex-1 max-w-3xl">
            <div class="relative">
                <i class="material-icons-outlined absolute left-4 top-3 text-gray-500">search</i>
                <input type="text" class="w-full bg-[#eaf1fb] focus:bg-white focus:shadow-md rounded-full py-3 pl-14 outline-none transition-all" placeholder="Поиск в почте">
            </div>
        </div>
        <div class="flex items-center gap-2 ml-4">
            <div class="w-10 h-10 bg-[#f29900] rounded-full flex items-center justify-center text-white font-bold border-2 border-white shadow-sm">S</div>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <aside class="w-64 pt-2 pr-4 flex flex-col gap-1">
            <button onclick="openCompose()" class="flex items-center gap-4 bg-[#c2e7ff] hover:shadow-lg py-5 px-6 rounded-2xl font-medium text-gray-800 mb-4 ml-2 transition-all active:scale-95">
                <i class="material-icons-outlined">edit</i> Написать
            </button>
            <div onclick="showTab('inbox')" id="tab-inbox" class="sidebar-item sidebar-active flex items-center gap-4 px-6 py-2.5 text-sm cursor-pointer">
                <i class="material-icons-outlined">inbox</i> Входящие <span class="ml-auto text-xs font-bold" id="count-inbox">2</span>
            </div>
            <div onclick="showTab('sent')" id="tab-sent" class="sidebar-item flex items-center gap-4 px-6 py-2.5 text-sm text-gray-600 cursor-pointer">
                <i class="material-icons-outlined">send</i> Отправленные
            </div>
            <div class="sidebar-item flex items-center gap-4 px-6 py-2.5 text-sm text-gray-600 cursor-pointer">
                <i class="material-icons-outlined">star_outline</i> Помеченные
            </div>
            <div onclick="showTab('trash')" id="tab-trash" class="sidebar-item flex items-center gap-4 px-6 py-2.5 text-sm text-gray-600 cursor-pointer">
                <i class="material-icons-outlined">delete_outline</i> Корзина
            </div>
        </aside>

        <main class="flex-1 bg-white my-2 mr-4 rounded-3xl shadow-sm border border-gray-100 flex flex-col overflow-hidden">
            <div class="flex items-center p-3 border-b border-gray-50 gap-6 text-gray-500"><input type="checkbox" class="ml-2 w-4 h-4 rounded">
                <i class="material-icons-outlined cursor-pointer hover:text-black transition" onclick="location.reload()">refresh</i>
                <i class="material-icons-outlined cursor-pointer hover:text-black transition">more_vert</i>
            </div>

            <div id="content-area" class="overflow-y-auto flex-1 divide-y divide-gray-50">
                </div>
        </main>
    </div>

    <div id="composeModal" class="hidden fixed bottom-0 right-16 w-[550px] bg-white modal-shadow rounded-t-xl z-[100] flex flex-col border">
        <div class="bg-[#f2f6fc] p-3 flex justify-between items-center rounded-t-xl">
            <span class="text-sm font-bold ml-2">Новое сообщение</span>
            <i onclick="closeCompose()" class="material-icons-outlined cursor-pointer text-gray-600 p-1 hover:bg-gray-200 rounded">close</i>
        </div>
        <div class="p-4 flex flex-col gap-2">
            <input id="mailTo" type="text" placeholder="Кому" class="border-b py-2 outline-none text-sm">
            <input id="mailSub" type="text" placeholder="Тема" class="border-b py-2 outline-none text-sm">
            <textarea id="mailMsg" rows="12" class="outline-none text-sm resize-none py-2" placeholder="Текст сообщения..."></textarea>
            <div class="flex justify-between items-center pt-4 border-t">
                <button onclick="handleSend()" class="bg-[#0b57d0] hover:bg-[#0842a0] text-white px-8 py-2.5 rounded-full font-bold shadow-md transition-all active:scale-95 text-sm">Отправить</button>
                <div class="flex gap-2 text-gray-400">
                    <i class="material-icons-outlined p-2 hover:bg-gray-100 rounded-full cursor-pointer">attach_file</i>
                    <i onclick="closeCompose()" class="material-icons-outlined p-2 hover:bg-red-50 hover:text-red-500 rounded-full cursor-pointer">delete</i>
                </div>
            </div>
        </div>
    </div>

    <script>
        // БАЗА ДАННЫХ (в памяти браузера)
        let mails = [
            { id: 1, from: 'SlowMail Support', sub: 'Добро пожаловать!', text: 'Ваша новая почта готова к работе. Попробуйте отправить письмо.', folder: 'inbox', time: '12:45' },
            { id: 2, from: 'BrawlStatic', sub: 'Новый баннер', text: 'Марк, зацени новый 3D баннер для группы.', folder: 'inbox', time: 'Вчера' }
        ];

        function renderMails(folder) {
            const area = document.getElementById('content-area');
            const filtered = mails.filter(m => m.folder === folder);
            area.innerHTML = filtered.length ? '' : '<div class="p-20 text-center text-gray-400 italic text-sm">Здесь пока пусто...</div>';
            
            filtered.forEach(m => {
                area.innerHTML += 
                    <div class="mail-content flex items-center px-4 py-2.5 border-b border-gray-50 transition-all">
                        <div class="flex items-center gap-3 mr-4">
                            <input type="checkbox">
                            <i class="material-icons-outlined text-gray-300">star_outline</i>
                        </div>
                        <div class="w-48 font-bold text-sm truncate">${m.from}</div>
                        <div class="flex-1 text-sm truncate pr-10">
                            <span class="font-bold text-gray-900">${m.sub}</span> — ${m.text}
                        </div>
                        <div class="text-xs font-bold text-gray-400">${m.time}</div>
                    </div>
                ;
            });
            document.getElementById('count-inbox').innerText = mails.filter(m => m.folder === 'inbox').length;
        }

        function showTab(tab) {
            ['tab-inbox', 'tab-sent', 'tab-trash'].forEach(id => {
                if (document.getElementById(id)) document.getElementById(id).classList.remove('sidebar-active');
            });
            document.getElementById('tab-' + tab).classList.add('sidebar-active');
            renderMails(tab);
        }function openCompose() { document.getElementById('composeModal').classList.remove('hidden'); }
        function closeCompose() { document.getElementById('composeModal').classList.add('hidden'); }

        function handleSend() {
            const to = document.getElementById('mailTo').value;
            const sub = document.getElementById('mailSub').value;
            const msg = document.getElementById('mailMsg').value;

            if(!to) return alert("Введите адрес получателя");

            mails.push({ id: Date.now(), from: to, sub: sub, text: msg, folder: 'sent', time: 'Сейчас' });
            closeCompose();
            alert("Письмо успешно отправлено!");
            renderMails('inbox');
            
            // Очистка формы
            document.getElementById('mailTo').value = '';
            document.getElementById('mailSub').value = '';
            document.getElementById('mailMsg').value = '';
        }

        // Старт
        renderMails('inbox');
    </script>
</body>
</html>
