<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KRAKEN | High-End Underground Casino</title>
    <style>
        :root {
            --neon-cyan: #00f2fe;
            --neon-purple: #7928ca;
            --gold: #f59e0b;
            --gold-glow: #fbbf24;
            --bg-dark: #02040a;
            --card-bg: rgba(10, 15, 30, 0.7);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            user-select: none; 
            -webkit-tap-highlight-color: transparent;
        }
        
        body { 
            background: var(--bg-dark); 
            color: #f8fafc; 
            min-height: 100vh; 
            padding: 15px; 
            background-image: 
                radial-gradient(circle at 50% -20%, rgba(0, 242, 254, 0.18) 0%, transparent 60%),
                radial-gradient(circle at 50% 110%, rgba(121, 40, 202, 0.15) 0%, transparent 60%);
            background-attachment: fixed;
            overflow-x: hidden;
        }

        /* Элитный Верхний Навибар */
        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 16px 24px; 
            background: rgba(4, 8, 16, 0.75); 
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px; 
            margin-bottom: 25px; 
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7);
        }

        .logo { 
            font-size: 24px; 
            font-weight: 900; 
            letter-spacing: 5px; 
            background: linear-gradient(135deg, var(--neon-cyan), #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase; 
            filter: drop-shadow(0 0 15px rgba(0, 242, 254, 0.4));
        }

        .balance-box { 
            background: linear-gradient(135deg, rgba(251, 191, 36, 0.05), rgba(217, 119, 6, 0.05)); 
            padding: 10px 22px; 
            border-radius: 40px; 
            font-weight: 800; 
            font-size: 18px;
            border: 1px solid rgba(251, 191, 36, 0.4); 
            color: var(--gold-glow); 
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.1);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Контейнер */
        .container { 
            display: flex; 
            flex-direction: column; 
            gap: 30px; 
            max-width: 440px; 
            margin: 0 auto; 
        }

        /* Карточки Нового Поколения */
        .card { 
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.04); 
            border-radius: 32px; 
            padding: 30px 24px; 
            text-align: center; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.05);
            position: relative;
        }

        .card-title { 
            font-size: 16px; 
            font-weight: 800; 
            margin-bottom: 25px; 
            color: #94a3b8; 
            text-transform: uppercase; 
            letter-spacing: 3px;
        }

        /* СЛОТЫ: Дорогой Механический Барабан */
        .slots-window {
            background: #010205;
            padding: 20px;
            border-radius: 24px;
            border: 1px solid rgba(0, 242, 254, 0.15);
            box-shadow: inset 0 10px 30px rgba(0,0,0,0.9), 0 0 30px rgba(0, 242, 254, 0.03);
            margin-bottom: 25px;
        }

        .slots-zone { 
            display: flex; 
            justify-content: center; 
            gap: 16px; 
        }

        .reel { 
            width: 85px; 
            height: 100px; 
            background: linear-gradient(180deg, #050914 0%, #0a1024 50%, #050914 100%); 
            border-radius: 16px; 
            font-size: 44px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border: 1px solid rgba(255,255,255,0.02);
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
        }

        /* Дофаминовое бешеное размытие */
        .blur-fast { animation: reelSpinFast 0.1s infinite linear; }
        .blur-medium { animation: reelSpinMedium 0.12s infinite linear; }
        .blur-slow { animation: reelSpinSlow 0.15s infinite linear; }

        @keyframes reelSpinFast { 0% { transform: translateY(-8px); filter: blur(6px); } 100% { transform: translateY(8px); filter: blur(6px); } }
        @keyframes reelSpinMedium { 0% { transform: translateY(-6px); filter: blur(5px); } 100% { transform: translateY(6px); filter: blur(5px); } }
        @keyframes reelSpinSlow { 0% { transform: translateY(-4px); filter: blur(4px); } 100% { transform: translateY(4px); filter: blur(4px); } }

        /* НАСТОЯЩИЕ 3D КУБИКИ */
        .dice-zone { 
            display: flex; 
            justify-content: center; 
            gap: 35px; 
            margin: 25px 0 35px 0; 
            perspective: 400px;
        }

        .dice { 
            width: 75px; 
            height: 75px; 
            background: linear-gradient(135deg, #111c30, #060b14); 
            border: 1px solid rgba(0, 242, 254, 0.25); 
            border-radius: 20px; 
            font-size: 36px; 
            font-weight: 900; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: var(--neon-cyan); 
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.6), 0 0 20px rgba(0, 242, 254, 0.05);
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .dice-rolling {
            animation: dice3D 0.6s infinite linear;
        }

        @keyframes dice3D {
            0% { transform: rotateX(0deg) rotateY(0deg) scale(1.1); filter: blur(1px); }
            50% { transform: rotateX(180deg) rotateY(90deg) scale(1.2); }
            100% { transform: rotateX(360deg) rotateY(360deg) scale(1.1); }
        }

        /* Поля Ставок */
        .bet-controller {
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.03);
            padding: 6px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .bet-btn {
            background: rgba(255,255,255,0.05);
            border: none;
            color: #94a3b8;
            width: 45px;
            height: 45px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .bet-btn:active { background: rgba(255,255,255,0.1); }

        input[type="number"] { 
            background: transparent;
            border: none;
            color: #fff; 
            font-size: 22px; 
            font-weight: 800; 
            text-align: center; 
            width: 50%;
            outline: none; 
        }
        /* Убираем стрелочки инпута */
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

        /* Кнопка Действия — Тяжелый Люкс */
        .action-btn { 
            width: 100%; 
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%); 
            border: none; 
            border-radius: 20px; 
            padding: 18px; 
            color: #010205; 
            font-size: 15px; 
            font-weight: 900; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            cursor: pointer; 
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.2);
            transition: all 0.2s;
        }

        .action-btn:active {
            transform: scale(0.96);
            filter: brightness(0.9);
        }

        .action-btn:disabled { 
            background: #101726; 
            color: #334155; 
            cursor: not-allowed; 
            box-shadow: none; 
        }

        /* Результаты и Дофаминовые Вспышки */
        .status-pane { 
            margin-top: 20px; 
            font-size: 15px; 
            min-height: 22px; 
            font-weight: 800; 
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* ЭКРАН ПОЛНОЙ ПОБЕДЫ (WIN SPLASH) */
        .win-splash {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(1, 2, 5, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .win-splash.active {
            opacity: 1;
            pointer-events: auto;
        }

        .splash-box {
            text-align: center;
            transform: scale(0.7);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .win-splash.active .splash-box {
            transform: scale(1);
        }

        .splash-title {
            font-size: 32px;
            font-weight: 900;
            color: var(--gold-glow);
            text-shadow: 0 0 30px var(--gold);
            margin-bottom: 10px;
            letter-spacing: 3px;
        }

        .splash-amount {
            font-size: 46px;
            font-weight: 900;
            color: #fff;
            margin-bottom: 25px;
        }

        .splash-close {
            background: #fff;
            color: #000;
            border: none;
            padding: 12px 35px;
            border-radius: 30px;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 13px;
        }

        /* Тряска экрана для куша */
        .shake-screen { animation: screenShake 0.4s ease-in-out; }
        @keyframes screenShake {
            0%, 100% { transform: translate(0, 0); }
            20% { transform: translate(-4px, 4px); }
            40% { transform: translate(4px, -4px); }
            60% { transform: translate(-4px, -4px); }
            80% { transform: translate(4px, 4px); }
        }

        .win-text { color: #10b981; text-shadow: 0 0 15px rgba(16, 185, 129, 0.4); }
        .lose-text { color: #ef4444; opacity: 0.7; }
    </style>
</head>
<body id="screen">

    <!-- ДОФАМИНОВЫЙ ЭКРАН ПОБЕДЫ -->
    <div class="win-splash" id="win-splash">
        <div class="splash-box">
            <div class="splash-title">💎 КУШ КРАКЕНА 💎</div>
            <div class="splash-amount" id="splash-money">+0 🪙</div>
            <button class="splash-close" onclick="closeSplash()">Забрать монеты</button>
        </div>
    </div>

    <header>
        <div class="logo">Kraken</div>
        <div class="balance-box" id="bal-box">🪙 <span id="balance">10000</span></div>
    </header>

    <div class="container">
        <!-- УЛЬТИМАТИВНЫЕ СЛОТЫ -->
        <div class="card">
            <div class="card-title">⚓ Модернизированный Слот</div>
            <div class="slots-window">
                <div class="slots-zone">
                    <div class="reel" id="s1">🔱</div>
                    <div class="reel" id="s2">🔱</div>
                    <div class="reel" id="s3">🔱</div>
                </div>
            </div>
            
            <div class="bet-controller">
                <button class="bet-btn" onclick="changeBet('slot-bet', -50)">-</button>
                <input type="number" id="slot-bet" value="100" readonly>
                <button class="bet-btn" onclick="changeBet('slot-bet', 50)">+</button>
            </div>

            <button class="action-btn" id="slot-btn" onclick="playPremiumSlots()">Испытать удачу</button>
            <div class="status-pane" id="slot-status"></div>
        </div>

        <!-- ЖИВЫЕ КУБИКИ -->
        <div class="card">
            <div class="card-title">🎲 Кости Бездны 7+</div>
            <div class="dice-zone">
                <div class="dice" id="d1">5</div>
                <div class="dice" id="d2">5</div>
            </div>

            <div class="bet-controller">
                <button class="bet-btn" onclick="changeBet('dice-bet', -50)">-</button>
                <input type="number" id="dice-bet" value="100" readonly>
                <button class="bet-btn" onclick="changeBet('dice-bet', 50)">+</button>
            </div>

            <button class="action-btn" id="dice-btn" onclick="playPremiumDice()">Бросить кости</button>
            <div class="status-pane" id="dice-status"></div>
        </div>
    </div>

    <script>
        let balance = parseInt(localStorage.getItem('kraken_pro_balance')) || 10000;
        const items = ['🐙', '💎', '🔱', '🪙', '🏴‍☠️'];

        function updateUI() {
            document.getElementById('balance').textContent = balance.toLocaleString();
            localStorage.setItem('kraken_pro_balance', balance);
        }
        updateUI();

        function changeBet(inputId, change) {
            const input = document.getElementById(inputId);
            let currentBet = parseInt(input.value);
            currentBet += change;
            if (currentBet < 50) currentBet = 50;
            if (currentBet > 5000) currentBet = 5000;
            input.value = currentBet;
        }

        function triggerSplash(amount) {
            document.getElementById('screen').classList.add('shake-screen');
            document.getElementById('splash-money').textContent = `+${amount.toLocaleString()} 🪙`;
            document.getElementById('win-splash').classList.add('active');
            setTimeout(() => {
                document.getElementById('screen').classList.remove('shake-screen');
            }, 400);
        }

        function closeSplash() {
            document.getElementById('win-splash').classList.remove('active');
            const box = document.getElementById('bal-box');
            box.style.transform = "scale(1.3)";
            setTimeout(() => box.style.transform = "scale(1)", 300);
        }

        // ЛОГИКА ДОФАМИНОВЫХ СЛОТОВ (С АНИМАЦИЕЙ ЗАДЕРЖКИ)
        function playPremiumSlots() {
            const betInput = document.getElementById('slot-bet');
            const bet = parseInt(betInput.value);
            
            if (bet > balance) { alert("Недостаточно золота!"); return; }
            balance -= bet; updateUI();

            const btn = document.getElementById('slot-btn');
            btn.disabled = true;
            document.getElementById('slot-status').innerHTML = "Вычисление комбинации...";

            const r1 = document.getElementById('s1');
            const r2 = document.getElementById('s2');
            const r3 = document.getElementById('s3');

            r1.classList.add('blur-fast');
            r2.classList.add('blur-medium');
            r3.classList.add('blur-slow');

            // Имитируем реальный просчет как на серверах дорогих казино
            const final1 = items[Math.floor(Math.random() * items.length)];
            const final2 = items[Math.floor(Math.random() * items.length)];
            const final3 = items[Math.floor(Math.random() * items.length)];

            // Рваная поочередная остановка барабанов (Эффект Напряжения)
            setTimeout(() => {
                r1.classList.remove('blur-fast');
                r1.textContent = final1;
            }, 700);

            setTimeout(() => {
                r2.classList.remove('blur-medium');
                r2.textContent = final2;
            }, 1400);

            // Третий барабан крутится дольше всего для создания интриги!
            setTimeout(() => {
                r3.classList.remove('blur-slow');
                r3.textContent = final3;

                const status = document.getElementById('slot-status');
                
                if (final1 === final2 && final2 === final3) {
                    let win = bet * 10;
                    balance += win; updateUI();
                    triggerSplash(win);
                    status.innerHTML = `<span class="win-text">Джекпот Тритона x10!</span>`;
                } else if (final1 === final2 || final2 === final3 || final1 === final3) {
                    let win = bet * 2.5;
                    balance += win; updateUI();
                    status.innerHTML = `<span class="win-text">Выигрыш x2.5! +${win} 🪙</span>`;
                } else {
                    status.innerHTML = `<span class="lose-text">Бездна забрала ставку</span>`;
                }
                btn.disabled = false;
            }, 2300);
        }

        // ЛОГИКА ПРЕМИУМ КУБИКОВ
        function playPremiumDice() {
            const bet = parseInt(document.getElementById('dice-bet').value);
            if (bet > balance) { alert("Недостаточно золота!"); return; }
            balance -= bet; updateUI();

            const btn = document.getElementById('dice-btn');
            const d1 = document.getElementById('d1');
            const d2 = document.getElementById('d2');

            btn.disabled = true;
            d1.classList.add('dice-rolling');
            d2.classList.add('dice-rolling');
            document.getElementById('dice-status').innerHTML = "Кубики испытывают судьбу...";

            setTimeout(() => {
                d1.classList.remove('dice-rolling');
                d2.classList.remove('dice-rolling');

                const n1 = Math.floor(Math.random() * 6) + 1;
                const n2 = Math.floor(Math.random() * 6) + 1;

                d1.textContent = n1;
                d2.textContent = n2;

                const sum = n1 + n2;
                const status = document.getElementById('dice-status');

                if (sum >= 7) {
                    let win = Math.floor(bet * 2);
                    balance += win; updateUI();
                    if (sum === 12) {
                        triggerSplash(win); // Максимальный дофамин при дубле шестерок
                    }
                    status.innerHTML = `<span class="win-text">Победа! Очки: ${sum} (Планка 7+)</span>`;
                } else {
                    status.innerHTML = `<span class="lose-text">Поражение. Выпало: ${sum}</span>`;
                }
                btn.disabled = false;
            }, 900);
        }
    </script>
</body>
</html>
