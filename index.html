<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Lum Crypto Drop Game</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800;900&family=Rajdhani:wght@500;600;700&display=swap');

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }

        body {
            background: #040209;
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        /* КИБЕР-ГРАДИЕНТЫ НА ФОНЕ */
        .bg-glow-1, .bg-glow-2 {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.25;
            z-index: 0;
            pointer-events: none;
            animation: pulseGlow 8s ease-in-out infinite alternate;
        }
        .bg-glow-1 { background: #00ffcc; top: -50px; left: -50px; }
        .bg-glow-2 { background: #9900ff; bottom: 50px; right: -50px; animation-delay: -4s; }

        @keyframes pulseGlow {
            0% { transform: scale(1) translate(0, 0); opacity: 0.2; }
            100% { transform: scale(1.3) translate(30px, 20px); opacity: 0.35; }
        }

        /* ЭКРАН ХАБА / МЕНЮ С ЭФФЕКТОМ ДОРОГОГО СТЕКЛА */
        #menu-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 40px 24px 30px 24px;
            z-index: 10;
            overflow-y: auto;
        }

        #game-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 16px 20px;
            z-index: 10;
            pointer-events: none;
        }

        .brand-section {
            text-align: center;
            width: 100%;
            z-index: 2;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 4.2rem;
            font-weight: 900;
            color: #00ffcc;
            text-shadow: 0 0 25px rgba(0, 255, 204, 0.5);
            letter-spacing: 12px;
            margin-bottom: 15px;
            text-indent: 12px;
        }

        /* ДИЗАЙН БАЛАНСА С МЯГКИМ СТЕКЛЯННЫМ БЛИКОМ */
        .crypto-balance {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.01));
            border: 1px solid rgba(0, 255, 204, 0.25);
            padding: 20px 20px;
            border-radius: 24px;
            text-align: center;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.75), inset 0 1px 1px rgba(255,255,255,0.1);
            width: 100%;
            max-width: 350px;
            margin: 0 auto;
        }

        .crypto-balance p {
            font-size: 0.8rem;
            color: #7b70a2;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 4px;
        }

        .crypto-balance .amount {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            font-weight: 900;
            color: #fff;
        }

        .crypto-balance .amount span {
            color: #00ffcc;
            text-shadow: 0 0 20px rgba(0, 255, 204, 0.6);
        }

        /* КРИПТО ФАРМИНГ */
        .farming-container {
            width: 100%;
            max-width: 350px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.01));
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 12px;
            backdrop-filter: blur(10px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.4), inset 0 1px 0px rgba(255,255,255,0.05);
        }

        .farming-info p {
            font-size: 0.75rem;
            color: #6c5f93;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .farming-info .farm-amount {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            font-weight: 800;
            color: #00b3ff;
        }

        .claim-btn {
            font-family: 'Orbitron', sans-serif;
            background: rgba(0, 255, 204, 0.1);
            border: 1px solid rgba(0, 255, 204, 0.3);
            color: #00ffcc;
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 800;
            cursor: pointer;
            transition: background 0.2s;
        }
        .claim-btn:active { background: rgba(0, 255, 204, 0.25); }

        /* БЛОК СТАТИСТИКИ И КНОПОК */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
            max-width: 350px;
            margin-top: 12px;
        }

        .stat-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.005));
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 18px;
            padding: 12px 14px;
            text-align: left;
            cursor: pointer;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3), inset 0 1px 0px rgba(255,255,255,0.05);
            transition: background 0.2s;
        }
        .stat-card:active { background: rgba(255,255,255,0.07); }
        .stat-card .label { font-size: 0.75rem; color: #6c5f93; text-transform: uppercase; }

        .stat-card .val {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: #fff;
            margin-top: 2px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .ticket-timer { font-size: 0.65rem; color: #ff3366; font-weight: 500; }
        .game-status-text { color: #ff3366; font-size: 1rem; font-weight: 700; min-height: 45px; text-align: center; margin-top: 15px; line-height: 1.4; }

        /* ГЛАВНАЯ КНОПКА */
        .btn-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 2;
        }

        .btn {
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(135deg, #00ffcc, #00b3ff);
            color: #040209;
            border: none;
            padding: 18px;
            font-size: 1.3rem;
            font-weight: 900;
            border-radius: 22px;
            cursor: pointer;
            box-shadow: 0 12px 35px rgba(0, 255, 204, 0.3);
            transition: all 0.2s ease;
            width: 100%;
            max-width: 350px;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
        }
        .btn:active:not(:disabled) { transform: scale(0.98); box-shadow: 0 6px 20px rgba(0, 255, 204, 0.2); }
        .btn:disabled { background: #1e1b24; color: #4e485d; box-shadow: none; cursor: not-allowed; }
        .btn .sub-timeout { display: block; font-size: 0.7rem; color: #ff3366; margin-top: 2px; }

        /* ВОЗДУШНЫЙ ПАРЯЩИЙ HUD */
        .hud {
            display: flex;
            width: 100%;
            max-width: 450px;
            justify-content: space-between;
            align-items: center;
            z-index: 12;
            pointer-events: auto;
            background: transparent;
        }

        .hud-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.005));
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 8px 16px;
            border-radius: 16px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            min-width: 115px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.45), inset 0 1px 0px rgba(255,255,255,0.08);
            position: relative;
        }

        .hud-box {
            font-size: 0.7rem;
            color: #7b70a2;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 700;
            text-align: center;
        }

        .hud-box div {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3rem;
            font-weight: 900;
            color: #fff;
            margin-top: 1px;
        }
        #score { color: #00ffcc; text-shadow: 0 0 10px rgba(0,255,204,0.2); }
        #timer { color: #ff3366; text-shadow: 0 0 10px rgba(255,51,102,0.2); }

        /* ИНДИКАТОР КОМБО */
        .combo-badge {
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%) scale(0.8);
            background: linear-gradient(135deg, #ff9900, #ff5500);
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.65rem;
            font-weight: 900;
            padding: 2px 8px;
            border-radius: 8px;
            box-shadow: 0 4px 12px rgba(255, 85, 0, 0.5);
            opacity: 0;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            white-space: nowrap;
        }
        .combo-badge.active { opacity: 1; transform: translateX(-50%) scale(1); }

        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; display: block; }

        /* ОВЕРЛЕИ / ОКНА МОДАЛОК */
        .overlay-modal {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(4, 2, 9, 0.95);
            z-index: 100;
            display: none;
            flex-direction: column;
            padding: 40px 24px;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 350px;
            margin: 0 auto 24px auto;
        }

        .modal-title { font-family: 'Orbitron', sans-serif; font-size: 1.8rem; color: #00ffcc; font-weight: 900; }

        .close-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            width: 36px; height: 36px;
            border-radius: 50%;
            font-weight: bold;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }

        .modal-content-list { width: 100%; max-width: 350px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; }
        .item-row { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; padding: 16px; display: flex; justify-content: space-between; align-items: center; }
        .item-info .item-name { font-weight: 700; font-size: 1rem; color: #fff; }
        .item-info .item-sub { font-size: 0.75rem; color: #6c5f93; margin-top: 2px; }

        .action-btn {
            font-family: 'Orbitron', sans-serif;
            background: #00ffcc;
            color: #040209;
            border: none;
            padding: 8px 14px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 800;
            cursor: pointer;
        }
        .action-btn:disabled { background: rgba(255,255,255,0.05); color: #554e68; cursor: not-allowed; }

        .shake { animation: shakeScreen 0.4s both; }
        @keyframes shakeScreen {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            30%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
    </style>
</head>
<body id="body">

    <div id="glow1" class="bg-glow-1"></div>
    <div id="glow2" class="bg-glow-2"></div>

    <canvas id="gameCanvas"></canvas>

    <div id="menu-screen">
        <div class="brand-section">
            <h1>LUM</h1>
            
            <div class="crypto-balance">
                <p>Баланс токенов</p>
                <div class="amount"><span id="total-balance">0.00</span> $LUM</div>
            </div>

            <div class="farming-container">
                <div class="farming-info">
                    <p>Пассивный фарминг</p>
                    <div class="farm-amount" id="farm-display">0.0000</div>
                </div>
                <button class="claim-btn" onclick="claimFarming()">CLAIM</button>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="label">Билеты</div>
                    <div class="val">
                        <span id="tickets-count">⚡ 7/7</span>
                        <span id="tickets-timer-container" class="ticket-timer"></span>
                    </div>
                </div>
                <div class="stat-card" onclick="openModal('quests-modal')">
                    <div class="label">Квесты</div>
                    <div class="val" style="color: #00ffcc;" id="quests-stat-label">Квесты →</div>
                </div>
            </div>

            <div class="stats-grid" style="margin-top: 8px;">
                <div class="stat-card" onclick="openModal('shop-modal')" style="grid-column: span 2; text-align: center;">
                    <div class="label">Магазин улучшений</div>
                    <div class="val" style="color: #00b3ff; justify-content: center; gap: 6px;">🛒 ПРОКАЧКА ХАБА</div>
                </div>
            </div>

            <div id="last-score" class="game-status-text"></div>
        </div>

        <div class="btn-wrapper">
            <button class="btn" id="play-btn" onclick="tryStartGame()">ИГРАТЬ</button>
        </div>
    </div>

    <div id="quests-modal" class="overlay-modal">
        <div class="modal-header">
            <div class="modal-title">КВЕСТЫ</div>
            <button class="close-btn" onclick="closeModal('quests-modal')">✕</button>
        </div>
        <div class="modal-content-list" id="quests-list"></div>
    </div>

    <div id="shop-modal" class="overlay-modal">
        <div class="modal-header">
            <div class="modal-title">МАГАЗИН</div>
            <button class="close-btn" onclick="closeModal('shop-modal')">✕</button>
        </div>
        <div class="modal-content-list">
            <div class="item-row">
                <div class="item-info">
                    <div class="item-name">Множитель клика</div>
                    <div class="item-sub" id="upgrade-click-desc">Ур. 1 (+0% к сбору кристаллов)</div>
                </div>
                <button class="action-btn" id="buy-click-btn" onclick="buyUpgrade('click')">0 $LUM</button>
            </div>
            <div class="item-row">
                <div class="item-info">
                    <div class="item-name">Скорость фарминга</div>
                    <div class="item-sub" id="upgrade-farm-desc">Ур. 1 (Базовая скорость)</div>
                </div>
                <button class="action-btn" id="buy-farm-btn" onclick="buyUpgrade('farm')">0 $LUM</button>
            </div>
        </div>
    </div>

    <div id="game-screen">
        <div class="hud">
            <div class="hud-card">
                <div class="hud-box">Токены<div><span id="score">0</span></div></div>
                <div class="combo-badge" id="combo-badge">COMBO x1</div>
            </div>
            <div class="hud-card">
                <div class="hud-box">Время<div><span id="timer">30</span>с</div></div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const body = document.getElementById('body');
        const menuScreen = document.getElementById('menu-screen');
        const gameScreen = document.getElementById('game-screen');
        const scoreDisplay = document.getElementById('score');
        const timerDisplay = document.getElementById('timer');
        const comboBadge = document.getElementById('combo-badge');
        const totalBalanceDisplay = document.getElementById('total-balance');
        const lastScoreDisplay = document.getElementById('last-score');
        const glow1 = document.getElementById('glow1');
        const glow2 = document.getElementById('glow2');
        const farmDisplay = document.getElementById('farm-display');
        const ticketsCount = document.getElementById('tickets-count');
        const ticketsTimerContainer = document.getElementById('tickets-timer-container');
        const playBtn = document.getElementById('play-btn');

        let cryptoBalance = parseFloat(localStorage.getItem('lum_balance')) || 0;
        let clickLevel = parseInt(localStorage.getItem('lum_shop_click_lvl')) || 1;
        let farmLevel = parseInt(localStorage.getItem('lum_shop_farm_lvl')) || 1;

        function updateBalanceDisplay() { totalBalanceDisplay.textContent = cryptoBalance.toFixed(2); }
        updateBalanceDisplay();

        let activeFarmAccum = parseFloat(localStorage.getItem('lum_farm_accum')) || 0;
        setInterval(() => {
            if (!gameActive) {
                let farmMultiplier = 1 + (farmLevel - 1) * 0.5;
                activeFarmAccum += 0.0003 * farmMultiplier;
                farmDisplay.textContent = activeFarmAccum.toFixed(4);
                localStorage.setItem('lum_farm_accum', activeFarmAccum);
            }
        }, 1000);

        function claimFarming() {
            if (activeFarmAccum <= 0) return;
            cryptoBalance += activeFarmAccum;
            checkQuestProgress('farm_goal', cryptoBalance);
            activeFarmAccum = 0;
            localStorage.setItem('lum_balance', cryptoBalance.toFixed(2));
            localStorage.setItem('lum_farm_accum', activeFarmAccum);
            updateBalanceDisplay();
            farmDisplay.textContent = "0.0000";
        }

        let questsData = JSON.parse(localStorage.getItem('lum_quests_state')) || [
            { id: 'tg_join', type: 'click', name: 'Вступить в Telegram-канал', reward: 15, done: false, claimed: false, link: 'https://t.me/#' },
            { id: 'x_follow', type: 'click', name: 'Подписаться на Twitter / X', reward: 10, done: false, claimed: false, link: 'https://x.com/#' },
            { id: 'farm_goal', type: 'progress', name: 'Накопить баланс 100 $LUM', reward: 50, target: 100, done: false, claimed: false }
        ];

        function renderQuests() {
            const list = document.getElementById('quests-list');
            list.innerHTML = '';
            let completedCount = 0;

            questsData.forEach((q, idx) => {
                if (q.claimed) completedCount++;
                let row = document.createElement('div');
                row.className = 'item-row';
                let subtext = q.type === 'click' ? `Награда: +${q.reward} $LUM` : `Прогресс: ${cryptoBalance.toFixed(1)} / ${q.target} $LUM`;
                
                let btnHtml = '';
                if (!q.done) {
                    btnHtml = q.type === 'click' ? `<button class="action-btn" style="background:#00b3ff;" onclick="doQuestClick(${idx})">ВЫПОЛНИТЬ</button>` : `<button class="action-btn" disabled>В ПРОЦЕССЕ</button>`;
                } else if (q.done && !q.claimed) {
                    btnHtml = `<button class="action-btn" style="background:#00ffcc;" onclick="claimQuestReward(${idx})">CLAIM</button>`;
                } else {
                    btnHtml = `<button class="action-btn" disabled style="background:rgba(255,255,255,0.05); color:#554e68;">ГОТОВО</button>`;
                }

                row.innerHTML = `<div class="item-info"><div class="item-name">${q.name}</div><div class="item-sub">${subtext}</div></div>${btnHtml}`;
                list.appendChild(row);
            });
            document.getElementById('quests-stat-label').textContent = `Выполнено: ${completedCount}/${questsData.length}`;
        }

        function doQuestClick(idx) {
            let q = questsData[idx];
            if (q.link) window.open(q.link, '_blank');
            q.done = true;
            localStorage.setItem('lum_quests_state', JSON.stringify(questsData));
            renderQuests();
        }

        function claimQuestReward(idx) {
            let q = questsData[idx];
            if (q.done && !q.claimed) {
                q.claimed = true;
                cryptoBalance += q.reward;
                localStorage.setItem('lum_balance', cryptoBalance.toFixed(2));
                localStorage.setItem('lum_quests_state', JSON.stringify(questsData));
                updateBalanceDisplay();
                renderQuests();
            }
        }

        function checkQuestProgress(id, currentVal) {
            let q = questsData.find(quest => quest.id === id);
            if (q && !q.done && currentVal >= q.target) {
                q.done = true;
                localStorage.setItem('lum_quests_state', JSON.stringify(questsData));
            }
        }

        function openModal(id) {
            if (id === 'quests-modal') renderQuests();
            if (id === 'shop-modal') updateShopUI();
            document.getElementById(id).style.display = 'flex';
        }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function updateShopUI() {
            let clickCost = clickLevel * 25;
            let farmCost = farmLevel * 30;

            document.getElementById('upgrade-click-desc').textContent = `Ур. ${clickLevel} (+${(clickLevel-1)*20}% к ценности кристаллов)`;
            let clickBtn = document.getElementById('buy-click-btn');
            clickBtn.textContent = `${clickCost} $LUM`;
            clickBtn.disabled = cryptoBalance < clickCost;

            document.getElementById('upgrade-farm-desc').textContent = `Ур. ${farmLevel} (+${(farmLevel-1)*50}% к скорости фарминга)`;
            let farmBtn = document.getElementById('buy-farm-btn');
            farmBtn.textContent = `${farmCost} $LUM`;
            farmBtn.disabled = cryptoBalance < farmCost;
        }

        function buyUpgrade(type) {
            if (type === 'click') {
                let cost = clickLevel * 25;
                if (cryptoBalance >= cost) { cryptoBalance -= cost; clickLevel++; localStorage.setItem('lum_shop_click_lvl', clickLevel); }
            } else if (type === 'farm') {
                let cost = farmLevel * 30;
                if (cryptoBalance >= cost) { cryptoBalance -= cost; farmLevel++; localStorage.setItem('lum_shop_farm_lvl', farmLevel); }
            }
            localStorage.setItem('lum_balance', cryptoBalance.toFixed(2));
            updateBalanceDisplay();
            updateShopUI();
        }

        const MAX_TICKETS = 7;
        const REGEN_TIME = 3 * 60 * 1000; 
        let tickets = parseInt(localStorage.getItem('lum_tickets'));
        if (isNaN(tickets)) tickets = MAX_TICKETS;
        let lastRegenTime = parseInt(localStorage.getItem('lum_last_regen_time')) || Date.now();

        function updateTicketsSystem() {
            let now = Date.now();
            if (tickets < MAX_TICKETS) {
                let elapsed = now - lastRegenTime;
                if (elapsed >= REGEN_TIME) {
                    let generated = Math.floor(elapsed / REGEN_TIME);
                    tickets = Math.min(MAX_TICKETS, tickets + generated);
                    lastRegenTime = lastRegenTime + (generated * REGEN_TIME);
                    localStorage.setItem('lum_tickets', tickets);
                    localStorage.setItem('lum_last_regen_time', lastRegenTime);
                }
            } else { lastRegenTime = now; localStorage.setItem('lum_last_regen_time', lastRegenTime); }

            ticketsCount.textContent = `⚡ ${tickets}/${MAX_TICKETS}`;
            let nextTicketIn = REGEN_TIME - (now - lastRegenTime);
            let mins = Math.floor(nextTicketIn / 60000);
            let secs = Math.floor((nextTicketIn % 60000) / 1000);
            let formatSecs = secs < 10 ? '0' + secs : secs;

            ticketsTimerContainer.textContent = tickets < MAX_TICKETS ? `(${mins}:${formatSecs})` : "";

            if (gameActive) return;
            if (tickets > 0) {
                playBtn.disabled = false; playBtn.innerHTML = "ИГРАТЬ";
            } else {
                playBtn.disabled = true; playBtn.innerHTML = `НЕТ БИЛЕТОВ <span class="sub-timeout">+1 ТИКЕТ ЧЕРЕЗ ${mins}:${formatSecs}</span>`;
            }
        }
        setInterval(updateTicketsSystem, 500);

        function tryStartGame() {
            if (tickets > 0) {
                tickets--;
                if (tickets < MAX_TICKETS && tickets === MAX_TICKETS - 1) lastRegenTime = Date.now(); 
                localStorage.setItem('lum_tickets', tickets);
                localStorage.setItem('lum_last_regen_time', lastRegenTime);
                updateTicketsSystem();
                startGame();
            }
        }

        // ИГРОВОЙ ДВИЖОК
        let score = 0, timeLeft = 30, gameActive = false, isFrozen = false, freezeAlpha = 0, snowParticles = [], isStunned = false, lastTime = 0, spawnTimer = 0, secondTimer = 0;
        let isEndingStage = false, endStageAlpha = 0, timeScale = 1.0; 
        let items = [], particles = [], stars = [], floatingTexts = [], visualTapWaves = [];
        
        let comboStreak = 0;
        let comboMultiplier = 1;

        const SPAWN_RATE = 330;
        const TYPES = {
            CRYSTAL: { id: 'crystal', color: '#00ffcc', points: 10, chance: 0.70 },
            GOLD: { id: 'gold', color: '#ffcc00', points: 30, chance: 0.08 }, 
            TIME: { id: 'time', color: '#ff33cc', points: 0, chance: 0.05 },    
            BOMB: { id: 'bomb', color: '#ff3366', points: -50, chance: 0.14 },
            FREEZE: { id: 'freeze', color: '#00b3ff', points: 5, chance: 0.03 } 
        };

        function resizeCanvas() {
            canvas.width = window.innerWidth * window.devicePixelRatio;
            canvas.height = window.innerHeight * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function initStars() {
            stars = [];
            for(let i=0; i<60; i++) {
                let layerRand = Math.random();
                let size, speed, opacity;
                
                if (layerRand < 0.6) { 
                    size = Math.random() * 0.7 + 0.3; speed = Math.random() * 0.1 + 0.05; opacity = Math.random() * 0.3 + 0.2;
                } else if (layerRand < 0.9) { 
                    size = Math.random() * 1.0 + 0.7; speed = Math.random() * 0.2 + 0.15; opacity = Math.random() * 0.4 + 0.4;
                } else { 
                    size = Math.random() * 1.5 + 1.2; speed = Math.random() * 0.4 + 0.35; opacity = Math.random() * 0.3 + 0.6;
                }

                stars.push({ x: Math.random() * window.innerWidth, y: Math.random() * window.innerHeight, size: size, speed: speed, opacity: opacity });
            }
        }
        initStars();

        function initSnow() {
            snowParticles = [];
            for(let i=0; i<25; i++) {
                snowParticles.push({ x: Math.random() * window.innerWidth, y: Math.random() * window.innerHeight - window.innerHeight, size: Math.random() * 2 + 1, speedY: Math.random() * 1 + 0.5, speedX: Math.random() * 0.4 - 0.2, drift: Math.random() * 0.02 });
            }
        }

        function startGame() {
            score = 0; timeLeft = 30; isFrozen = false; freezeAlpha = 0; isStunned = false; isEndingStage = false; endStageAlpha = 0; timeScale = 1.0;
            comboStreak = 0; comboMultiplier = 1;
            items = []; particles = []; floatingTexts = []; snowParticles = []; visualTapWaves = [];
            scoreDisplay.textContent = score; timerDisplay.textContent = timeLeft;
            
            comboBadge.textContent = "COMBO x1";
            comboBadge.classList.remove('active');

            menuScreen.style.display = 'none'; glow1.style.display = 'none'; glow2.style.display = 'none';
            gameScreen.style.display = 'flex';
            gameActive = true; lastTime = performance.now();
            requestAnimationFrame(gameLoop);
        }

        function drawTrail(item, ctx, drawFunc) {
            if (!item.history) item.history = [];
            if (!isFrozen && gameActive) {
                item.history.push({ x: item.currentX, y: item.y, angle: item.angle });
                if (item.history.length > 5) item.history.shift();
            }
            
            ctx.save();
            for (let i = 0; i < item.history.length - 1; i++) {
                let pos = item.history[i];
                let alpha = (i + 1) / item.history.length * 0.18; 
                ctx.globalAlpha = alpha;
                drawFunc(ctx, pos.x, pos.y, item.size, pos.angle, true);
            }
            ctx.restore();
            drawFunc(ctx, item.currentX, item.y, item.size, item.angle, false);
        }

        function drawCrystal(ctx, x, y, size, angle, isTrail=false) {
            ctx.save(); ctx.translate(x, y); ctx.rotate(angle); 
            ctx.shadowBlur = isTrail ? 4 : 12; ctx.shadowColor = '#00ffcc'; 
            ctx.strokeStyle = '#00ffcc'; ctx.lineWidth = 2.5; ctx.fillStyle = 'rgba(0, 255, 204, 0.15)';
            ctx.beginPath(); ctx.moveTo(0, -size); ctx.lineTo(size * 0.7, -size * 0.2); ctx.lineTo(size * 0.5, size * 0.8); ctx.lineTo(0, size); ctx.lineTo(-size * 0.5, size * 0.8); ctx.lineTo(-size * 0.7, -size * 0.2); ctx.closePath(); ctx.fill(); ctx.stroke(); ctx.restore();
        }

        function drawGoldCrystal(ctx, x, y, size, angle, isTrail=false) {
            ctx.save(); ctx.translate(x, y); ctx.rotate(angle); 
            ctx.shadowBlur = isTrail ? 6 : 18; ctx.shadowColor = '#ffcc00'; 
            ctx.strokeStyle = '#ffcc00'; ctx.lineWidth = 3; ctx.fillStyle = 'rgba(255, 204, 0, 0.25)';
            ctx.beginPath(); ctx.moveTo(0, -size * 1.1); ctx.lineTo(size * 0.8, -size * 0.2); ctx.lineTo(size * 0.5, size * 0.9); ctx.lineTo(0, size * 1.1); ctx.lineTo(-size * 0.5, size * 0.9); ctx.lineTo(-size * 0.8, -size * 0.2); ctx.closePath(); ctx.fill(); ctx.stroke(); ctx.restore();
        }

        function drawTimeCrystal(ctx, x, y, size, angle, isTrail=false) {
            ctx.save(); ctx.translate(x, y); ctx.rotate(angle); 
            ctx.shadowBlur = isTrail ? 5 : 14; ctx.shadowColor = '#ff33cc'; 
            ctx.strokeStyle = '#ff33cc'; ctx.lineWidth = 2.5; ctx.fillStyle = 'rgba(255, 51, 204, 0.2)';
            ctx.beginPath(); ctx.moveTo(0, -size); ctx.lineTo(size * 0.6, -size * 0.6); ctx.lineTo(size, 0); ctx.lineTo(size * 0.6, size * 0.6); ctx.lineTo(0, size); ctx.lineTo(-size * 0.6, size * 0.6); ctx.lineTo(-size, 0); ctx.lineTo(-size * 0.6, -size * 0.6); ctx.closePath(); ctx.fill(); ctx.stroke(); ctx.restore();
        }

        function drawBomb(ctx, x, y, size, angle, isTrail=false) {
            let pulse = Math.sin(performance.now() * 0.01);
            ctx.save(); ctx.translate(x, y); 
            ctx.shadowBlur = isTrail ? 4 : (12 + pulse * 8); ctx.shadowColor = '#ff3366'; 
            ctx.fillStyle = '#1a0510'; ctx.strokeStyle = '#ff3366'; ctx.lineWidth = 2.5;
            ctx.beginPath(); ctx.arc(0, 0, size * 0.8, 0, Math.PI * 2); ctx.fill(); ctx.stroke(); 
            ctx.fillStyle = `rgba(255, 51, 102, ${0.4 + pulse * 0.6})`; ctx.beginPath(); ctx.arc(0, 0, size * 0.35, 0, Math.PI * 2); ctx.fill(); ctx.restore();
        }

        function drawFreeze(ctx, x, y, size, angle, isTrail=false) {
            ctx.save(); ctx.translate(x, y); ctx.rotate(angle); 
            ctx.shadowBlur = isTrail ? 4 : 12; ctx.shadowColor = '#00b3ff'; 
            ctx.strokeStyle = '#00b3ff'; ctx.lineWidth = 2; ctx.fillStyle = 'rgba(0, 179, 255, 0.15)';
            ctx.beginPath(); for (let i = 0; i < 6; i++) { ctx.lineTo(size * Math.cos(i * Math.PI / 3), size * Math.sin(i * Math.PI / 3)); } ctx.closePath(); ctx.fill(); ctx.stroke(); ctx.restore();
        }

        function gameLoop(time) {
            if (!gameActive) return;
            let dt = time - lastTime; lastTime = time;
            ctx.fillStyle = '#030108'; ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

            stars.forEach(star => {
                if (!isFrozen) star.y += star.speed * timeScale;
                if (star.y > window.innerHeight) star.y = -5;
                ctx.save();
                ctx.fillStyle = `rgba(255, 255, 255, ${star.opacity})`;
                ctx.fillRect(star.x, star.y, star.size, star.size);
                ctx.restore();
            });

            if (!isFrozen && !isEndingStage) {
                spawnTimer += dt;
                if (spawnTimer >= SPAWN_RATE) { spawnItem(); spawnTimer = 0; }
                secondTimer += dt;
                if (secondTimer >= 1000) { timeLeft--; timerDisplay.textContent = timeLeft; secondTimer = 0; if (timeLeft <= 0) triggerEndStage(); }
            }

            if (isEndingStage) {
                if (timeScale > 0.05) timeScale -= 0.02; 
                if (endStageAlpha < 1) endStageAlpha += 0.02; 
                if (endStageAlpha >= 1) { executeEndGame(); return; }
            }

            // РЕНДЕР ПРЕДМЕТОВ С ФИЗИКОЙ ВЕТРА (СИНУСОИДАЛЬНОЕ СМЕЩЕНИЕ)
            for (let i = items.length - 1; i >= 0; i--) {
                let item = items[i];
                if (!isFrozen) { 
                    item.y += item.speed * timeScale; 
                    item.angle += item.rotSpeed * timeScale;
                    
                    // Вычисляем смещение влево/вправо по формуле синуса от текущей высоты Y
                    item.currentX = item.baseX + Math.sin(item.y * item.swingSpeed) * item.swingRange;
                }
                if (item.y > window.innerHeight + 50) { items.splice(i, 1); continue; }
                
                if (item.type === 'crystal') drawTrail(item, ctx, drawCrystal);
                else if (item.type === 'gold') drawTrail(item, ctx, drawGoldCrystal);
                else if (item.type === 'time') drawTrail(item, ctx, drawTimeCrystal);
                else if (item.type === 'bomb') drawTrail(item, ctx, drawBomb);
                else if (item.type === 'freeze') drawTrail(item, ctx, drawFreeze);
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i]; 
                p.x += p.vx * timeScale; p.y += p.vy * timeScale; 
                p.vy += 0.08 * timeScale; p.alpha -= 0.025;
                if (p.alpha <= 0) { particles.splice(i, 1); continue; }
                
                ctx.save(); 
                ctx.globalAlpha = p.alpha; 
                ctx.strokeStyle = p.color;
                ctx.lineWidth = p.size;
                ctx.beginPath();
                ctx.moveTo(p.x, p.y);
                ctx.lineTo(p.x - p.vx * 2, p.y - p.vy * 2);
                ctx.stroke(); 
                ctx.restore();
            }

            for (let i = visualTapWaves.length - 1; i >= 0; i--) {
                let w = visualTapWaves[i]; w.r += 3; w.alpha -= 0.04;
                if (w.alpha <= 0) { visualTapWaves.splice(i, 1); continue; }
                ctx.save(); ctx.globalAlpha = w.alpha; ctx.strokeStyle = w.color; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(w.x, w.y, w.r, 0, Math.PI*2); ctx.stroke(); ctx.restore();
            }

            for (let i = floatingTexts.length - 1; i >= 0; i--) {
                let t = floatingTexts[i]; t.y -= 1; t.alpha -= 0.02;
                if (t.alpha <= 0) { floatingTexts.splice(i, 1); continue; }
                ctx.save(); ctx.globalAlpha = t.alpha; ctx.fillStyle = t.color; ctx.font = "900 1.1rem 'Orbitron', sans-serif"; ctx.textAlign = 'center';
                ctx.fillText(t.text, t.x, t.y); ctx.restore();
            }

            if (isFrozen && freezeAlpha < 1) freezeAlpha += 0.05;
            else if (!isFrozen && freezeAlpha > 0) freezeAlpha -= 0.05;
            if (freezeAlpha > 0.01) { ctx.fillStyle = `rgba(0, 140, 255, ${freezeAlpha * 0.06})`; ctx.fillRect(0, 0, window.innerWidth, window.innerHeight); }

            if (endStageAlpha > 0.01) {
                ctx.save(); ctx.fillStyle = `rgba(4, 2, 9, ${endStageAlpha * 0.95})`; ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
                ctx.font = "900 2.5rem 'Orbitron', sans-serif"; ctx.fillStyle = '#ff3366'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText("TIME OVER", window.innerWidth / 2, window.innerHeight / 2); ctx.restore();
            }

            requestAnimationFrame(gameLoop);
        }

        function spawnItem() {
            let rand = Math.random();
            let type = 'crystal';

            if (rand < TYPES.FREEZE.chance) type = 'freeze';
            else if (rand < TYPES.FREEZE.chance + TYPES.TIME.chance) type = 'time';
            else if (rand < TYPES.FREEZE.chance + TYPES.TIME.chance + TYPES.GOLD.chance) type = 'gold';
            else if (rand < TYPES.FREEZE.chance + TYPES.TIME.chance + TYPES.GOLD.chance + TYPES.BOMB.chance) type = 'bomb';

            let startX = Math.random() * (window.innerWidth - 80) + 40;

            items.push({
                baseX: startX,          // Опорная линия падения
                currentX: startX,       // Реальная позиция с учетом ветра
                y: -30, 
                size: 24,
                speed: (type === 'gold' ? Math.random() * 2 + 3.5 : Math.random() * 2 + 2.5), 
                angle: Math.random() * Math.PI,
                rotSpeed: Math.random() * 0.04 - 0.02,
                type: type,
                history: [],
                // Уникальные параметры покачивания для каждого кристалла
                swingSpeed: Math.random() * 0.01 + 0.008, 
                swingRange: Math.random() * 15 + 10        // Амплитуда отклонения от 10 до 25 пикселей
            });
        }

        function updateCombo(isHit) {
            if (isHit) {
                comboStreak++;
                if (comboStreak >= 15) comboMultiplier = 5;
                else if (comboStreak >= 10) comboMultiplier = 3;
                else if (comboStreak >= 5) comboMultiplier = 2;
                else comboMultiplier = 1;

                if (comboMultiplier > 1) {
                    comboBadge.textContent = `COMBO x${comboMultiplier}`;
                    comboBadge.classList.add('active');
                }
            } else {
                comboStreak = 0;
                comboMultiplier = 1;
                comboBadge.classList.remove('active');
            }
        }

        function checkHit(clientX, clientY) {
            if (!gameActive || isStunned || isEndingStage) return;
            let hitSomething = false;

            for (let i = items.length - 1; i >= 0; i--) {
                let item = items[i];
                // Проверка тапа теперь идет по динамической координате currentX
                let dist = Math.hypot(clientX - item.currentX, clientY - item.y);

                if (dist < item.size + 20) {
                    hitSomething = true;
                    createParticles(item.currentX, item.y, TYPES[item.type.toUpperCase()].color);
                    visualTapWaves.push({ x: clientX, y: clientY, r: 10, alpha: 1, color: TYPES[item.type.toUpperCase()].color });

                    if (item.type === 'bomb') { 
                        triggerBomb(item.currentX, item.y); 
                    } else if (item.type === 'time') {
                        timeLeft += 3;
                        timerDisplay.textContent = timeLeft;
                        floatingTexts.push({ x: item.currentX, y: item.y - 15, text: "+3 сек", color: '#ff33cc', alpha: 1 });
                        updateCombo(true);
                    } else {
                        if (item.type === 'freeze') triggerFreeze();
                        
                        let basePoints = TYPES[item.type.toUpperCase()].points;
                        let shopMultiplier = 1 + (clickLevel - 1) * 0.2; 
                        
                        let finalPoints = Math.round(basePoints * shopMultiplier * comboMultiplier);
                        
                        score += finalPoints; 
                        scoreDisplay.textContent = score;

                        let textShow = comboMultiplier > 1 ? `+${finalPoints} (x${comboMultiplier})` : `+${finalPoints}`;
                        floatingTexts.push({ x: item.currentX, y: item.y - 15, text: textShow, color: TYPES[item.type.toUpperCase()].color, alpha: 1 });
                        
                        updateCombo(true);
                    }
                    items.splice(i, 1); break; 
                }
            }
            if (!hitSomething) { 
                visualTapWaves.push({ x: clientX, y: clientY, r: 5, alpha: 0.5, color: 'rgba(255,255,255,0.3)' }); 
                updateCombo(false); 
            }
        }

        window.addEventListener('mousedown', (e) => checkHit(e.clientX, e.clientY));
        window.addEventListener('touchstart', (e) => { checkHit(e.touches[0].clientX, e.touches[0].clientY); });

        function createParticles(x, y, color) {
            for(let i=0; i<12; i++) {
                let angle = Math.random() * Math.PI * 2; 
                let speed = Math.random() * 4 + 2;
                particles.push({ 
                    x: x, 
                    y: y, 
                    vx: Math.cos(angle) * speed, 
                    vy: Math.sin(angle) * speed, 
                    size: Math.random() * 1.5 + 1.5, 
                    color: color, 
                    alpha: 1 
                });
            }
        }

        function triggerBomb(x, y) {
            isStunned = true; 
            body.classList.add('shake'); 
            score -= 50; if (score < 0) score = 0; 
            scoreDisplay.textContent = score;
            updateCombo(false); 
            setTimeout(() => { body.classList.remove('shake'); isStunned = false; }, 400);
        }

        function triggerFreeze() { if (!isFrozen) { isFrozen = true; initSnow(); setTimeout(() => { isFrozen = false; }, 3000); } }
        function triggerEndStage() { isEndingStage = true; }

        function executeEndGame() {
            gameActive = false;
            let earnedCrypto = score * 0.01; cryptoBalance += earnedCrypto;
            checkQuestProgress('farm_goal', cryptoBalance);
            localStorage.setItem('lum_balance', cryptoBalance.toFixed(2));
            updateBalanceDisplay();

            lastScoreDisplay.innerHTML = `РАУНД ЗАВЕРШЕН!<br><span style="color:#00ffcc; font-family:'Orbitron'; font-size:1.3rem;">+${earnedCrypto.toFixed(2)} $LUM</span>`;
            gameScreen.style.display = 'none'; menuScreen.style.display = 'flex'; glow1.style.display = 'block'; glow2.style.display = 'block';
            updateTicketsSystem(); 
        }

        renderQuests();
    </script>
</body>
