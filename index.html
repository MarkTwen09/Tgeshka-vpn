<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Lum Crypto Drop Game</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800;900&family=Rajdhani:wght@500;700&display=swap');

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }

        body {
            background: #030108;
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        /* ЭКРАН ХАБА / МЕНЮ */
        #menu-screen, #game-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 40px 24px;
            z-index: 10;
        }

        #game-screen {
            display: none;
            justify-content: flex-start;
            pointer-events: none;
        }

        .brand-section {
            text-align: center;
            margin-top: 20px;
            width: 100%;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 5rem;
            font-weight: 900;
            color: #00ffcc;
            text-shadow: 0 0 20px rgba(0, 255, 204, 0.6), 0 0 40px rgba(0, 255, 204, 0.3);
            letter-spacing: 8px;
            margin-bottom: 5px;
        }

        .crypto-balance {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.01));
            border: 1px solid rgba(0, 255, 204, 0.2);
            padding: 24px 20px;
            border-radius: 24px;
            text-align: center;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.7), inset 0 1px 1px rgba(255,255,255,0.1);
            margin: 30px auto;
            width: 90%;
            max-width: 340px;
        }

        .crypto-balance p {
            font-size: 0.85rem;
            color: #6c5f93;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .crypto-balance .amount {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.3rem;
            font-weight: 800;
            color: #fff;
        }

        .crypto-balance .amount span {
            color: #00ffcc;
            text-shadow: 0 0 15px rgba(0, 255, 204, 0.5);
        }

        .game-status-text {
            color: #ff3366;
            font-size: 1.2rem;
            font-weight: 700;
            min-height: 30px;
            text-align: center;
            letter-spacing: 1px;
        }

        .btn {
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(135deg, #00ffcc, #00b3ff);
            color: #030108;
            border: none;
            padding: 20px;
            font-size: 1.3rem;
            font-weight: 900;
            border-radius: 24px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0, 255, 204, 0.3), inset 0 -4px 0 rgba(0,0,0,0.15);
            transition: transform 0.1s;
            width: 90%;
            max-width: 340px;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        .btn:active {
            transform: scale(0.95);
        }

        /* ИНТЕРФЕЙС ИГРЫ */
        .hud {
            display: flex;
            width: 100%;
            max-width: 500px;
            justify-content: space-between;
            align-items: center;
            background: rgba(3, 1, 8, 0.6);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 16px 24px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 12;
            pointer-events: auto;
        }

        .hud-box {
            font-size: 0.9rem;
            color: #6c5f93;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
        }

        .hud-box div {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            font-weight: 800;
            color: #fff;
            text-transform: none;
            letter-spacing: 0;
            margin-top: 4px;
        }

        #score { color: #00ffcc; text-shadow: 0 0 10px rgba(0,255,204,0.3); }
        #timer { color: #ff3366; text-shadow: 0 0 10px rgba(ff,51,102,0.3); }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            display: block;
        }

        .shake {
            animation: shakeScreen 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shakeScreen {
            10%, 90% { transform: translate3d(-2px, 1px, 0); }
            20%, 80% { transform: translate3d(4px, -3px, 0); }
            30%, 50%, 70% { transform: translate3d(-6px, 5px, 0); }
            40%, 60% { transform: translate3d(6px, -4px, 0); }
        }
    </style>
</head>
<body id="body">

    <canvas id="gameCanvas"></canvas>

    <div id="menu-screen">
        <div class="brand-section">
            <h1>LUM</h1>
            <div class="crypto-balance">
                <p>Баланс токенов</p>
                <div class="amount"><span id="total-balance">0.00</span> $LUM</div>
            </div>
            <div id="last-score" class="game-status-text"></div>
        </div>
        <button class="btn" onclick="startGame()">ИГРАТЬ</button>
    </div>

    <div id="game-screen">
        <div class="hud">
            <div class="hud-box">Токены<div><span id="score">0</span></div></div>
            <div class="hud-box" style="text-align: right;">Время<div><span id="timer">30</span>с</div></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const body = document.getElementById('body');
        const menuScreen = document.getElementById('menu-screen');
        const gameScreen = document.getElementById('game-screen');
        const scoreDisplay = document.getElementById('score');
        const timerDisplay = document.getElementById('timer');
        const totalBalanceDisplay = document.getElementById('total-balance');
        const lastScoreDisplay = document.getElementById('last-score');

        let cryptoBalance = parseFloat(localStorage.getItem('lum_balance')) || 0;
        totalBalanceDisplay.textContent = cryptoBalance.toFixed(2);

        let score = 0;
        let timeLeft = 30;
        let gameActive = false;
        
        // Переменные заморозки
        let isFrozen = false;
        let freezeAlpha = 0; // Плавное проявление льда (от 0 до 1)
        let snowParticles = []; // Частицы падающего неона во время мерзлоты

        let isStunned = false;
        let lastTime = 0;
        let spawnTimer = 0;
        let secondTimer = 0;

        let items = [];
        let particles = [];
        let stars = [];
        let floatingTexts = [];
        let shockwaves = [];

        const SPAWN_RATE = 350;
        const TYPES = {
            CRYSTAL: { id: 'crystal', color: '#00ffcc', points: 10, chance: 0.85 },
            BOMB: { id: 'bomb', color: '#ff3366', points: -50, chance: 0.12 },
            FREEZE: { id: 'freeze', color: '#00b3ff', points: 5, chance: 0.03 } 
        };

        function resizeCanvas() {
            canvas.width = window.innerWidth * window.devicePixelRatio;
            canvas.height = window.innerHeight * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function initStars() {
            stars = [];
            for(let i=0; i<60; i++) {
                stars.push({
                    x: Math.random() * window.innerWidth,
                    y: Math.random() * window.innerHeight,
                    size: Math.random() * 1.5 + 0.5,
                    speed: Math.random() * 0.3 + 0.1
                });
            }
        }
        initStars();

        // Инициализация кастомного падающего нежного снега для эффекта заморозки
        function initSnow() {
            snowParticles = [];
            for(let i=0; i<35; i++) {
                snowParticles.push({
                    x: Math.random() * window.innerWidth,
                    y: Math.random() * window.innerHeight - window.innerHeight,
                    size: Math.random() * 2 + 1,
                    speedY: Math.random() * 1 + 0.5,
                    speedX: Math.random() * 0.4 - 0.2,
                    drift: Math.random() * 0.02
                });
            }
        }

        function startGame() {
            score = 0;
            timeLeft = 30;
            isFrozen = false;
            freezeAlpha = 0;
            isStunned = false;
            items = [];
            particles = [];
            floatingTexts = [];
            shockwaves = [];
            snowParticles = [];
            
            scoreDisplay.textContent = score;
            timerDisplay.textContent = timeLeft;
            
            menuScreen.style.display = 'none';
            gameScreen.style.display = 'flex';
            gameActive = true;
            lastTime = performance.now();
            
            requestAnimationFrame(gameLoop);
        }

        // Отрисовка Неонового Кристалла
        function drawCrystal(ctx, x, y, size, angle) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#00ffcc';
            ctx.strokeStyle = '#00ffcc';
            ctx.lineWidth = 3;
            ctx.fillStyle = 'rgba(0, 255, 204, 0.2)';
            ctx.beginPath();
            ctx.moveTo(0, -size);
            ctx.lineTo(size * 0.7, -size * 0.2);
            ctx.lineTo(size * 0.5, size * 0.8);
            ctx.lineTo(0, size);
            ctx.lineTo(-size * 0.5, size * 0.8);
            ctx.lineTo(-size * 0.7, -size * 0.2);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(0, -size);
            ctx.lineTo(0, size);
            ctx.moveTo(-size * 0.7, -size * 0.2);
            ctx.lineTo(size * 0.7, -size * 0.2);
            ctx.stroke();
            ctx.restore();
        }

        // Отрисовка Кибер-Бомбы
        function drawBomb(ctx, x, y, size, pulse) {
            ctx.save();
            ctx.translate(x, y);
            ctx.shadowBlur = 15 + pulse * 10;
            ctx.shadowColor = '#ff3366';
            ctx.fillStyle = '#1a0510';
            ctx.strokeStyle = '#ff3366';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(0, 0, size * 0.8, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            ctx.fillStyle = `rgba(255, 51, 102, ${0.4 + pulse * 0.6})`;
            ctx.beginPath();
            ctx.arc(0, 0, size * 0.4, 0, Math.PI * 2);
            ctx.fill();
            ctx.lineWidth = 2;
            for(let i=0; i<8; i++) {
                ctx.rotate(Math.PI / 4);
                ctx.beginPath();
                ctx.moveTo(0, -size * 0.8);
                ctx.lineTo(0, -size * 1.1);
                ctx.stroke();
            }
            ctx.restore();
        }

        // Отрисовка Модуля Заморозки
        function drawFreeze(ctx, x, y, size, angle) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#00b3ff';
            ctx.strokeStyle = '#00b3ff';
            ctx.lineWidth = 2.5;
            ctx.fillStyle = 'rgba(0, 179, 255, 0.15)';
            ctx.beginPath();
            for (let i = 0; i < 6; i++) {
                ctx.lineTo(size * Math.cos(i * Math.PI / 3), size * Math.sin(i * Math.PI / 3));
            }
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
            ctx.beginPath();
            for(let i=0; i<3; i++) {
                ctx.rotate(Math.PI / 3);
                ctx.moveTo(0, -size);
                ctx.lineTo(0, size);
            }
            ctx.stroke();
            ctx.restore();
        }

        // ЛОГИКА И ЭФФЕКТЫ ДВИЖКА (60 FPS)
        function gameLoop(time) {
            if (!gameActive) return;

            let dt = time - lastTime;
            lastTime = time;

            // Очистка сцены базовым космическим цветом
            ctx.fillStyle = '#030108';
            ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

            // Рендер звезд бэкграунда
            ctx.shadowBlur = 0;
            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            stars.forEach(star => {
                if (!isFrozen) star.y += star.speed;
                if (star.y > window.innerHeight) star.y = -5;
                ctx.fillRect(star.x, star.y, star.size, star.size);
            });

            // Плавное изменение прозрачности ледяного налета (Frost Vignette)
            if (isFrozen && freezeAlpha < 1) {
                freezeAlpha += 0.05; // Лед нарастает
            } else if (!isFrozen && freezeAlpha > 0) {
                freezeAlpha -= 0.05; // Лед тает
            }

            // ВИЗУАЛ ЗАМОРОЗКИ ЭТАП 1: Медленный неоновый снег внутри замерзшего экрана
            if (freezeAlpha > 0.01) {
                ctx.save();
                ctx.shadowBlur = 8;
                ctx.shadowColor = 'rgba(0, 179, 255, 0.6)';
                ctx.fillStyle = `rgba(135, 220, 255, ${freezeAlpha * 0.7})`;
                snowParticles.forEach(p => {
                    p.y += p.speedY;
                    p.x += p.speedX + Math.sin(time * p.drift) * 0.2;
                    if (p.y > window.innerHeight) {
                        p.y = -10;
                        p.x = Math.random() * window.innerWidth;
                    }
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                });
                ctx.restore();
            }

            // Работа таймеров спавна и раунда
            if (!isFrozen) {
                spawnTimer += dt;
                if (spawnTimer >= SPAWN_RATE) {
                    spawnItem();
                    spawnTimer = 0;
                }

                secondTimer += dt;
                if (secondTimer >= 1000) {
                    timeLeft--;
                    timerDisplay.textContent = timeLeft;
                    secondTimer = 0;
                    if (timeLeft <= 0) { endGame(); return; }
                }
            }

            // Отрисовка падающих предметов
            let pulseValue = Math.sin(time * 0.01);
            for (let i = items.length - 1; i >= 0; i--) {
                let item = items[i];
                if (!isFrozen) {
                    item.y += item.speed;
                    item.angle += item.rotSpeed;
                }
                if (item.y > window.innerHeight + 50) {
                    items.splice(i, 1);
                    continue;
                }
                if (item.type === 'crystal') drawCrystal(ctx, item.x, item.y, item.size, item.angle);
                if (item.type === 'bomb') drawBomb(ctx, item.x, item.y, item.size, pulseValue);
                if (item.type === 'freeze') drawFreeze(ctx, item.x, item.y, item.size, item.angle);
            }

            // Частицы от взрывов и сборов
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.1;
                p.alpha -= 0.02;
                if (p.alpha <= 0) {
                    particles.splice(i, 1);
                    continue;
                }
                ctx.save();
                ctx.globalAlpha = p.alpha;
                ctx.shadowBlur = 10;
                ctx.shadowColor = p.color;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
                ctx.restore();
            }

            // Взрывные волны
            for(let i = shockwaves.length - 1; i >= 0; i--) {
                let sw = shockwaves[i];
                sw.radius += 8;
                sw.alpha -= 0.03;
                if(sw.alpha <= 0) {
                    shockwaves.splice(i, 1);
                    continue;
                }
                ctx.save();
                ctx.globalAlpha = sw.alpha;
                ctx.lineWidth = 4;
                ctx.strokeStyle = '#ff3366';
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#ff3366';
                ctx.beginPath();
                ctx.arc(sw.x, sw.y, sw.radius, 0, Math.PI * 2);
                ctx.stroke();
                ctx.restore();
            }

            // Тексты очков
            for(let i = floatingTexts.length - 1; i >= 0; i--) {
                let ft = floatingTexts[i];
                ft.y -= 1.5;
                ft.alpha -= 0.02;
                if(ft.alpha <= 0) {
                    floatingTexts.splice(i, 1);
                    continue;
                }
                ctx.save();
                ctx.globalAlpha = ft.alpha;
                ctx.font = "bold 1.6rem 'Orbitron', sans-serif";
                ctx.fillStyle = ft.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = ft.color;
                ctx.textAlign = 'center';
                ctx.fillText(ft.text, ft.x, ft.y);
                ctx.restore();
            }

            // ВИЗУАЛ ЗАМОРОЗКИ ЭТАП 2: Реалистичный ледяной туман (Frost Vignette) по краям экрана
            if (freezeAlpha > 0.01) {
                ctx.save();
                // Накладываем холодную тонировку на весь дисплей
                ctx.fillStyle = `rgba(0, 140, 255, ${freezeAlpha * 0.08})`;
                ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

                // Создаем градиент замерзания (от матового краев к прозрачному центру)
                let width = window.innerWidth;
                let height = window.innerHeight;
                let radialGrad = ctx.createRadialGradient(
                    width / 2, height / 2, Math.min(width, height) * 0.2, 
                    width / 2, height / 2, Math.max(width, height) * 0.75
                );
                
                radialGrad.addColorStop(0, 'rgba(0, 179, 255, 0)');
                radialGrad.addColorStop(0.5, `rgba(0, 179, 255, ${freezeAlpha * 0.15})`);
                radialGrad.addColorStop(0.85, `rgba(135, 225, 255, ${freezeAlpha * 0.45})`);
                radialGrad.addColorStop(1, `rgba(200, 245, 255, ${freezeAlpha * 0.75})`);

                ctx.fillStyle = radialGrad;
                ctx.globalCompositeOperation = 'source-over';
                ctx.fillRect(0, 0, width, height);
                ctx.restore();
            }

            requestAnimationFrame(gameLoop);
        }

        function spawnItem() {
            let rand = Math.random();
            let type = 'crystal';

            if (rand < TYPES.FREEZE.chance) {
                type = 'freeze';
            } else if (rand < TYPES.FREEZE.chance + TYPES.BOMB.chance) {
                type = 'bomb';
            }

            items.push({
                x: Math.random() * (window.innerWidth - 60) + 30,
                y: -40,
                size: 26,
                speed: Math.random() * 2 + 3,
                angle: Math.random() * Math.PI,
                rotSpeed: Math.random() * 0.04 - 0.02,
                type: type
            });
        }

        function checkHit(clientX, clientY) {
            if (!gameActive || isStunned) return;

            for (let i = items.length - 1; i >= 0; i--) {
                let item = items[i];
                let dist = Math.hypot(clientX - item.x, clientY - item.y);

                if (dist < item.size + 15) {
                    createParticles(item.x, item.y, TYPES[item.type.toUpperCase()].color);
                    
                    if (item.type === 'bomb') {
                        triggerBomb(item.x, item.y);
                    } else {
                        if (item.type === 'freeze') triggerFreeze();
                        
                        let points = TYPES[item.type.toUpperCase()].points;
                        score += points;
                        if(score < 0) score = 0;
                        scoreDisplay.textContent = score;

                        floatingTexts.push({
                            x: item.x, y: item.y,
                            text: `+${points}`,
                            color: TYPES[item.type.toUpperCase()].color,
                            alpha: 1
                        });
                    }
                    items.splice(i, 1);
                    break; 
                }
            }
        }

        window.addEventListener('mousedown', (e) => checkHit(e.clientX, e.clientY));
        window.addEventListener('touchstart', (e) => {
            checkHit(e.touches[0].clientX, e.touches[0].clientY);
        });

        function createParticles(x, y, color) {
            let amount = color === '#ff3366' ? 35 : 12;
            for(let i=0; i<amount; i++) {
                let angle = Math.random() * Math.PI * 2;
                let speed = Math.random() * 4 + 1;
                particles.push({
                    x: x, y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    size: Math.random() * 3 + 2,
                    color: color,
                    alpha: 1
                });
            }
        }

        function triggerBomb(x, y) {
            isStunned = true;
            shockwaves.push({ x: x, y: y, radius: 10, alpha: 1 });
            body.classList.add('shake');

            score -= 50;
            if (score < 0) score = 0;
            scoreDisplay.textContent = score;

            floatingTexts.push({ x: x, y: y - 20, text: '-50 $LUM', color: '#ff3366', alpha: 1 });

            setTimeout(() => {
                body.classList.remove('shake');
                isStunned = false;
            }, 400);
        }

        // КИНЕМАТОГРАФИЧНАЯ ЗАМОРОЗКА С ЭФФЕКТАМИ
        function triggerFreeze() {
            if (isFrozen) return;
            isFrozen = true;
            initSnow(); // Запускаем генератор неонового снега

            setTimeout(() => { 
                isFrozen = false; 
            }, 3000);
        }

        function endGame() {
            gameActive = false;
            let earnedCrypto = score * 0.01;
            cryptoBalance += earnedCrypto;

            localStorage.setItem('lum_balance', cryptoBalance.toFixed(2));
            totalBalanceDisplay.textContent = cryptoBalance.toFixed(2);

            lastScoreDisplay.innerHTML = `РАУНД ЗАВЕРШЕН!<br><span style="color:#00ffcc; font-family:'Orbitron'">+${earnedCrypto.toFixed(2)} $LUM</span>`;

            gameScreen.style.display = 'none';
            menuScreen.style.display = 'flex';
        }
    </script>
</body>
</html>
