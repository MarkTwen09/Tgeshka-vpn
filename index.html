<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SO2 Case Simulator ULTRA</title>
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --accent: #ffcc00;
            --common: #b0c3d9;
            --uncommon: #5e98d9;
            --rare: #4b69ff;
            --epic: #8847ff;
            --legendary: #d32ce6;
            --arcane: #eb4b4b;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 10px;
        }

        /* ПРОФИЛЬ */
        .profile-card {
            background: var(--card);
            width: 100%;
            max-width: 800px;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #30363d;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .lvl-badge {
            background: var(--accent);
            color: black;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
        }

        .xp-bar-bg {
            width: 150px;
            height: 8px;
            background: #30363d;
            border-radius: 4px;
            margin-top: 5px;
            overflow: hidden;
        }

        .xp-bar-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: 0.3s;
        }

        .balance { font-size: 24px; color: var(--accent); font-weight: bold; }

        /* РУЛЕТКА */
        .roulette-wrapper {
            position: relative;
            width: 100%;
            max-width: 800px;
            height: 160px;
            background: var(--card);
            border: 2px solid #30363d;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .pointer {
            position: absolute;
            left: 50%;
            top: 0;
            width: 3px;
            height: 100%;
            background: #ff4747;
            z-index: 10;
            transform: translateX(-50%);
            box-shadow: 0 0 15px #ff4747;
        }

        .cases-line { display: flex; position: absolute; left: 0; top: 10px; }

        .skin-card {
            min-width: 140px;
            height: 140px;
            margin: 0 5px;
            background: #21262d;
            border-bottom: 4px solid #ccc;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .main-btn {
            padding: 15px 50px;
            background: linear-gradient(180deg, #ffcc00, #ff9900);
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 30px;
        }

        .main-btn:disabled { opacity: 0.5; }

        /* ИНВЕНТАРЬ */
        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 10px;
            width: 100%;
            max-width: 900px;
        }

        .inv-item {
            background: var(--card);
            padding: 10px;
            border-radius: 8px;
            border-bottom: 3px solid;
            text-align: center;
            cursor: pointer;
        }

        /* МОДАЛЬНОЕ ОКНО */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .modal {
            background: var(--card);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid var(--accent);
            max-width: 300px;
        }

        .modal button {
            margin: 10px;
            padding: 10px 20px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-confirm { background: #eb4b4b; color: white; }
        .btn-cancel { background: #484f58; color: white; }

        /* Редкости */
        .common { border-color: var(--common); }
        .uncommon { border-color: var(--uncommon); }
        .rare { border-color: var(--rare); }
        .epic { border-color: var(--epic); }
        .legendary { border-color: var(--legendary); }
        .arcane { border-color: var(--arcane); }

    </style>
</head>
<body>

    <div class="profile-card">
        <div>
            <div id="userLvl" class="lvl-badge">LVL 1</div>
            <div class="xp-bar-bg"><div id="xpFill" class="xp-bar-fill"></div></div>
            <div style="font-size: 10px; margin-top: 3px; color: #8b949e;">Кейсов открыто: <span id="statsCases">0</span></div>
        </div>
        <div class="balance"><span id="balanceText">1000</span> G</div>
    </div>

    <div class="roulette-wrapper">
        <div class="pointer"></div>
        <div id="line" class="cases-line"></div>
    </div>

    <button id="spinBtn" class="main-btn" onclick="openCase()">ОТКРЫТЬ КЕЙС (100 G)</button>

    <div style="width:100%; max-width:900px;">
        <h3>ИНВЕНТАРЬ</h3>
        <div id="inventory" class="inventory-grid"></div>
    </div>

    <div id="modal" class="modal-overlay">
        <div class="modal">
            <h3 id="modalTitle">Продать предмет?</h3>
            <p id="modalPrice" style="color: var(--accent); font-weight: bold;"></p>
            <button class="btn-confirm" onclick="confirmSell()">ПРОДАТЬ</button>
            <button class="btn-cancel" onclick="closeModal()">ОТМЕНА</button>
        </div>
    </div>

    <script>
        const skins = [
            { name: "G22 | Casual", rarity: "common", icon: "🔫", price: 5 },
            { name: "USP | Genesis", rarity: "uncommon", icon: "🔫", price: 15 },
            { name: "M4 | Tiger", rarity: "rare", icon: "🔫", price: 45 },
            { name: "AKR | Necromancer", rarity: "epic", icon: "🔫", price: 150 },
            { name: "AWM | Scratch", rarity: "legendary", icon: "🎯", price: 600 },
            { name: "M9 | Universe", rarity: "arcane", icon: "🔪", price: 8500 },
            { name: "Karambit | Gold", rarity: "arcane", icon: "🔪", price: 15000 }
        ];

        const rarityWeights = { common: 60, uncommon: 25, rare: 10, epic: 3, legendary: 1.5, arcane: 0.5 };

        // Данные игрока
        let balance = parseInt(localStorage.getItem('so2_balance')) || 1000;
        let myItems = JSON.parse(localStorage.getItem('so2_inventory')) || [];
        let xp = parseInt(localStorage.getItem('so2_xp')) || 0;
        let casesOpened = parseInt(localStorage.getItem('so2_cases')) || 0;

        let selectedItemIndex = null;

        function updateUI() {
            document.getElementById('balanceText').innerText = balance;
            document.getElementById('statsCases').innerText = casesOpened;
            
            // Уровень: каждые 500 XP = новый уровень
            let lvl = Math.floor(xp / 500) + 1;
            let currentXpInLvl = xp % 500;
            document.getElementById('userLvl').innerText = `LVL ${lvl}`;
            document.getElementById('xpFill').style.width = (currentXpInLvl / 500 * 100) + "%";

            const invDiv = document.getElementById('inventory');
            invDiv.innerHTML = '';
            myItems.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = `inv-item ${item.rarity}`;
                div.onclick = () => openSellModal(index);
                div.innerHTML = `<div style="font-size:30px">${item.icon}</div><div style="font-size:10px">${item.name}</div><div style="color:var(--accent); font-size:10px">${item.price} G</div>`;
                invDiv.appendChild(div);
            });

            localStorage.setItem('so2_balance', balance);
            localStorage.setItem('so2_inventory', JSON.stringify(myItems));
            localStorage.setItem('so2_xp', xp);
            localStorage.setItem('so2_cases', casesOpened);
        }

        function openSellModal(index) {
            selectedItemIndex = index;
            const item = myItems[index];
            document.getElementById('modalTitle').innerText = `Продать ${item.name}?`;
            document.getElementById('modalPrice').innerText = `Цена: ${item.price} G`;
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        function confirmSell() {
            if (selectedItemIndex !== null) {
                balance += myItems[selectedItemIndex].price;
                myItems.splice(selectedItemIndex, 1);
                closeModal();
                updateUI();
            }
        }

        function getWeightedRandomSkin() {
            let totalWeight = 0;
            for (let r in rarityWeights) totalWeight += rarityWeights[r];
            let random = Math.random() * totalWeight;
            let currentWeight = 0;
            for (let r in rarityWeights) {
                currentWeight += rarityWeights[r];
                if (random < currentWeight) {
                    const filtered = skins.filter(s => s.rarity === r);
                    return {...filtered[Math.floor(Math.random() * filtered.length)]};
                }
            }
        }

        function openCase() {
            if (balance < 100) return alert("Мало голды!");
            balance -= 100;
            xp += 50; // Даем 50 опыта за кейс
            casesOpened++;
            
            const btn = document.getElementById('spinBtn');
            const line = document.getElementById('line');
            btn.disabled = true;
            
            line.innerHTML = '';
            const totalCards = 60;
            const winningIndex = 55;
            let winSkin;

            for(let i=0; i < totalCards; i++) {
                let s = getWeightedRandomSkin();
                if(i === winningIndex) winSkin = s;
                const card = document.createElement('div');
                card.className = `skin-card ${s.rarity}`;
                card.innerHTML = `<div style="font-size:40px">${s.icon}</div><div>${s.name}</div>`;
                line.appendChild(card);
            }

            line.style.transition = 'none';
            line.style.transform = 'translateX(0)';
            
            setTimeout(() => {
                const cardWidth = 150; 
                const offset = (winningIndex * cardWidth) - (window.innerWidth / 2) + (cardWidth / 2);
                line.style.transition = 'transform 7s cubic-bezier(0.1, 0, 0.1, 1)';
                line.style.transform = `translateX(-${offset}px)`;
            }, 50);

            setTimeout(() => {
                btn.disabled = false;
                myItems.unshift(winSkin);
                updateUI();
            }, 7200);
        }

        updateUI();
    </script>
</body>
</html>
