<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SO2: BALANCED MARKET V12.7</title>
    <style>
        :root {
            --bg: #0a0f1b;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #ffcc00; --silver: #b0c3d9; --blue: #00d2ff;
            --up: #00ff88; --down: #ff4d4d;
            --common: #b0c3d9; --uncommon: #5e98d9; --rare: #4b69ff; --epic: #8847ff; --legendary: #d32ce6; --arcane: #eb4b4b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body {
            background: var(--bg); background: radial-gradient(circle at 50% -10%, #1a2a4d 0%, #0a0f1b 100%);
            color: white; font-family: 'SF Pro Display', sans-serif; margin: 0; padding: 12px;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow: hidden;
        }

        .header {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); width: 100%; max-width: 480px;
            padding: 20px; border-radius: 32px; border: 1px solid var(--border); margin-bottom: 20px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .currency-row { display: flex; gap: 15px; }
        .balance-item { display: flex; flex-direction: column; }
        .balance-item label { font-size: 9px; opacity: 0.5; text-transform: uppercase; }
        .gold-txt { color: var(--accent); } .silver-txt { color: var(--silver); }

        .tabs { display: flex; gap: 8px; width: 100%; max-width: 480px; margin-bottom: 20px; }
        .tab { 
            flex: 1; padding: 14px; background: var(--glass); border: 1px solid var(--border);
            color: #777; border-radius: 18px; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 10px; text-align: center;
        }
        .tab.active { background: var(--blue); color: #000; border: none; }

        .view { display: none; width: 100%; max-width: 480px; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding-bottom: 40px; overflow-y: auto; max-height: 55vh; width: 100%; }
        .card { background: var(--glass); padding: 20px; border-radius: 28px; text-align: center; border: 1px solid var(--border); position: relative; transition: 0.2s; }
        .card.selected { border: 2px solid var(--up); }

        .price-change { font-size: 10px; position: absolute; top: 10px; right: 10px; font-weight: bold; }
        .price-up { color: var(--up); } .price-down { color: var(--down); }

        .case-selector { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 20px; }
        .case-card { background: var(--glass); padding: 10px; border-radius: 20px; border: 1px solid var(--border); text-align: center; cursor: pointer; font-size: 11px; }
        .case-card.active { border-color: var(--blue); background: rgba(0, 210, 255, 0.1); }

        /* ЭФФЕКТЫ */
        .glow-circle { 
            position: absolute; width: 300px; height: 300px; 
            background: radial-gradient(circle, var(--rarity-color) 0%, transparent 75%);
            top: 40%; left: 50%; transform: translate(-50%, -50%); opacity: 0.5; 
            filter: blur(50px); z-index: -1; animation: pulse 2s infinite; 
        }
        @keyframes pulse { 0%, 100% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); } 50% { opacity: 0.7; transform: translate(-50%, -50%) scale(1.3); } }
        
        .win-item-icon { font-size: 110px; margin-bottom: 20px; animation: float 3s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        .roulette-container { height: 140px; background: rgba(0,0,0,0.4); border-radius: 28px; position: relative; overflow: hidden; margin-bottom: 20px; border: 1px solid var(--border); }
        .track { display: flex; position: absolute; left: 0; top: 15px; transition: transform 6s cubic-bezier(0.1, 0, 0, 1); }
        .t-item { min-width: 110px; height: 110px; margin: 0 6px; background: var(--glass); border-radius: 22px; display: flex; align-items: center; justify-content: center; font-size: 45px; border-bottom: 5px solid #333; }
        .pointer { position: absolute; left: 50%; width: 3px; height: 100%; background: #ff3e3e; z-index: 10; transform: translateX(-50%); }

        .btn-main { width: 100%; padding: 20px; border: none; border-radius: 22px; font-weight: 900; cursor: pointer; background: var(--accent); color: #000; text-transform: uppercase; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5,7,12,0.96); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(20px); }
        .modal { background: #121929; padding: 30px; border-radius: 35px; border: 1px solid var(--border); width: 90%; max-width: 400px; text-align: center; }
    </style>
</head>
<body>

    <div class="header">
        <div class="currency-row">
            <div class="balance-item"><label>Золото</label><b class="gold-txt"><span id="money">0</span> G</b></div>
            <div class="balance-item"><label>Серебро</label><b class="silver-txt"><span id="silver">0</span> S</b></div>
        </div>
        <div style="font-size: 14px; opacity: 0.5;">kaoface</div>
    </div>

    <div class="tabs">
        <div id="t-shop" class="tab active" onclick="tab('shop')">Кейсы</div>
        <div id="t-inv" class="tab" onclick="tab('inv')">Инв</div>
        <div id="t-market" class="tab" onclick="tab('market')">Рынок</div>
        <div id="t-craft" class="tab" onclick="tab('craft')">Крафт</div>
    </div>

    <div id="shop" class="view" style="display: block;">
        <div class="case-selector">
            <div id="c0" class="case-card" onclick="setCase(0)">🔘<br>100S</div>
            <div id="c1" class="case-card active" onclick="setCase(1)">📦<br>250G</div>
            <div id="c2" class="case-card" onclick="setCase(2)">📦<br>500G</div>
            <div id="c3" class="case-card" onclick="setCase(3)">🔪<br>1500G</div>
        </div>
        <div class="roulette-container"><div class="pointer"></div><div id="track" class="track"></div></div>
        <button id="spinBtn" class="btn-main" onclick="openCase()">Открыть кейс</button>
    </div>

    <div id="inv" class="view"><div id="invGrid" class="grid"></div></div>
    <div id="market" class="view"><div id="marketGrid" class="grid"></div></div>
    <div id="craft" class="view"><div id="craftGrid" class="grid"></div><button id="craftBtn" class="btn-main" disabled onclick="doCraft()">Скрафтить (10 шт)</button></div>

    <div id="winOverlay" class="overlay">
        <div style="text-align:center">
            <div id="rarityGlow" class="glow-circle"></div>
            <div id="winIcon" class="win-item-icon">🔫</div>
            <h2 id="winName">Item</h2>
            <p id="winRarity" style="font-weight:900; letter-spacing:2px; margin:10px 0 30px;"></p>
            <button class="btn-main" onclick="takeWin()">В инвентарь</button>
            <button class="btn-main" style="background:none; color:#555; margin-top:10px;" id="sellBtnWin" onclick="sellWin()">Продать (-20%)</button>
        </div>
    </div>

    <div id="confirmOverlay" class="overlay">
        <div class="modal">
            <h3 style="margin-top:0">Подтверждение</h3>
            <p id="confirmText" style="opacity:0.8; margin-bottom:25px;"></p>
            <div style="display:flex; gap:10px;">
                <button class="btn-main" style="background:#222; color:#fff;" onclick="closeConfirm()">Нет</button>
                <button class="btn-main" id="confirmOk" style="background:var(--up);">Да</button>
            </div>
        </div>
    </div>

    <script>
        const SKINS = [
            { id: 0, name: "G22 | Casual", rar: "common", p: 5, i: "🔫", currency: "S" },
            { id: 1, name: "USP | Genesis", rar: "uncommon", p: 35, i: "🔫", currency: "S" },
            { id: 2, name: "M4 | Tiger", rar: "rare", p: 120, i: "🔫", currency: "G" },
            { id: 3, name: "AKR | Necro", rar: "epic", p: 480, i: "🔫", currency: "G" },
            { id: 4, name: "AWM | Scratch", rar: "legendary", p: 1200, i: "🎯", currency: "G" },
            { id: 5, name: "Karambit | Gold", rar: "arcane", p: 25000, i: "🔪", currency: "G" },
            { id: 6, name: "Butterfly | Star", rar: "arcane", p: 18000, i: "🦋", currency: "G" }
        ];

        const RARITIES = ["common", "uncommon", "rare", "epic", "legendary", "arcane"];

        let state = {
            money: parseInt(localStorage.getItem('v12_money')) || 1000,
            silver: parseInt(localStorage.getItem('v12_silver')) || 1000,
            inv: JSON.parse(localStorage.getItem('v12_inv')) || [],
            market: JSON.parse(localStorage.getItem('v12_market')) || SKINS.map(s => ({id: s.id, cur: s.p, chg: 0})),
            curCase: 1, lastWin: null, selCraft: []
        };

        function updateMarket() {
            state.market.forEach(item => {
                const move = (Math.random() - 0.5) * 0.12;
                item.chg = (move * 100).toFixed(1);
                item.cur = Math.max(Math.floor(item.cur * (1 + move)), 2);
            });
            sync();
        }
        setInterval(updateMarket, 5000);

        function tab(name) {
            document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(name).style.display = 'block';
            document.getElementById('t-'+name).classList.add('active');
            state.selCraft = []; sync();
        }

        function setCase(i) {
            state.curCase = i;
            document.querySelectorAll('.case-card').forEach(c => c.classList.remove('active'));
            document.getElementById('c'+i).classList.add('active');
        }

        function openCase() {
            const costs = [{s:100}, {g:250}, {g:500}, {g:1500}];
            const cost = costs[state.curCase];
            if(cost.g && state.money < cost.g) return alert("Мало G!");
            if(cost.s && state.silver < cost.s) return alert("Мало S!");
            if(cost.g) state.money -= cost.g; else state.silver -= cost.s;
            sync();

            const track = document.getElementById('track');
            track.style.transition = 'none'; track.style.transform = 'translateX(0)';
            track.innerHTML = '';
            
            let win;
            // Шанс на Аркану 0.5% (1 из 200)
            const getSkinByChance = () => {
                const rng = Math.random();
                if(rng < 0.005) return SKINS[Math.floor(Math.random() * 2) + 5]; // Arcane
                if(rng < 0.05) return SKINS[4]; // Legendary
                if(rng < 0.15) return SKINS[3]; // Epic
                if(rng < 0.40) return SKINS[2]; // Rare
                return SKINS[Math.floor(Math.random() * 2)]; // Common/Uncommon
            };

            for(let i=0; i<60; i++) {
                const s = getSkinByChance();
                if(i === 52) win = s;
                track.innerHTML += `<div class="t-item" style="border-bottom-color:var(--${s.rar})">${s.i}</div>`;
            }
            
            setTimeout(() => {
                track.style.transition = 'transform 6s cubic-bezier(0.1, 0, 0, 1)';
                track.style.transform = `translateX(-${52 * 122 - (window.innerWidth/2 - 61)}px)`;
            }, 50);
            setTimeout(() => { state.lastWin = win; showWin(win); }, 6200);
        }

        function showWin(win) {
            document.getElementById('rarityGlow').style.setProperty('--rarity-color', `var(--${win.rar})`);
            document.getElementById('winIcon').innerText = win.i;
            document.getElementById('winIcon').style.color = `var(--${win.rar})`;
            document.getElementById('winName').innerText = win.name;
            const rt = document.getElementById('winRarity');
            rt.innerText = win.rar.toUpperCase(); rt.style.color = `var(--${win.rar})`;
            const price = state.market.find(m => m.id === win.id).cur;
            document.getElementById('sellBtnWin').innerText = `Продать за ${Math.floor(price*0.8)} ${win.currency}`;
            document.getElementById('winOverlay').style.display = 'flex';
        }

        function sellWithConfirm(idx) {
            const it = state.inv[idx];
            const price = state.market.find(m => m.id === it.id).cur;
            const p = Math.floor(price * 0.8);
            document.getElementById('confirmText').innerText = `${it.name} за ${p} ${it.currency}?`;
            document.getElementById('confirmOverlay').style.display = 'flex';
            document.getElementById('confirmOk').onclick = () => {
                if(it.currency === "G") state.money += p; else state.silver += p;
                state.inv.splice(idx, 1); closeConfirm(); sync();
            };
        }

        function buyMarket(id) {
            const mData = state.market.find(m => m.id === id);
            const s = SKINS.find(x => x.id === id);
            if(s.currency === "G" && state.money < mData.cur) return alert("Мало G!");
            if(s.currency === "S" && state.silver < mData.cur) return alert("Мало S!");
            if(s.currency === "G") state.money -= mData.cur; else state.silver -= mData.cur;
            state.inv.unshift({...s}); sync();
        }

        function toggleCraft(idx) {
            const pos = state.selCraft.indexOf(idx);
            if(pos > -1) state.selCraft.splice(pos, 1);
            else if(state.selCraft.length < 10) {
                if(state.selCraft.length > 0 && state.inv[state.selCraft[0]].rar !== state.inv[idx].rar) return;
                state.selCraft.push(idx);
            }
            sync();
        }

        function doCraft() {
            const rar = state.inv[state.selCraft[0]].rar;
            const nextIdx = RARITIES.indexOf(rar) + 1;
            const win = SKINS.filter(s => s.rar === (RARITIES[nextIdx] || "arcane"))[0];
            state.selCraft.sort((a,b)=>b-a).forEach(i => state.inv.splice(i,1));
            state.selCraft = []; state.lastWin = win; showWin(win); sync();
        }

        function takeWin() { state.inv.unshift(state.lastWin); closeOverlay(); sync(); }
        function sellWin() { 
            const price = state.market.find(m => m.id === state.lastWin.id).cur;
            const p = Math.floor(price * 0.8);
            if(state.lastWin.currency === "G") state.money += p; else state.silver += p;
            closeOverlay(); sync(); 
        }
        function closeOverlay() { document.getElementById('winOverlay').style.display = 'none'; }
        function closeConfirm() { document.getElementById('confirmOverlay').style.display = 'none'; }

        function sync() {
            document.getElementById('money').innerText = state.money.toLocaleString();
            document.getElementById('silver').innerText = state.silver.toLocaleString();
            localStorage.setItem('v12_money', state.money); localStorage.setItem('v12_silver', state.silver);
            localStorage.setItem('v12_inv', JSON.stringify(state.inv));
            localStorage.setItem('v12_market', JSON.stringify(state.market));
            
            const ig = document.getElementById('invGrid'); if(ig) {
                ig.innerHTML = '';
                state.inv.forEach((it, i) => {
                    const mp = state.market.find(m => m.id === it.id).cur;
                    ig.innerHTML += `<div class="card" onclick="sellWithConfirm(${i})"><div>${it.i}</div><div style="font-size:10px">${it.name}</div><div style="color:var(--${it.rar})">${Math.floor(mp*0.8)}${it.currency}</div></div>`;
                });
            }
            const mg = document.getElementById('marketGrid'); if(mg) {
                mg.innerHTML = '';
                state.market.forEach(m => {
                    const s = SKINS.find(x => x.id === m.id);
                    const col = m.chg >= 0 ? 'price-up' : 'price-down';
                    mg.innerHTML += `<div class="card" onclick="buyMarket(${s.id})"><div class="price-change ${col}">${m.chg}%</div><div style="font-size:40px">${s.i}</div><div style="font-size:10px">${s.name}</div><b>${m.cur}${s.currency}</b></div>`;
                });
            }
            const cg = document.getElementById('craftGrid'); if(cg) {
                cg.innerHTML = '';
                state.inv.forEach((it, i) => { if(it.rar !== "arcane") cg.innerHTML += `<div class="card ${state.selCraft.includes(i)?'selected':''}" onclick="toggleCraft(${i})"><div>${it.i}</div><div style="font-size:10px">${it.rar}</div></div>`; });
                document.getElementById('craftBtn').disabled = state.selCraft.length < 10;
            }
        }
        sync();
    </script>
</body>
</html>
