<style>
    /* ... (старые стили остаются) ... */
    
    .farm-zone {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 15px;
        background: var(--glass);
        padding: 30px;
        border-radius: 32px;
        border: 1px solid var(--border);
        margin-top: 20px;
    }

    .main-crystal {
        font-size: 80px;
        cursor: pointer;
        transition: 0.1s;
        filter: drop-shadow(0 0 20px var(--blue));
        user-select: none;
    }

    .main-crystal:active {
        transform: scale(0.9);
    }

    .daily-btn {
        background: linear-gradient(90deg, #ffcc00, #ff9900);
        color: black;
        padding: 15px 30px;
        border-radius: 15px;
        font-weight: 900;
        border: none;
        cursor: pointer;
        text-transform: uppercase;
        font-size: 12px;
    }

    .daily-btn:disabled {
        background: #333;
        color: #777;
    }
</style>

<div id="farm" class="view">
    <div class="farm-zone">
        <div style="text-align: center;">
            <div style="font-size: 12px; opacity: 0.5; margin-bottom: 10px;">КЛИКАЙ НА КРИСТАЛЛ</div>
            <div class="main-crystal" onclick="clickFarm(event)">💎</div>
        </div>
        
        <div style="width: 100%; height: 1px; background: var(--border);"></div>
        
        <button id="dailyBtn" class="daily-btn" onclick="getDaily()">Забрать ежедневный бонус (+100 G)</button>
        <div id="dailyTimer" style="font-size: 11px; color: #888;"></div>
    </div>
</div>

<div class="tabs">
    <div id="t-shop" class="tab active" onclick="tab('shop')">Кейсы</div>
    <div id="t-farm" class="tab" onclick="tab('farm')">Голда</div> <div id="t-market" class="tab" onclick="tab('market')">Рынок</div>
    <div id="t-inv" class="tab" onclick="tab('inv')">Инв</div>
</div>

<script>
    // ... (старый код синхронизации) ...

    function clickFarm(e) {
        state.money += 0.5; // Даем по 0.5 G за клик
        
        // Создаем вылетающую цифру +0.5
        const float = document.createElement('div');
        float.innerText = '+0.5';
        float.style.position = 'fixed';
        float.style.left = e.clientX + 'px';
        float.style.top = e.clientY + 'px';
        float.style.color = 'var(--accent)';
        float.style.fontWeight = '900';
        float.style.pointerEvents = 'none';
        float.style.animation = 'floatUp 0.8s forwards';
        document.body.appendChild(float);
        setTimeout(() => float.remove(), 800);
        
        sync();
    }

    function getDaily() {
        const last = localStorage.getItem('last_daily');
        const now = Date.now();
        
        if (last && now - last < 86400000) {
            alert("Бонус будет доступен завтра!");
            return;
        }
        
        state.money += 100;
        localStorage.setItem('last_daily', now);
        alert("Вы получили 100 G!");
        checkDaily();
        sync();
    }

    function checkDaily() {
        const last = localStorage.getItem('last_daily');
        const btn = document.getElementById('dailyBtn');
        const now = Date.now();
        
        if (last && now - last < 86400000) {
            btn.disabled = true;
            btn.innerText = "Бонус получен";
        } else {
            btn.disabled = false;
            btn.innerText = "Забрать ежедневный бонус (+100 G)";
        }
    }

    // Добавь анимацию в <style>
    // @keyframes floatUp { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-50px); } }

    // Не забудь вызвать checkDaily() в функции sync() или при старте
</script>
