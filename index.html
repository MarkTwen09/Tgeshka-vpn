<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>RADAR VRV | FINAL FIX</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --red: #ff3030; --green: #00ff88; --ui-bg: rgba(15,15,20,0.9); }
        body { margin: 0; background: #111; font-family: sans-serif; overflow: hidden; height: 100vh; color: #fff; }
        #map { height: 100%; width: 100%; filter: saturate(1.1) brightness(0.9); } /* Улучшил яркость здесь */
        
        .ui { position: fixed; z-index: 1000; pointer-events: none; }
        .top-bar { top: 15px; left: 15px; right: 15px; display: flex; justify-content: space-between; }
        .panel { background: var(--ui-bg); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 12px; backdrop-filter: blur(5px); pointer-events: auto; }
        
        #console { bottom: 20px; right: 20px; width: 280px; font-family: monospace; font-size: 10px; border-right: 4px solid var(--red); }
        .threat-panel { bottom: 20px; left: 20px; width: 300px; }
        .threat-box { background: rgba(255,48,48,0.15); border-left: 4px solid var(--red); padding: 8px; margin-top: 8px; border-radius: 4px; animation: in 0.4s ease; }
        
        @keyframes in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .pulse { animation: p 1s infinite alternate; }
        @keyframes p { from { fill-opacity: 0.2; } to { fill-opacity: 0.6; } }
    </style>
</head>
<body>

<div id="map"></div>

<div class="ui top-bar">
    <div class="panel" style="font-weight: 900; color: var(--red);">🛰 RADAR SYSTEM VRV</div>
    <div class="panel" id="status">📡 СВЯЗЬ: ОЖИДАНИЕ...</div>
</div>

<div class="ui threat-panel panel">
    <div style="font-size: 11px; opacity: 0.6;">АКТИВНЫЕ СЕКТОРЫ:</div>
    <div id="threat-list">Чисто</div>
</div>

<div class="ui panel" id="console"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', { center: [48.5, 42.0], zoom: 6, zoomControl: false });
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    const threats = new Map();
    const mapLayers = new Map();

    const REGIONS = {
        "Ставрополье": { c: [[43.8, 41.2], [46.1, 45.8]], keys: ["невинка", "невинномысск", "ставрополь"] },
        "Белгород": { c: [[50.1, 35.8], [51.2, 38.8]], keys: ["белгород", "шебекино"] },
        "Курск": { c: [[50.9, 34.1], [52.3, 36.3]], keys: ["курск", "суджа"] },
        "Воронеж": { c: [[49.8, 38.5], [52.0, 42.5]], keys: ["воронеж"] }
    };

    function addLog(text, color = "#888") {
        const c = document.getElementById('console');
        const d = document.createElement('div');
        d.innerHTML = `> ${new Date().toLocaleTimeString()} ${text}`;
        d.style.color = color;
        c.prepend(d);
        if (c.children.length > 7) c.lastChild.remove();
    }

    async function scan() {
        try {
            addLog("Синхронизация...");
            // Используем только самый стабильный прокси с анти-кешем
            const url = `https://api.allorigins.win/get?url=${encodeURIComponent('https://t.me/s/vrv_radar?t=' + Date.now())}`;
            const res = await fetch(url);
            if(!res.ok) throw "Server Error";
            const data = await res.json();
            const doc = new DOMParser().parseFromString(data.contents, 'text/html');
            const posts = Array.from(doc.querySelectorAll('.tgme_widget_message_text')).slice(-3);

            if(posts.length === 0) { addLog("Посты не найдены", "#f0a"); return; }

            posts.forEach(p => {
                const txt = p.innerText.toLowerCase();
                for(let r in REGIONS) {
                    const isAlert = ["опасность", "внимание", "угроза", "ракетная"].some(w => txt.includes(w));
                    const isClear = ["отбой", "чисто", "снята"].some(w => txt.includes(w));
                    const isMe = REGIONS[r].keys.some(k => txt.includes(k));

                    if (isMe) {
                        if (isClear) threats.delete(r);
                        else if (isAlert) threats.set(r, p.innerText.substring(0, 50));
                    }
                }
            });

            document.getElementById('status').innerHTML = "📡 СВЯЗЬ: OK";
            document.getElementById('status').style.color = "#00ff88";
            render();
        } catch (e) {
            addLog("СБОЙ (ПАУЗА 60с)", "#ff3030");
            document.getElementById('status').innerHTML = "📡 СВЯЗЬ: ПЕРЕЗАГРУЗКА";
            document.getElementById('status').style.color = "#ff3030";
        }
    }

    function render() {
        const list = document.getElementById('threat-list');
        list.innerHTML = threats.size === 0 ? "Чисто" : "";
        mapLayers.forEach(l => map.removeLayer(l));
        mapLayers.clear();

        threats.forEach((msg, r) => {
            const poly = L.rectangle(REGIONS[r].c, { color: '#ff3030', fillColor: '#ff3030', fillOpacity: 0.4, className: 'pulse' }).addTo(map);
            mapLayers.set(r, poly);
            const box = document.createElement('div');
            box.className = 'threat-box';
            box.innerHTML = `<b>${r}</b><br><span style="font-size:10px">${msg}</span>`;
            list.appendChild(box);
        });
    }

    setInterval(scan, 30000);
    scan();

    // ТЕСТ ПРИ НАЖАТИИ
    map.on('click', () => {
        addLog("ЗАПУСК ТЕСТА", "#ff8800");
        threats.set("Ставрополье", "ТЕСТОВАЯ ПРОВЕРКА...");
        render();
        setTimeout(() => { threats.delete("Ставрополье"); render(); }, 5000);
    });
</script>
</body>
</html>
