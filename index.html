<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>EURO-ASIA CONQUEST FINAL</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #0b0e14; --panel: #161b22; --accent: #238636; --war: #da3633; --blue: #1f6feb; }
        body { margin: 0; background: var(--bg); color: #c9d1d9; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* Панели управления */
        .glass { background: var(--panel); border: 1px solid #30363d; padding: 15px; border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); z-index: 100; position: absolute; }
        #left-ui { top: 20px; left: 20px; width: 280px; }
        #right-ui { top: 20px; right: 20px; width: 240px; }

        /* Карта */
        #map-container { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
        svg { width: 90%; height: 90%; background: #0d1117; border-radius: 12px; border: 2px solid #30363d; }
        .country { fill: #21262d; stroke: #30363d; stroke-width: 1; transition: 0.2s; cursor: pointer; }
        .country:hover { fill: #30363d; stroke: #8b949e; }
        .selected { stroke: #f1e05a !important; stroke-width: 3px !important; }
        .my-land { fill: var(--blue) !important; }
        .enemy-land { fill: var(--war) !important; }

        /* Кнопки и чат */
        button { background: var(--accent); border: none; color: white; padding: 10px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; margin-bottom: 8px; }
        button:hover { opacity: 0.8; }
        button:disabled { background: #484f58; cursor: not-allowed; }
        #log { font-size: 12px; color: #8b949e; height: 100px; overflow-y: auto; background: #0d1117; padding: 5px; border-radius: 4px; margin-top: 10px; }
        .stat { font-size: 18px; font-weight: bold; color: var(--blue); margin-bottom: 10px; display: block; }

        /* Армия */
        #army-unit { width: 15px; height: 15px; background: #f1e05a; border-radius: 50%; position: absolute; display: none; z-index: 500; box-shadow: 0 0 15px #f1e05a; transition: all 1.2s ease-in-out; }
    </style>
</head>
<body>

<div id="left-ui" class="glass">
    <h3 id="c-title" style="margin:0">Выберите регион</h3>
    <div style="margin: 10px 0;">
        💰 Золото: <span id="gold-val" class="stat">1000</span>
        ⚔️ Армия: <span id="army-val" class="stat">100</span>
    </div>
    <button onclick="updateRes('gold')">💰 Экономика (-200)</button>
    <button onclick="updateRes('army')">🎖 Вербовка (-300)</button>
    <button id="atk-btn" style="background:var(--war)" disabled onclick="attack()">🚀 ВТОРЖЕНИЕ</button>
    <div id="log">> Система готова.</div>
</div>

<div id="right-ui" class="glass">
    <div style="font-size: 11px;">
        ВАШ ID: <b id="my-id" style="color:var(--blue)">Генерация...</b><br><br>
        <input type="text" id="friend-id" style="width:100%; padding:5px; box-sizing:border-box;" placeholder="ID друга">
        <button style="margin-top:5px; background:var(--blue)" onclick="connect()">ПОДКЛЮЧИТЬСЯ</button>
    </div>
</div>

<div id="army-unit"></div>

<div id="map-container">
    <svg viewBox="0 0 800 500" id="world-map">
        <path id="rus" class="country" d="M300,50 L600,30 L750,200 L400,250 Z" onclick="sel('rus','Россия')"/>
        <path id="chn" class="country" d="M450,260 L750,210 L700,450 L400,480 Z" onclick="sel('chn','Китай')"/>
        <path id="kaz" class="country" d="M300,180 L440,250 L380,350 L250,300 Z" onclick="sel('kaz','Казахстан')"/>
        <path id="eur" class="country" d="M50,100 L280,60 L280,250 L80,300 Z" onclick="sel('eur','Евросоюз')"/>
        <path id="ind" class="country" d="M400,400 L550,490 L300,480 Z" onclick="sel('ind','Индия')"/><text x="450" y="100" fill="white" font-size="14" pointer-events="none">РОССИЯ</text>
        <text x="550" y="350" fill="white" font-size="14" pointer-events="none">КИТАЙ</text>
        <text x="120" y="180" fill="white" font-size="14" pointer-events="none">ЕВРОПА</text>
    </svg>
</div>

<script>
    let gold = 1000, army = 100, selected = null, conn = null;
    const peer = new Peer();

    peer.on('open', id => { document.getElementById('my-id').innerText = id; });
    peer.on('connection', c => { conn = c; handleConn(); log("Друг в сети!"); });

    function connect() {
        const id = document.getElementById('friend-id').value;
        conn = peer.connect(id);
        handleConn();
        log("Подключение к " + id);
    }

    function handleConn() {
        conn.on('data', data => {
            if(data.type === 'atk') {
                document.getElementById(data.id).classList.add('enemy-land');
                log("Враг захватил " + data.id);
            }
        });
    }

    function sel(id, name) {
        if(selected) document.getElementById(selected).classList.remove('selected');
        selected = id;
        document.getElementById(id).classList.add('selected');
        document.getElementById('c-title').innerText = name;
        document.getElementById('atk-btn').disabled = false;
    }

    function updateRes(type) {
        if(type === 'gold' && gold >= 200) { gold += 400; gold -= 200; log("Бюджет вырос."); }
        if(type === 'army' && gold >= 300) { army += 50; gold -= 300; log("Армия пополнена."); }
        document.getElementById('gold-val').innerText = gold;
        document.getElementById('army-val').innerText = army;
    }

    function attack() {
        if(army < 40) return log("Недостаточно войск!");
        army -= 40;
        document.getElementById('army-val').innerText = army;

        const target = document.getElementById(selected);
        const rect = target.getBoundingClientRect();
        const unit = document.getElementById('army-unit');
        
        unit.style.display = "block";
        unit.style.left = "50px"; unit.style.top = "80%";

        setTimeout(() => {
            unit.style.left = (rect.left + rect.width/2) + "px";
            unit.style.top = (rect.top + rect.height/2) + "px";
        }, 100);

        setTimeout(() => {
            unit.style.display = "none";
            target.classList.add('my-land');
            log("Захвачено: " + selected);
            if(conn) conn.send({type: 'atk', id: selected});
        }, 1300);
    }

    function log(m) {
        const l = document.getElementById('log');
        l.innerHTML = <div>> ${m}</div> + l.innerHTML;
    }
</script>
</body>
</html>
