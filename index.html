<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>THE EMPIRE: Global Strategy</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #000; font-family: sans-serif; height: 100vh; overflow: hidden; }
        #map { height: 100%; width: 100%; background: #1a1a2e; }
        
        .ui-panel {
            position: fixed; bottom: 20px; left: 20px; width: 280px;
            background: rgba(0, 0, 0, 0.9); border: 2px solid #ff3333;
            border-radius: 10px; padding: 15px; z-index: 1000; color: white;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
        }
        .stat { display: flex; justify-content: space-between; margin: 5px 0; font-size: 14px; }
        .val { color: #00ff88; font-weight: bold; }
        
        .log {
            position: fixed; top: 20px; right: 20px; width: 250px;
            background: rgba(0,0,0,0.8); padding: 10px; border-radius: 5px;
            font-size: 11px; color: #aaa; z-index: 1000; border-left: 3px solid #ff3333;
        }
        button { 
            width: 100%; margin-top: 5px; padding: 5px; cursor: pointer; 
            background: #333; color: white; border: 1px solid #555; border-radius: 3px;
        }
        button:hover { background: #444; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="ui-panel">
    <div style="color:#ff3333; font-weight:900; margin-bottom:10px;">МОЯ ИМПЕРИЯ</div>
    <div class="stat">Золото: <span class="val" id="gold">10000</span></div>
    <div class="stat">Армия: <span class="val" id="army">1000</span></div>
    <div class="stat">Доход: <span class="val" id="inc">+100</span></div>
    <hr style="border:0; border-top:1px solid #333; margin:10px 0;">
    <div id="status" style="font-size:12px; color:#888;">Выберите страну на карте...</div>
</div>

<div class="log" id="log">--- ЛОГ СОБЫТИЙ ---</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // 1. Создаем карту (Стандартная, чтобы точно прогрузилась)
    const map = L.map('map', { center: [55, 60], zoom: 3, zoomControl: false });
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let stats = { gold: 10000, army: 1000, inc: 100, country: null };

    // 2. Данные стран (координаты-боксы для начала)
    const countries = [
        { name: "Россия", bounds: [[41, 19], [81, 180]], army: 2000, gold: 15000 },
        { name: "Украина", bounds: [[44, 22], [52, 40]], army: 500, gold: 5000 },
        { name: "Казахстан", bounds: [[40, 46], [55, 87]], army: 400, gold: 6000 },
        { name: "Беларусь", bounds: [[51, 23], [56, 32]], army: 300, gold: 4000 },
        { name: "Китай", bounds: [[18, 73], [53, 134]], army: 3000, gold: 20000 },
        { name: "США", bounds: [[24, -125], [49, -66]], army: 2500, gold: 25000 },
        { name: "Европа", bounds: [[36, -10], [70, 30]], army: 1200, gold: 18000 }
    ];

    function addLog(text) {
        const l = document.getElementById('log');
        l.innerHTML = `<div>> ${text}</div>` + l.innerHTML;
    }

    // 3. Рисуем страны
    countries.forEach(c => {
        const rect = L.rectangle(c.bounds, {
            color: 'white', weight: 1, fillColor: 'blue', fillOpacity: 0.1
        }).addTo(map);

        rect.on('mouseover', function() { this.setStyle({ fillOpacity: 0.4, color: '#ff3333' }); });
        rect.on('mouseout', function() { if(stats.country !== c.name) this.setStyle({ fillOpacity: 0.1, color: 'white' }); });

        rect.on('click', function() {
            if (!stats.country) {
                stats.country = c.name;
                stats.gold = c.gold; stats.army = c.army;
                document.getElementById('status').innerHTML = "ВАША СТРАНА: " + c.name;
                this.setStyle({ fillColor: 'red', fillOpacity: 0.5 });
                addLog("Вы возглавили: " + c.name);
            } else {
                const action = `<b>${c.name}</b><br>Армия: ${c.army}<br>` +
                               `<button onclick="attack('${c.name}', ${c.army})">Атаковать</button>` +
                               `<button onclick="trade('${c.name}')">Торговля</button>`;
                L.popup().setLatLng(rect.getBounds().getCenter()).setContent(action).openOn(map);
            }
        });
    });

    // 4. Механики
    window.attack = (name, eArmy) => {
        if (stats.army > eArmy) {
            stats.gold += 2000; stats.army -= Math.floor(eArmy/2);
            addLog("ПОБЕДА над " + name + "! Захвачено +2000$");
        } else {
            stats.army = Math.floor(stats.army/2);
            addLog("ПОРАЖЕНИЕ от " + name + "! Потеряно пол-армии");
        }
        map.closePopup();
        updateUI();
    };

    window.trade = (name) => {
        stats.inc += 20;
        addLog("Торговля с " + name + ": Доход +20");
        map.closePopup();
        updateUI();
    };

    function updateUI() {
        document.getElementById('gold').innerText = stats.gold;
        document.getElementById('army').innerText = stats.army;
        document.getElementById('inc').innerText = "+" + stats.inc;
    }

    // Цикл экономики (каждые 2 сек)
    setInterval(() => {
        if(stats.country) {
            stats.gold += stats.inc;
            updateUI();
        }
    }, 2000);

</script>
</body>
</html>
