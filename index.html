<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Svetsky Coin (SVT) // Analytics Dashboard</title>
    <!-- Подключаем шрифт для технологичного вида -->
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Подключаем библиотеку для крутых графиков -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-main: #0B0E11;
            --bg-card: #141A23;
            --text-main: #EAECEF;
            --text-muted: #848E9C;
            --accent-green: #0ECB81;
            --accent-red: #F6465D;
            --border-color: #2B3139;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            padding: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .dashboard {
            width: 100%;
            max-width: 1000px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
        }

        /* Шапка панели */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
            margin-bottom: 25px;
        }

        .coin-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .coin-title {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .coin-ticker {
            background: var(--border-color);
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
        }

        /* Сетка с метриками */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1-fraction));
            gap: 20px;
            margin-bottom: 25px;
        }

        .metric-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
        }

        .metric-label {
            color: var(--text-muted);
            font-size: 13px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .metric-value {
            font-size: 28px;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
        }

        .metric-change {
            font-size: 14px;
            font-weight: 600;
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Зона графика */
        .chart-container {
            position: relative;
            width: 100%;
            height: 350px;
            background: rgba(0, 0, 0, 0.15);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 25px;
        }

        /* Кнопка действия */
        .action-zone {
            display: flex;
            justify-content: flex-end;
        }

        .btn-buy {
            background: var(--accent-green);
            color: #000;
            text-decoration: none;
            font-weight: 700;
            font-size: 16px;
            padding: 14px 32px;
            border-radius: 8px;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(14, 203, 129, 0.2);
        }

        .btn-buy:hover {
            opacity: 0.9;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(14, 203, 129, 0.3);
        }

        .btn-buy:active {
            transform: translateY(1px);
        }

        /* Стили для статусов изменения */
        .up { color: var(--accent-green); }
        .down { color: var(--accent-red); }
    </style>
</head>
<body>

<div class="dashboard">
    <!-- Header -->
    <div class="header">
        <div class="coin-info">
            <h1 class="coin-title">Svetsky Coin Terminal</h1>
            <span class="coin-ticker">SVT / RUB</span>
        </div>
        <div style="text-align: right">
            <span style="color: var(--text-muted); font-size: 12px;">Статус системы:</span>
            <span style="color: var(--accent-green); font-size: 12px; font-weight: 600; display: block;">● LIVE MARKET</span>
        </div>
    </div>

    <!-- Metrics -->
    <div class="metrics-grid">
        <div class="metric-card">
            <div class="metric-label">Текущий курс</div>
            <div class="metric-value" id="current-price">250.00 ₽</div>
            <div class="metric-change up" id="price-change">+0.00%</div>
        </div>
        <div class="metric-card">
            <div class="metric-label">Макс. за сессию</div>
            <div class="metric-value" id="max-price" style="font-size: 20px; padding-top: 5px;">250.00 ₽</div>
        </div>
        <div class="metric-card">
            <div class="metric-label">Мин. за сессию</div>
            <div class="metric-value" id="min-price" style="font-size: 20px; padding-top: 5px;">250.00 ₽</div>
        </div>
    </div>

    <!-- Chart -->
    <div class="chart-container">
        <canvas id="analyticsChart"></canvas>
    </div>

    <!-- Action Button -->
    <div class="action-zone">
        <a href="https://t.me/markplau" target="_blank" class="btn-buy">
            Закупить $SVT$
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
        </a>
    </div>
</div>

<script>
    // Начальные настройки экономики Коина
    let basePrice = 250.00;
    let currentPrice = basePrice;
    let maxPrice = basePrice;
    let minPrice = basePrice;
    
    const maxDataPoints = 30; // Сколько точек одновременно отображается на графике
    const labels = Array(maxDataPoints).fill('');
    const dataPoints = Array(maxDataPoints).fill(basePrice);

    // Инициализация графика Chart.js
    const ctx = document.getElementById('analyticsChart').getContext('2d');
    
    // Создаем градиент под линией графика в стиле бирж
    const gradient = ctx.createLinearGradient(0, 0, 0, 300);
    gradient.addColorStop(0, 'rgba(14, 203, 129, 0.2)');
    gradient.addColorStop(1, 'rgba(14, 203, 129, 0.0)');

    const chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Рыночная цена SVT',
                data: dataPoints,
                borderColor: '#0ECB81',
                borderWidth: 2,
                pointRadius: 0, // Прячем точки для строгости
                pointHoverRadius: 6,
                fill: true,
                backgroundColor: gradient,
                tension: 0.4 // Плавные линии
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false } // Прячем легенду
            },
            scales: {
                x: {
                    grid: { display: false },
                    ticks: { display: false }
                },
                y: {
                    grid: { color: '#2B3139' },
                    ticks: {
                        color: '#848E9C',
                        font: { family: 'JetBrains Mono', size: 11 },
                        callback: function(value) { return value.toFixed(2) + ' ₽'; }
                    }
                }
            },
            interaction: {
                intersect: false,
                mode: 'index',
            }
        }
    });

    // Функция генерации случайных реалистичных колебаний (алгоритм случайного блуждания)
    function updateMarket() {
        // Случайное изменение от -1.5% до +1.5% за шаг
        const changePercent = (Math.random() * 3 - 1.5) / 100;
        const priceDiff = currentPrice * changePercent;
        currentPrice += priceDiff;
        
        // Ограничим, чтобы цена не падала ниже 1 рубля
        if (currentPrice < 1) currentPrice = 1;

        // Считаем общий процент изменения от первоначальной цены
        const totalChange = ((currentPrice - basePrice) / basePrice) * 100;

        // Фиксируем максимумы и минимумы сессии
        if (currentPrice > maxPrice) maxPrice = currentPrice;
        if (currentPrice < minPrice) minPrice = currentPrice;

        // Обновляем текст в карточках интерфейса
        document.getElementById('current-price').innerText = currentPrice.toFixed(2) + ' ₽';
        document.getElementById('max-price').innerText = maxPrice.toFixed(2) + ' ₽';
        document.getElementById('min-price').innerText = minPrice.toFixed(2) + ' ₽';

        // Элемент процента изменения
        const changeEl = document.getElementById('price-change');
        if (totalChange >= 0) {
            changeEl.innerText = '+' + totalChange.toFixed(2) + '%';
            changeEl.className = 'metric-change up';
            chart.data.datasets[0].borderColor = '#0ECB81'; // Зеленый график при росте
        } else {
            changeEl.innerText = totalChange.toFixed(2) + '%';
            changeEl.className = 'metric-change down';
            chart.data.datasets[0].borderColor = '#F6465D'; // Красный при падении
        }

        // Двигаем массив данных графика (удаляем старую точку, добавляем новую)
        chart.data.datasets[0].data.shift();
        chart.data.datasets[0].data.push(currentPrice);
        chart.update('none'); // Обновление без лишней анимации для экономии ресурсов
    }

    // Запускаем симуляцию рынка каждые 2 секунды (2000 миллисекунд)
    setInterval(updateMarket, 2000);
</script>

</body>
</html>
