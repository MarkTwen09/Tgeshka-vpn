<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Cyber Stars Casino</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: radial-gradient(circle at center, #140d26 0%, #07040d 100%);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: #ff0055;
            filter: blur(150px);
            opacity: 0.15;
            top: 10%;
            left: 15%;
            z-index: -1;
        }

        body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: #00f2fe;
            filter: blur(150px);
            opacity: 0.15;
            bottom: 10%;
            right: 15%;
            z-index: -1;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(45deg, #00f2fe, #ff007f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0, 242, 254, 0.3);
            margin-bottom: 5px;
        }

        /* Двойная панель балансов */
        .balance-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 460px;
            margin-bottom: 30px;
        }

        .balance-card {
            background: rgba(20, 15, 38, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px 24px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            transition: all 0.3s ease;
        }

        .balance-card:hover {
            border-color: rgba(255, 255, 255, 0.2);
        }

        .balance-info {
            display: flex;
            flex-direction: column;
        }

        .balance-text {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #9d96b8;
            margin-bottom: 4px;
        }

        .balance-value {
            font-weight: 800;
            font-size: 1.4rem;
            color: #fff;
        }

        #game-balance {
            background: linear-gradient(to right, #ffe600, #ff9900);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #payout-balance {
            background: linear-gradient(to right, #00ff88, #00f2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Кнопки действий */
        .btn-action {
            border: none;
            color: white;
            padding: 10px 22px;
            font-weight: 700;
            font-size: 0.85rem;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
        }

        .btn-deposit {
            background: linear-gradient(90deg, #ff007f 0%, #7928ca 100%);
            box-shadow: 0 4px 15px rgba(255, 0, 127, 0.2);
        }

        .btn-deposit:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.5);
        }

        .btn-withdraw {
            background: linear-gradient(90deg, #00ff88 0%, #00eaec 100%);
            box-shadow: 0 4px 15px rgba(0, 255, 136, 0.2);
            color: #07040d;
        }

        .btn-withdraw:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }

        /* Поле ввода для вывода */
        .withdraw-box {
            display: flex;
            gap: 10px;
            align-items: center;
            width: 130px;
        }

        .withdraw-input {
            width: 100%;
            background: #05030a;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #00ff88;
            padding: 8px;
            border-radius: 8px;
            font-weight: 700;
            text-align: center;
            outline: none;
        }

        /* Корпус автомата */
        .slot-machine {
            background: linear-gradient(145deg, #18132b, #0f0b1e);
            border: 2px solid rgba(255, 0, 127, 0.2);
            border-radius: 24px;
            padding: 35px;
            width: 100%;
            max-width: 460px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6), 
                        inset 0 0 20px rgba(255, 0, 127, 0.1),
                        0 0 30px rgba(121, 40, 202, 0.2);
        }

        /* Экран со слотами */
        .screen {
            background: #05030a;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.9);
            overflow: hidden;
        }

        .slots-container {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .slot-window {
            background: linear-gradient(180deg, #0e0a1a 0%, #17112a 50%, #0e0a1a 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            width: 90px;
            height: 110px;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.7);
        }

        .slot-reel {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
        }

        .slot-tile {
            width: 100%;
            height: 110px;
            font-size: 3.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }

        .blur-effect {
            filter: blur(4px);
            transform: scaleY(1.2);
        }

        .winner-glow {
            border-color: #00ff88 !important;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.5), inset 0 0 15px rgba(0, 255, 136, 0.2);
            animation: pulseGlow 0.4s infinite alternate;
        }

        /* Управление */
        .control-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 8px;
        }

        .input-label {
            color: #8a8a9e;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .bet-input {
            width: 100%;
            background: #090611;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 14px;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: 700;
            text-align: center;
            outline: none;
        }

        .bet-input:focus {
            border-color: #ff007f;
        }

        .btn-spin {
            background: linear-gradient(135deg, #ff007f 0%, #7928ca 100%);
            border: none;
            color: white;
            padding: 16px;
            font-size: 1.3rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(255, 0, 127, 0.3);
            transition: all 0.2s ease;
        }

        .btn-spin:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 0, 127, 0.5);
        }

        .btn-spin:disabled {
            background: #332d42;
            color: #665f7a;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        #status-display {
            margin-top: 20px;
            font-size: 1.1rem;
            font-weight: 600;
            min-height: 28px;
            letter-spacing: 0.5px;
        }

        .win-text { color: #00ff88; text-shadow: 0 0 15px rgba(0, 255, 136, 0.6); }
        .lose-text { color: #ff3366; text-shadow: 0 0 10px rgba(255, 51, 102, 0.3); }
        .info-text { color: #00f2fe; }

        @keyframes pulseGlow {
            from { transform: scale(1); }
            to { transform: scale(1.02); }
        }
    </style>
</head>
<body>

    <header>
        <h1>STARDUST SLOTS</h1>
        <p style="color: #6c6382; font-weight: 500;">Играй на игровые, выводи реальные</p>
    </header>

    <div class="balance-container">
        <div class="balance-card">
            <div class="balance-info">
                <span class="balance-text">Игровой баланс</span>
                <span class="balance-value" id="game-balance">100 ⭐</span>
            </div>
            <a href="https://t.me/markplau" target="_blank" class="btn-action btn-deposit">Пополнить</a>
        </div>

        <div class="balance-card" style="border-color: rgba(0, 255, 136, 0.15);">
            <div class="balance-info">
                <span class="balance-text">Баланс вывода (Мин. 15 / Макс. 100)</span>
                <span class="balance-value" id="payout-balance">0 🏆</span>
            </div>
            <div class="withdraw-box">
                <input type="number" id="withdraw-amount" class="withdraw-input" value="15" min="15" max="100">
                <button class="btn-action btn-withdraw" onclick="requestWithdraw()">Вывод</button>
            </div>
        </div>
    </div>

    <div class="slot-machine">
        <div class="screen">
            <div class="slots-container">
                <div class="slot-window" id="w1"><div class="slot-reel" id="reel1"></div></div>
                <div class="slot-window" id="w2"><div class="slot-reel" id="reel2"></div></div>
                <div class="slot-window" id="w3"><div class="slot-reel" id="reel3"></div></div>
            </div>
        </div>

        <div class="control-panel">
            <div class="input-group">
                <span class="input-label">Ставка (Тратит ⭐)</span>
                <input type="number" id="bet" class="bet-input" value="10" min="1">
            </div>
            <button class="btn-spin" id="spin-btn" onclick="startSpin()">ЗАПУСК</button>
        </div>

        <div id="status-display">Удачи! Твой выигрыш пойдет на выводной баланс!</div>
    </div>

    <script>
        let gameBalance = 100;   // Баланс для игры
        let payoutBalance = 0;    // Баланс для вывода
        
        const symbols = ['🍒', '🍋', '🍇', '🍉', '⭐', '💎', '7️⃣'];
        const TILE_HEIGHT = 110; 
        const REEL_SEQUENCE_COUNT = 30;

        function initReels() {
            for (let i = 1; i <= 3; i++) {
                const reel = document.getElementById(`reel${i}`);
                let html = '';
                for (let j = 0; j < REEL_SEQUENCE_COUNT; j++) {
                    const randomSymbol = symbols[Math.floor(Math.random() * symbols.length)];
                    html += `<div class="slot-tile">${randomSymbol}</div>`;
                }
                reel.innerHTML = html;
                reel.style.top = `-${(REEL_SEQUENCE_COUNT - 1) * TILE_HEIGHT}px`;
            }
        }

        async function startSpin() {
            const betInput = document.getElementById('bet');
            const btn = document.getElementById('spin-btn');
            const display = document.getElementById('status-display');
            const gameBalanceEl = document.getElementById('game-balance');

            let bet = parseInt(betInput.value);

            if (isNaN(bet) || bet <= 0) {
                display.className = 'lose-text';
                display.innerText = '⚠️ Введи верную ставку!';
                return;
            }
            if (bet > gameBalance) {
                display.className = 'lose-text';
                display.innerText = '⚠️ Недостаточно игровых звёзд ⭐!';
                return;
            }

            btn.disabled = true;
            betInput.disabled = true;
            display.className = 'info-text';
            display.innerText = 'Барабаны запущены...';

            for(let i=1; i<=3; i++) document.getElementById(`w${i}`).classList.remove('winner-glow');

            // Списываем ставку с игрового баланса
            gameBalance -= bet;
            gameBalanceEl.innerText = `${gameBalance} ⭐`;

            const finalResults = [
                symbols[Math.floor(Math.random() * symbols.length)],
                symbols[Math.floor(Math.random() * symbols.length)],
                symbols[Math.floor(Math.random() * symbols.length)]
            ];

            const p1 = animateReel(1, finalResults[0], 1.5);
            const p2 = animateReel(2, finalResults[1], 2.0);
            const p3 = animateReel(3, finalResults[2], 2.5);

            await Promise.all([p1, p2, p3]);

            btn.disabled = false;
            betInput.disabled = false;

            processResult(finalResults, bet);
        }

        function animateReel(reelNum, targetSymbol, durationSeconds) {
            return new Promise(resolve => {
                const reel = document.getElementById(`reel${reelNum}`);
                const windowEl = document.getElementById(`w${reelNum}`);
                
                const tiles = reel.getElementsByClassName('slot-tile');
                tiles[0].innerText = targetSymbol; 
                
                windowEl.classList.add('blur-effect');
                reel.style.transition = `top ${durationSeconds}s cubic-bezier(0.25, 0.1, 0.2, 1)`;
                reel.style.top = '0px';

                setTimeout(() => {
                    windowEl.classList.remove('blur-effect');
                    
                    setTimeout(() => {
                        reel.style.transition = 'none';
                        let html = '';
                        for (let j = 0; j < REEL_SEQUENCE_COUNT - 1; j++) {
                            html += `<div class="slot-tile">${symbols[Math.floor(Math.random() * symbols.length)]}</div>`;
                        }
                        html += `<div class="slot-tile">${targetSymbol}</div>`;
                        reel.innerHTML = html;
                        reel.style.top = `-${(REEL_SEQUENCE_COUNT - 1) * TILE_HEIGHT}px`;
                        resolve();
                    }, 50);

                }, durationSeconds * 1000);
            });
        }

        function processResult(results, bet) {
            const display = document.getElementById('status-display');
            const payoutBalanceEl = document.getElementById('payout-balance');
            
            const [r1, r2, r3] = results;

            // Выигрыш начисляется на выводной баланс (🏆)
            if (r1 === r2 && r2 === r3) {
                let multiplier = 5;
                if (r1 === '7️⃣') multiplier = 15;
                if (r1 === '💎') multiplier = 10;

                let win = bet * multiplier;
                payoutBalance += win;
                display.className = 'win-text';
                display.innerText = `🔥 ДЖЕКПОТ x${multiplier}! На вывод зачислено +${win} 🏆!`;
                
                for(let i=1; i<=3; i++) document.getElementById(`w${i}`).classList.add('winner-glow');
            } 
            else if (r1 === r2 || r2 === r3 || r1 === r3) {
                let win = Math.floor(bet * 1.5);
                payoutBalance += win;
                display.className = 'win-text';
                display.innerText = `🎉 Совпадение! На вывод зачислено +${win} 🏆`;
                
                if (r1 === r2) { document.getElementById('w1').classList.add('winner-glow'); document.getElementById('w2').classList.add('winner-glow'); }
                else if (r2 === r3) { document.getElementById('w2').classList.add('winner-glow'); document.getElementById('w3').classList.add('winner-glow'); }
                else if (r1 === r3) { document.getElementById('w1').classList.add('winner-glow'); document.getElementById('w3').classList.add('winner-glow'); }
            } 
            else {
                display.className = 'lose-text';
                display.innerText = 'Увы, пустая комбинация. Попробуй еще!';
            }

            payoutBalanceEl.innerText = `${payoutBalance} 🏆`;
        }

        function requestWithdraw() {
            const display = document.getElementById('status-display');
            const withdrawInput = document.getElementById('withdraw-amount');
            const payoutBalanceEl = document.getElementById('payout-balance');
            
            let amount = parseInt(withdrawInput.value);

            if (isNaN(amount) || amount < 15 || amount > 100) {
                display.className = 'lose-text';
                display.innerText = '⚠️ Лимиты вывода: от 15 до 100 🏆 звёзд!';
                return;
            }

            if (amount > payoutBalance) {
                display.className = 'lose-text';
                display.innerText = '⚠️ Недостаточно звёзд на балансе вывода!';
                return;
            }

            // Списываем звёзды с баланса вывода
            payoutBalance -= amount;
            payoutBalanceEl.innerText = `${payoutBalance} 🏆`;

            display.className = 'win-text';
            display.innerText = `Заявка одобрена! Перенаправление на @markplau...`;

            const textMessage = encodeURIComponent(`Привет! Я хочу вывести ${amount} звёзд из казино.`);
            const tgUrl = `https://t.me/markplau?text=${textMessage}`;

            setTimeout(() => {
                window.open(tgUrl, '_blank');
            }, 1000);
        }

        window.onload = initReels;
    </script>
</body>
</html>
