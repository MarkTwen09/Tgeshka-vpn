<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shaman Coin Slot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        <header class="header">
            <div class="wallet-btn">👛</div>
            <div class="balance-container">
                <span class="coin-icon">🪙</span>
                <span id="balance">0</span>
            </div>
            <div class="profile">👤</div>
        </header>

        <div class="shaman-container">
            <img src="https://via.placeholder.com/200x200?text=Shaman" alt="Shaman" class="shaman-img">
        </div>

        <div class="slot-machine">
            <div class="bet-badge">СТАВКА X1 ⚡</div>
            
            <div class="slots-container">
                <div class="slot-window" id="slot1">🎰</div>
                <div class="slot-window" id="slot2">🎰</div>
                <div class="slot-window" id="slot3">🎰</div>
            </div>

            <div class="mana-section">
                <div class="mana-bar-container">
                    <div class="mana-bar" id="manaBar"></div>
                    <span class="mana-text" id="manaText">50/50</span>
                </div>
                <div class="mana-label">Фулл мана</div>
            </div>

            <div class="control-panel">
                <button class="side-btn">🎯</button>
                <button class="spin-btn" id="spinBtn">SPIN</button>
                <button class="side-btn">🧪</button>
            </div>
        </div>

        <nav class="bottom-nav">
            <div class="nav-item">📋<span>Задания</span></div>
            <div class="nav-item">👥<span>Друзья</span></div>
            <div class="nav-item active">☀️<span>Спин</span></div>
            <div class="nav-item">⚡<span>Бусты</span></div>
            <div class="nav-item">⭐<span>Рейтинг</span></div>
        </nav>
    </div>

    <script src="script.js"></script>
</body>
</html>
