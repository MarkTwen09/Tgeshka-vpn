<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SO2 CASE SIMULATOR: ULTRA DESIGN</title>
    <style>
        :root {
            --bg: radial-gradient(circle at top, #1a1f2b 0%, #05070a 100%);
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #ffcc00;
            --stattrak: #ff8000;
            --blue: #00e6ff;
            --common: #b0c3d9; --uncommon: #5e98d9; --rare: #4b69ff; --epic: #8847ff; --legendary: #d32ce6; --arcane: #eb4b4b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body {
            background: var(--bg); color: white; font-family: 'Montserrat', sans-serif;
            display: flex; flex-direction: column; align-items: center; margin: 0; padding: 15px; min-height: 100vh;
            overflow-x: hidden;
        }

        /* HEADER */
        .header-panel {
            background: var(--glass); backdrop-filter: blur(15px);
            width: 100%; max-width: 800px; padding: 20px;
            border-radius: 24px; border: 1px solid var(--glass-border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }
        .top-row { display: flex; justify-content: space-between; align-items: center; }
        .balance-val { font-size: 28px; font-weight: 800; color: var(--accent); text-shadow: 0 0 15px rgba(255,204,0,0.3); }

        .stats-panel {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
            margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--glass-border);
            font-size: 10px; color: #8b949e; text-transform: uppercase; letter-spacing: 1px;
        }
        .stat-item b { color: #fff; display: block; font-size: 14px; margin-top: 2px; }

        /* TABS */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; width: 100%; max-width: 800px; }
        .tab-btn {
            flex: 1; padding: 14px; background: var(--glass); border: 1px solid var(--glass-border);
            color: #8b949e; border-radius: 16px; cursor: pointer; font-weight: 700; transition: 0.4s;
        }
        .tab-btn.active { background: var(--blue); color: #000; box-shadow: 0 0 20px rgba(0,230,255,0.4); border-color: transparent; }

        /* ROULETTE */
        .roulette-box { 
            height: 180px; background: rgba(0,0,0,0.3); border-radius: 24px; 
            overflow: hidden; position: relative; margin-bottom: 20px; 
            border: 1px solid var(--glass-border); box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }
        .pointer { 
            position: absolute; left: 50%; top: 0; width: 4px; height: 100%; 
            background: #ff4747; z-index: 5; transform: translateX(-50%); 
            box-shadow: 0 0 20px #ff4747; border-radius: 2px;
        }
        .track-card { 
            min-width: 150px; height: 140px; margin: 0 8px; 
            background: linear-gradient(145deg, #1e242e, #161a22); 
            border-radius: 18px; border-bottom: 5px solid #555; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* CARDS */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .item-card { 
            background: var(--glass); padding: 20px; border-radius: 20px; 
            border: 1px solid var(--glass-border); text-align: center; 
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative;
        }
        .item-card:hover { transform: translateY(-5px); background: rgba(255,255,255,0.06); }
        .st-badge { 
            position: absolute; top: 10px; right: 10px; background: var(--stattrak); 
            color: black; font-size: 9px; font-weight: 900; padding: 3px 6px; border-radius: 6px; 
            box-shadow: 0 0 10px rgba(255,128,0,0.4);
        }

        /* BUTTONS */
        .btn { 
            width: 100%; padding: 18px; border: none; border-radius: 18px; 
            font-size: 18px; font-weight: 800; cursor: pointer; 
            background: linear-gradient(135deg, #ffcc00, #ffaa00); 
            color: black; transition: 0.3s; box-shadow: 0 8px 25px rgba(255,204,0,0.3);
            text-transform: uppercase; letter-spacing: 1px;
        }
        .btn:active { transform: scale(0.96); box-shadow: 0 4px 10px rgba(255,204,0,0.2); }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

        /* MODAL */
        .overlay { 
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: rgba(0,0,0,0.85); display:none; align-items:center; 
            justify-content:center; z-index:1000; backdrop-filter: blur(12px); 
        }
        .modal { 
            background: #151921; padding: 40px; border-radius: 32px; 
            border: 1px solid rgba(255,255,255,0.1); text-align: center; 
            width: 90%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            animation: modalShow 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }
        @keyframes modalShow { from { transform: scale(0.8) translateY(30px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }
    </style>
</head>
<body>

    <div class="header-panel">
        <div class="top-row">
            <div>
                <div id="lvlTxt" style="font-weight: 800; color: var(--blue); letter-spacing: 1px;">LEVEL 1</div>
                <div style="width: 120px; height: 6px; background: rgba(255,255,255,0.05); margin-top: 6px; border-radius: 10px; overflow: hidden;">
                    <div id="xpFill" style="height: 100%; background: var(--blue); width: 0%; transition: 0.5s;"></div>
                </div>
            </div>
            <div class="balance-val"><span id="money">1000</span> G</div>
        </div>
        
        <div class="stats-panel">
            <div class="stat-item">Кейсы<b id="statOpened">0</b></div>
            <div class="stat-item">Лучший дроп<b id="statBest">---</b></div>
            <div class="stat-item">Прибыль<b id="statProfit">0 G</b></div>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('cases')">МАГАЗИН</button>
        <button class="tab-btn" onclick="switchTab('market')">РЫНОК</button>
        <button class="tab-btn" onclick="switchTab('inventory')">ИНВЕНТАРЬ</button>
    </div>

    <div id="cases-view" class="view-section active">
        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px;">
            <div id="c-furious" class="case-card item-card active" onclick="setCase('furious')" style="padding: 10px;">📦<br><small>FURIOUS</small></div>
            <div id="c-revenge" class="case-card item-card" onclick="setCase('revenge')" style="padding: 10px;">💜<br><small>REVENGE</small></div>
            <div id="c-empire" class="case-card item-card" onclick="setCase('empire')" style="padding: 10px;">🟡<br><small>EMPIRE</small></div>
        </div>
        <div class="roulette-box"><div class="pointer"></div><div id="track" class="track"></div></div>
        <button id="spinBtn" class="btn" onclick="spin()">Открыть кейс</button>
    </div>

    <div id="market-view" class="view-section"><div id="marketGrid" class="grid"></div></div>
    <div id="inventory-view" class="view-section"><div id="invGrid" class="grid"></div></div>

    <div id="winModal" class="overlay">
        <div class="modal">
            <span id="stWinLabel" style="color:var(--stattrak); font-weight:900; letter-spacing: 2px; display:none;">STATTRAK™</span>
            <div id="winIcon" style="font-size:100px; filter: drop-shadow(0 0 20px rgba(255,255,255,0.2));">🔫</div>
            <h2 id="winName" style="margin: 10px 0;"></h2>
            <p id="winRarity" style="font-weight:800; text-transform: uppercase; margin-bottom: 30px;"></p>
            <button class="btn" onclick="closeWin()">В инвентарь</button>
            <button class="btn" style="background:none; color:#8b949e; margin-top:15px; box-shadow: none; font-size: 14px;" onclick="sellImmediately()">Продать за <span id="winPrice">0</span> G</button>
        </div>
    </div>

    <script>
        // ... (скрипт остается тем же, что и в прошлой версии, только обновляем localStorage ключи на s10 для чистоты дизайна)
        const skinsDB = [
            { id: 0, name: "G22 | Casual", rarity: "common", basePrice: 10, icon: "🔫" },
            { id: 1, name: "USP | Genesis", rarity: "uncommon", basePrice: 35, icon: "🔫" },
            { id: 2, name: "M4 | Tiger", rarity: "rare", basePrice: 120, icon: "🔫" },
            { id: 3, name: "AKR | Necro", rarity: "epic", basePrice: 450, icon: "🔫" },
            { id: 4, name: "AWM | Scratch", rarity: "legendary", basePrice: 1200, icon: "🎯" },
            { id: 5, name: "Karambit | Gold", rarity: "arcane", basePrice: 15000, icon: "🔪" }
        ];

        const cases = {
            furious: { cost: 100, weights: [60, 25, 10, 4, 0.8, 0.2] },
            revenge: { cost: 250, weights: [30, 40, 20, 8, 1.5, 0.5] },
            empire: { cost: 500, weights: [0, 0, 10, 50, 30, 10] }
        };

        let money = parseInt(localStorage.getItem('s10_money')) || 5000;
        let inv = JSON.parse(localStorage.getItem('s10_inv')) || [];
        let xp = parseInt(localStorage.getItem('s10_xp')) || 0;
        let curCase = 'furious';
        let marketPrices = {};
        let lastWin = null;
        let totalOpened = parseInt(localStorage.getItem('s10_opened')) || 0;
        let bestItem = localStorage.getItem('s10_best') || "---";
        let bestPrice = parseInt(localStorage.getItem('s10_best_price')) || 0;
        let totalProfit = parseInt(localStorage.getItem('s10_profit')) || 0;

        skinsDB.forEach(s => marketPrices[s.id] = { price: s.basePrice, trend: 1 });

        function updateMarket() {
            skinsDB.forEach(s => {
                let change = (Math.random() * 0.14 - 0.07);
                marketPrices[s.id].price = Math.max(5, Math.round(marketPrices[s.id].price * (1 + change)));
                marketPrices[s.id].trend = change > 0 ? 1 : -1;
            });
            render();
        }
        setInterval(updateMarket, 6000);

        function render() {
            document.getElementById('money').innerText = money.toLocaleString();
            document.getElementById('xpFill').style.width = (xp % 1000 / 10) + "%";
            document.getElementById('lvlTxt').innerText = "LEVEL " + (Math.floor(xp / 1000) + 1);
            document.getElementById('statOpened').innerText = totalOpened;
            document.getElementById('statBest').innerText = bestItem;
            document.getElementById('statProfit').innerText = totalProfit.toLocaleString() + " G";

            const iGrid = document.getElementById('invGrid'); iGrid.innerHTML = '';
            inv.forEach((it, idx) => {
                const p = Math.round(marketPrices[it.id].price * (it.isST ? 2 : 1));
                const d = document.createElement('div');
                d.className = 'item-card';
                d.style.boxShadow = `0 0 15px var(--${it.rarity})`;
                d.style.borderColor = it.isST ? 'var(--stattrak)' : `var(--${it.rarity})`;
                if(it.isST) d.innerHTML += `<span class="st-badge">ST</span>`;
                d.innerHTML += `<div style="font-size:40px">${it.icon}</div><div style="font-size:11px; margin:5px 0;">${it.name}</div><b style="color:var(--accent)">${p} G</b>`;
                d.onclick = () => { money += p; totalProfit += p; inv.splice(idx, 1); render(); };
                iGrid.appendChild(d);
            });

            const mGrid = document.getElementById('marketGrid'); mGrid.innerHTML = '';
            skinsDB.forEach(s => {
                const d = document.createElement('div');
                d.className = 'item-card';
                const trend = marketPrices[s.id].trend > 0 ? `<span style="color:var(--green)">▲</span>` : `<span style="color:#ff4747">▼</span>`;
                d.innerHTML = `<div style="font-size:40px">${s.icon}</div><div style="font-size:11px; margin:5px 0;">${s.name}</div><b style="color:var(--accent)">${marketPrices[s.id].price} G</b> ${trend}`;
                mGrid.appendChild(d);
            });

            localStorage.setItem('s10_money', money);
            localStorage.setItem('s10_inv', JSON.stringify(inv));
            localStorage.setItem('s10_xp', xp);
            localStorage.setItem('s10_opened', totalOpened);
            localStorage.setItem('s10_best', bestItem);
            localStorage.setItem('s10_best_price', bestPrice);
            localStorage.setItem('s10_profit', totalProfit);
        }

        function spin() {
            if (money < cases[curCase].cost) return alert("Недостаточно голды!");
            money -= cases[curCase].cost;
            totalOpened++;
            render();
            
            const track = document.getElementById('track');
            track.innerHTML = ''; track.style.transition = 'none'; track.style.transform = 'translateX(0)';
            
            let win;
            for(let i=0; i<60; i++) {
                let r = Math.random() * 100, cur = 0, s;
                for(let j=0; j<6; j++) {
                    cur += cases[curCase].weights[j];
                    if(r <= cur) { s = skinsDB[j]; break; }
                }
                if(i === 55) win = {...s, isST: Math.random() < 0.05};
                let d = document.createElement('div'); d.className = 'track-card';
                d.style.borderBottomColor = `var(--${s.rarity})`;
                d.innerHTML = `<div style="font-size:40px">${s.icon}</div><div style="font-size:10px; color:#8b949e;">${s.name}</div>`;
                track.appendChild(d);
            }

            document.getElementById('spinBtn').disabled = true;
            setTimeout(() => {
                track.style.transition = 'transform 7s cubic-bezier(0.1, 0, 0.1, 1)';
                track.style.transform = `translateX(-${55 * 166 - (window.innerWidth/2 - 83)}px)`;
            }, 50);

            setTimeout(() => {
                document.getElementById('spinBtn').disabled = false;
                lastWin = win;
                let cp = Math.round(marketPrices[win.id].price * (win.isST ? 2 : 1));
                if (cp > bestPrice) { bestPrice = cp; bestItem = (win.isST ? "ST " : "") + win.name; }

                document.getElementById('stWinLabel').style.display = win.isST ? 'block' : 'none';
                document.getElementById('winIcon').innerText = win.icon;
                document.getElementById('winName').innerText = win.name;
                document.getElementById('winRarity').innerText = win.rarity;
                document.getElementById('winRarity').style.color = `var(--${win.rarity})`;
                document.getElementById('winPrice').innerText = cp;
                document.getElementById('winModal').style.display = 'flex';
                render();
            }, 7200);
        }

        function closeWin() { inv.unshift(lastWin); xp += 200; document.getElementById('winModal').style.display = 'none'; render(); }
        function sellImmediately() { let p = Math.round(marketPrices[lastWin.id].price * (lastWin.isST ? 2 : 1)); money += p; totalProfit += p; document.getElementById('winModal').style.display = 'none'; render(); }
        function switchTab(t) { document.querySelectorAll('.view-section, .tab-btn').forEach(el => el.classList.remove('active')); document.getElementById(t + '-view').classList.add('active'); if(event) event.currentTarget.classList.add('active'); }
        function setCase(c) { curCase = c; document.querySelectorAll('.case-card').forEach(b => b.classList.remove('active')); document.getElementById('c-' + c).classList.add('active'); }

        updateMarket();
    </script>
</body>
</html>
