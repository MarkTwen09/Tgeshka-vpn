<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TGESHKA VPN | Анонимный веб-прокси</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0a0f1f, #010101);
            font-family: 'Orbitron', 'Segoe UI', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Глитч-сетка на фоне */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,255,255,0.03) 0px, rgba(0,255,255,0.03) 2px, transparent 2px, transparent 6px);
            pointer-events: none;
            z-index: 0;
        }

        /* Основной контейнер */
        .vpn-container {
            position: relative;
            z-index: 2;
            width: 95%;
            max-width: 1300px;
            background: rgba(8, 12, 20, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 3rem;
            border: 1px solid rgba(0, 255, 255, 0.5);
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.2), inset 0 0 30px rgba(0, 255, 255, 0.05);
            padding: 2rem;
            transition: all 0.4s ease;
        }

        /* Заголовок */
        .glitch-title {
            text-align: center;
            font-size: 2.4rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #0ff;
            text-shadow: 0 0 8px cyan, 0 0 20px cyan;
            margin-bottom: 2rem;
            animation: glitch 3s infinite;
        }

        @keyframes glitch {
            0%, 100% { text-shadow: 0 0 8px cyan, 0 0 20px cyan; }
            95% { text-shadow: -2px 0 red, 2px 0 blue; }
            96% { text-shadow: 2px 0 red, -2px 0 blue; }
        }

        /* Неоновая кнопка */
        .neon-btn {
            display: block;
            width: 320px;
            margin: 0 auto 2rem auto;
            padding: 1.2rem 2rem;
            font-size: 1.6rem;
            font-weight: bold;
            text-align: center;
            text-transform: uppercase;
            background: linear-gradient(135deg, #0ff, #0a4);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            border: 2px solid #0ff;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 8px #0ff, 0 0 20px #0ff;
            letter-spacing: 3px;
            backdrop-filter: blur(4px);
            font-family: 'Orbitron', monospace;
        }

        .neon-btn:hover {
            transform: scale(1.03);
            box-shadow: 0 0 20px cyan, 0 0 40px cyan;
            border-color: #f0f;
        }

        /* Панель управления (появляется после активации) */
        .dashboard {
            display: none;
            animation: fadeSlideUp 0.6s ease-out;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Строка поиска */
        .search-bar {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin: 1.5rem 0;
            background: rgba(0, 20, 30, 0.6);
            padding: 0.8rem;
            border-radius: 60px;
            border: 1px solid rgba(0, 255, 255, 0.4);
        }

        .url-input {
            flex: 1;
            background: #0a0f1a;
            border: 1px solid #0ff;
            border-radius: 40px;
            padding: 1rem 1.5rem;
            font-size: 1rem;
            font-family: monospace;
            color: #0ff;
            outline: none;
            transition: 0.2s;
        }

        .url-input:focus {
            box-shadow: 0 0 10px #0ff;
            background: #000;
        }

        .go-btn {
            background: rgba(0, 255, 255, 0.2);
            border: 1px solid #0ff;
            border-radius: 40px;
            padding: 0 2rem;
            font-weight: bold;
            font-size: 1.1rem;
            color: cyan;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
        }

        .go-btn:hover {
            background: rgba(0, 255, 255, 0.5);
            box-shadow: 0 0 12px cyan;
        }

        /* Индикатор шифрования */
        .crypto-status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .radar {
            width: 35px;
            height: 35px;
            background: radial-gradient(circle, rgba(0,255,255,0.4) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            animation: radarPulse 1.2s infinite;
        }

        @keyframes radarPulse {
            0% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(0,255,255,0.4);}
            100% { transform: scale(1.2); box-shadow: 0 0 0 10px rgba(0,255,255,0);}
        }

        .badge {
            background: rgba(0,0,0,0.6);
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-family: monospace;
            border-left: 3px solid cyan;
            color: #0ff;
            letter-spacing: 1px;
        }

        /* iframe-браузер */
        .browser-frame {
            width: 100%;
            height: 65vh;
            min-height: 450px;
            border: 2px solid rgba(0, 255, 255, 0.6);
            border-radius: 28px;
            background: #111;
            overflow: hidden;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.3);
            margin-top: 1rem;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #fff;
        }

        footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.7rem;
            opacity: 0.7;
            color: #0ff;
        }

        @media (max-width: 700px) {
            .vpn-container { padding: 1rem; }
            .neon-btn { width: 260px; font-size: 1.2rem; }
            .browser-frame { height: 55vh; }
            .glitch-title { font-size: 1.6rem; }
        }
    </style>
</head>
<body>
<div class="vpn-container">
    <div class="glitch-title">⚡ TGESHKA VPN ⚡</div>
    <button id="toggleBtn" class="neon-btn">АКТИВИРОВАТЬ VPN</button>

    <div id="dashboard" class="dashboard">
        <div class="crypto-status">
            <div class="radar"></div>
            <div class="badge">🔒 ЗАЩИТА: AES-256 + ALLOY PROXY</div>
            <div class="badge" id="statusText">СОЕДИНЕНИЕ АКТИВНО</div>
        </div>
        <div class="search-bar">
            <input type="text" id="siteInput" class="url-input" placeholder="Введите адрес сайта (например, youtube.com)" value="https://google.com">
            <button id="goBtn" class="go-btn">ПЕРЕЙТИ</button>
        </div>
        <div class="browser-frame">
            <iframe id="proxyFrame" src="about:blank" title="Анонимный браузер TGESHKA"></iframe>
        </div>
        <footer>🔥 Трафик через защищённый прокси-шлюз | Обход блокировок | Анонимность</footer>
    </div>
</div>

<script>
    // Рабочий публичный прокси (AlloyProxy) — надёжный, не требует ключей
    const PROXY_URL = "https://alloyproxy.com/?url=";

    let isActive = false;   // активен ли VPN-режим

    // DOM элементы
    const toggleBtn = document.getElementById('toggleBtn');
    const dashboard = document.getElementById('dashboard');
    const proxyFrame = document.getElementById('proxyFrame');
    const siteInput = document.getElementById('siteInput');
    const goBtn = document.getElementById('goBtn');
    const statusSpan = document.getElementById('statusText');

    // Функция загрузки сайта через прокси
    function loadSite(url) {
        if (!isActive) return;
        let target = url.trim();
        if (!target) return;

        // Добавляем протокол, если отсутствует
        if (!target.match(/^https?:\/\//i)) {
            target = 'https://' + target;
        }

        // Кодируем URL и формируем прокси-ссылку
        const encodedUrl = encodeURIComponent(target);
        const proxyLink = PROXY_URL + encodedUrl;

        // Загружаем в iframe
        proxyFrame.src = proxyLink;
        console.log(`[TGESHKA] Загружаем через прокси: ${proxyLink}`);
    }

    // Активация VPN
    function activateVPN() {
        if (isActive) return;
        isActive = true;

        // Показываем панель
        dashboard.style.display = 'block';

        // Меняем кнопку
        toggleBtn.textContent = 'ДЕАКТИВИРОВАТЬ VPN';
        toggleBtn.style.borderColor = '#f0f';
        toggleBtn.style.boxShadow = '0 0 20px #f0f';
        toggleBtn.style.color = '#f0f';

        // Загружаем стартовый сайт
        const startUrl = siteInput.value.trim() || 'https://google.com';
        loadSite(startUrl);

        // Обновляем статус с анимацией
        statusSpan.textContent = '🔓 ЗАЩИТА АКТИВНА';
        setTimeout(() => {
            if (isActive) statusSpan.textContent = '⚡ СОЕДИНЕНИЕ ЗАШИФРОВАНО';
        }, 800);
    }

    // Деактивация VPN
    function deactivateVPN() {
        if (!isActive) return;
        isActive = false;

        // Скрываем панель
        dashboard.style.display = 'none';

        // Возвращаем кнопку
        toggleBtn.textContent = 'АКТИВИРОВАТЬ VPN';
        toggleBtn.style.borderColor = '#0ff';
        toggleBtn.style.boxShadow = '0 0 8px #0ff, 0 0 20px #0ff';
        toggleBtn.style.color = 'transparent';

        // Очищаем iframe
        proxyFrame.src = 'about:blank';
    }

    // Обработчик кнопки включения/выключения
    toggleBtn.addEventListener('click', () => {
        if (isActive) {
            deactivateVPN();
        } else {
            activateVPN();
        }
    });

    // Обработчик кнопки "Перейти"
    goBtn.addEventListener('click', () => {
        if (!isActive) {
            alert('Сначала активируйте VPN, нажав на большую кнопку!');
            return;
        }
        const url = siteInput.value;
        if (url) {
            loadSite(url);
        } else {
            alert('Введите адрес сайта');
        }
    });

    // Обработка нажатия Enter в поле ввода
    siteInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            if (!isActive) {
                alert('Активируйте VPN перед использованием');
                return;
            }
            loadSite(siteInput.value);
        }
    });

    // Небольшой эффект "бегущих цифр" для статуса (дополнительная атмосфера)
    setInterval(() => {
        if (isActive && statusSpan) {
            const messages = ['🔒 ЗАШИФРОВАНО', '⚡ ПРОКСИ ОНЛАЙН', '🌐 АНОНИМНО', '🛡️ БЛОКИРОВКИ СНЯТЫ'];
            if (Math.random() > 0.95) {
                const randomMsg = messages[Math.floor(Math.random() * messages.length)];
                statusSpan.textContent = randomMsg;
                setTimeout(() => {
                    if (isActive) statusSpan.textContent = '⚡ СОЕДИНЕНИЕ ЗАШИФРОВАНО';
                }, 1500);
            }
        }
    }, 3000);
</script>
</body>
</html>
