<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stardust Slots Cyber Premium</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background: radial-gradient(circle at center, #110826 0%, #040208 100%);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        body::before, body::after {
            content: '';
            position: absolute;
            width: 350px;
            height: 350px;
            filter: blur(160px);
            opacity: 0.12;
            z-index: -1;
        }
        body::before { background: #ff007f; top: 5%; left: 10%; }
        body::after { background: #00f2fe; bottom: 5%; right: 10%; }

        header {
            text-align: center;
            margin-bottom: 25px;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(45deg, #00f2fe, #ff007f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 40px rgba(0, 242, 254, 0.4);
        }

        /* Балансы */
        .balance-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 460px;
            margin-bottom: 30px;
        }

        .balance-card {
            background: rgba(22, 16, 40, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 16px 24px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            backdrop-filter: blur(20px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
        }

        .balance-info { display: flex; flex-direction: column; }
        .balance-text { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; color: #9d96b8; margin-bottom: 4px; }
        .balance-value { font-weight: 800; font-size: 1.4rem; color: #fff; }

        #game-balance { background: linear-gradient(to right, #ffe600, #ff9900); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        #payout-balance { background: linear-gradient(to right, #00ff88, #00f2fe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .btn-action {
            border: none;
            color: white;
            padding: 11px 22px;
            font-weight: 700;
            font-size: 0.85rem;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.25s ease;
        }

        .btn-deposit { background: linear-gradient(90deg, #ff007f 0%, #7928ca 100%); box-shadow: 0 4px 15px rgba(255, 0, 127, 0.2); }
        .btn-deposit:hover { transform: translateY(-2px); box-shadow: 0 0 25px rgba(255, 0, 127, 0.5); }

        .btn-withdraw { background: linear-gradient(90deg, #00ff88 0%, #00eaec 100%); color: #07040d; box-shadow: 0 4px 15px rgba(0, 255, 136, 0.2); }
        .btn-withdraw:hover { transform: translateY(-2px); box-shadow: 0 0 25px rgba(0, 255, 136, 0.5); }

        .withdraw-box { display: flex; gap: 10px; align-items: center; width: 135px; }
        .withdraw-input { width: 100%; background: #05030a; border: 1px solid rgba(255, 255, 255, 0.1); color: #00ff88; padding: 9px; border-radius: 8px; font-weight: 700; text-align: center; outline: none; }

        /* Игровой автомат */
        .slot-machine {
            background: linear-gradient(145deg, #18112e, #090614);
            border: 2px solid rgba(255, 0, 127, 0.2);
            border-radius: 28px;
            padding: 30px;
            width: 100%;
            max-width: 460px;
            text-align: center;
            box-shadow: 0 30px 70px rgba(0,0,0,0.8), inset 0 0 30px rgba(121, 40, 202, 0.1);
            position: relative;
        }

        /* ПРОКАЧАННАЯ СТИЛЬНАЯ ЗОНА ЭКРАНА */
        .screen {
            background: radial-gradient(circle at center, #0c081d 0%, #030206 100%);
            border: 2px solid rgba(0, 242, 254, 0.15);
            border-radius: 22px;
            padding: 25px 20px;
            margin-bottom: 25px;
            box-shadow: 0 0 35px rgba(0, 242, 254, 0.05), inset 0 0 30px rgba(0,0,0,0.9);
            position: relative;
            overflow: hidden;
        }

        /* Эффектная неоновая подложка */
        .screen::before {
            content: '';
            position: absolute;
            bottom: -10px; left: 10%; width: 80%; height: 20px;
            background: #ff007f;
            filter: blur(20px);
            opacity: 0.4;
            pointer-events: none;
        }

        .slots-container {
            display: flex;
            justify-content: center;
            gap: 14px;
            position: relative;
        }

        /* Премиальное 3D окно барабана */
        .slot-window {
            background: linear-gradient(180deg, #05030a 0%, #16102b 25%, #16102b 75%, #05030a 100%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            width: 100px;
            height: 115px;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 12px 20px rgba(0,0,0,0.95), 
                        inset 0 -12px 20px rgba(0,0,0,0.95),
                        0 4px 15px rgba(0,0,0,0.5);
        }

        /* Дорогой блик на стекле слотов */
        .slot-window::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0) 45%, rgba(0,242,254,0.02) 100%);
            pointer-events: none;
            z-index: 3;
        }

        .slot-reel {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: absolute;
            width: 100%;
            top: 0;
            left: 0;
            will-change: transform;
            transform: translate3d(0, 0, 0);
        }

        .slot-tile {
            width: 100%;
            height: 115px;
            font-size: 3.4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            filter: drop-shadow(0 6px 10px rgba(0,0,0,0.6));
        }

        /* Эффект вылетающих кубков +0.1 */
        .floating-badge {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 255, 136, 0.15);
            border: 1px solid #00ff88;
            padding: 6px 14px;
            border-radius: 30px;
            color: #00ff88;
            font-weight: 800;
            font-size: 1.2rem;
            text-shadow: 0 0 10px rgba(0,255,136,0.6);
            box-shadow: 0 0 20px rgba(0,255,136,0.3);
            pointer-events: none;
            z-index: 10;
            opacity: 0;
            animation: popUpAndFade 1.3s ease-out forwards;
        }

        /* Плавный размытый моушн-блур */
        .blur-effect {
            filter: blur(5px) saturate(1.2);
            will-change: filter;
        }

        /* Сочный победный неон */
        .winner-glow {
            border-color: #00ff88 !important;
            box-shadow: 0 0 25px rgba(0, 255, 136, 0.7), inset 0 0 15px rgba(0, 255, 136, 0.4);
            animation: winPulse 0.3s infinite alternate;
        }

        .control-panel { display: flex; flex-direction: column; gap: 20px; }
        .input-group { display: flex; flex-direction: column; align-items: flex-start; gap: 8px; }
        .input-label { color: #8a8a9e; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; }

        .bet-input {
            width: 100%;
            background: #06040a;
            border: 1px solid rgba(255, 255, 255, 0.07);
            color: white;
            padding: 15px;
            border-radius: 14px;
            font-size: 1.25rem;
            font-weight: 700;
            text-align: center;
            outline: none;
        }

        .btn-spin {
            background: linear-gradient(135deg, #ff007f 0%, #7928ca 100%);
            border: none;
            color: white;
            padding: 18px;
            font-size: 1.35rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 14px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(255, 0, 127, 0.35);
            transition: all 0.2s ease;
        }
        .btn-spin:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(255, 0, 127, 0.5); }
        .btn-spin:disabled { background: #221d2e; color: #524c61; box-shadow: none; cursor: not-allowed; transform: none; }

        #status-display {
            margin-top: 22px;
            font-size: 1.05rem;
            font-weight: 600;
            min-height: 28px;
        }

        .win-text { color: #00ff88; text-shadow: 0 0 20px rgba(0, 255, 136, 0.5); }
        .lose-text { color: #ff3366; }
        .info-text { color: #00f2fe; }

        @keyframes winPulse {
            from { transform: scale(1); }
            to { transform: scale(1.03); }
        }

        @keyframes popUpAndFade {
            0% { opacity: 0; transform: translate(-50%, -20%) scale(0.7); }
            20% { opacity: 1; transform: translate(-50%, -60%) scale(1.1); }
            45% { transform: translate(-50%, -70%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -120%) scale(0.9); }
        }
    </style>
</head>
<body>

    <header>
        <h1>STARDUST SLOTS</h1>
        <p style="color: #6c6382; font-weight: 500;">VIP Дизайн • Сложный сбор кубков (+0.1 🏆)</p>
    </header>

    <div class="balance-container">
        <div class="balance-card">
            <div class="balance-info">
                <span class="balance-text">Игровой баланс</span>
                <span class="balance-value" id="game-balance">100 ⭐</span>
            </div>
            <button class="btn-action btn-deposit" onclick="redirectToTgDirect()">Пополнить</button>
        </div>

        <div class="balance-card" style="border-color: rgba(0, 255, 136, 0.15);">
            <div class="balance-info">
                <span class="balance-text">Баланс вывода (Мин. 15 / Макс. 100)</span>
                <span class="balance-value" id="payout-balance">0 🏆</span>
            </div>
            <div class="withdraw-box">
                <input type="number" id="withdraw-amount" class="withdraw-input" value="15" min="15" max="100">
                <button class="btn-action btn-withdraw" onclick="requestWithdraw()">Вывод</button>
            </div>
        </div>
    </div>

    <div class="slot-machine">
        <div class="screen" id="slot-screen">
            <div class="slots-container">
                <div class="slot-window" id="w1"><div class="slot-reel" id="reel1"></div></div>
                <div class="slot-window" id="w2"><div class="slot-reel" id="reel2"></div></div>
                <div class="slot-window" id="w3"><div class="slot-reel" id="reel3"></div></div>
            </div>
        </div>

        <div class="control-panel">
            <div class="input-group">
                <span class="input-label">Ставка (⭐)</span>
                <input type="number" id="bet" class="bet-input" value="10" min="1">
            </div>
            <button class="btn-spin" id="spin-btn" onclick="startSpin()">ЗАПУСК</button>
        </div>

        <div id="status-display">Собери 3 одинаковых символа, чтобы заработать выводные кубки!</div>
    </div>

    <script>
        let gameBalance = 100;   
        let payoutBalance = 0;    
        
        const symbols = ['🍒', '🍋', '🍇', '🍉', '⭐', '💎', '7️⃣'];
        const TILE_HEIGHT = 115; 
        
        // Математика распределения шансов (RTP)
        const weights = [
            { sym: '🍒', weight: 28 },
            { sym: '🍋', weight: 26 },
            { sym: '🍇', weight: 20 },
            { sym: '🍉', weight: 15 },
            { sym: '⭐', weight: 8 },
            { sym: '💎', weight: 2 },
            { sym: '7️⃣', weight: 1 }
        ];

        function getRandomSymbol() {
            let num = Math.floor(Math.random() * 100);
            let sum = 0;
            for (let i = 0; i < weights.length; i++) {
                sum += weights[i].weight;
                if (num < sum) return weights[i].sym;
            }
            return symbols[0];
        }

        function initReels() {
            for (let i = 1; i <= 3; i++) {
                const reel = document.getElementById(`reel${i}`);
                generateReelContent(reel, '🍒');
            }
        }

        function generateReelContent(reelEl, targetSymbol, totalTiles = 40) {
            let html = `<div class="slot-tile">${targetSymbol}</div>`;
            for (let j = 1; j < totalTiles; j++) {
                html += `<div class="slot-tile">${symbols[Math.floor(Math.random() * symbols.length)]}</div>`;
            }
            reelEl.innerHTML = html;
            reelEl.style.transform = `translate3d(0, -${(totalTiles - 1) * TILE_HEIGHT}px, 0)`;
        }

        async function startSpin() {
            const betInput = document.getElementById('bet');
            const btn = document.getElementById('spin-btn');
            const display = document.getElementById('status-display');
            const gameBalanceEl = document.getElementById('game-balance');

            let bet = parseInt(betInput.value);

            if (isNaN(bet) || bet <= 0) {
                display.className = 'lose-text';
                display.innerText = '⚠️ Укажи корректную ставку!';
                return;
            }
            if (bet > gameBalance) {
                display.className = 'lose-text';
                display.innerText = '⚠️ Не хватает звёзд ⭐!';
                return;
            }

            btn.disabled = true;
            betInput.disabled = true;
            display.className = 'info-text';
            display.innerText = 'Удача испытывается...';

            for(let i=1; i<=3; i++) document.getElementById(`w${i}`).classList.remove('winner-glow');

            gameBalance -= bet;
            gameBalanceEl.innerText = `${gameBalance} ⭐`;

            const finalResults = [getRandomSymbol(), getRandomSymbol(), getRandomSymbol()];

            const p1 = animateReel(1, finalResults[0], 1.5);
            const p2 = animateReel(2, finalResults[1], 2.0);
            const p3 = animateReel(3, finalResults[2], 2.5);

            await Promise.all([p1, p2, p3]);

            btn.disabled = false;
            betInput.disabled = false;

            processResult(finalResults, bet);
        }

        function animateReel(reelNum, targetSymbol, duration) {
            return new Promise(resolve => {
                const reel = document.getElementById(`reel${reelNum}`);
                const windowEl = document.getElementById(`w${reelNum}`);
                const totalTiles = 40;

                let html = `<div class="slot-tile">${targetSymbol}</div>`;
                for (let j = 1; j < totalTiles; j++) {
                    html += `<div class="slot-tile">${symbols[Math.floor(Math.random() * symbols.length)]}</div>`;
                }
                
                reel.style.transition = 'none';
                reel.innerHTML = html;
                reel.style.transform = `translate3d(0, -${(totalTiles - 1) * TILE_HEIGHT}px, 0)`;

                windowEl.classList.add('blur-effect');
                reel.offsetHeight; 

                // Профессиональный физический отскок (Bounce) в конце
                reel.style.transition = `transform ${duration}s cubic-bezier(0.25, 1.28, 0.4, 0.96)`;
                reel.style.transform = 'translate3d(0, 0, 0)';

                setTimeout(() => {
                    windowEl.classList.remove('blur-effect');
                    resolve();
                }, duration * 1000);
            });
        }

        function triggerFloatingScore() {
            const screen = document.getElementById('slot-screen');
            const badge = document.createElement('div');
            badge.className = 'floating-badge';
            badge.innerText = '+0.1 🏆';
            screen.appendChild(badge);
            
            // Удаляем элемент после завершения анимации
            setTimeout(() => { badge.remove(); }, 1300);
        }

        function processResult(results, bet) {
            const display = document.getElementById('status-display');
            const payoutBalanceEl = document.getElementById('payout-balance');
            const gameBalanceEl = document.getElementById('game-balance');
            
            const [r1, r2, r3] = results;

            // СТРОГО 3 В РЯД
            if (r1 === r2 && r2 === r3) {
                // Игровой баланс: х2 от ставки обратно
                let gameBonus = bet * 2;
                gameBalance += gameBonus;

                // Выводной баланс: строго +0.1 кубка
                let payoutWin = 0.1;
                payoutBalance = parseFloat((payoutBalance + payoutWin).toFixed(1)); 

                gameBalanceEl.innerText = `${gameBalance} ⭐`;
                payoutBalanceEl.innerText = `${payoutBalance} 🏆`;

                display.className = 'win-text';
                display.innerText = `🔥 ПОБЕДА! На игру: +${gameBonus} ⭐ | На вывод: +0.1 🏆`;
                
                // Запуск красивой вылетающей анимации над барабанами
                triggerFloatingScore();
                
                for(let i=1; i<=3; i++) document.getElementById(`w${i}`).classList.add('winner-glow');
            } 
            // 2 совпадения (Вывод = 0, небольшой кэшбек на игру)
            else if (r1 === r2 || r2 === r3 || r1 === r3) {
                let cashback = Math.floor(bet * 0.4);
                gameBalance += cashback;
                gameBalanceEl.innerText = `${gameBalance} ⭐`;
                
                display.className = 'info-text';
                display.innerText = `2 совпадения! Возврат на баланс игры: +${cashback} ⭐`;
            } 
            // Полный проигрыш
            else {
                display.className = 'lose-text';
                display.innerText = 'Комбинация пуста. Испытай удачу снова!';
            }
        }

        function redirectToTgDirect() {
            window.location.href = "https://t.me/markplau";
        }

        function requestWithdraw() {
            const display = document.getElementById('status-display');
            const withdrawInput = document.getElementById('withdraw-amount');
            const payoutBalanceEl = document.getElementById('payout-balance');
            
            let amount = parseInt(withdrawInput.value);

            if (isNaN(amount) || amount < 15 || amount > 100) {
                display.className = 'lose-text';
                display.innerText = '⚠️ Лимиты вывода: строго от 15 до 100 🏆 звёзд!';
                return;
            }

            if (amount > payoutBalance) {
                display.className = 'lose-text';
                display.innerText = '⚠️ Недостаточно кубков на балансе вывода!';
                return;
            }

            payoutBalance = parseFloat((payoutBalance - amount).toFixed(1));
            payoutBalanceEl.innerText = `${payoutBalance} 🏆`;

            display.className = 'win-text';
            display.innerText = `Заявка принята! Перенаправление...`;

            const textMessage = encodeURIComponent(`Привет! Я накопил выигрыш и хочу вывести ${amount} звёзд.`);
            
            setTimeout(() => {
                window.location.href = `https://t.me/markplau?text=${textMessage}`;
            }, 800);
        }

        window.onload = initReels;
    </script>
</body>
</html>
