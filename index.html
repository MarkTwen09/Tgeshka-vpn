<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>RADAR VRV | RUSSIA MONITOR</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #000; font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; }
        #map { height: 100%; width: 100%; }
        .ui { position: fixed; z-index: 9999; pointer-events: none; }
        .panel { background: rgba(0,0,0,0.85); border: 1px solid #ff3333; border-radius: 8px; padding: 12px; pointer-events: auto; color: #fff; backdrop-filter: blur(5px); }
        .top { top: 15px; left: 15px; font-weight: 800; color: #ff3333; text-transform: uppercase; }
        .threats { bottom: 20px; left: 20px; width: 320px; max-height: 50%; overflow-y: auto; }
        .alert-item { background: rgba(255,51,51,0.2); border-left: 5px solid #ff3333; padding: 10px; margin-top: 8px; border-radius: 4px; animation: pulse 1.5s infinite alternate; }
        @keyframes pulse { from { box-shadow: 0 0 5px #ff3333; } to { box-shadow: 0 0 15px #ff3333; } }
    </style>
</head>
<body>

<div id="map"></div>

<div class="ui panel top">RADAR VRV: МОНИТОРИНГ РОССИИ</div>

<div class="ui panel threats">
    <div style="font-size: 11px; color: #888; margin-bottom: 5px;">АКТИВНЫЕ ЦЕЛИ:</div>
    <div id="threat-list">Ожидание эфира...</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', { center: [50.0, 40.0], zoom: 5, zoomControl: false });
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    const activeThreats = new Map();
    const layers = new Map();

    // БАЗА РЕГИОНОВ (ПОЛ-РОССИИ)
    const REGIONS = {
        "Ставрополье": { c: [[43.5, 41.0], [46.2, 46.0]], keys: ["невинка", "невинномысск", "ставрополь", "ставропольский"] },
        "Краснодарский край": { c: [[44.0, 37.0], [46.8, 41.0]], keys: ["краснодар", "сочи", "новороссийск", "туапсе", "кубань"] },
        "Крым": { c: [[44.4, 32.5], [46.2, 36.6]], keys: ["крым", "севастополь", "керчь", "симферополь", "джанкой"] },
        "Ростовская обл.": { c: [[46.0, 38.0], [50.1, 44.0]], keys: ["ростов", "таганрог", "шахты", "новочеркасск"] },
        "Белгородская обл.": { c: [[50.0, 35.5], [51.3, 39.1]], keys: ["белгород", "шебекино", "валуйки", "грайворон"] },
        "Курская обл.": { c: [[50.8, 33.8], [52.4, 36.6]], keys: ["курск", "суджа", "рыльск", "льгов"] },
        "Воронежская обл.": { c: [[49.5, 38.2], [52.1, 43.1]], keys: ["воронеж", "лиски", "острогожск"] },
        "Брянская обл.": { c: [[52.0, 31.2], [54.0, 35.5]], keys: ["брянск", "клинцы", "стародуб"] },
        "Москва и МО": { c: [[54.2, 35.2], [56.9, 40.2]], keys: ["москва", "подмосковье", "люберцы", "одинцово", "раменское"] },
        "Тульская обл.": { c: [[52.9, 36.2], [54.9, 38.8]], keys: ["тула", "ефремов"] },
        "Калужская обл.": { c: [[53.3, 33.4], [55.4, 37.1]], keys: ["калуга", "обнинск"] }
    };

    async function scan() {
        try {
            // Используем RSS2JSON как самый стабильный мост
            const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=https://tg.i-c-a.su/rss/vrv_radar&t=${Date.now()}`);
            const data = await res.json();
            if (data.status !== 'ok') return;

            const items = data.items.slice(0, 7); // Проверяем последние 7 постов

            items.forEach(item => {
                const text = item.content.toLowerCase();
                for (let r in REGIONS) {
                    const isTarget = REGIONS[r].keys.some(k => text.includes(k));
                    const isAlert = ["опасность", "внимание", "угроза", "ракетная", "бпла", "пуск"].some(w => text.includes(w));
                    const isClear = ["отбой", "чисто", "снята"].some(w => text.includes(w));

                    if (isTarget) {
                        if (isClear) activeThreats.delete(r);
                        else if (isAlert) activeThreats.set(r, item.title || "Зафиксирована активность");
                    }
                }
            });
            render();
        } catch (e) { console.log("Связь..."); }
    }

    function render() {
        const list = document.getElementById('threat-list');
        list.innerHTML = activeThreats.size === 0 ? '<span style="color:#00ff88">● В ЭФИРЕ СПОКОЙНО</span>' : "";
        
        layers.forEach(l => map.removeLayer(l));
        layers.clear();

        activeThreats.forEach((msg, r) => {
            const poly = L.rectangle(REGIONS[r].c, { color: 'red', weight: 2, fillColor: 'red', fillOpacity: 0.4 }).addTo(map);
            layers.set(r, poly);

            const div = document.createElement('div');
            div.className = 'alert-item';
            div.innerHTML = `<b>${r}</b><br><small>${msg}</small>`;
            list.appendChild(div);
        });
    }

    setInterval(scan, 20000);
    scan();
</script>
</body>
</html>
