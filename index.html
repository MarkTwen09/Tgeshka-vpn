<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Lum Game</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }

        body {
            background: radial-gradient(circle at center, #1a0b2e, #05010d);
            color: #fff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        /* Экран меню */
        #menu-screen, #game-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        #game-screen {
            display: none;
            justify-content: flex-start;
        }

        h1 {
            font-size: 4rem;
            color: #00ffcc;
            text-shadow: 0 0 20px rgba(0, 255, 204, 0.6);
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .subtitle {
            color: #8a7fa4;
            font-size: 1.2rem;
            margin-bottom: 40px;
            text-align: center;
        }

        .btn {
            background: linear-gradient(135deg, #00ffcc, #0099ff);
            color: #05010d;
            border: none;
            padding: 15px 40px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 255, 204, 0.4);
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .btn:active {
            transform: scale(0.95);
            box-shadow: 0 2px 5px rgba(0, 255, 204, 0.2);
        }

        /* Игровой интерфейс */
        .hud {
            display: flex;
            width: 100%;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            z-index: 10;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px 20px;
            border-radius: 15px;
            backdrop-filter: blur(5px);
        }

        .score-box, .timer-box {
            font-size: 1.2rem;
            font-weight: bold;
        }

        .score-box span {
            color: #00ffcc;
            font-size: 1.5rem;
        }

        .timer-box span {
            color: #ff3366;
            font-size: 1.5rem;
        }

        /* Игровое поле для ловли элементов */
        #game-area {
            position: relative;
            width: 100%;
            flex-grow: 1;
            margin-top: 20px;
            overflow: hidden;
        }

        /* Падающие элементы */
        .item {
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            cursor: pointer;
            transform: translate(-50%, -50%);
            animation: fall linear forwards;
            touch-action: none;
        }

        @keyframes fall {
            0% { top: -50px; }
            100% { top: calc(100% + 50px); }
        }

        /* Спецэффект при клике */
        .pop {
            position: absolute;
            color: #00ffcc;
            font-weight: bold;
            font-size: 1.5rem;
            animation: floatUp 0.4s ease-out forwards;
            pointer-events: none;
            z-index: 5;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-30px); }
        }
    </style>
</head>
<body>

    <div id="menu-screen">
        <h1>LUM</h1>
        <div class="subtitle">Поймай как можно больше кристаллов! Избегай бомб.</div>
        <div id="last-score" style="margin-bottom: 20px; font-size: 1.2rem; color: #00ffcc; display: none;"></div>
        <button class="btn" onclick="startGame()">Играть</button>
    </div>

    <div id="game-screen">
        <div class="hud">
            <div class="score-box">Очки: <span id="score">0</span></div>
            <div class="timer-box">Время: <span id="timer">30</span>с</div>
        </div>
        <div id="game-area"></div>
    </div>

    <script>
        const menuScreen = document.getElementById('menu-screen');
        const gameScreen = document.getElementById('game-screen');
        const gameArea = document.getElementById('game-area');
        const scoreDisplay = document.getElementById('score');
        const timerDisplay = document.getElementById('timer');
        const lastScoreDisplay = document.getElementById('last-score');

        let score = 0;
        let timeLeft = 30;
        let gameInterval;
        let spawnInterval;
        let gameActive = false;

        // Конфигурация предметов
        // В оригинале Blum это зеленые снежинки, здесь это кристаллы 💎 и бомбы 💣
        const TYPES = [
            { id: 'crystal', icon: '💎', points: 10, chance: 0.85 },
            { id: 'bomb', icon: '💣', points: -50, chance: 0.15 }
        ];

        function startGame() {
            // Сброс состояния
            score = 0;
            timeLeft = 30;
            scoreDisplay.textContent = score;
            timerDisplay.textContent = timeLeft;
            gameArea.innerHTML = '';
            
            // Переключение экранов
            menuScreen.style.display = 'none';
            gameScreen.style.display = 'flex';
            gameActive = true;

            // Таймер игры
            gameInterval = setInterval(() => {
                timeLeft--;
                timerDisplay.textContent = timeLeft;
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);

            // Спавн предметов (каждые 400мс)
            spawnInterval = setInterval(createItem, 400);
        }

        function createItem() {
            if (!gameActive) return;

            const item = document.createElement('div');
            item.classList.add('item');

            // Выбираем тип (кристалл или бомба) на основе шанса
            const rand = Math.random();
            let type = TYPES[0]; // по умолчанию кристалл
            if (rand > TYPES[0].chance) {
                type = TYPES[1]; // бомба
            }

            item.textContent = type.icon;
            item.dataset.type = type.id;
            item.dataset.points = type.points;

            // Рандомная позиция по горизонтали (от 10% до 90% ширины экрана)
            const randomX = Math.floor(Math.random() * 80) + 10;
            item.style.left = randomX + '%';

            // Рандомная скорость падения (от 2 до 4 секунд)
            const speed = (Math.random() * 2 + 2).toFixed(2);
            item.style.animationDuration = speed + 's';

            // Обработка клика / тапа
            item.addEventListener('touchstart', (e) => {
                e.preventDefault(); // Предотвращает двойной тап на смартфонах
                catchItem(item);
            });
            item.addEventListener('mousedown', () => catchItem(item));

            // Удаляем элемент после того, как он упал за экран
            item.addEventListener('animationend', () => {
                item.remove();
            });

            gameArea.appendChild(item);
        }

        function catchItem(item) {
            if (!gameActive) return;

            const points = parseInt(item.dataset.points);
            score += points;
            if (score < 0) score = 0; // Очки не падают ниже нуля
            scoreDisplay.textContent = score;

            // Создаем красивый текст с эффектом на месте клика
            createPopEffect(item.offsetLeft, item.offsetTop, points > 0 ? `+${points}` : points);

            // Удаляем пойманный элемент
            item.remove();
        }

        function createPopEffect(x, y, text) {
            const pop = document.createElement('div');
            pop.classList.add('pop');
            pop.style.left = x + 'px';
            pop.style.top = y + 'px';
            pop.textContent = text;
            
            if (text.startsWith('-')) {
                pop.style.color = '#ff3366'; // Красный цвет для бомбы
            }

            gameArea.appendChild(pop);
            setTimeout(() => pop.remove(), 400);
        }

        function endGame() {
            gameActive = false;
            clearInterval(gameInterval);
            clearInterval(spawnInterval);

            // Показываем счет в меню
            lastScoreDisplay.textContent = `Ваш результат в Lum: ${score} очков!`;
            lastScoreDisplay.style.display = 'block';

            // Возврат на экран меню
            gameScreen.style.display = 'none';
            menuScreen.style.style.display = 'flex'; // небольшая страховка для сброса стилей flex
            menuScreen.setAttribute("style", "display: flex;");
        }
    </script>
</body>
</html>
