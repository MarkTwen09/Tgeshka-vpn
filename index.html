<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>RADAR VRV | СИСТЕМА МОНИТОРИНГА</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --danger: #ff3333; --safe: #00ff66; --bg: #050505; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; overflow: hidden; height: 100vh; }
        
        #map { height: 100%; width: 100%; z-index: 1; filter: saturate(1.2) brightness(0.8); }
        
        .ui-overlay { position: fixed; z-index: 1000; pointer-events: none; }
        .top-bar { top: 0; left: 0; right: 0; padding: 15px; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); display: flex; justify-content: space-between; pointer-events: auto; }
        
        .brand { font-weight: 900; letter-spacing: 2px; color: var(--danger); text-shadow: 0 0 10px rgba(255,51,51,0.5); }
        .status-led { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: var(--safe); margin-right: 5px; box-shadow: 0 0 10px var(--safe); }
        
        .threat-panel { bottom: 20px; left: 15px; width: 300px; max-height: 45%; background: rgba(10,10,15,0.9); border: 1px solid rgba(255,51,51,0.3); border-radius: 15px; padding: 15px; overflow-y: auto; pointer-events: auto; backdrop-filter: blur(10px); }
        .threat-item { background: rgba(255,255,255,0.05); border-left: 4px solid var(--danger); padding: 10px; margin-bottom: 10px; border-radius: 5px; animation: slideIn 0.3s ease-out; }
        
        #log-box { top: 60px; right: 15px; width: 250px; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 8px; font-family: monospace; font-size: 11px; color: #aaa; border-right: 2px solid var(--danger); }
        .log-entry { margin-bottom: 4px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 2px; }

        @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes zonePulse { 0% { fill-opacity: 0.2; } 100% { fill-opacity: 0.6; } }
        .pulse-zone { animation: zonePulse 1s infinite alternate; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="ui-overlay top-bar">
    <div class="brand">🛰 РАДАР ВРВ</div>
    <div id="global-status"><span class="status-led"></span> <span id="sync-time">СИНХРОНИЗАЦИЯ...</span></div>
</div>

<div class="ui-overlay threat-panel">
    <div style="font-size: 12px; color: #888; margin-bottom: 10px; text-transform: uppercase; font-weight: bold;">Активные угрозы:</div>
    <div id="threat-list">
        <div style="color: #444; font-size: 13px;">Угроз не обнаружено</div>
    </div>
</div>

<div class="ui-overlay" id="log-box"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // --- КОНФИГУРАЦИЯ ---
    const map = L.map('map', { center: [48.0, 40.0], zoom: 6, zoomControl: false });
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    const activeAlerts = new Map();
    const regionLayers = new Map();

    const REGIONS = {
        "Ставропольский край": { bounds: [[43.5, 41.0], [46.2, 46.0]], keywords: ["невинка", "невинномысск", "ставрополь", "пятигорск", "минеральные"] },
        "Белгородская область": { bounds: [[50.0, 35.5], [51.3, 39.0]], keywords: ["белгород", "шебекино", "валуйки", "грайворон"] },
        "Курская область": { bounds: [[50.8, 33.8], [52.4, 36.5]], keywords: ["курск", "суджа", "рыльск", "глушково"] },
        "Воронежская область": { bounds: [[49.5, 38.0], [52.2, 43.0]], keywords: ["воронеж", "лиски", "острогожск"] },
        "Ростовская область": { bounds: [[46.0, 38.0], [50.0, 44.0]], keywords: ["ростов", "таганрог", "азов", "шахты"] },
        "Крым": { bounds: [[44.2, 32.3], [46.3, 36.8]], keywords: ["крым", "севастополь", "керчь", "джанкой"] }
    };

    const START_WORDS = ["опасность", "фиксация", "угроза", "начало", "внимание", "пуски"];
    const END_WORDS = ["отбой", "снята", "миновала", "чисто"];

    function addLog(msg, isUrgent = false) {
        const box = document.getElementById('log-box');
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        entry.style.color = isUrgent ? '#ff3333' : '#aaa';
        entry.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
        box.prepend(entry);
        if (box.children.length > 10) box.lastChild.remove();
    }

    function updateVisuals() {
        const list = document.getElementById('threat-list');
        list.innerHTML = activeAlerts.size === 0 ? "Угроз не обнаружено" : "";
        
        regionLayers.forEach(l => map.removeLayer(l));
        regionLayers.clear();

        activeAlerts.forEach((val, key) => {
            if (REGIONS[key]) {
                const rect = L.rectangle(REGIONS[key].bounds, {
                    color: '#ff0000', weight: 2, fillColor: '#ff0000', fillOpacity: 0.4, className: 'pulse-zone'
                }).addTo(map);
                regionLayers.set(key, rect);

                const item = document.createElement('div');
                item.className = 'threat-item';
                item.innerHTML = `<div style="color:#ff8888; font-weight:bold; font-size:14px;">${key}</div><div style="font-size:11px; opacity:0.8; margin-top:4px;">${val}</div>`;
                list.appendChild(item);
            }
        });
    }

    async function scanTelegram() {
        addLog("Сканирование эфира...");
        try {
            // Тройной обход кэша через AllOrigins
            const ts = Date.now();
            const target = `https://t.me/s/vrv_radar?cb=${ts}`;
            const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(target)}&_=${ts}`;
            
            const res = await fetch(proxy);
            const data = await res.json();
            const doc = new DOMParser().parseFromString(data.contents, 'text/html');
            const messages = Array.from(doc.querySelectorAll('.tgme_widget_message_text')).slice(-5);

            messages.forEach(m => {
                const text = m.innerText.toLowerCase();
                let foundRegionName = null;

                // Поиск региона
                for (let rName in REGIONS) {
                    const hasKey = REGIONS[rName].keywords.some(k => text.includes(k));
                    if (hasKey || text.includes(rName.toLowerCase())) {
                        foundRegionName = rName;
                        break;
                    }
                }

                if (foundRegionName) {
                    const start = START_WORDS.some(w => text.includes(w));
                    const end = END_WORDS.some(w => text.includes(w));

                    if (end) {
                        if (activeAlerts.has(foundRegionName)) {
                            activeAlerts.delete(foundRegionName);
                            addLog(`ОТБОЙ: ${foundRegionName}`);
                        }
                    } else if (start) {
                        if (!activeAlerts.has(foundRegionName)) {
                            activeAlerts.set(foundRegionName, m.innerText.substring(0, 80) + "...");
                            addLog(`ОБНАРУЖЕНО: ${foundRegionName}`, true);
                        }
                    }
                }
            });

            updateVisuals();
            document.getElementById('sync-time').innerText = `ОБНОВЛЕНО: ${new Date().toLocaleTimeString()}`;
        } catch (e) {
            addLog("ОШИБКА СЕТИ (ПОВТОР...)");
        }
    }

    setInterval(scanTelegram, 30000);
    scanTelegram();

    // Секретный тест: Кликни на карту, чтобы зажечь Ставрополье вручную
    map.on('click', () => {
        addLog("ТЕСТ СТАВРОПОЛЬЯ...");
        activeAlerts.set("Ставропольский край", "Тестовый режим: Проверка системы");
        updateVisuals();
        setTimeout(() => { activeAlerts.delete("Ставропольский край"); updateVisuals(); }, 5000);
    });
</script>

</body>
</html>
