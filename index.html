<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GLOBAL CONQUEST: EURASIA FINAL</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #05080c; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100vw; z-index: 1; background: #05080c; }

        /* Левая панель управления */
        .ui-left {
            position: absolute; top: 20px; left: 20px; width: 310px;
            background: rgba(10, 20, 30, 0.95); border: 1px solid #1f2d3d;
            border-radius: 8px; z-index: 1000; padding: 15px; box-shadow: 0 0 35px rgba(0,0,0,0.9);
        }
        .ui-title { color: #00ccff; font-weight: bold; margin-bottom: 10px; border-bottom: 1px solid #1f2d3d; padding-bottom: 5px; text-transform: uppercase; font-size: 14px; }
        .stats-box { display: flex; gap: 20px; margin-bottom: 15px; font-size: 20px; font-weight: bold; }
        
        .btn {
            width: 100%; padding: 11px; margin-bottom: 7px; border: none; border-radius: 5px;
            color: white; font-weight: bold; cursor: pointer; text-align: left; font-size: 12px;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.2); transition: 0.2s;
        }
        .btn-green { background: linear-gradient(180deg, #2b9348, #1a6d1a); }
        .btn-army { background: linear-gradient(180deg, #558b2f, #33691e); }
        .btn-war { background: linear-gradient(180deg, #007bff, #0056b3); text-transform: uppercase; }
        .btn:hover { filter: brightness(1.3); }

        .log-area {
            background: rgba(0,0,0,0.6); border: 1px solid #223344; height: 180px;
            margin-top: 15px; padding: 8px; overflow-y: auto; font-size: 11px; font-family: monospace;
        }
        .sys { color: #ffcc00; }
        .chat-in { width: 100%; background: #0d1117; border: 1px solid #223344; color: white; padding: 10px; margin-top: 10px; box-sizing: border-box; border-radius: 4px; }

        /* Правая панель ID */
        .ui-right {
            position: absolute; top: 20px; right: 20px; width: 250px;
            background: rgba(10, 20, 30, 0.95); border-radius: 8px; z-index: 1000; padding: 15px;
            border-top: 4px solid #00ccff;
        }
        .id-label { color: #00ccff; font-size: 10px; font-weight: bold; }
        .id-val { font-size: 22px; font-weight: bold; margin: 5px 0 15px 0; letter-spacing: 1px; }
        .friend-row { display: flex; gap: 5px; }
        .friend-input { background: #05080c; border: 1px solid #223344; color: white; padding: 8px; flex-grow: 1; border-radius: 3px; font-size: 12px; }
        .ok-btn { background: #28a745; color: white; border: none; padding: 0 15px; border-radius: 3px; cursor: pointer; font-weight: bold; }

        /* Карта - стили стран */
        .country { stroke: #00ccff; stroke-width: 1.5; fill: #1a2634; fill-opacity: 0.4; transition: 0.3s; }
        .war-line { stroke: #ff4444; stroke-width: 3; stroke-dasharray: 6, 6; animation: dash 0.8s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -12; } }
    </style>
</head>
<body>

    <div class="ui-left">
        <div class="ui-title">Действия и чат</div>
        <div class="stats-box">
            <div style="color:#ff9900">🔥 1000</div>
            <div>⚔️ 150</div>
        </div>
        <button class="btn btn-green" onclick="addMsg('Экономика +10%')">📈 Развить экономику (-$200)</button>
        <button class="btn btn-army" onclick="addMsg('Генералы в сборе')">🎖️ Мобилизовать армию (-$300)</button>
        <button class="btn btn-war" onclick="startWar()">🚀 ВТОРЖЕНИЕ (ВЫБЕРИТЕ ЦЕЛЬ)</button>

        <div class="log-area" id="log">
            <div><span class="sys">SYSTEM:</span> Map Loaded. Eurasia Grid Active.</div><div><span style="color:#00ffcc">Dmitry:</span> Got my ID! 987654321</div>
            <div><span style="color:#55aaff">Ivan:</span> Got it, connected.</div>
            <div><span style="color:#ffcc00">Dmitry:</span> Ready to ally?</div>
        </div>
        <input type="text" class="chat-in" placeholder="Введите сообщение...">
    </div>

    <div class="ui-right">
        <div class="id-label">YOUR NETWORK ID: ...</div>
        <div class="id-val">987654321</div>
        <div class="id-label">ЮЮ ДРУГА</div>
        <div class="friend-row">
            <input type="text" class="friend-input" placeholder="friend_id_456">
            <button class="ok-btn" onclick="addMsg('Связь установлена')">OK</button>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', { center: [50, 60], zoom: 4, zoomControl: false, attributionControl: false });
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        let isAttacking = false;
        let myCapital = [55.7, 37.6]; // Начальная база - Москва

        function addMsg(t) {
            const l = document.getElementById('log');
            l.innerHTML += <div><span style="color:#00ffcc">Dmitry:</span> ${t}</div>;
            l.scrollTop = l.scrollHeight;
        }

        function startWar() {
            isAttacking = true;
            addMsg("<span style='color:#ff4444'>ВЫБЕРИТЕ СТРАНУ ДЛЯ ЗАХВАТА НА КАРТЕ!</span>");
        }

        // Загрузка точных границ Евразии
        fetch('https://raw.githubusercontent.com/datasets/geo-boundaries-world-110m/master/countries.geojson')
            .then(res => res.json())
            .then(data => {
                L.geoJSON(data, {
                    style: (f) => ({ className: 'country' }),
                    onEachFeature: (f, layer) => {
                        layer.on('mouseover', () => layer.setStyle({ fillOpacity: 0.7 }));
                        layer.on('mouseout', () => layer.setStyle({ fillOpacity: 0.4 }));
                        layer.on('click', (e) => {
                            if(isAttacking) {
                                executeInvasion(f.properties.name, e.latlng, layer);
                            } else {
                                layer.setStyle({fillColor: '#00ccff', fillOpacity: 0.6});
                                addMsg("Выбрана цель: " + f.properties.name);
                            }
                        });
                    }
                }).addTo(map);
            });

        function executeInvasion(name, target, layer) {
            isAttacking = false;
            addMsg("Войска выдвинулись на " + name);

            // Пунктирная линия наступления
            const line = L.polyline([myCapital, target], {className: 'war-line'}).addTo(map);
            
            setTimeout(() => {
                layer.setStyle({ fillColor: '#ff0000', color: '#ff4444', fillOpacity: 0.6, weight: 3 });
                addMsg("<span style='color:#ff4444'>ПОБЕДА! " + name + " захвачена.</span>");
                map.removeLayer(line);
                myCapital = [target.lat, target.lng]; // Армия закрепляется на новой территории
            }, 1500);
        }
    </script>
</body>
</html>
