<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVT Quantum Analytics Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@2.1.0"></script>
    <style>
        :root {
            --bg-main: #050709;
            --bg-card: #0B0E11;
            --bg-field: #131A22;
            --bg-input: #1A222C;
            --text-main: #EAEEF3;
            --text-muted: #62707F;
            --accent-green: #0ECB81;
            --accent-red: #F6465D;
            --border-color: #1E2732;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            padding: 12px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .terminal-container {
            width: 100%;
            max-width: 440px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            box-shadow: 0 30px 70px rgba(0,0,0,0.8);
        }

        /* Шапка */
        .term-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 12px;
        }

        .brand-zone {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-badge {
            background: linear-gradient(135deg, #0ECB81, #00965B);
            color: #050709;
            font-weight: 800;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-size: 14px;
        }

        .title-pair h1 { font-size: 14px; font-weight: 700; }
        .title-pair span { font-size: 11px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }

        .live-badge {
            font-size: 10px;
            color: var(--accent-green);
            font-weight: 700;
            background: rgba(14, 203, 129, 0.06);
            padding: 4px 10px;
            border-radius: 4px;
            border: 1px solid rgba(14, 203, 129, 0.15);
        }

        /* Блок курса */
        .main-price-box {
            background: var(--bg-field);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 16px;
            text-align: center;
            position: relative;
        }

        .price-label {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 2px;
        }

        .price-value {
            font-size: 38px;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: -1px;
        }

        .price-direction {
            font-size: 12px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-top: 2px;
        }

        /* Панель Таймфреймов */
        .timeframes-bar {
            display: flex;
            gap: 6px;
            background: rgba(0,0,0,0.2);
            padding: 4px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .tf-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 600;
            padding: 6px 0;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .tf-btn.active {
            background: var(--bg-input);
            color: var(--accent-green);
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }

        /* График */
        .chart-box {
            position: relative;
            height: 190px;
            background: var(--bg-field);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 8px;
        }

        /* Биржевой стакан */
        .orderbook-box {
            background: rgba(20, 26, 34, 0.3);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .ob-header {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 600;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 4px;
        }

        .ob-tables {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .ob-row {
            display: flex;
            justify-content: space-between;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            margin-bottom: 3px;
        }

        /* Калькулятор */
        .calculator-box {
            background: var(--bg-field);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .calc-title {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .input-wrapper {
            display: flex;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            align-items: center;
            justify-content: space-between;
        }

        .input-wrapper input {
            background: transparent;
            border: none;
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            font-size: 16px;
            font-weight: 600;
            width: 75%;
            outline: none;
        }

        .input-currency { font-size: 11px; color: var(--text-muted); font-weight: 700; }

        .calc-result {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-muted);
            padding: 0 2px;
        }

        .btn-trade-action {
            background: var(--accent-green);
            color: #050709;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            padding: 14px;
            border-radius: 8px;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            transition: opacity 0.15s;
        }

        .btn-trade-action:hover { opacity: 0.9; }

        /* Метрики сети */
        .market-info-block {
            border-top: 1px dashed var(--border-color);
            padding-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .info-row { display: flex; justify-content: space-between; font-size: 11px; }
        .info-row .lbl { color: var(--text-muted); }
        .info-row .val { font-family: 'JetBrains Mono', monospace; }

        /* Служебное */
        .up { color: var(--accent-green); }
        .down { color: var(--accent-red); }
        .flash-green { animation: flashG 0.3s ease; }
        .flash-red { animation: flashR 0.3s ease; }

        @keyframes flashG { 0% { background: rgba(14, 203, 129, 0.12); } 100% { background: var(--bg-field); } }
        @keyframes flashR { 0% { background: rgba(246, 70, 93, 0.12); } 100% { background: var(--bg-field); } }
    </style>
</head>
<body>

<div class="terminal-container">
    <div class="term-header">
        <div class="brand-zone">
            <div class="logo-badge">S</div>
            <div class="title-pair">
                <h1>Svetsky Terminal</h1>
                <span>SVT / RUB</span>
            </div>
        </div>
        <div class="live-badge">● LIVE MARKET</div>
    </div>

    <div class="main-price-box" id="price-card">
        <div class="price-label" id="price-label-text">Рыночный курс</div>
        <div class="price-value" id="current-price">10.00 ₽</div>
        <div class="price-direction up" id="price-change">+0.00%</div>
    </div>

    <div class="timeframes-bar">
        <button class="tf-btn active" onclick="changeTimeframe('1m', 5000)">1м</button>
        <button class="tf-btn" onclick="changeTimeframe('5m', 10000)">5м</button>
        <button class="tf-btn" onclick="changeTimeframe('1ч', 20000)">1ч</button>
        <button class="tf-btn" onclick="changeTimeframe('1д', 45000)">1д</button>
    </div>

    <div class="chart-box">
        <canvas id="analyticsChart"></canvas>
    </div>

    <div class="orderbook-box">
        <div class="ob-header">
            <span>Заявки на покупку (SVT)</span>
            <span>Заявки на продажу (SVT)</span>
        </div>
        <div class="ob-tables">
            <div id="bids-table"></div>
            <div id="asks-table"></div>
        </div>
    </div>

    <div class="calculator-box">
        <div class="calc-title">Создать ордер на покупку</div>
        <div class="input-wrapper">
            <input type="number" id="rub-input" value="1000" placeholder="Сумма инвестиций">
            <span class="input-currency">RUB</span>
        </div>
        <div class="calc-result">
            <span>К зачислению на баланс:</span>
            <span><strong id="svt-output" style="color: var(--accent-green);">100.00</strong> <strong style="color:#fff">SVT</strong></span>
        </div>
        <a href="https://t.me/markplau" target="_blank" class="btn-trade-action" id="buy-btn">
            Купить 100.00 SVT
        </a>
    </div>

    <div class="market-info-block">
        <div class="info-row">
            <span class="lbl">Рыночная капитализация</span>
            <span class="val" id="market-cap" style="color: #fff;">120,500,000 ₽</span>
        </div>
        <div class="info-row">
            <span class="lbl">Объем торгов (24ч)</span>
            <span class="val" id="volume-24h" style="color: #fff;">4,812,400 ₽</span>
        </div>
    </div>
</div>

<script>
    let basePrice = 10.00;
    let currentPrice = basePrice;
    
    let marketTrend = 0;
    let trendDuration = 0; 

    const maxDataPoints = 25;
    const labels = [];
    let now = Date.now();
    for (let i = maxDataPoints - 1; i >= 0; i--) {
        let t = new Date(now - i * 5000);
        labels.push(t.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit', second: '2-digit' }));
    }
    
    const dataPoints = Array(maxDataPoints).fill(basePrice);

    // Кастомный плагин для рисования вертикальной линии Crosshair
    const crosshairPlugin = {
        id: 'crosshair',
        afterDraw: (chart) => {
            if (chart.tooltip?._active?.length) {
                const activePoint = chart.tooltip._active[0];
                const ctx = chart.ctx;
                const x = activePoint.element.x;
                const topY = chart.scales.y.top;
                const bottomY = chart.scales.y.bottom;

                ctx.save();
                ctx.beginPath();
                ctx.moveTo(x, topY);
                ctx.lineTo(x, bottomY);
                ctx.lineWidth = 1;
                ctx.strokeStyle = 'rgba(98, 112, 127, 0.5)'; // Цвет var(--text-muted) с прозрачностью
                ctx.setLineDash([4, 4]); // Пунктир
                ctx.stroke();
                ctx.restore();
            }
        }
    };

    const ctx = document.getElementById('analyticsChart').getContext('2d');
    const gradGreen = ctx.createLinearGradient(0, 0, 0, 160);
    gradGreen.addColorStop(0, 'rgba(14, 203, 129, 0.12)');
    gradGreen.addColorStop(1, 'rgba(14, 203, 129, 0.0)');

    const gradRed = ctx.createLinearGradient(0, 0, 0, 160);
    gradRed.addColorStop(0, 'rgba(246, 70, 93, 0.12)');
    gradRed.addColorStop(1, 'rgba(246, 70, 93, 0.0)');

    const chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                data: dataPoints,
                borderColor: '#0ECB81',
                borderWidth: 2,
                pointRadius: 0,
                hoverRadius: 5,
                pointHoverBackgroundColor: '#fff',
                pointHoverBorderColor: '#0ECB81',
                pointHoverBorderWidth: 2,
                fill: true,
                backgroundColor: gradGreen,
                tension: 0.35
            }]
        },
        plugins: [crosshairPlugin],
        options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: {
                mode: 'index',
                intersect: false
            },
            plugins: {
                legend: { display: false },
                tooltip: {
                    enabled: false,
                    external: function(context) {
                        const labelText = document.getElementById('price-label-text');
                        const priceDisplay = document.getElementById('current-price');
                        const tooltipModel = context.tooltip;

                        if (tooltipModel.opacity === 0) {
                            labelText.innerText = "Рыночный курс";
                            labelText.style.color = "var(--text-muted)";
                            priceDisplay.innerText = currentPrice.toFixed(2) + ' ₽';
                            chart.draw(); // Перерисовываем для скрытия линии
                            return;
                        }

                        const index = tooltipModel.dataPoints[0].dataIndex;
                        const hoveredPrice = tooltipModel.dataPoints[0].raw;
                        const hoveredTime = chart.data.labels[index];

                        labelText.innerText = `Цена в ${hoveredTime}`;
                        labelText.style.color = "var(--accent-green)";
                        priceDisplay.innerText = hoveredPrice.toFixed(2) + ' ₽';
                    }
                },
                annotation: {
                    annotations: {
                        line1: {
                            type: 'line', yMin: basePrice, yMax: basePrice,
                            borderColor: 'rgba(14, 203, 129, 0.3)', borderWidth: 1, borderDash: [4, 4]
                        }
                    }
                }
            },
            scales: {
                x: { grid: { display: false }, ticks: { display: false } },
                y: {
                    grid: { color: '#131A22' },
                    ticks: {
                        color: '#434E5A',
                        font: { family: 'JetBrains Mono', size: 10 },
                        callback: function(v) { return v.toFixed(2) + ' ₽'; }
                    }
                }
            }
        }
    });

    let currentInterval = null;
    let updateSpeed = 5000; 

    function changeTimeframe(tf, speed) {
        document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        
        for(let i=0; i<maxDataPoints; i++) {
            chart.data.datasets[0].data[i] = currentPrice * (1 + (Math.random()*0.04 - 0.02));
        }
        chart.update();
        
        updateSpeed = speed;
        clearInterval(currentInterval);
        currentInterval = setInterval(tickTerminalEngine, updateSpeed);
    }

    const rubInput = document.getElementById('rub-input');
    const svtOutput = document.getElementById('svt-output');
    const buyBtn = document.getElementById('buy-btn');

    function updateCalculations() {
        const rub = parseFloat(rubInput.value) || 0;
        const out = rub / currentPrice;
        svtOutput.innerText = out.toFixed(2);
        buyBtn.innerText = `Купить ${out.toFixed(2)} SVT`;
    }
    rubInput.addEventListener('input', updateCalculations);

    function refreshOrderBook() {
        const bidsTable = document.getElementById('bids-table');
        const asksTable = document.getElementById('asks-table');
        bidsTable.innerHTML = '';
        asksTable.innerHTML = '';

        for(let i=0; i<4; i++) {
            const bidPrice = currentPrice - (Math.random() * 0.15 + 0.02);
            const bidVol = (Math.random() * 900 + 40).toFixed(1);
            bidsTable.innerHTML += `<div class="ob-row"><span class="up">${Math.max(0.1, bidPrice).toFixed(2)}</span><span style="color:var(--text-muted)">${bidVol}</span></div>`;

            const askPrice = currentPrice + (Math.random() * 0.15 + 0.02);
            const askVol = (Math.random() * 900 + 40).toFixed(1);
            asksTable.innerHTML += `<div class="ob-row"><span class="down">${askPrice.toFixed(2)}</span><span style="color:var(--text-muted)">${askVol}</span></div>`;
        }
    }

    function tickTerminalEngine() {
        if (trendDuration <= 0) {
            trendDuration = Math.floor(Math.random() * 8) + 5;
            if (currentPrice <= 6.5) {
                marketTrend = Math.random() * 0.6 + 0.4; 
            } else if (currentPrice >= 48) {
                marketTrend = -(Math.random() * 0.6 + 0.4); 
            } else {
                marketTrend = (Math.random() * 2 - 1); 
            }
        }
        trendDuration--;

        let volatility = (Math.random() * 1.6 + 0.4); 
        let changePercent = (marketTrend * volatility);

        const priceDiff = currentPrice * (changePercent / 100);
        currentPrice += priceDiff;

        if (currentPrice < 5.00) currentPrice = 5.00 + (Math.random() * 0.2);
        if (currentPrice > 55.00) currentPrice = 55.00 - (Math.random() * 0.4);

        const totalChange = ((currentPrice - basePrice) / basePrice) * 100;

        if (document.getElementById('price-label-text').innerText === "Рыночный курс") {
            document.getElementById('current-price').innerText = currentPrice.toFixed(2) + ' ₽';
        }
        
        updateCalculations();

        document.getElementById('market-cap').innerText = Math.round(12050000 * currentPrice).toLocaleString('ru-RU') + ' ₽';
        document.getElementById('volume-24h').innerText = Math.round(4812400 + (Math.random()*40000 - 20000)).toLocaleString('ru-RU') + ' ₽';

        const priceCard = document.getElementById('price-card');
        const changeEl = document.getElementById('price-change');
        priceCard.classList.remove('flash-green', 'flash-red');

        if (priceDiff >= 0) {
            void priceCard.offsetWidth;
            priceCard.classList.add('flash-green');
            changeEl.innerText = (totalChange >= 0 ? '+' : '') + totalChange.toFixed(2) + '%';
            changeEl.className = 'price-direction up';
            chart.data.datasets[0].borderColor = '#0ECB81';
            chart.data.datasets[0].backgroundColor = gradGreen;
            chart.options.plugins.annotation.annotations.line1.borderColor = 'rgba(14, 203, 129, 0.3)';
        } else {
            void priceCard.offsetWidth;
            priceCard.classList.add('flash-red');
            changeEl.innerText = totalChange.toFixed(2) + '%';
            changeEl.className = 'price-direction down';
            chart.data.datasets[0].borderColor = '#F6465D';
            chart.data.datasets[0].backgroundColor = gradRed;
            chart.options.plugins.annotation.annotations.line1.borderColor = 'rgba(246, 70, 93, 0.3)';
        }

        let t = new Date();
        chart.data.labels.shift();
        chart.data.labels.push(t.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit', second: '2-digit' }));

        chart.data.datasets[0].data.shift();
        chart.data.datasets[0].data.push(currentPrice);
        chart.options.plugins.annotation.annotations.line1.yMin = currentPrice;
        chart.options.plugins.annotation.annotations.line1.yMax = currentPrice;
        chart.update('none');

        refreshOrderBook();
    }

    currentInterval = setInterval(tickTerminalEngine, updateSpeed);
    tickTerminalEngine();
</script>

</body>
</html>
