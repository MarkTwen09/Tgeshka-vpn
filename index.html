<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRAKEN CASINO | Elite Underground</title>
    <style>
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            user-select: none; 
        }
        
        body { 
            background: #020617; 
            color: #f8fafc; 
            min-height: 100vh; 
            padding: 15px; 
            background-image: 
                radial-gradient(circle at 50% 0%, #071930 0%, #020617 80%),
                radial-gradient(circle at 0% 100%, #0c1524 0%, transparent 50%);
            background-attachment: fixed;
        }

        /* Дорогая неоновая шапка */
        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 18px 20px; 
            background: rgba(3, 7, 18, 0.6); 
            border: 1px solid rgba(0, 242, 254, 0.15);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px; 
            margin-bottom: 25px; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.05);
        }

        .logo { 
            font-size: 26px; 
            font-weight: 900; 
            letter-spacing: 4px; 
            background: linear-gradient(90deg, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase; 
            filter: drop-shadow(0 0 10px rgba(0, 242, 254, 0.5));
        }

        .balance-box { 
            background: rgba(251, 191, 36, 0.03); 
            padding: 10px 20px; 
            border-radius: 30px; 
            font-weight: 800; 
            font-size: 18px;
            border: 1px solid rgba(251, 191, 36, 0.3); 
            color: #fbbf24; 
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.1);
            transition: all 0.3s ease;
        }

        .balance-animate {
            transform: scale(1.15);
            text-shadow: 0 0 20px #fbbf24;
        }

        .container { 
            display: flex; 
            flex-direction: column; 
            gap: 25px; 
            max-width: 480px; 
            margin: 0 auto; 
        }

        /* Премиум карточки */
        .card { 
            background: linear-gradient(145deg, rgba(15, 23, 42, 0.9), rgba(8, 13, 28, 0.95)); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            border-radius: 24px; 
            padding: 25px; 
            text-align: center; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), inset 0 1px 1px rgba(255,255,255,0.05);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 0%, rgba(0, 242, 254, 0.05), transparent 60%);
            pointer-events: none;
        }

        .card-title { 
            font-size: 19px; 
            font-weight: 700; 
            margin-bottom: 20px; 
            color: #e2e8f0; 
            text-transform: uppercase; 
            letter-spacing: 2px;
        }

        /* ЭФФЕКТЫ СЛОТОВ: Размытие при вращении */
        .slots-zone { 
            display: flex; 
            justify-content: center; 
            gap: 15px; 
            margin: 20px 0; 
            background: #020617; 
            padding: 15px; 
            border-radius: 18px; 
            border: 1px solid rgba(0, 242, 254, 0.1);
            box-shadow: inset 0 5px 20px rgba(0,0,0,0.8);
        }

        .reel { 
            width: 75px; 
            height: 85px; 
            background: linear-gradient(180deg, #0b1329, #050a14); 
            border-radius: 12px; 
            font-size: 38px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border: 1px solid rgba(255,255,255,0.03);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.1s;
        }

        /* Класс блёра для анимации слотов */
        .blur-motion {
            animation: slotBlur 0.1s infinite alternate;
            filter: blur(4px) cubic-bezier(0.5, 0, 0.5, 1);
        }

        @keyframes slotBlur {
            0% { transform: translateY(-5px); }
            100% { transform: translateY(5px); }
        }

        /* ЭФФЕКТЫ КУБИКОВ: Тряска и 3D вращение */
        .dice-zone { 
            display: flex; 
            justify-content: center; 
            gap: 25px; 
            margin: 20px 0; 
        }

        .dice { 
            width: 70px; 
            height: 70px; 
            background: linear-gradient(135deg, #1e293b, #0f172a); 
            border: 2px solid rgba(0, 242, 254, 0.3); 
            border-radius: 16px; 
            font-size: 32px; 
            font-weight: bold; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: #00f2fe; 
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4), 0 0 15px rgba(0, 242, 254, 0.1);
        }

        .shake-dice {
            animation: diceShake 0.5s ease-in-out;
        }

        @keyframes diceShake {
            0% { transform: scale(1) rotate(0deg); }
            20% { transform: scale(1.2) rotate(-15deg); filter: blur(1px); }
            40% { transform: scale(1.2) rotate(15deg); }
            60% { transform: scale(1.1) rotate(-10deg); }
            80% { transform: scale(1.1) rotate(10deg); }
            100% { transform: scale(1) rotate(0deg); }
        }

        /* ЭФФЕКТЫ КОЛЕСА */
        .wheel-zone { 
            position: relative; 
            width: 160px; 
            height: 160px; 
            margin: 20px auto; 
        }

        .wheel-element { 
            width: 100%; 
            height: 100%; 
            border-radius: 50%; 
            border: 6px solid #0f172a; 
            background: conic-gradient(
                #ef4444 0deg 60deg, 
                #3b82f6 60deg 120deg, 
                #10b981 120deg 180deg, 
                #f59e0b 180deg 240deg, 
                #8b5cf6 240deg 300deg,
                #ec4899 300deg 360deg
            ); 
            box-shadow: 0 0 25px rgba(0, 242, 254, 0.15), inset 0 0 20px rgba(0,0,0,0.6);
            transition: transform 3.5s cubic-bezier(0.1, 0.8, 0.1, 1); 
        }

        .pointer { 
            position: absolute; 
            top: -12px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 0; 
            height: 0; 
            border-left: 12px solid transparent; 
            border-right: 12px solid transparent; 
            border-top: 22px solid #00f2fe; 
            z-index: 5; 
            filter: drop-shadow(0 2px 8px rgba(0, 242, 254, 0.8));
        }

        /* Инпуты ставок */
        input[type="number"] { 
            width: 100%; 
            background: #020617; 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 14px; 
            padding: 14px; 
            color: #fff; 
            font-size: 18px; 
            font-weight: 700; 
            text-align: center; 
            margin-bottom: 15px; 
            outline: none; 
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
            transition: all 0.3s;
        }

        input[type="number"]:focus {
            border-color: #00f2fe;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5), 0 0 15px rgba(0, 242, 254, 0.2);
        }

        /* Премиум Кнопки */
        .action-btn { 
            width: 100%; 
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%); 
            border: none; 
            border-radius: 14px; 
            padding: 15px; 
            color: #020617; 
            font-size: 15px; 
            font-weight: 800; 
            text-transform: uppercase; 
            letter-spacing: 1.5px;
            cursor: pointer; 
            box-shadow: 0 5px 20px rgba(0, 242, 254, 0.3);
            transition: all 0.2s ease;
        }

        .action-btn:active {
            transform: scale(0.97);
            box-shadow: 0 2px 10px rgba(0, 242, 254, 0.2);
        }

        .action-btn:disabled { 
            background: #1e293b; 
            color: #475569; 
            cursor: not-allowed; 
            box-shadow: none; 
        }

        /* Анимированный текст статуса */
        .status-text { 
            margin-top: 15px; 
            font-size: 15px; 
            min-height: 20px; 
            font-weight: 700; 
            letter-spacing: 0.5px;
        }

        .win { 
            color: #10b981; 
            text-shadow: 0 0 15px rgba(16, 185, 129, 0.5);
            animation: winPulse 0.4s ease-in-out infinite alternate;
        }
        
        .lose { 
            color: #ef4444; 
            text-shadow: 0 0 15px rgba(239, 68, 68, 0.4); 
        }

        @keyframes winPulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); }
        }

        footer {
            text-align: center;
            margin-top: 30px;
            color: #334155;
            font-size: 11px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Kraken</div>
        <div class="balance-box" id="balance-container">🪙 <span id="balance">10000</span></div>
    </header>

    <div class="container">
        <!-- СЛОТЫ -->
        <div class="card">
            <div class="card-title">⚓ Кракен Слот</div>
            <div class="slots-zone">
                <div class="reel" id="s1">🐙</div>
                <div class="reel" id="s2">🐙</div>
                <div class="reel" id="s3">🐙</div>
            </div>
            <input type="number" id="slot-bet" value="100">
            <button class="action-btn" id="slot-btn" onclick="runSlots()">Запустить автоматы</button>
            <div class="status-text" id="slot-status"></div>
        </div>

        <!-- КУБИКИ -->
        <div class="card">
            <div class="card-title">🎲 Кости Бездны</div>
            <div class="dice-zone">
                <div class="dice" id="d1">1</div>
                <div class="dice" id="d2">1</div>
            </div>
            <input type="number" id="dice-bet" value="100">
            <button class="action-btn" id="dice-btn" onclick="runDice()">Бросить кости</button>
            <div class="status-text" id="dice-status"></div>
        </div>

        <!-- КОЛЕСО -->
        <div class="card">
            <div class="card-title">🎡 Колесо Судьбы</div>
            <div class="wheel-zone">
                <div class="pointer"></div>
                <div class="wheel-element" id="wheel-obj"></div>
            </div>
            <input type="number" id="wheel-bet" value="100">
            <button class="action-btn" id="wheel-btn" onclick="runWheel()">Испытать фортуну</button>
            <div class="status-text" id="wheel-status"></div>
        </div>
    </div>

    <footer>
        © 2026 KRAKEN CASINO | DESIGNED FOR ELITE PLAYERS
    </footer>

    <script>
        let currentBalance = parseInt(localStorage.getItem('luxury_balance')) || 10000;
        const slotItems = ['🐙', '💎', '🔱', '🪙', '🏴‍☠️'];
        const wheelMultipliers = [3, 0, 2, 0.5, 5, 0];
        let wheelDeg = 0;

        function refreshDisplay(isWin = false) { 
            const balElement = document.getElementById('balance');
            const balContainer = document.getElementById('balance-container');
            
            balElement.textContent = currentBalance.toLocaleString(); 
            localStorage.setItem('luxury_balance', currentBalance);

            if(isWin) {
                balContainer.classList.add('balance-animate');
                setTimeout(() => balContainer.classList.remove('balance-animate'), 400);
            }
        }
        refreshDisplay();
        
        function getValidatedBet(inputId) {
            const val = parseInt(document.getElementById(inputId).value);
            if (isNaN(val) || val <= 0 || val > currentBalance) { 
                alert("Укажите допустимую ставку!"); 
                return 0; 
            }
            return val;
        }

        // УЛУЧШЕННЫЕ СЛОТЫ
        function runSlots() {
            const bet = getValidatedBet('slot-bet'); if (bet === 0) return;
            currentBalance -= bet; refreshDisplay();
            
            const btn = document.getElementById('slot-btn'); btn.disabled = true;
            const r1 = document.getElementById('s1');
            const r2 = document.getElementById('s2');
            const r3 = document.getElementById('s3');
            
            // Включаем сочный эффект размытия движения
            r1.classList.add('blur-motion');
            r2.classList.add('blur-motion');
            r3.classList.add('blur-motion');
            
            document.getElementById('slot-status').innerHTML = "Крутим барабаны...";

            let count = 0;
            const roller = setInterval(() => {
                r1.textContent = slotItems[Math.floor(Math.random() * slotItems.length)];
                r2.textContent = slotItems[Math.floor(Math.random() * slotItems.length)];
                r3.textContent = slotItems[Math.floor(Math.random() * slotItems.length)];
                count++;
                
                if (count > 15) {
                    clearInterval(roller);
                    
                    // Выключаем размытие
                    r1.classList.remove('blur-motion');
                    r2.classList.remove('blur-motion');
                    r3.classList.remove('blur-motion');
                    
                    const res1 = slotItems[Math.floor(Math.random() * slotItems.length)];
                    const res2 = slotItems[Math.floor(Math.random() * slotItems.length)];
                    const res3 = slotItems[Math.floor(Math.random() * slotItems.length)];
                    
                    r1.textContent = res1; r2.textContent = res2; r3.textContent = res3;
                    const status = document.getElementById('slot-status');
                    
                    if (res1 === res2 && res2 === res3) { 
                        const winAmount = bet * 6; currentBalance += winAmount; 
                        status.innerHTML = `<span class="win">ДЖЕКПОТ x6! +${winAmount} 🪙</span>`;
                        refreshDisplay(true);
                    } else if (res1 === res2 || res2 === res3 || res1 === res3) { 
                        const winAmount = bet * 2; currentBalance += winAmount; 
                        status.innerHTML = `<span class="win">ЗОЛОТОЕ СОВПАДЕНИЕ! +${winAmount} 🪙</span>`;
                        refreshDisplay(true);
                    } else { 
                        status.innerHTML = `<span class="lose">Морская пучина забрала ставку</span>`;
                        refreshDisplay(false);
                    }
                    btn.disabled = false;
                }
            }, 70);
        }

        // УЛУЧШЕННЫЕ КУБИКИ
        function runDice() {
            const bet = getValidatedBet('dice-bet'); if (bet === 0) return;
            currentBalance -= bet; refreshDisplay();

            const d1 = document.getElementById('d1');
            const d2 = document.getElementById('d2');
            const btn = document.getElementById('dice-btn');
            
            btn.disabled = true;
            d1.classList.add('shake-dice');
            d2.classList.add('shake-dice');
            document.getElementById('dice-status').innerHTML = "Кости брошены...";

            setTimeout(() => {
                d1.classList.remove('shake-dice');
                d2.classList.remove('shake-dice');
                
                const n1 = Math.floor(Math.random() * 6) + 1; 
                const n2 = Math.floor(Math.random() * 6) + 1;
                
                d1.textContent = n1; d2.textContent = n2;
                const sum = n1 + n2; 
                const status = document.getElementById('dice-status');
                
                if (sum >= 7) { 
                    const winAmount = Math.floor(bet * 1.9); currentBalance += winAmount; 
                    status.innerHTML = `<span class="win">ПОБЕДА (Сумма: ${sum})! +${winAmount} 🪙</span>`; 
                    refreshDisplay(true);
                } else { 
                    status.innerHTML = `<span class="lose">ПРОИГРЫШ (Сумма: ${sum} < 7)</span>`; 
                    refreshDisplay(false);
                }
                btn.disabled = false;
            }, 500);
        }

        // УЛУЧШЕННОЕ КОЛЕСО
        function runWheel() {
            const bet = getValidatedBet('wheel-bet'); if (bet === 0) return;
            currentBalance -= bet; refreshDisplay();
            
            const btn = document.getElementById('wheel-btn'); btn.disabled = true;
            document.getElementById('wheel-status').innerHTML = "Колесо Судьбы запущено...";

            const targetSector = Math.floor(Math.random() * 360);
            wheelDeg += (360 * 5) + targetSector; // 5 полных оборотов для солидности
            
            document.getElementById('wheel-obj').style.transform = `rotate(${wheelDeg}deg)`;

            setTimeout(() => {
                const exactAngle = (360 - (wheelDeg % 360)) % 360;
                const mult = wheelMultipliers[Math.floor(exactAngle / 60)];
                const winAmount = Math.floor(bet * mult); 
                currentBalance += winAmount;
                
                const status = document.getElementById('wheel-status');
                if (mult > 1) {
                    status.innerHTML = `<span class="win">МНОЖИТЕЛЬ x${mult}! +${winAmount} 🪙</span>`;
                    refreshDisplay(true);
                } else if (mult > 0) {
                    status.innerHTML = `<span class="win">ВОЗВРАТ x${mult}! +${winAmount} 🪙</span>`;
                    refreshDisplay(true);
                } else {
                    status.innerHTML = `<span class="lose">СЕКТОР ZERO! Ставка потеряна</span>`;
                    refreshDisplay(false);
                }
                btn.disabled = false;
            }, 3500);
        }
    </script>
</body>
</html>
