<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель Мониторинга (Симулятор)</title>
    <style>
        /* Основные стили в пастельных тонах из скриншота */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #fcf6f4;
            color: #4a3530;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            background: #ffffff;
            width: 100%;
            max-width: 380px;
            border-radius: 28px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(163, 122, 112, 0.1);
            box-sizing: border-box;
        }

        .title {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #4a3530;
        }

        /* Поле ввода номера */
        .input-wrapper {
            display: flex;
            align-items: center;
            background: #fdfaf9;
            border: 1.5px solid #e8dedb;
            border-radius: 16px;
            padding: 12px 16px;
            margin-bottom: 20px;
        }

        .country-badge {
            background: #f0e4e1;
            padding: 6px 10px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
            margin-right: 10px;
        }

        .phone-input {
            border: none;
            outline: none;
            background: transparent;
            font-size: 16px;
            color: #4a3530;
            width: 100%;
        }

        /* Настройки скорости (Кнопки) */
        .section-title {
            font-size: 13px;
            color: #8a7570;
            margin-bottom: 8px;
        }

        .speed-selector {
            display: flex;
            background: #f5eae7;
            border-radius: 14px;
            padding: 4px;
            margin-bottom: 20px;
        }

        .speed-btn {
            flex: 1;
            border: none;
            background: transparent;
            padding: 8px 0;
            font-size: 13px;
            border-radius: 10px;
            cursor: pointer;
            color: #4a3530;
            transition: all 0.2s;
        }

        .speed-btn.active {
            background: #3a221d;
            color: #ffffff;
            font-weight: bold;
        }

        /* Переключатели (Toggle switches) */
        .switch-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .switch-label {
            font-size: 14px;
            font-weight: 500;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #e8dedb;
            transition: .3s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px; width: 18px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider { background-color: #ca8a7c; }
        input:checked + .slider:before { transform: translateX(20px); }

        /* Главная кнопка действия */
        .main-btn {
            width: 100%;
            background: #a64b39;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }

        .main-btn:hover { background: #8f3e2e; }
        .main-btn:disabled { background: #d0c0bc; cursor: not-allowed; }

        /* Имитация логов / терминала */
        .console-box {
            margin-top: 20px;
            background: #261714;
            color: #ffbcae;
            font-family: monospace;
            font-size: 12px;
            padding: 12px;
            border-radius: 16px;
            height: 120px;
            overflow-y: auto;
            border: 1px solid #4a3530;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="title">Панель Тестирования</div>

    <div class="input-wrapper">
        <span class="country-badge">🇷🇺 +7</span>
        <input type="tel" class="phone-input" id="phone" placeholder="999 123-45-67">
    </div>

    <div class="section-title">Регулировка скорости симуляции:</div>
    <div class="speed-selector">
        <button class="speed-btn" onclick="setSpeed(this, 'Медленно')">Медленно</button>
        <button class="speed-btn active" onclick="setSpeed(this, 'Нормально')">По умолчанию</button>
        <button class="speed-btn" onclick="setSpeed(this, 'Быстро')">Быстро</button>
    </div>

    <div class="switch-group">
        <span class="switch-label">Включить логирование API</span>
        <label class="switch">
            <input type="checkbox" id="opt1" checked>
            <span class="slider"></span>
        </label>
    </div>
    
    <div class="switch-group">
        <span class="switch-label">Проверка прокси-серверов</span>
        <label class="switch">
            <input type="checkbox" id="opt2">
            <span class="slider"></span>
        </label>
    </div>

    <div class="switch-group">
        <span class="switch-label">Эмуляция браузерных запросов</span>
        <label class="switch">
            <input type="checkbox" id="opt3" checked>
            <span class="slider"></span>
        </label>
    </div>

    <button class="main-btn" id="actionBtn">Запустить отладку</button>

    <div class="console-box" id="console">
        <div>[Система] Готов к запуску симуляции...</div>
    </div>
</div>

<script>
    let currentSpeed = 'Нормально';
    const actionBtn = document.getElementById('actionBtn');
    const consoleBox = document.getElementById('console');
    const phoneInput = document.getElementById('phone');

    function setSpeed(element, speed) {
        document.querySelectorAll('.speed-btn').forEach(btn => btn.classList.remove('active'));
        element.classList.add('active');
        currentSpeed = speed;
        addLog(`Установлена скорость: ${speed}`);
    }

    function addLog(text) {
        const time = new Date().toLocaleTimeString();
        consoleBox.innerHTML += `<div>[${time}] ${text}</div>`;
        consoleBox.scrollTop = consoleBox.scrollHeight;
    }

    actionBtn.addEventListener('click', () => {
        const number = phoneInput.value.trim();
        if(!number) {
            addLog('Ошибка: Введите номер телефона');
            return;
        }

        actionBtn.disabled = true;
        addLog(`Старт симуляции для номера +7 ${number}...`);

        // Пошаговая цепочка имитации работы
        setTimeout(() => {
            addLog(`[Тест] Режим скорости: ${currentSpeed}`);
        }, 800);

        setTimeout(() => {
            const checkProxy = document.getElementById('opt2').checked;
            addLog(checkProxy ? '[Прокси] Соединение установлено.' : '[Сеть] Прямое подключение.');
        }, 1600);

        setTimeout(() => {
            addLog('[Успешно] Все локальные тесты интерфейса завершены.', 'color: #2ecc71');
            actionBtn.disabled = false;
        }, 3000);
    });
</script>

</body>
</html>
