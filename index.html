<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SO2: DYNAMIC MARKET PRO</title>
    <style>
        :root {
            --bg: #05060a;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #ffcc00;
            --blue: #00d2ff;
            --up: #2ecc71;
            --down: #e74c3c;
            --common: #b0c3d9; --uncommon: #5e98d9; --rare: #4b69ff; --epic: #8847ff; --legendary: #d32ce6; --arcane: #eb4b4b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body {
            background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow-x: hidden;
        }

        .header {
            background: var(--glass); backdrop-filter: blur(20px); width: 100%; max-width: 480px;
            padding: 20px; border-radius: 24px; border: 1px solid var(--border); margin-bottom: 20px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .balance b { font-size: 24px; color: var(--accent); }

        .tabs { display: flex; gap: 8px; width: 100%; max-width: 480px; margin-bottom: 20px; }
        .tab { 
            flex: 1; padding: 14px; background: var(--glass); border: 1px solid var(--border);
            color: #555; border-radius: 16px; font-weight: 800; cursor: pointer; transition: 0.3s;
        }
        .tab.active { background: var(--blue); color: #000; border: none; }

        .view { display: none; width: 100%; max-width: 480px; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* MARKET & INV GRID */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card { 
            background: var(--glass); padding: 20px; border-radius: 22px; text-align: center;
            border: 1px solid var(--border); position: relative; transition: 0.3s;
        }
        .card:active { transform: scale(0.96); }

        .price-row { display: flex; align-items: center; justify-content: center; gap: 5px; margin-top: 10px; font-weight: 900; }
        .trend { font-size: 10px; padding: 2px 6px; border-radius: 6px; }
        .trend.up { color: var(--up); background: rgba(46, 204, 113, 0.1); }
        .trend.down { color: var(--down); background: rgba(231, 76, 60, 0.1); }

        /* ROULETTE */
        .case-sel { display: flex; gap: 10px; margin-bottom: 20px; }
        .c-btn { flex: 1; background: var(--glass); padding: 15px; border-radius: 18px; border: 1px solid var(--border); text-align: center; }
        .c-btn.active { border-color: var(--blue); }

        .win-box { height: 120px; background: #000; border-radius: 20px; position: relative; overflow: hidden; margin-bottom: 20px; }
        .track { display: flex; position: absolute; left: 0; top: 10px; transition: transform 6s cubic-bezier(0.1, 0, 0, 1); }
        .t-item { min-width: 100px; height: 100px; margin: 0 5px; display: flex; align-items: center; justify-content: center; font-size: 40px; border-bottom: 4px solid #333; }

        .btn-main { width: 100%; padding: 18px; border-radius: 18px; border: none; background: var(--accent); font-weight: 900; font-size: 16px; cursor: pointer; }

        /* MODALS */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(10px); }
        .modal { background: #0d1117; padding: 30px; border-radius: 30px; text-align: center; width: 85%; max-width: 350px; border: 1px solid var(--border); }
    </style>
</head>
<body>

    <div class="header">
        <div class="balance"><b><span id="money">0</span> G</b></div>
        <div id="market-status" style="font-size: 9px; color: var(--up);">● LIVE MARKET</div>
    </div>

    <div class="tabs">
        <button class="tab active" onclick="switchTab('cases', event)">Кейсы</button>
        <button class="tab" onclick="switchTab('market', event)">Рынок</button>
        <button class="tab" onclick="switchTab('inv', event)">Инв</button>
    </div>

    <div id="cases" class="view" style="display: block;">
        <div class="case-sel">
            <div id="c0" class="c-btn active" onclick="setCase(0)">📦<br>100G</div>
            <div id="c1" class="c-btn" onclick="setCase(1)">📦<br>250G</div>
            <div id="c2" class="c-btn" onclick="setCase(2)">🔪<br>600G</div>
        </div>
        <div class="win-box"><div id="track" class="track"></div></div>
        <button id="spinBtn" class="btn-main" onclick="spin()">ОТКРЫТЬ</button>
    </div>

    <div id="market" class="view"><div id="marketGrid" class="grid"></div></div>
    <div id="inv" class="view"><div id="invGrid" class="grid"></div></div>

    <div id="winOverlay" class="overlay">
        <div class="modal">
            <div id="winIcon" style="font-size: 70px;">🔫</div>
            <h2 id="winName">Weapon</h2>
            <div id="winRarity" style="font-weight: 900; margin-bottom: 20px;">RARITY</div>
            <button class="btn-main" onclick="take()">В ИНВЕНТАРЬ</button>
            <button class="btn-main" style="background:none; color:#555; margin-top:10px;" onclick="sellNow()">ПРОДАТЬ (<span id="winPrice">0</span>G)</button>
        </div>
    </div>

    <div id="sellOverlay" class="overlay">
        <div class="modal">
            <h3>ПРОДАТЬ?</h3>
            <div id="sellIcon" style="font-size: 50px; margin: 15px 0;">🔫</div>
            <p id="sellText">Вы получите 0 G</p>
            <button class="btn-main" style="background:var(--down); color:white;" onclick="confirmSell()">ПРОДАТЬ</button>
            <button class="btn-main" style="background:none; color:white;" onclick="closeModal()">ОТМЕНА</button>
        </div>
    </div>

    <script>
        const DATABASE = [
            { id: 0, name: "G22 | Casual", rar: "common", p: 15, i: "🔫" },
            { id: 1, name: "USP | Genesis", rar: "uncommon", p: 45, i: "🔫" },
            { id: 2, name: "M4 | Tiger", rar: "rare", p: 160, i: "🔫" },
            { id: 3, name: "AKR | Necro", rar: "epic", p: 550, i: "🔫" },
            { id: 4, name: "AWM | Scratch", rar: "legendary", p: 1400, i: "🎯" },
            { id: 5, name: "Karambit | Gold", rar: "arcane", p: 18000, i: "🔪" },
            { id: 6, name: "M9 | Universe", rar: "arcane", p: 13500, i: "🔪" }
        ];

        let state = {
            bal: parseInt(localStorage.getItem('dyn_bal')) || 5000,
            inv: JSON.parse(localStorage.getItem('dyn_inv')) || [],
            prices: DATABASE.map(s => ({ id: s.id, current: s.p * 1.3, last: s.p * 1.3 })),
            curCase: 0,
            lastWin: null,
            pendingIdx: null
        };

        // ДИНАМИКА ЦЕН
        function tickMarket() {
            state.prices.forEach(p => {
                p.last = p.current;
                const change = (Math.random() * 0.14 - 0.07); // ±7%
                const base = DATABASE.find(x => x.id === p.id).p * 1.3;
                p.current = Math.max(base * 0.5, Math.floor(p.current * (1 + change)));
            });
            if(document.getElementById('market').style.display === 'block') renderMarket();
        }
        setInterval(tickMarket, 5000); // Обновление каждые 5 сек

        function renderMarket() {
            const mG = document.getElementById('marketGrid'); mG.innerHTML = '';
            DATABASE.forEach(s => {
                const p = state.prices.find(x => x.id === s.id);
                const isUp = p.current >= p.last;
                mG.innerHTML += `<div class="card" onclick="buySkin(${s.id}, ${p.current})">
                    <div style="font-size:40px">${s.i}</div>
                    <div style="font-size:11px; font-weight:bold; margin-top:5px">${s.name}</div>
                    <div class="price-row">
                        ${p.current} G 
                        <span class="trend ${isUp ? 'up' : 'down'}">${isUp ? '▲' : '▼'}</span>
                    </div>
                </div>`;
            });
        }

        function renderInv() {
            const iG = document.getElementById('invGrid'); iG.innerHTML = '';
            state.inv.forEach((it, idx) => {
                iG.innerHTML += `<div class="card" onclick="openSell(${idx})">
                    <div style="font-size:40px">${it.i}</div>
                    <div style="font-size:11px; margin-top:5px">${it.name}</div>
                    <div style="color:var(--accent); font-size:12px; margin-top:8px">${it.p} G</div>
                </div>`;
            });
        }

        function spin() {
            const cost = [100, 250, 600][state.curCase];
            if(state.bal < cost) return alert("Мало голды!");
            state.bal -= cost; updateUI();
            
            const track = document.getElementById('track');
            track.style.transition = 'none'; track.style.transform = 'translateX(0)';
            track.innerHTML = '';
            
            let win;
            const pool = [[0,0,1,1,2], [1,2,2,3,4], [3,4,5,6]][state.curCase];
            for(let i=0; i<50; i++) {
                const s = DATABASE[pool[Math.floor(Math.random() * pool.length)]];
                if(i === 45) win = s;
                track.innerHTML += `<div class="t-item" style="border-color:var(--${s.rar})">${s.i}</div>`;
            }

            setTimeout(() => {
                track.style.transition = 'transform 6s cubic-bezier(0.1, 0, 0, 1)';
                track.style.transform = `translateX(-${45 * 110 - (window.innerWidth/2 - 55)}px)`;
            }, 50);

            setTimeout(() => {
                state.lastWin = win;
                document.getElementById('winIcon').innerText = win.i;
                document.getElementById('winName').innerText = win.name;
                document.getElementById('winRarity').innerText = win.rar.toUpperCase();
                document.getElementById('winRarity').style.color = `var(--${win.rar})`;
                document.getElementById('winPrice').innerText = win.p;
                document.getElementById('winOverlay').style.display = 'flex';
                updateUI();
            }, 6200);
        }

        function buySkin(id, pr) {
            if(state.bal < pr) return alert("Мало голды!");
            state.bal -= pr;
            state.inv.unshift({...DATABASE.find(x => x.id === id)});
            updateUI();
        }

        function openSell(idx) {
            state.pendingIdx = idx;
            const it = state.inv[idx];
            document.getElementById('sellIcon').innerText = it.i;
            document.getElementById('sellText').innerText = `Продать ${it.name} за ${it.p} G?`;
            document.getElementById('sellOverlay').style.display = 'flex';
        }

        function confirmSell() {
            state.bal += state.inv[state.pendingIdx].p;
            state.inv.splice(state.pendingIdx, 1);
            closeModal(); updateUI();
        }

        function take() { state.inv.unshift(state.lastWin); closeModal(); updateUI(); }
        function sellNow() { state.bal += state.lastWin.p; closeModal(); updateUI(); }
        function closeModal() { document.querySelectorAll('.overlay').forEach(o => o.style.display = 'none'); }

        function updateUI() {
            document.getElementById('money').innerText = state.bal.toLocaleString();
            localStorage.setItem('dyn_bal', state.bal);
            localStorage.setItem('dyn_inv', JSON.stringify(state.inv));
            renderInv(); renderMarket();
        }

        function switchTab(t, e) {
            document.querySelectorAll('.view, .tab').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
            document.getElementById(t).style.display = 'block';
            e.target.classList.add('active');
            updateUI();
        }

        function setCase(i) {
            state.curCase = i;
            document.querySelectorAll('.c-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('c'+i).classList.add('active');
        }

        updateUI();
    </script>
</body>
</html>
