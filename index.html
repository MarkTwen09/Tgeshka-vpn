<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRAKEN CASINO | Elite Underground</title>
    <style>
        /* Базовые стили и обнуление */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
        }

        body {
            background-color: #030712;
            color: #f3f4f6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background-image: 
                radial-gradient(circle at 50% 0%, #0b1528 0%, #030712 70%);
        }

        /* Шапка сайта */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            background: rgba(3, 7, 18, 0.9);
            border-bottom: 2px solid rgba(0, 242, 254, 0.2);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.8);
        }

        .logo {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 5px;
            text-transform: uppercase;
            background: linear-gradient(90deg, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
        }

        .balance-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 242, 254, 0.3);
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 18px;
            box-shadow: inset 0 0 10px rgba(0, 242, 254, 0.1);
        }

        .balance-amount {
            color: #fbbf24;
            text-shadow: 0 0 10px rgba(251, 191, 36, 0.4);
        }

        /* Главная сетка */
        .container {
            max-width: 1200px;
            width: 100%;
            margin: 40px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        /* Игровые карточки */
        .card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(0, 242, 254, 0.5);
            box-shadow: 0 15px 35px rgba(0, 242, 254, 0.1);
        }

        .card-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #00f2fe;
        }

        /* Зона игры: Слоты */
        .slots-zone {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
            background: #020617;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .reel {
            width: 70px;
            height: 80px;
            background: rgba(255,255,255,0.02);
            border-radius: 8px;
            font-size: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* Зона игры: Кубики */
        .dice-zone {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 25px 0;
        }

        .dice {
            width: 70px;
            height: 70px;
            background: #1e293b;
            border: 2px solid #00f2fe;
            border-radius: 12px;
            font-size: 32px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
        }

        /* Зона игры: Колесо */
        .wheel-zone {
            position: relative;
            width: 160px;
            height: 160px;
            margin: 20px auto;
        }

        .wheel-element {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid #1e293b;
            background: conic-gradient(
                #ef4444 0deg 60deg, 
                #3b82f6 60deg 120deg, 
                #10b981 120deg 180deg, 
                #f59e0b 180deg 240deg, 
                #8b5cf6 240deg 300deg,
                #ec4899 300deg 360deg
            );
            transition: transform 3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .pointer {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-top: 20px solid #00f2fe;
            z-index: 5;
        }

        /* Инпуты и Кнопки */
        .input-group {
            margin-bottom: 15px;
        }

        input[type="number"] {
            width: 100%;
            background: #020617;
            border: 1px solid rgba(0, 242, 254, 0.3);
            border-radius: 10px;
            padding: 12px;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            outline: none;
        }

        input[type="number"]:focus {
            border-color: #00f2fe;
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.3);
        }

        .action-btn {
            width: 100%;
            background: linear-gradient(90deg, #4facfe, #00f2fe);
            border: none;
            border-radius: 10px;
            padding: 14px;
            color: #030712;
            font-size: 14px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3);
            transition: all 0.2s ease;
        }

        .action-btn:hover {
            opacity: 0.9;
            transform: scale(0.98);
        }

        .action-btn:disabled {
            background: #334155;
            color: #64748b;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* Сообщения о результате */
        .status-text {
            margin-top: 15px;
            font-size: 14px;
            font-weight: 600;
            min-height: 20px;
        }

        .win { color: #10b981; text-shadow: 0 0 10px rgba(16, 185, 129, 0.2); }
        .lose { color: #ef4444; text-shadow: 0 0 10px rgba(239, 68, 68, 0.2); }

        /* Подвал */
        footer {
            text-align: center;
            padding: 30px;
            color: #4b5563;
            font-size: 12px;
            letter-spacing: 1px;
            border-top: 1px solid rgba(255,255,255,0.02);
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Kraken</div>
        <div class="balance-box">Баланс: <span class="balance-amount" id="balance">10000</span> 🪙</div>
    </header>

    <div class="container">

        <!-- СЛОТЫ -->
        <div class="card">
            <div class="card-title">⚓ Кракен Слот</div>
            <div class="slots-zone">
                <div class="reel" id="s1">🐙</div>
                <div class="reel" id="s2">🐙</div>
                <div class="reel" id="s3">🐙</div>
            </div>
            <div class="input-group">
                <input type="number" id="slot-bet" value="100" min="1">
            </div>
            <button class="action-btn" id="slot-btn" onclick="runSlots()">Крутить слоты</button>
            <div class="status-text" id="slot-status"></div>
        </div>

        <!-- КУБИКИ -->
        <div class="card">
            <div class="card-title">🎲 Кости Бездны</div>
            <div class="dice-zone">
                <div class="dice" id="d1">1</div>
                <div class="dice" id="d2">1</div>
            </div>
            <div class="input-group">
                <input type="number" id="dice-bet" value="100" min="1">
            </div>
            <button class="action-btn" id="dice-btn" onclick="runDice()">Бросить кубики</button>
            <div class="status-text" id="dice-status"></div>
        </div>

        <!-- КОЛЕСО -->
        <div class="card">
            <div class="card-title">🎡 Колесо Судьбы</div>
            <div class="wheel-zone">
                <div class="pointer"></div>
                <div class="wheel-element" id="wheel-obj"></div>
            </div>
            <div class="input-group">
                <input type="number" id="wheel-bet" value="100" min="1">
            </div>
            <button class="action-btn" id="wheel-btn" onclick="runWheel()">Вращать колесо</button>
            <div class="status-text" id="wheel-status"></div>
        </div>

    </div>

    <footer>
        © 2026 KRAKEN ENTERTAINMENT | PREMIUM HIGH-ROLLER CASINO
    </footer>

    <script>
        // Инициализация игровых данных
        let currentBalance = 10000;
        const slotItems = ['🐙', '💎', '🔱', '🏴‍☠️', '🪙'];
        const wheelMultipliers = [3, 0, 2, 0.5, 5, 0]; // Награды секторов по кругу
        let wheelDeg = 0;

        // Обновление цифры на экране
        function refreshDisplay() {
            document.getElementById('balance').textContent = currentBalance;
        }

        // Проверка ставки перед игрой
        function getValidatedBet(inputId) {
            const val = parseInt(document.getElementById(inputId).value);
            if (isNaN(val) || val <= 0) {
                alert("Укажите правильную сумму ставки!");
                return 0;
            }
            if (val > currentBalance) {
                alert("У вас нет стольки монет!");
                return 0;
            }
            return val;
        }

        // 1. ЛОГИКА СЛОТОВ
        function runSlots() {
            const bet = getValidatedBet('slot-bet');
            if (bet === 0) return;

            currentBalance -= bet;
            refreshDisplay();

            const btn = document.getElementById('slot-btn');
            btn.disabled = true;
            document.getElementById('slot-status').innerHTML = "Вращение...";

            let count = 0;
            const roller = setInterval(() => {
                document.getElementById('s1').textContent = slotItems[Math.floor(Math.random() * slotItems.length)];
                document.getElementById('s2').textContent = slotItems[Math.floor(Math.random() * slotItems.length)];
                document.getElementById('s3').textContent = slotItems[Math.floor(Math.random() * slotItems.length)];
                count++;
                if (count > 12) {
                    clearInterval(roller);
                    finalizeSlots(bet, btn);
                }
            }, 80);
        }

        function finalizeSlots(bet, btn) {
            const res1 = slotItems[Math.floor(Math.random() * slotItems.length)];
            const res2 = slotItems[Math.floor(Math.random() * slotItems.length)];
            const res3 = slotItems[Math.floor(Math.random() * slotItems.length)];

            document.getElementById('s1').textContent = res1;
            document.getElementById('s2').textContent = res2;
            document.getElementById('s3').textContent = res3;

            const status = document.getElementById('slot-status');

            if (res1 === res2 && res2 === res3) {
                const prize = bet * 7;
                currentBalance += prize;
                status.innerHTML = `<span class="win">ДЖЕКПОТ x7! +${prize} 🪙</span>`;
            } else if (res1 === res2 || res2 === res3 || res1 === res3) {
                const prize = bet * 2;
                currentBalance += prize;
                status.innerHTML = `<span class="win">Совпадение! +${prize} 🪙</span>`;
            } else {
                status.innerHTML = `<span class="lose">Мимо. Попробуй еще!</span>`;
            }

            refreshDisplay();
            btn.disabled = false;
        }

        // 2. ЛОГИКА КУБИКОВ
        function runDice() {
            const bet = getValidatedBet('dice-bet');
            if (bet === 0) return;

            currentBalance -= bet;
            refreshDisplay();

            const num1 = Math.floor(Math.random() * 6) + 1;
            const num2 = Math.floor(Math.random() * 6) + 1;

            document.getElementById('d1').textContent = num1;
            document.getElementById('d2').textContent = num2;

            const sum = num1 + num2;
            const status = document.getElementById('dice-status');

            if (sum >= 7) {
                const prize = Math.floor(bet * 1.8);
                currentBalance += prize;
                status.innerHTML = `<span class="win">Сумма ${sum} >= 7! Выиграно: +${prize} 🪙</span>`;
            } else {
                status.innerHTML = `<span class="lose">Сумма ${sum} < 7. Проигрыш!</span>`;
            }

            refreshDisplay();
        }

        // 3. ЛОГИКА КОЛЕСА
        function runWheel() {
            const bet = getValidatedBet('wheel-bet');
            if (bet === 0) return;

            currentBalance -= bet;
            refreshDisplay();

            const btn = document.getElementById('wheel-btn');
            btn.disabled = true;
            document.getElementById('wheel-status').innerHTML = "Колесо крутится...";

            const targetSector = Math.floor(Math.random() * 360);
            wheelDeg += (360 * 4) + targetSector; // 4 полных круга + сектор

            const wheelObj = document.getElementById('wheel-obj');
            wheelObj.style.transform = `rotate(${wheelDeg}deg)`;

            setTimeout(() => {
                const exactAngle = (360 - (wheelDeg % 360)) % 360;
                const sectorIdx = Math.floor(exactAngle / 60);
                const mult = wheelMultipliers[sectorIdx];

                const prize = Math.floor(bet * mult);
                currentBalance += prize;

                const status = document.getElementById('wheel-status');
                if (mult > 1) {
                    status.innerHTML = `<span class="win">Успех x${mult}! Получено +${prize} 🪙</span>`;
                } else if (mult > 0) {
                    status.innerHTML = `<span class="win">Возврат x${mult}: +${prize} 🪙</span>`;
                } else {
                    status.innerHTML = `<span class="lose">Сектор ZERO. 0 🪙</span>`;
                }

                refreshDisplay();
                btn.disabled = false;
            }, 3000);
        }
    </script>
</body>
</html>
