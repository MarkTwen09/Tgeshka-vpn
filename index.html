<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SO2: STABLE V13.2</title>
    <style>
        :root {
            --bg: #0a0f1b;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #ffcc00; --silver: #b0c3d9; --blue: #00d2ff;
            --up: #00ff88; --down: #ff4d4d;
            --common: #b0c3d9; --uncommon: #5e98d9; --rare: #4b69ff; --epic: #8847ff; --legendary: #d32ce6; --arcane: #eb4b4b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body {
            background: var(--bg); background: radial-gradient(circle at 50% -10%, #1a2a4d 0%, #0a0f1b 100%);
            color: white; font-family: 'SF Pro Display', sans-serif; margin: 0; padding: 12px;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow: hidden;
        }

        .header {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); width: 100%; max-width: 480px;
            padding: 15px 20px; border-radius: 32px; border: 1px solid var(--border); margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center; width: 100%;
        }
        .currency-row { display: flex; gap: 15px; }
        .balance-item { display: flex; flex-direction: column; }
        .balance-item label { font-size: 9px; opacity: 0.5; text-transform: uppercase; }
        .gold-txt { color: var(--accent); } .silver-txt { color: var(--silver); }

        .mission-panel {
            background: rgba(0, 210, 255, 0.05); border: 1px dashed var(--blue);
            width: 100%; max-width: 480px; border-radius: 20px; padding: 12px; margin-bottom: 15px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .mission-info h4 { margin: 0; font-size: 13px; color: var(--blue); }
        .m-progress { font-weight: 900; color: #fff; margin-left: 10px; }

        .tabs { display: flex; gap: 8px; width: 100%; max-width: 480px; margin-bottom: 15px; }
        .tab { 
            flex: 1; padding: 12px; background: var(--glass); border: 1px solid var(--border);
            color: #777; border-radius: 15px; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 10px; text-align: center;
        }
        .tab.active { background: var(--blue); color: #000; border: none; }

        .view { display: none; width: 100%; max-width: 480px; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding-bottom: 30px; overflow-y: auto; max-height: 50vh; width: 100%; }
        .card { background: var(--glass); padding: 15px; border-radius: 22px; text-align: center; border: 1px solid var(--border); position: relative; transition: 0.2s; cursor: pointer; }
        .card.selected { border: 2px solid var(--up); box-shadow: 0 0 15px rgba(0,255,136,0.2); }
        
        .market-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .price-change-row { display: flex; align-items: center; gap: 4px; font-size: 10px; font-weight: 900; }
        .price-up { color: var(--up); } .price-down { color: var(--down); }

        .case-selector { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 15px; }
        .case-card { background: var(--glass); padding: 8px; border-radius: 15px; border: 1px solid var(--border); text-align: center; cursor: pointer; font-size: 10px; }
        .case-card.active { border-color: var(--blue); background: rgba(0, 210, 255, 0.1); }

        /* ЭФФЕКТЫ ВЫИГРЫША */
        .glow-circle { 
            position: absolute; width: 320px; height: 320px; 
            background: radial-gradient(circle, var(--rarity-color) 0%, transparent 70%);
            top: 45%; left: 50%; transform: translate(-50%, -50%); opacity: 0.6; 
            filter: blur(50px); z-index: -1; animation: pulseGlow 2.5s infinite ease-in-out; 
        }
        @keyframes pulseGlow { 
            0%, 100% { opacity: 0.4; transform: translate(-50%, -50%) scale(1); } 
            50% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.25); } 
        }
        
        .win-item-icon { 
            font-size: 110px; margin-bottom: 20px; 
            filter: drop-shadow(0 0 30px var(--rarity-color));
            animation: floating 3s infinite ease-in-out; 
        }
        @keyframes floating { 
            0%, 100% { transform: translateY(0) rotate(0deg); } 
            50% { transform: translateY(-25px) rotate(5deg); } 
        }

        .roulette-container { height: 130px; background: rgba(0,0,0,0.4); border-radius: 25px; position: relative; overflow: hidden; margin-bottom: 15px; border: 1px solid var(--border); }
        .track { display: flex; position: absolute; left: 0; top: 10px; transition: transform 6s cubic-bezier(0.1, 0, 0, 1); }
        .t-item { min-width: 110px; height: 110px; margin: 0 6px; background: var(--glass); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 40px; border-bottom: 5px solid #333; }
        .pointer { position: absolute; left: 50%; width: 3px; height: 100%; background: #ff3e3e; z-index: 10; transform: translateX(-50%); }

        .btn-main { width: 100%; padding: 18px; border: none; border-radius: 20px; font-weight: 900; cursor: pointer; background: var(--accent); color: #000; text-transform: uppercase; font-size: 13px; }
        .btn-main:disabled { opacity: 0.2; pointer-events: none; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5,7,12,0.98); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(20px); }
        .modal { background: #121929; padding: 25px; border-radius: 30px; border: 1px solid var(--border); width: 85%; max-width: 380px; text-align: center; }
    </style>
</head>
<body>

    <div class="header">
        <div class="currency-row">
            <div class="balance-item"><label>Gold</label><b class="gold-txt"><span id="money">0</span> G</b></div>
            <div class="balance-item"><label>Silver</label><b class="silver-txt"><span id="silver">0</span> S</b></div>
        </div>
        <div style="font-size: 12px; opacity: 0.4;">V13.2 • kaoface</div>
    </div>

    <div class="mission-panel" id="missionBox">
        <div class="mission-info"><h4 id="mTitle">Миссии</h4><p id="mDesc" style="margin:2px 0; font-size:11px; opacity:0.7;">Фарми валюту</p></div>
        <div style="display:flex; align-items:center; gap:10px;"><span class="m-progress" id="mProgress">0/0</span><button id="mClaimBtn" onclick="claimMission()" style="background:var(--up); border:none; border-radius:10px; padding:8px 12px; font-weight:bold; display:none;">Взять</button></div>
    </div>

    <div class="tabs">
        <div id="t-shop" class="tab active" onclick="tab('shop')">Кейсы</div>
        <div id="t-inv" class="tab" onclick="tab('inv')">Инв</div>
        <div id="t-market" class="tab" onclick="tab('market')">Рынок</div>
        <div id="t-craft" class="tab" onclick="tab('craft')">Крафт</div>
    </div>

    <div id="shop" class="view" style="display: block;">
        <div class="case-selector">
            <div id="c0" class="case-card" onclick="setCase(0)">🔘 100S</div>
            <div id="c1" class="case-card active" onclick="setCase(1)">📦 250G</div>
            <div id="c2" class="case-card" onclick="setCase(2)">📦 500G</div>
            <div id="c3" class="case-card" onclick="setCase(3)">🔪 1500G</div>
        </div>
        <div class="roulette-container"><div class="pointer"></div><div id="track" class="track"></div></div>
        <button id="spinBtn" class="btn-main" onclick="openCase()">Открыть</button>
    </div>

    <div id="inv" class="view"><div id="invGrid" class="grid"></div></div>
    <div id="market" class="view"><div id="marketGrid" class="grid"></div></div>
    <div id="craft" class="view">
        <button id="craftBtn" class="btn-main" style="margin-bottom:15px;" disabled onclick="doCraft()">Начать крафт (10 шт)</button>
        <div id="craftGrid" class="grid"></div>
    </div>

    <div id="winOverlay" class="overlay">
        <div style="text-align:center; position:relative;">
            <div id="rarityGlow" class="glow-circle"></div>
            <div id="winIcon" class="win-item-icon">🔪</div>
            <h2 id="winName" style="margin:0; font-size: 28px;">Item</h2>
            <p id="winRarity" style="font-weight:900; letter-spacing:4px; margin:15px 0 40px; font-size: 14px;"></p>
            <button class="btn-main" onclick="takeWin()" style="margin-bottom: 12px;">В инвентарь</button>
            <button class="btn-main" style="background:none; color:rgba(255,255,255,0.3); border: 1px solid var(--border);" id="sellBtnWin" onclick="sellWin()">Продать</button>
        </div>
    </div>

    <div id="confirmOverlay" class="overlay">
        <div class="modal">
            <h3>Продать предмет?</h3>
            <p id="confirmText" style="opacity:0.7; margin-bottom:20px;"></p>
            <div style="display:flex; gap:10px;">
                <button class="btn-main" style="background:#222; color:#fff;" onclick="closeConfirm()">Отмена</button>
                <button class="btn-main" id="confirmOk" style="background:var(--up);">Продать</button>
            </div>
        </div>
    </div>

    <script>
        const SKINS = [
            { id: 0, name: "G22 | Casual", rar: "common", p: 5, i: "🔫", currency: "S" },
            { id: 1, name: "USP | Genesis", rar: "uncommon", p: 35, i: "🔫", currency: "S" },
            { id: 2, name: "M4 | Tiger", rar: "rare", p: 120, i: "🔫", currency: "G" },
            { id: 3, name: "AKR | Necro", rar: "epic", p: 480, i: "🔫", currency: "G" },
            { id: 4, name: "AWM | Scratch", rar: "legendary", p: 1200, i: "🎯", currency: "G" },
            { id: 5, name: "Karambit | Gold", rar: "arcane", p: 25000, i: "🔪", currency: "G" },
            { id: 6, name: "Butterfly | Star", rar: "arcane", p: 18000, i: "🦋", currency: "G" }
        ];

        const MISSIONS = [
            { id: 'craft', title: 'Крафтер', target: 1, reward: {g: 100} },
            { id: 'sell', title: 'Торговец', target: 3, reward: {g: 50} },
            { id: 'open_silver', title: 'Коллекционер', target: 5, reward: {s: 200} }
        ];

        const RARITIES = ["common", "uncommon", "rare", "epic", "legendary", "arcane"];

        let state = {
            money: parseInt(localStorage.getItem('v12_money')) || 1000,
            silver: parseInt(localStorage.getItem('v12_silver')) || 1000,
            inv: JSON.parse(localStorage.getItem('v12_inv')) || [],
            market: JSON.parse(localStorage.getItem('v12_market')) || SKINS.map(s => ({id: s.id, cur: s.p, chg: 0, old: s.p})),
            curCase: 1, lastWin: null, selCraft: [],
            mission: JSON.parse(localStorage.getItem('v12_mission')) || { typeIdx: 0, progress: 0, cooldown: false }
        };

        function setCase(i) {
            state.curCase = i;
            document.querySelectorAll('.case-card').forEach(c => c.classList.remove('active'));
            document.getElementById('c'+i).classList.add('active');
        }

        function openCase() {
            const costs = [{s:100}, {g:250}, {g:500}, {g:1500}];
            const cost = costs[state.curCase];
            if(cost.g && state.money < cost.g) return alert("Мало Gold!");
            if(cost.s && state.silver < cost.s) return alert("Мало Silver!");
            if(cost.g) state.money -= cost.g; else state.silver -= cost.s;
            if(state.curCase === 0) checkMission('open_silver');
            sync();
            const track = document.getElementById('track');
            track.style.transition = 'none'; track.style.transform = 'translateX(0)'; track.innerHTML = '';
            let win;
            const getSkin = () => {
                const rng = Math.random();
                if(rng < 0.005) return SKINS[Math.floor(Math.random()*2)+5];
                if(rng < 0.06) return SKINS[4]; if(rng < 0.18) return SKINS[3];
                return SKINS[Math.floor(Math.random()*3)];
            };
            for(let i=0; i<60; i++) {
                const s = getSkin(); if(i === 52) win = s;
                track.innerHTML += `<div class="t-item" style="border-bottom-color:var(--${s.rar})">${s.i}</div>`;
            }
            setTimeout(() => { track.style.transition = 'transform 6s cubic-bezier(0.1, 0, 0, 1)'; track.style.transform = `translateX(-${52*122 - (window.innerWidth/2 - 61)}px)`; }, 50);
            setTimeout(() => { state.lastWin = win; showWin(win); }, 6200);
        }

        function sellWithConfirm(idx) {
            const it = state.inv[idx];
            const mPrice = state.market.find(m => m.id === it.id).cur;
            const p = Math.floor(mPrice * 0.8);
            document.getElementById('confirmText').innerText = `${it.name} за ${p} ${it.currency}?`;
            document.getElementById('confirmOverlay').style.display = 'flex';
            document.getElementById('confirmOk').onclick = () => {
                if(it.currency === "G") state.money += p; else state.silver += p;
                state.inv.splice(idx, 1); checkMission('sell'); closeConfirm(); sync();
            };
        }

        function toggleCraft(idx) {
            const pos = state.selCraft.indexOf(idx);
            if(pos > -1) state.selCraft.splice(pos, 1);
            else if(state.selCraft.length < 10) {
                if(state.selCraft.length > 0 && state.inv[state.selCraft[0]].rar !== state.inv[idx].rar) return;
                state.selCraft.push(idx);
            }
            sync();
        }

        function doCraft() {
            const rar = state.inv[state.selCraft[0]].rar;
            const nextRar = RARITIES[Math.min(RARITIES.indexOf(rar) + 1, 5)];
            const pool = SKINS.filter(s => s.rar === nextRar);
            const win = pool[Math.floor(Math.random()*pool.length)];
            state.selCraft.sort((a,b)=>b-a).forEach(i => state.inv.splice(i,1));
            state.selCraft = []; state.lastWin = win; checkMission('craft'); showWin(win); sync();
        }

        function showWin(win) {
            document.getElementById('rarityGlow').style.setProperty('--rarity-color', `var(--${win.rar})`);
            document.getElementById('winIcon').innerText = win.i;
            document.getElementById('winIcon').style.color = `var(--${win.rar})`;
            document.getElementById('winName').innerText = win.name;
            const rt = document.getElementById('winRarity');
            rt.innerText = win.rar.toUpperCase(); rt.style.color = `var(--${win.rar})`;
            const price = Math.floor(state.market.find(m => m.id === win.id).cur * 0.8);
            document.getElementById('sellBtnWin').innerText = `Продать за ${price} ${win.currency}`;
            document.getElementById('winOverlay').style.display = 'flex';
        }

        function takeWin() { state.inv.unshift(state.lastWin); document.getElementById('winOverlay').style.display = 'none'; sync(); }
        function sellWin() { 
            const p = Math.floor(state.market.find(m => m.id === state.lastWin.id).cur * 0.8);
            if(state.lastWin.currency === "G") state.money += p; else state.silver += p;
            checkMission('sell'); document.getElementById('winOverlay').style.display = 'none'; sync(); 
        }

        function buyMarket(id) {
            const mData = state.market.find(m => m.id === id);
            const s = SKINS.find(x => x.id === id);
            if(s.currency === "G" && state.money < mData.cur) return alert("Мало G!");
            if(s.currency === "S" && state.silver < mData.cur) return alert("Мало S!");
            if(s.currency === "G") state.money -= mData.cur; else state.silver -= mData.cur;
            state.inv.unshift({...s}); sync();
        }

        function closeConfirm() { document.getElementById('confirmOverlay').style.display = 'none'; }
        function tab(name) {
            document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(name).style.display = 'block';
            document.getElementById('t-'+name).classList.add('active');
            state.selCraft = []; sync();
        }

        function sync() {
            document.getElementById('money').innerText = state.money.toLocaleString();
            document.getElementById('silver').innerText = state.silver.toLocaleString();
            localStorage.setItem('v12_money', state.money); localStorage.setItem('v12_silver', state.silver);
            localStorage.setItem('v12_inv', JSON.stringify(state.inv)); localStorage.setItem('v12_mission', JSON.stringify(state.mission));

            const m = MISSIONS[state.mission.typeIdx];
            if (state.mission.cooldown) {
                document.getElementById('mTitle').innerText = "Ожидание..."; document.getElementById('mProgress').innerText = "⏰";
                document.getElementById('mClaimBtn').style.display = 'none';
            } else {
                document.getElementById('mTitle').innerText = m.title;
                document.getElementById('mProgress').innerText = `${state.mission.progress}/${m.target}`;
                document.getElementById('mClaimBtn').style.display = (state.mission.progress >= m.target) ? 'block' : 'none';
            }

            const ig = document.getElementById('invGrid'); if(ig) {
                ig.innerHTML = '';
                state.inv.forEach((it, i) => { ig.innerHTML += `<div class="card" onclick="sellWithConfirm(${i})"><div>${it.i}</div><div style="font-size:10px">${it.name}</div><div style="color:var(--${it.rar}); font-size:11px;">Цена: ${state.market.find(m=>m.id===it.id).cur}${it.currency}</div></div>`; });
            }
            const mg = document.getElementById('marketGrid'); if(mg) {
                mg.innerHTML = '';
                state.market.forEach(m => {
                    const s = SKINS.find(x => x.id === m.id);
                    const col = m.cur >= m.old ? 'price-up' : 'price-down';
                    mg.innerHTML += `<div class="card" onclick="buyMarket(${s.id})"><div class="market-header"><span>${s.i}</span><div class="price-change-row ${col}">${m.chg}%</div></div><div style="font-size:10px">${s.name}</div><b>${m.cur}${s.currency}</b></div>`;
                });
            }
            const cg = document.getElementById('craftGrid'); if(cg) {
                cg.innerHTML = '';
                state.inv.forEach((it, i) => { if(it.rar !== "arcane") cg.innerHTML += `<div class="card ${state.selCraft.includes(i)?'selected':''}" onclick="toggleCraft(${i})"><div>${it.i}</div><div style="font-size:10px">${it.rar}</div></div>`; });
                document.getElementById('craftBtn').disabled = (state.selCraft.length < 10);
            }
        }

        function checkMission(type, amount = 1) {
            const m = MISSIONS[state.mission.typeIdx];
            if (state.mission.cooldown || m.id !== type) return;
            state.mission.progress = Math.min(state.mission.progress + amount, m.target);
            sync();
        }

        function updateMarket() {
            state.market.forEach(item => {
                const s = SKINS.find(x => x.id === item.id);
                item.old = item.cur;
                const move = (Math.random() - 0.5) * 0.2;
                item.cur = Math.max(Math.floor(s.p * (1 + move)), 2);
                item.chg = (((item.cur - item.old) / item.old) * 100).toFixed(1);
            });
            sync();
        }
        setInterval(updateMarket, 6000);
        sync();
    </script>
</body>
</html>
