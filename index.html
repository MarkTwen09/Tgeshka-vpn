<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>РАДАР ВРВ | Мониторинг LIVE</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #000; overflow: hidden; height: 100vh; }
        #map { height: 100%; width: 100%; z-index: 1; background: #050505; }
        
        .status-bar {
            position: fixed; top: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
            z-index: 1000; padding: 10px 15px;
            border-bottom: 1px solid #ff3333;
            display: flex; justify-content: space-between; align-items: center;
        }
        .status-title { font-weight: bold; color: #ff3a3a; font-size: 0.9rem; }
        .last-update { font-size: 0.7rem; color: #0f0; font-family: monospace; }

        .threat-panel {
            position: fixed; bottom: 20px; left: 10px; width: 280px;
            max-height: 40%; background: rgba(10,10,15,0.95);
            border-radius: 15px; border: 1px solid #ff3333;
            z-index: 1000; padding: 10px; overflow-y: auto;
        }
        .threat-item { 
            background: #1a1a1a; margin-bottom: 8px; padding: 8px; 
            border-left: 4px solid #ff3333; border-radius: 5px; 
        }
        .threat-region { color: #ff8888; font-weight: bold; font-size: 0.8rem; }
        .threat-msg { color: #ccc; font-size: 0.7rem; margin-top: 3px; }

        #log {
            position: fixed; top: 50px; right: 10px; width: 220px;
            background: rgba(0,0,0,0.8); color: #0f0;
            font-family: monospace; font-size: 10px; padding: 8px;
            border-radius: 5px; z-index: 1000; pointer-events: none;
            max-height: 120px; overflow: hidden;
        }

        @keyframes pulse {
            0% { fill-opacity: 0.3; }
            100% { fill-opacity: 0.7; }
        }
        .danger-zone { animation: pulse 0.8s infinite alternate; }
    </style>
</head>
<body>

<div id="map"></div>
<div class="status-bar">
    <span class="status-title">📡 РАДАР ВРВ LIVE</span>
    <span class="last-update" id="lastUpdateTime">ОЖИДАНИЕ...</span>
</div>

<div class="threat-panel" id="threatPanel">
    <h4 style="color: #ff3333; font-size: 0.8rem; margin-bottom: 8px;">🔴 АКТИВНЫЕ ЗОНЫ:</h4>
    <div id="threatList" style="color: #666; font-size: 0.7rem;">Нет активных угроз</div>
</div>

<div id="log"><div>> Инициализация системы...</div></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', { center: [50.0, 38.0], zoom: 6, zoomControl: false });
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    const activeThreats = new Map();
    const regionLayers = new Map();

    const regions = {
        "Белгородская область": [[50.0, 35.5], [51.2, 39.0]],
        "Курская область": [[50.8, 34.0], [52.3, 36.5]],
        "Воронежская область": [[49.6, 38.0], [52.1, 43.0]],
        "Брянская область": [[52.0, 31.5], [54.0, 35.5]],
        "Ростовская область": [[46.0, 38.5], [50.0, 43.0]],
        "Ставропольский край": [[43.5, 41.0], [46.3, 46.0]],
        "Крым": [[44.3, 32.5], [46.2, 36.6]]
    };

    const cities = {
        "невинномысск": "Ставропольский край", "невинка": "Ставропольский край", "ставрополь": "Ставропольский край",
        "белгород": "Белгородская область", "шебекино": "Белгородская область", "валуйки": "Белгородская область",
        "курск": "Курская область", "суджа": "Курская область", "рыльск": "Курская область",
        "воронеж": "Воронежская область", "брянск": "Брянская область", "ростов": "Ростовская область"
    };

    function addLog(text) {
        const log = document.getElementById('log');
        const d = document.createElement('div');
        d.innerHTML = `> ${text}`;
        log.prepend(d);
        if (log.children.length > 8) log.lastChild.remove();
    }

    function updateMap() {
        const list = document.getElementById('threatList');
        list.innerHTML = activeThreats.size === 0 ? "Нет активных угроз" : "";
        
        // Очистка старых слоев
        regionLayers.forEach(layer => map.removeLayer(layer));
        regionLayers.clear();

        activeThreats.forEach((data, name) => {
            if (regions[name]) {
                const layer = L.rectangle(regions[name], {
                    color: '#ff0000', weight: 2, fillColor: '#ff0000', fillOpacity: 0.5, className: 'danger-zone'
                }).addTo(map);
                regionLayers.set(name, layer);
                
                const item = document.createElement('div');
                item.className = 'threat-item';
                item.innerHTML = `<div class="threat-region">${name}</div><div class="threat-msg">${data.text}</div>`;
                list.appendChild(item);
            }
        });
    }

    async function checkTelegram() {
        try {
            document.getElementById('lastUpdateTime').innerText = "ОБНОВЛЕНИЕ...";
            // Тройной обход кэша
            const url = `https://t.me/s/vrv_radar?v=${Date.now()}&q=${Math.random()}`;
            const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
            
            const response = await fetch(proxy);
            const data = await response.json();
            const doc = new DOMParser().parseFromString(data.contents, 'text/html');
            const posts = Array.from(doc.querySelectorAll('.tgme_widget_message_text')).slice(-5); // Берем 5 последних

            posts.forEach(post => {
                const text = post.innerText.toLowerCase();
                let targetRegion = null;

                // 1. Ищем город/регион
                for (const [city, reg] of Object.entries(cities)) {
                    if (text.includes(city)) { targetRegion = reg; break; }
                }
                for (const regName in regions) {
                    if (text.includes(regName.toLowerCase())) { targetRegion = regName; break; }
                }

                if (targetRegion) {
                    const isStart = ["опасность", "фиксация", "угроза", "начало", "внимание", "пуски"].some(t => text.includes(t));
                    const isEnd = ["отбой", "снята", "миновала", "чисто"].some(t => text.includes(t));

                    if (isEnd) {
                        if (activeThreats.has(targetRegion)) {
                            activeThreats.delete(targetRegion);
                            addLog(`ОТБОЙ: ${targetRegion}`);
                        }
                    } else if (isStart) {
                        if (!activeThreats.has(targetRegion)) {
                            activeThreats.set(targetRegion, { text: post.innerText.substring(0, 60) + "..." });
                            addLog(`ТРЕВОГА: ${targetRegion}`);
                        }
                    }
                }
            });

            updateMap();
            document.getElementById('lastUpdateTime').innerText = new Date().toLocaleTimeString();

        } catch (e) {
            addLog("ОШИБКА СЕТИ");
        }
    }

    setInterval(checkTelegram, 30000);
    checkTelegram();
</script>
</body>
</html>
