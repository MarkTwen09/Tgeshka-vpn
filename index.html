<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KRAKEN | Syndicate Syndicate</title>
    <style>
        :root {
            --bg-main: #060913;
            --panel-titanium: linear-gradient(145deg, #111625, #070a12);
            --gold-premium: linear-gradient(135deg, #c5a880 0%, #e6d3b8 50%, #b39266 100%);
            --gold-glow: #d4af37;
            --carbon-border: rgba(197, 168, 128, 0.1);
            --text-muted: #4b5563;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; padding: 0; 
            font-family: '-apple-system', BlinkMacSystemFont, "SF Pro Display", Roboto, sans-serif;
            user-select: none; 
            -webkit-tap-highlight-color: transparent;
        }
        
        body { 
            background: var(--bg-main); 
            color: #f1f5f9; 
            min-height: 100vh; 
            padding: 15px; 
            background-image: radial-gradient(circle at 50% -20%, rgba(197, 168, 128, 0.06) 0%, transparent 60%);
            background-attachment: fixed;
            overflow-x: hidden;
        }

        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 18px 22px; 
            background: rgba(9, 13, 21, 0.8); 
            border-bottom: 1px solid var(--carbon-border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px; 
            margin-bottom: 25px; 
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
        }

        .logo { 
            font-size: 22px; 
            font-weight: 800; 
            letter-spacing: 6px; 
            background: var(--gold-premium);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase; 
        }

        .balance-box { 
            background: #000; 
            padding: 10px 20px; 
            border-radius: 14px; 
            font-weight: 700; 
            font-size: 16px;
            border: 1px solid var(--carbon-border); 
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .container { 
            display: flex; 
            flex-direction: column; 
            gap: 25px; 
            max-width: 410px; 
            margin: 0 auto; 
        }

        .card { 
            background: var(--panel-titanium);
            border: 1px solid var(--carbon-border); 
            border-radius: 28px; 
            padding: 30px 20px; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }

        .card-title { 
            font-size: 12px; 
            font-weight: 800; 
            margin-bottom: 25px; 
            color: #64748b; 
            text-transform: uppercase; 
            letter-spacing: 3px;
            text-align: center;
        }

        /* МОДЕРНИЗИРОВАННЫЕ СЛОТЫ */
        .slots-viewport {
            background: #030509;
            padding: 12px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.01);
            box-shadow: inset 0 10px 30px rgba(0,0,0,0.9);
            margin-bottom: 25px;
            overflow: hidden;
            height: 124px;
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .reel-container {
            width: 95px;
            height: 100px;
            position: relative;
            background: #060a12;
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.02);
        }

        .reel-strip {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            transform: translateY(0);
        }

        .slot-tile {
            height: 100px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 38px;
        }

        /* Эффект сверхскоростного размытия */
        .blur-motion {
            filter: blur(8px) scaleY(1.2);
            will-change: transform;
        }

        /* АККУРАТНЫЕ 3D КУБИКИ */
        .dice-board {
            display: flex;
            justify-content: center;
            gap: 50px;
            margin: 20px 0 30px 0;
            perspective: 800px;
            height: 85px;
        }

        .cube-wrapper {
            width: 80px;
            height: 80px;
            position: relative;
            transform-style: preserve-3d;
            transform: rotateX(0deg) rotateY(0deg);
            transition: transform 1.2s cubic-bezier(0.2, 0.9, 0.3, 1);
            will-change: transform;
        }

        .cube-face {
            position: absolute;
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #161f33 0%, #0b101a 100%);
            border: 1.5px solid rgba(197, 168, 128, 0.25);
            border-radius: 16px;
            font-size: 32px;
            font-weight: 800;
            color: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
            backface-visibility: hidden;
        }

        /* Корректные оси, чтобы цифры не переворачивались вверх ногами */
        .face-1 { transform: rotateY(0deg) translateZ(40px); }
        .face-2 { transform: rotateY(90deg) translateZ(40px); }
        .face-3 { transform: rotateX(90deg) translateZ(40px); }
        .face-4 { transform: rotateX(-90deg) translateZ(40px); }
        .face-5 { transform: rotateY(-90deg) translateZ(40px); }
        .face-6 { transform: rotateY(180deg) translateZ(40px); color: #d4af37; }

        /* Виджет Ставок */
        .bet-widget {
            background: #030509;
            padding: 6px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.01);
        }

        .bet-trigger {
            background: rgba(255,255,255,0.02);
            border: none;
            color: #94a3b8;
            width: 45px;
            height: 45px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }

        .bet-value {
            font-size: 20px;
            font-weight: 800;
        }

        .btn-premium {
            width: 100%;
            background: var(--gold-premium);
            border: none;
            border-radius: 16px;
            padding: 18px;
            color: #090d16;
            font-size: 13px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(197, 168, 128, 0.1);
        }
        .btn-premium:disabled { background: #1e293b; color: #475569; box-shadow: none; }

        .feedback-log {
            margin-top: 20px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-align: center;
            color: #4b5563;
        }

        /* КУШ ЭКРАН */
        .overlay-win {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(4, 6, 11, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .overlay-win.show { opacity: 1; pointer-events: auto; }

        .victory-panel { text-align: center; }
        .vic-title { font-size: 12px; font-weight: 800; color: var(--gold-glow); letter-spacing: 5px; margin-bottom: 10px; }
        .vic-payout { font-size: 46px; font-weight: 900; color: #fff; margin-bottom: 25px; }
        .vic-btn { background: #fff; color: #000; border: none; padding: 12px 35px; border-radius: 30px; font-weight: 900; text-transform: uppercase; font-size: 12px; }

        .status-win { color: #10b981; }
        .status-lose { color: #475569; }
    </style>
</head>
<body>

    <div class="overlay-win" id="win-screen">
        <div class="victory-panel">
            <div class="vic-title">ВЫИГРЫШ СИНДИКАТА</div>
            <div class="vic-payout" id="win-amount">+0 🪙</div>
            <button class="vic-btn" onclick="claimPayout()">Забрать</button>
        </div>
    </div>

    <header>
        <div class="logo">Kraken</div>
        <div class="balance-box">🪙&nbsp;<span id="balance">10,000</span></div>
    </header>

    <div class="container">
        <div class="card">
            <div class="card-title">Люкс Слот-Ротация</div>
            <div class="slots-viewport">
                <div class="reel-container"><div class="reel-strip" id="strip1"></div></div>
                <div class="reel-container"><div class="reel-strip" id="strip2"></div></div>
                <div class="reel-container"><div class="reel-strip" id="strip3"></div></div>
            </div>
            
            <div class="bet-widget">
                <button class="bet-trigger" onclick="alterBet('slot-bet', -100)">-</button>
                <div class="bet-value" id="slot-bet-view">100</div>
                <button class="bet-trigger" onclick="alterBet('slot-bet', 100)">+</button>
            </div>

            <button class="btn-premium" id="slot-btn" onclick="spinSlots()">Запустить ротацию</button>
            <div class="feedback-log" id="slot-log">Ставки приняты</div>
        </div>

        <div class="card">
            <div class="card-title">3D Кубы Безны</div>
            <div class="dice-board">
                <div class="cube-wrapper" id="cube1">
                    <div class="cube-face face-1">1</div>
                    <div class="cube-face face-2">2</div>
                    <div class="cube-face face-3">3</div>
                    <div class="cube-face face-4">4</div>
                    <div class="cube-face face-5">5</div>
                    <div class="cube-face face-6">6</div>
                </div>
                <div class="cube-wrapper" id="cube2">
                    <div class="cube-face face-1">1</div>
                    <div class="cube-face face-2">2</div>
                    <div class="cube-face face-3">3</div>
                    <div class="cube-face face-4">4</div>
                    <div class="cube-face face-5">5</div>
                    <div class="cube-face face-6">6</div>
                </div>
            </div>

            <div class="bet-widget">
                <button class="bet-trigger" onclick="alterBet('dice-bet', -100)">-</button>
                <div class="bet-value" id="dice-bet-view">100</div>
                <button class="bet-trigger" onclick="alterBet('dice-bet', 100)">+</button>
            </div>

            <button class="btn-premium" id="dice-btn" onclick="rollDice()">Бросить кубы</button>
            <div class="feedback-log" id="dice-log">Ожидание броска</div>
        </div>
    </div>

    <script>
        let wallet = parseInt(localStorage.getItem('k_syndicate_wallet')) || 10000;
        const pool = ['💎', '👑', '🔱', '🪙', '⚔️', '👁️'];
        let bets = { 'slot-bet': 100, 'dice-bet': 100 };

        // Генерируем ОЧЕНЬ длинную ленту (чтобы крутилось долго и разнообразно)
        function generateStrips() {
            for(let s=1; s<=3; s++) {
                const strip = document.getElementById(`strip${s}`);
                let content = '';
                // 60 элементов вверх гарантируют долгий полет
                for(let i=0; i<60; i++) {
                    const item = pool[Math.floor(Math.random() * pool.length)];
                    content += `<div class="slot-tile">${item}</div>`;
                }
                strip.innerHTML = content;
            }
        }
        generateStrips();

        function syncWallet() {
            document.getElementById('balance').textContent = wallet.toLocaleString();
            localStorage.setItem('k_syndicate_wallet', wallet);
        }
        syncWallet();

        function alterBet(key, amount) {
            bets[key] += amount;
            if(bets[key] < 100) bets[key] = 100;
            if(bets[key] > 5000) bets[key] = 5000;
            document.getElementById(`${key}-view`).textContent = bets[key].toLocaleString();
        }

        function triggerWinPanel(sum) {
            document.getElementById('win-amount').textContent = `+${sum.toLocaleString()} 🪙`;
            document.getElementById('win-screen').classList.add('show');
        }

        function claimPayout() { document.getElementById('win-screen').classList.remove('show'); }

        // ОБНОВЛЕННАЯ СВЕРХСКОРОСТНАЯ ПРОКРУТКА
        function spinSlots() {
            const currentBet = bets['slot-bet'];
            if(currentBet > wallet) { alert("Недостаточно средств"); return; }
            
            wallet -= currentBet; syncWallet();
            const btn = document.getElementById('slot-btn'); btn.disabled = true;
            document.getElementById('slot-log').innerHTML = "Ротация...";

            const finalResults = [
                pool[Math.floor(Math.random() * pool.length)],
                pool[Math.floor(Math.random() * pool.length)],
                pool[Math.floor(Math.random() * pool.length)]
            ];

            // Дистанция прокрутки (сдвигаем ленту глубоко вниз)
            const tileHeight = 100;
            const targetOffset = 50 * tileHeight; 

            for(let s=1; s<=3; s++) {
                const strip = document.getElementById(`strip${s}`);
                
                // Прописываем результат строго в нужный финальный слот
                strip.children[50].textContent = finalResults[s-1]; 
                
                strip.style.transition = 'none';
                strip.style.transform = 'translateY(0)';
                strip.classList.add('blur-motion');

                // Разное время остановки для каждого барабана (создаем саспенс)
                setTimeout(() => {
                    strip.style.transition = `transform ${1.2 + (s * 0.4)}s cubic-bezier(0.1, 0.9, 0.2, 1)`;
                    strip.style.transform = `translateY(-${targetOffset}px)`;
                }, 40);
            }

            setTimeout(() => {
                for(let s=1; s<=3; s++) {
                    document.getElementById(`strip${s}`).classList.remove('blur-motion');
                }

                const log = document.getElementById('slot-log');
                if(finalResults[0] === finalResults[1] && finalResults[1] === finalResults[2]) {
                    let win = currentBet * 10; wallet += win; syncWallet();
                    triggerWinPanel(win);
                    log.innerHTML = `<span class="status-win">Альянс x10!</span>`;
                } else if(finalResults[0] === finalResults[1] || finalResults[1] === finalResults[2] || finalResults[0] === finalResults[2]) {
                    let win = currentBet * 2; wallet += win; syncWallet();
                    log.innerHTML = `<span class="status-win">Совпадение x2!</span>`;
                } else {
                    log.innerHTML = `<span class="status-lose">Комбинация пуста</span>`;
                }
                btn.disabled = false;
            }, 2600);
        }

        // ПЛАВНАЯ ЧИСТАЯ 3D-ФИЗИКА КУБИКОВ
        const targetAngles = {
            1: { x: 0,   y: 0 },
            2: { x: 0,   y: 90 },
            3: { x: -90, y: 0 },
            4: { x: 90,  y: 0 },
            5: { x: 0,   y: -90 },
            6: { x: 180, y: 0 }
        };

        let currentRotations = { c1: {x:0, y:0}, c2: {x:0, y:0} };

        function rollDice() {
            const currentBet = bets['dice-bet'];
            if(currentBet > wallet) { alert("Недостаточно средств"); return; }
            
            wallet -= currentBet; syncWallet();
            const btn = document.getElementById('dice-btn'); btn.disabled = true;
            document.getElementById('dice-log').innerHTML = "Кубы пущены...";

            const r1 = Math.floor(Math.random() * 6) + 1;
            const r2 = Math.floor(Math.random() * 6) + 1;

            const c1 = document.getElementById('cube1');
            const c2 = document.getElementById('cube2');

            // Накручиваем ровно 3 полных оборота (1080 град) + целевой угол
            // Это даёт чистую, не дёрганую траекторию вращения
            currentRotations.c1.x += 1080 + targetAngles[r1].x;
            currentRotations.c1.y += 1080 + targetAngles[r1].y;
            currentRotations.c2.x += 1080 + targetAngles[r2].x;
            currentRotations.c2.y += 1080 + targetAngles[r2].y;

            c1.style.transform = `rotateX(${currentRotations.c1.x}deg) rotateY(${currentRotations.c1.y}deg)`;
            c2.style.transform = `rotateX(${currentRotations.c2.x}deg) rotateY(${currentRotations.c2.y}deg)`;

            setTimeout(() => {
                const sum = r1 + r2;
                const log = document.getElementById('dice-log');

                if (sum >= 7) {
                    let win = Math.floor(currentBet * 2); wallet += win; syncWallet();
                    if(sum === 12) triggerWinPanel(win);
                    log.innerHTML = `<span class="status-win">Победа! Выпало: ${sum}</span>`;
                } else {
                    log.innerHTML = `<span class="status-lose">Поражение. Сумма: ${sum}</span>`;
                }
                btn.disabled = false;
            }, 1200); // Время плавного броска
        }
    </script>
</body>
</html>
