<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SO2: CRYSTAL GLOW FIX V9</title>
    <style>
        :root {
            --bg: #0a0f1b;
            --glass: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #ffcc00;
            --blue: #00d2ff;
            --up: #00ff88;
            --down: #ff4d4d;
            --common: #b0c3d9; --uncommon: #5e98d9; --rare: #4b69ff; --epic: #8847ff; --legendary: #d32ce6; --arcane: #eb4b4b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body {
            background: var(--bg);
            background: radial-gradient(circle at 50% -10%, #1a2a4d 0%, #0a0f1b 100%);
            color: white; font-family: 'SF Pro Display', sans-serif;
            margin: 0; padding: 12px; display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow: hidden;
        }

        .header {
            background: var(--glass); backdrop-filter: blur(25px);
            width: 100%; max-width: 480px; padding: 20px; border-radius: 28px;
            border: 1px solid var(--border); margin-bottom: 20px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .balance b { font-size: 22px; color: var(--accent); }
        .inv-value { font-size: 9px; opacity: 0.6; margin-top: 4px; display: block; }

        .tabs { display: flex; gap: 6px; width: 100%; max-width: 480px; margin-bottom: 20px; }
        .tab { 
            flex: 1; padding: 12px; background: var(--glass); border: 1px solid var(--border);
            color: #777; border-radius: 16px; font-weight: 800; cursor: pointer; transition: 0.3s;
            text-transform: uppercase; font-size: 9px;
        }
        .tab.active { background: var(--blue); color: #000; border: none; }

        .view { display: none; width: 100%; max-width: 480px; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* ROULETTE */
        .roulette-box { height: 120px; background: rgba(0,0,0,0.3); border-radius: 26px; position: relative; overflow: hidden; margin: 15px 0; border: 1px solid var(--border); }
        .track { display: flex; position: absolute; left: 0; top: 10px; transition: transform 6s cubic-bezier(0.1, 0, 0, 1); }
        .t-item { min-width: 100px; height: 100px; margin: 0 6px; background: var(--glass); border-radius: 20px; display: flex; align-items: center; justify-content: center; border-bottom: 4px solid #333; font-size: 36px; }

        /* GRID */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding-bottom: 40px; overflow-y: auto; max-height: 60vh; width: 100%; }
        .card { background: var(--glass); padding: 20px 15px; border-radius: 28px; text-align: center; border: 1px solid var(--border); position: relative; transition: 0.2s; }
        .card.selected { border: 2px solid var(--up); box-shadow: 0 0 15px rgba(0,255,136,0.2); }
        
        .btn-action { width: 100%; padding: 18px; border: none; border-radius: 20px; font-weight: 900; cursor: pointer; background: var(--accent); color: #000; text-transform: uppercase; }

        /* --- FIX: ANIMATIONS FOR WIN WINDOW --- */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5,7,12,0.96); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(20px); }
        
        .modal-win { text-align: center; width: 90%; max-width: 400px; animation: winReveal 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; }
        
        @keyframes winReveal { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        /* ПУЛЬСИРУЮЩЕЕ СВЕЧЕНИЕ */
        .win-glow { 
            position: absolute; width: 280px; height: 280px; 
            background: radial-gradient(circle, var(--rarity-color) 0%, transparent 70%); 
            top: 40%; left: 50%; transform: translate(-50%, -50%); 
            opacity: 0.5; filter: blur(40px); z-index: -1; 
            animation: glowPulse 2.5s infinite ease-in-out; 
        }
        
        @keyframes glowPulse {
            0%, 100% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.6; transform: translate(-50%, -50%) scale(1.2); }
        }

        /* ПЛАВАЮЩАЯ ИКОНКА */
        .win-icon { 
            font-size: 110px; margin-bottom: 15px; 
            filter: drop-shadow(0 0 20px var(--rarity-color)); 
            animation: iconFloat 3s infinite ease-in-out;
        }

        @keyframes iconFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

    </style>
</head>
<body>

    <div class="header">
        <div class="balance">
            <span style="font-size: 10px; opacity: 0.5;">БАЛАНС</span>
            <b><span id="money">0</span> G</b>
            <span class="inv-value">ИНВЕНТАРЬ: <span id="invVal">0</span> G</span>
        </div>
        <div style="font-size: 14px;">💎</div>
    </div>

    <div class="tabs">
        <button id="t-shop" class="tab active" onclick="tab('shop')">Кейсы</button>
        <button id="t-craft" class="tab" onclick="tab('craft')">Крафт</button>
        <button id="t-market" class="tab" onclick="tab('market')">Рынок</button>
        <button id="t-inv" class="tab" onclick="tab('inv')">Инв</button>
    </div>

    <div id="shop" class="view" style="display: block;">
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;">
            <div id="c0" class="case-btn active" onclick="setCase(0)">📦 100G</div>
            <div id="c1" class="case-btn" onclick="setCase(1)">📦 250G</div>
            <div id="c2" class="case-btn" onclick="setCase(2)">🔪 600G</div>
        </div>
        <div class="roulette-box"><div class="track" id="track"></div><div style="position:absolute;left:50%;width:2px;height:100%;background:red;z-index:5;transform:translateX(-50%);"></div></div>
        <button id="spinBtn" class="btn-action" onclick="openCase()">ОТКРЫТЬ КЕЙС</button>
    </div>

    <div id="craft" class="view">
        <div style="text-align:center; padding: 15px; background: var(--glass); border-radius: 20px; margin-bottom: 15px;">
            <div id="craftStatus">Выбрано: <b id="selCount">0</b> / 10</div>
            <button id="craftBtn" class="btn-action" disabled onclick="doCraft()" style="margin-top:10px; padding: 12px;">СКРАФТИТЬ</button>
        </div>
        <div id="craftGrid" class="grid"></div>
    </div>

    <div id="market" class="view"><div id="marketGrid" class="grid"></div></div>
    <div id="inv" class="view"><div id="invGrid" class="grid"></div></div>

    <div id="winOverlay" class="overlay">
        <div class="modal-win">
            <div class="win-glow" id="rarityGlow"></div>
            <div class="win-icon" id="winIcon">🔫</div>
            <h2 id="winName" style="margin:5px 0; font-size: 28px;">Item</h2>
            <p id="winRarity" style="font-weight:900; margin-bottom:30px; letter-spacing: 2px;"></p>
            <button class="btn-action" onclick="take()">В ИНВЕНТАРЬ</button>
            <button class="btn-action" style="background:none; color:#777; margin-top:10px;" onclick="sellNow()">ПРОДАТЬ ЗА <span id="winPrice">0</span> G</button>
        </div>
    </div>

    <div id="sellOverlay" class="overlay">
        <div style="background: #121826; padding: 30px; border-radius: 30px; text-align: center; width: 85%;">
            <div id="sellPreview" style="font-size: 60px; margin-bottom: 15px;">🔫</div>
            <h3 id="sellTitle">Продать предмет?</h3>
            <button class="btn-action" style="background: var(--down); color:white;" onclick="confirmSell()">ПРОДАТЬ</button>
            <button class="btn-action" style="background: none; color:white;" onclick="closeOverlays()">ОТМЕНА</button>
        </div>
    </div>

    <script>
        const SKINS = [
            { id: 0, name: "G22 | Casual", rar: "common", p: 20, i: "🔫", weight: 50 },
            { id: 1, name: "USP | Genesis", rar: "uncommon", p: 55, i: "🔫", weight: 30 },
            { id: 2, name: "M4 | Tiger", rar: "rare", p: 190, i: "🔫", weight: 12 },
            { id: 3, name: "AKR | Necro", rar: "epic", p: 620, i: "🔫", weight: 6 },
            { id: 4, name: "AWM | Scratch", rar: "legendary", p: 1600, i: "🎯", weight: 2 },
            { id: 5, name: "Karambit | Gold", rar: "arcane", p: 25000, i: "🔪", weight: 0.3 },
            { id: 6, name: "Butterfly | Star", rar: "arcane", p: 22000, i: "🦋", weight: 0.3 }
        ];

        const RARITIES = ["common", "uncommon", "rare", "epic", "legendary", "arcane"];

        let state = {
            money: parseInt(localStorage.getItem('v9_money')) || 5000,
            inv: JSON.parse(localStorage.getItem('v9_inv')) || [],
            prices: SKINS.map(s => ({ id: s.id, cur: s.p * 1.3, old: s.p * 1.3 })),
            curCase: 0,
            lastWin: null,
            selectedForCraft: [],
            pendingSellIdx: null
        };

        function tick() {
            state.prices.forEach(p => {
                p.old = p.cur;
                p.cur = Math.floor(p.cur * (1 + (Math.random() * 0.12 - 0.06)));
            });
            renderMarket();
        }
        setInterval(tick, 5000);

        function tab(name) {
            document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(name).style.display = 'block';
            document.getElementById('t-'+name).classList.add('active');
            state.selectedForCraft = [];
            sync();
        }

        function sync() {
            document.getElementById('money').innerText = state.money.toLocaleString();
            let totalVal = state.inv.reduce((acc, it) => acc + it.p, 0);
            document.getElementById('invVal').innerText = totalVal.toLocaleString();
            localStorage.setItem('v9_money', state.money);
            localStorage.setItem('v9_inv', JSON.stringify(state.inv));
            renderInventory();
            renderCraft();
            renderMarket();
        }

        function renderInventory() {
            const g = document.getElementById('invGrid'); g.innerHTML = '';
            state.inv.forEach((it, idx) => {
                g.innerHTML += `<div class="card" onclick="openSell(${idx})">
                    <div style="font-size:40px">${it.i}</div>
                    <div style="font-size:11px; margin-top:8px">${it.name}</div>
                    <div style="color:var(--${it.rar}); font-weight:900; font-size:10px;">${it.p} G</div>
                </div>`;
            });
        }

        function renderCraft() {
            const g = document.getElementById('craftGrid'); g.innerHTML = '';
            state.inv.forEach((it, idx) => {
                if(it.rar === 'arcane') return;
                const isSel = state.selectedForCraft.includes(idx);
                g.innerHTML += `<div class="card ${isSel?'selected':''}" onclick="toggleCraft(${idx})">
                    <div style="font-size:40px">${it.i}</div>
                    <div style="font-size:10px; margin-top:8px">${it.rar.toUpperCase()}</div>
                </div>`;
            });
            document.getElementById('selCount').innerText = state.selectedForCraft.length;
            document.getElementById('craftBtn').disabled = state.selectedForCraft.length !== 10;
        }

        function renderMarket() {
            const g = document.getElementById('marketGrid'); if(!g) return; g.innerHTML = '';
            SKINS.forEach(s => {
                const p = state.prices.find(x => x.id === s.id);
                const up = p.cur >= p.old;
                g.innerHTML += `<div class="card" onclick="buyMarket(${s.id}, ${p.cur})">
                    <div style="font-size:40px">${s.i}</div>
                    <div style="font-size:10px; margin-top:8px">${s.name}</div>
                    <div style="color:${up?'var(--up)':'var(--down)'}; font-weight:900; margin-top:5px">${p.cur} G ${up?'▲':'▼'}</div>
                </div>`;
            });
        }

        function openSell(idx) {
            state.pendingSellIdx = idx;
            const it = state.inv[idx];
            document.getElementById('sellPreview').innerText = it.i;
            document.getElementById('sellTitle').innerText = `Продать за ${it.p} G?`;
            document.getElementById('sellOverlay').style.display = 'flex';
        }

        function confirmSell() {
            state.money += state.inv[state.pendingSellIdx].p;
            state.inv.splice(state.pendingSellIdx, 1);
            closeOverlays(); sync();
        }

        function toggleCraft(idx) {
            const item = state.inv[idx];
            const i = state.selectedForCraft.indexOf(idx);
            if(i > -1) state.selectedForCraft.splice(i, 1);
            else {
                if(state.selectedForCraft.length > 0) {
                    if(state.inv[state.selectedForCraft[0]].rar !== item.rar) return;
                }
                if(state.selectedForCraft.length < 10) state.selectedForCraft.push(idx);
            }
            sync();
        }

        function doCraft() {
            const first = state.inv[state.selectedForCraft[0]];
            const nextRar = RARITIES[RARITIES.indexOf(first.rar) + 1];
            const pool = SKINS.filter(s => s.rar === nextRar);
            const win = pool[Math.floor(Math.random() * pool.length)];
            state.selectedForCraft.sort((a,b)=>b-a).forEach(idx => state.inv.splice(idx, 1));
            state.selectedForCraft = [];
            state.lastWin = win;
            showWin(win);
            sync();
        }

        function openCase() {
            const cost = [100, 250, 600][state.curCase];
            if(state.money < cost) return alert("Мало голды!");
            state.money -= cost; sync();
            const btn = document.getElementById('spinBtn');
            btn.disabled = true;
            const track = document.getElementById('track');
            track.style.transition = 'none'; track.style.transform = 'translateX(0)';
            track.innerHTML = '';
            let win;
            const pools = [[0,1,2,3], [1,2,3,4,5], [3,4,5,6]];
            for(let i=0; i<60; i++) {
                const s = SKINS[pools[state.curCase][Math.floor(Math.random() * pools[state.curCase].length)]];
                if(i === 52) win = s;
                track.innerHTML += `<div class="t-item" style="border-bottom-color:var(--${s.rar})">${s.i}</div>`;
            }
            setTimeout(() => {
                track.style.transition = 'transform 6s cubic-bezier(0.1, 0, 0, 1)';
                track.style.transform = `translateX(-${52 * 112 - (window.innerWidth/2 - 56)}px)`;
            }, 50);
            setTimeout(() => { state.lastWin = win; showWin(win); btn.disabled = false; }, 6200);
        }

        function showWin(win) {
            const glow = document.getElementById('rarityGlow');
            glow.style.setProperty('--rarity-color', `var(--${win.rar})`);
            
            const icon = document.getElementById('winIcon');
            icon.innerText = win.i;
            icon.style.setProperty('--rarity-color', `var(--${win.rar})`);
            
            document.getElementById('winName').innerText = win.name;
            const rt = document.getElementById('winRarity');
            rt.innerText = win.rar.toUpperCase();
            rt.style.color = `var(--${win.rar})`;
            document.getElementById('winPrice').innerText = win.p;
            document.getElementById('winOverlay').style.display = 'flex';
        }

        function buyMarket(id, pr) {
            if(state.money < pr) return alert("Мало голды!");
            state.money -= pr; state.inv.unshift({...SKINS.find(x => x.id === id)});
            sync();
        }

        function take() { state.inv.unshift(state.lastWin); closeOverlays(); sync(); }
        function sellNow() { state.money += state.lastWin.p; closeOverlays(); sync(); }
        function closeOverlays() { document.querySelectorAll('.overlay').forEach(o => o.style.display = 'none'); }
        function setCase(i) {
            state.curCase = i;
            document.querySelectorAll('.case-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('c'+i).classList.add('active');
        }

        sync();
    </script>
</body>
</html>
