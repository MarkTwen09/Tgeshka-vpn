<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassmorphism Notification Panel</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: #f1f5f9;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        body::before, body::after {
            content: "";
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            z-index: 0;
            opacity: 0.4;
        }
        body::before { width: 300px; height: 300px; background: #db2777; top: 15%; left: 20%; }
        body::after { width: 250px; height: 250px; background: #6366f1; bottom: 15%; right: 20%; }

        .glass-container {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(16px) saturate(120%);
            -webkit-backdrop-filter: blur(16px) saturate(120%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 400px;
            border-radius: 24px;
            padding: 28px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            z-index: 1;
            position: relative;
        }

        .title {
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 24px;
            background: linear-gradient(90deg, #f472b6, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-group {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 10px 14px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }
        .input-group label { font-size: 11px; color: #a78bfa; margin-bottom: 4px; text-transform: uppercase;}
        .input-group input {
            border: none; outline: none; background: transparent;
            color: #fff; font-size: 16px; width: 100%;
        }

        .action-btn {
            width: 100%;
            background: linear-gradient(90deg, #ec4899, #8b5cf6);
            color: white; border: none; padding: 16px;
            border-radius: 16px; font-size: 16px; font-weight: 600;
            cursor: pointer; transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(236, 72, 153, 0.3);
        }
        .action-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(139, 92, 246, 0.5); }

        .log-box {
            margin-top: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 14px;
            padding: 12px;
            height: 90px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
            color: #34d399;
        }
    </style>
</head>
<body>

<div class="glass-container">
    <div class="title">Push Notification</div>

    <div class="input-group">
        <label>Текст пуш-уведомления</label>
        <input type="text" id="alertText" value="Внимание! Система работает исправно.">
    </div>

    <button class="action-btn" id="pushBtn">Запустить уведомление</button>

    <div class="log-box" id="logger">
        <div style="color: #94a3b8;">[Система] Готов к работе.</div>
    </div>
</div>

<script>
    const pushBtn = document.getElementById('pushBtn');
    const logger = document.getElementById('logger');

    function log(text, color = '#34d399') {
        logger.innerHTML += `<div style="color: ${color}">[${new Date().toLocaleTimeString()}] ${text}</div>`;
        logger.scrollTop = logger.scrollHeight;
    }

    // Автоматический запрос прав при клике на страницу
    window.addEventListener('DOMContentLoaded', () => {
        if (Notification.permission !== 'granted' && Notification.permission !== 'denied') {
            Notification.requestPermission();
        }
    });

    pushBtn.addEventListener('click', () => {
        const text = document.getElementById('alertText').value.trim();

        if (Notification.permission === 'default') {
            Notification.requestPermission().then(perm => {
                if(perm === 'granted') log('Доступ получен! Нажмите еще раз.');
            });
            return;
        }

        if (Notification.permission === 'denied') {
            log('Ошибка: Вы заблокировали уведомления в браузере!', '#f43f5e');
            alert('Пожалуйста, разрешите уведомления в строке адреса браузера (иконка замочка).');
            return;
        }

        if (Notification.permission === 'granted') {
            log('Отправка push-запроса...');
            
            // Запуск настоящего уведомления операционной системы
            new Notification('Новое оповещение', {
                body: text,
                icon: 'https://cdn-icons-png.flaticon.com/512/1827/1827349.png'
            });

            log('Уведомление успешно выведено на экран!', '#a7f3d0');
        }
    });
</script>

</body>
</html>
