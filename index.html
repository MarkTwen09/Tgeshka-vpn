<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>LUM: Space Odyssey</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght=500;800;900&family=Rajdhani:wght=600;700&display=swap');

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }

        body, html {
            background: #020105;
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        #webgl-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }

        /* КИБЕР-ИНТЕРФЕЙС МЕНЮ */
        #menu-screen {
            position: absolute;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 30px 20px;
            z-index: 10;
            overflow-y: auto;
            background: linear-gradient(to bottom, rgba(2,1,5,0.4), rgba(15,10,30,0.2));
        }

        #game-screen {
            position: absolute;
            width: 100%; height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 20px;
            z-index: 10;
            pointer-events: none;
        }

        .header-brand {
            text-align: center;
            width: 100%;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.8rem;
            font-weight: 900;
            color: #00ffcc;
            text-shadow: 0 0 30px rgba(0, 255, 204, 0.6);
            letter-spacing: 10px;
            margin-bottom: 5px;
            text-indent: 10px;
        }

        /* НЕОНОВЫЙ КРИПТО-БАЛАНС */
        .balance-container {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.01));
            border: 1px solid rgba(0, 255, 204, 0.3);
            padding: 16px;
            border-radius: 24px;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), inset 0 1px 1px rgba(255,255,255,0.1);
            width: 100%; max-width: 360px;
            margin: 0 auto;
        }

        .balance-container p {
            font-size: 0.8rem;
            color: #8c82b3;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            margin-bottom: 2px;
        }

        .balance-container .value {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.3rem;
            font-weight: 900;
        }
        .balance-container .value span {
            color: #00ffcc;
            text-shadow: 0 0 20px rgba(0, 255, 204, 0.5);
        }

        /* СИСТЕМА ВЫБОРА ПЛАНЕТ (СТИЛЬ СЛАЙДЕРА CLASH ROYALE) */
        .planet-selector-zone {
            width: 100%;
            max-width: 360px;
            margin: 15px 0;
            text-align: center;
        }

        .planet-switcher-box {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 10px 15px;
            backdrop-filter: blur(10px);
        }

        .arrow-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            width: 40px; height: 40px;
            border-radius: 50%;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .arrow-btn:active { background: #00ffcc; color: #000; }

        .planet-info-slide {
            flex-grow: 1;
            padding: 0 10px;
        }

        .planet-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4rem;
            font-weight: 800;
            color: #fff;
            letter-spacing: 1px;
        }

        .planet-status {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 3px;
        }

        /* СЕКЦИЯ СТАТИСТИКИ ХАБА */
        .hub-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%; max-width: 360px;
            margin-bottom: 10px;
        }

        .hub-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 18px;
            padding: 12px;
            backdrop-filter: blur(15px);
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .hub-card .lbl { font-size: 0.75rem; color: #766b9c; text-transform: uppercase; letter-spacing: 1px; }
        .hub-card .val {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            margin-top: 2px;
            display: flex; align-items: center; justify-content: space-between;
        }

        /* КНОПКА ФАРМИНГА СЛИШКОМ СОЧНАЯ */
        .farm-bar {
            grid-column: span 2;
            display: flex; align-items: center; justify-content: space-between;
            background: linear-gradient(90deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
            border: 1px solid rgba(0, 179, 255, 0.2);
        }
        .farm-val { font-family: 'Orbitron', sans-serif; color: #00b3ff; font-weight: 800; }
        .claim-action {
            font-family: 'Orbitron', sans-serif;
            background: rgba(0, 179, 255, 0.15);
            border: 1px solid #00b3ff;
            color: #00b3ff;
            padding: 6px 14px; border-radius: 10px;
            font-size: 0.75rem; font-weight: 800; cursor: pointer;
        }
        .claim-action:active { background: #00b3ff; color: #000; }

        .game-status-box {
            font-size: 0.9rem; font-weight: 700; text-align: center;
            min-height: 40px; color: #ff3366; margin-top: 5px;
        }

        /* КНОПКА ЗАПУСКА */
        .action-zone { width: 100%; max-width: 360px; z-index: 5; }
        .main-btn {
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(135deg, #00ffcc, #00b3ff);
            color: #020105; border: none;
            padding: 16px; font-size: 1.4rem; font-weight: 900;
            border-radius: 20px; cursor: pointer;
            box-shadow: 0 10px 30px rgba(0, 255, 204, 0.3);
            width: 100%; letter-spacing: 2px;
            transition: transform 0.1s;
        }
        .main-btn:active:not(:disabled) { transform: scale(0.97); }
        .main-btn:disabled { background: #181522; color: #433e52; box-shadow: none; cursor: not-allowed; }
        .main-btn .lock-sub { display: block; font-size: 0.7rem; color: #ff3366; margin-top: 1px; }

        /* ИГРОВОЙ HUD */
        .game-hud {
            display: flex; width: 100%; max-width: 440px;
            justify-content: space-between; pointer-events: auto;
        }

        .hud-glass {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 16px; border-radius: 16px;
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            min-width: 110px; text-align: center;
            position: relative;
        }

        .hud-label { font-size: 0.7rem; color: #8c82b3; text-transform: uppercase; letter-spacing: 1px; }
        .hud-number { font-family: 'Orbitron', sans-serif; font-size: 1.4rem; font-weight: 900; }

        .combo-tag {
            position: absolute; bottom: -12px; left: 50%; transform: translateX(-50%);
            background: linear-gradient(135deg, #ff9900, #ff4400);
            font-family: 'Orbitron', sans-serif; font-size: 0.65rem; font-weight: 900;
            padding: 2px 8px; border-radius: 6px; box-shadow: 0 4px 10px rgba(255,68,0,0.4);
            opacity: 0; white-space: nowrap;
        }
        .combo-tag.visible { opacity: 1; }

        /* ОКНА МОДАЛОК */
        .modal-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 1, 5, 0.96); z-index: 100;
            display: none; flex-direction: column; padding: 30px 20px;
        }

        .modal-w-header { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 360px; margin: 0 auto 20px auto; }
        .modal-w-title { font-family: 'Orbitron', sans-serif; font-size: 1.6rem; color: #00ffcc; font-weight: 900; }
        .m-close { background: rgba(255,255,255,0.06); border: none; color: #fff; width: 34px; height: 34px; border-radius: 50%; font-weight: bold; cursor: pointer; }

        .modal-items-stack { width: 100%; max-width: 360px; margin: 0 auto; display: flex; flex-direction: column; gap: 10px; }
        .list-row { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 14px; display: flex; justify-content: space-between; align-items: center; }
        .row-info .r-title { font-weight: 700; color: #fff; }
        .row-info .r-sub { font-size: 0.75rem; color: #6e6494; margin-top: 1px; }

        .row-btn { font-family: 'Orbitron', sans-serif; background: #00ffcc; color: #020105; border: none; padding: 8px 12px; border-radius: 8px; font-size: 0.75rem; font-weight: 800; cursor: pointer; }
        .row-btn:disabled { background: rgba(255,255,255,0.04); color: #494457; cursor: not-allowed; }

        /* ЗД ТЕКСТЫ СЧЕТА */
        .html-score-popup {
            position: absolute; pointer-events: none;
            font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 1.2rem;
            text-shadow: 0 0 8px currentColor;
            transform: translate(-50%, -50%);
            animation: floatUp 0.8s ease-out forwards;
            z-index: 20;
        }
        @keyframes floatUp {
            0% { transform: translate(-50%, -50%) scale(0.6); opacity: 1; }
            100% { transform: translate(-50%, -120px) scale(1.1); opacity: 0; }
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="webgl-container"></div>

    <div id="menu-screen">
        <div class="header-brand">
            <h1>LUM</h1>
            
            <div class="balance-container">
                <p>Баланс токенов</p>
                <div class="value"><span id="total-balance">0.00</span> $LUM</div>
            </div>

            <div class="planet-selector-zone">
                <div style="font-size: 0.75rem; color: #766b9c; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px;">Локация миссии</div>
                <div class="planet-switcher-box">
                    <button class="arrow-btn" onclick="switchPlanet(-1)">◀</button>
                    <div class="planet-info-slide">
                        <div class="planet-title" id="p-slide-title">Луна</div>
                        <div class="planet-status" id="p-slide-status" style="color: #00ffcc;">Доступно</div>
                    </div>
                    <button class="arrow-btn" onclick="switchPlanet(1)">▶</button>
                </div>
            </div>

            <div class="hub-grid">
                <div class="hub-card farm-bar">
                    <div style="text-align: left;">
                        <div class="lbl">Авто-добыча</div>
                        <div class="farm-val" id="farm-display">0.0000</div>
                    </div>
                    <button class="claim-action" onclick="claimFarming()">CLAIM</button>
                </div>
                
                <div class="hub-card">
                    <div class="lbl">Энергия</div>
                    <div class="val" id="tickets-count">⚡ 7/7</div>
                </div>
                
                <div class="hub-card" onclick="openModal('quests-modal')">
                    <div class="lbl">Задания</div>
                    <div class="val" style="color: #00ffcc;" id="quests-btn-lbl">0/3 →</div>
                </div>

                <div class="hub-card" onclick="openModal('shop-modal')" style="grid-column: span 2; text-align: center; border: 1px solid rgba(0,255,204,0.15)">
                    <div class="lbl">Улучшения технологий</div>
                    <div class="val" style="color: #00b3ff; justify-content: center; gap: 5px;">🛒 МОДЕРНИЗАЦИЯ ХАБА</div>
                </div>
            </div>

            <div id="last-score" class="game-status-box"></div>
        </div>

        <div class="action-zone">
            <button class="main-btn" id="play-btn" onclick="tryStartGame()">ИГРАТЬ</button>
        </div>
    </div>

    <div id="quests-modal" class="modal-overlay">
        <div class="modal-w-header">
            <div class="modal-w-title">ЗАДАНИЯ</div>
            <button class="m-close" onclick="closeModal('quests-modal')">✕</button>
        </div>
        <div class="modal-items-stack" id="quests-list"></div>
    </div>

    <div id="shop-modal" class="modal-overlay">
        <div class="modal-w-header">
            <div class="modal-w-title">УЛУЧШЕНИЯ</div>
            <button class="m-close" onclick="closeModal('shop-modal')">✕</button>
        </div>
        <div class="modal-items-stack">
            <div class="list-row">
                <div class="row-info">
                    <div class="r-title">Экстрактор Кристаллов</div>
                    <div class="r-sub" id="upg-click-desc">Ур. 1 (+0% к доходу)</div>
                </div>
                <button class="row-btn" id="upg-click-btn" onclick="buyUpgrade('click')">25 $LUM</button>
            </div>
            <div class="list-row">
                <div class="row-info">
                    <div class="r-title">Фарминг-Дрон</div>
                    <div class="r-sub" id="upg-farm-desc">Ур. 1 (Стандарт)</div>
                </div>
                <button class="row-btn" id="upg-farm-btn" onclick="buyUpgrade('farm')">30 $LUM</button>
            </div>
        </div>
    </div>

    <div id="game-screen">
        <div class="game-hud">
            <div class="hud-glass">
                <div class="hud-label">Собрано</div>
                <div class="hud-number" id="score" style="color: #00ffcc;">0</div>
                <div class="combo-tag" id="combo-tag">COMBO x1</div>
            </div>
            <div class="hud-glass">
                <div class="hud-label">Таймер</div>
                <div class="hud-number" id="timer" style="color: #ff3366;">30</div>
            </div>
        </div>
    </div>

    <script>
        // ДАННЫЕ О СИСТЕМЕ ПЛАНЕТ (АНАЛОГ ОСТРОВОВ КЛЭШ РОЯЛЬ)
        const PLANETS = [
            { id: 'moon', name: 'Луна', req: 0, color: 0x8899a6, spaceColor: 0x050510, speed: 1.0 },
            { id: 'mars', name: 'Марс', req: 15, color: 0xcc5533, spaceColor: 0x1a0505, speed: 1.2 },
            { id: 'jupiter', name: 'Юпитер', req: 50, color: 0xd4a373, spaceColor: 0x151005, speed: 1.4 },
            { id: 'neptune', name: 'Нептун', req: 120, color: 0x3366cc, spaceColor: 0x020a1c, speed: 1.6 },
            { id: 'lum_prime', name: 'Планета LUM', req: 300, color: 0x00ffcc, spaceColor: 0x01140f, speed: 2.0 }
        ];

        let selectedPlanetIdx = 0;
        let activeGamePlanetIdx = 0;

        // ПЕРЕМЕННЫЕ ХАБА И СОСТОЯНИЯ
        let cryptoBalance = parseFloat(localStorage.getItem('lum_balance')) || 0;
        let clickLevel = parseInt(localStorage.getItem('lum_shop_click_lvl')) || 1;
        let farmLevel = parseInt(localStorage.getItem('lum_shop_farm_lvl')) || 1;
        let activeFarmAccum = parseFloat(localStorage.getItem('lum_farm_accum')) || 0;

        let gameActive = false, score = 0, timeLeft = 30, secondTimer = 0;
        let comboStreak = 0, comboMultiplier = 1;
        let isFrozen = false, freezeTimer = 0;

        // THREE.JS ДВИЖОК СЦЕНЫ
        let scene, camera, renderer;
        let spaceStars, centralPlanetMesh;
        let active3DItems = [];
        let raycaster = new THREE.Raycaster();
        let mouse = new THREE.Vector2();

        // ИНИЦИАЛИЗАЦИЯ ИГРОВОГО 3D ПРОСТРАНСТВА
        function initEngine3D() {
            const container = document.getElementById('webgl-container');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(PLANETS[selectedPlanetIdx].spaceColor);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 25;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            // Освещение (чтобы 3D грани круто блестели)
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const dirLight1 = new THREE.DirectionalLight(0x00ffcc, 1);
            dirLight1.position.set(5, 10, 7);
            scene.add(dirLight1);

            const dirLight2 = new THREE.DirectionalLight(0xff00bb, 0.5);
            dirLight2.position.set(-5, -5, 5);
            scene.add(dirLight2);

            // Создание объемного звездного неба
            buildStarsField();

            // Создание главной фоновой планеты
            buildBackgroundPlanet();

            window.addEventListener('resize', onWindowResize);
            
            // Нажатия на 3D объекты
            window.addEventListener('pointerdown', onPointScene);

            // Запуск рендер-лупа
            animateLoop();
        }

        function buildStarsField() {
            const starGeo = new THREE.BufferGeometry();
            const starCount = 400;
            const posArray = new Float32Array(starCount * 3);

            for(let i=0; i < starCount * 3; i++) {
                posArray[i] = (Math.random() - 0.5) * 80;
            }
            starGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            const starMat = new THREE.PointsMaterial({ size: 0.15, color: 0xffffff, transparent: true, opacity: 0.8 });
            spaceStars = new THREE.Points(starGeo, starMat);
            scene.add(spaceStars);
        }

        function buildBackgroundPlanet() {
            if (centralPlanetMesh) scene.remove(centralPlanetMesh);

            const geom = new THREE.SphereGeometry(6, 32, 32);
            // Используем крутую сеточную структуру для кибер-эффекта
            const mat = new THREE.MeshPhongMaterial({
                color: PLANETS[selectedPlanetIdx].color,
                wireframe: true,
                transparent: true,
                opacity: 0.25
            });
            centralPlanetMesh = new THREE.Mesh(geom, mat);
            // Смещаем назад и в центр, чтобы круто смотрелось в меню
            centralPlanetMesh.position.set(0, -1, -5);
            scene.add(centralPlanetMesh);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // РЕНДЕР ЦИКЛ И АНИМАЦИЯ ОБЪЕКТОВ
        let prevTime = performance.now();
        function animateLoop() {
            requestAnimationFrame(animateLoop);
            const time = performance.now();
            const delta = (time - prevTime) / 1000;
            prevTime = time;

            // Вращаем звезды и фоновую планету
            if (spaceStars) spaceStars.rotation.y += 0.02 * delta;
            if (centralPlanetMesh) {
                centralPlanetMesh.rotation.y += 0.05 * delta;
                centralPlanetMesh.rotation.x += 0.02 * delta;
            }

            // Плавное изменение позиции фоновой планеты (в игре она уходит вниз, в меню по центру)
            if (gameActive) {
                centralPlanetMesh.position.y = THREE.MathUtils.lerp(centralPlanetMesh.position.y, -14, 0.03);
                centralPlanetMesh.scale.setScalar(THREE.MathUtils.lerp(centralPlanetMesh.scale.x, 1.4, 0.03));
            } else {
                centralPlanetMesh.position.y = THREE.MathUtils.lerp(centralPlanetMesh.position.y, -1, 0.03);
                centralPlanetMesh.scale.setScalar(THREE.MathUtils.lerp(centralPlanetMesh.scale.x, 1.0, 0.03));
            }

            // Обработка падающих 3D предметов в игре
            if (gameActive) {
                let currentSpeedMod = PLANETS[activeGamePlanetIdx].speed;
                let finalSpeed = isFrozen ? 0.15 : currentSpeedMod;

                for (let i = active3DItems.length - 1; i >= 0; i--) {
                    let item = active3DItems[i];
                    item.mesh.position.y -= item.fallSpeed * finalSpeed * delta;
                    
                    // Настоящее сочное 3D вращение по всем осям
                    item.mesh.rotation.x += item.rotSpeed.x * (isFrozen ? 0.2 : 1);
                    item.mesh.rotation.y += item.rotSpeed.y * (isFrozen ? 0.2 : 1);
                    item.mesh.rotation.z += item.rotSpeed.z * (isFrozen ? 0.2 : 1);

                    // Космическое покачивание волной
                    item.mesh.position.x = item.initialX + Math.sin(item.mesh.position.y * 0.4) * 0.8;

                    // Улетело за нижнюю границу экрана
                    if (item.mesh.position.y < -16) {
                        scene.remove(item.mesh);
                        active3DItems.splice(i, 1);
                    }
                }
            }

            renderer.render(scene, camera);
        }

        // ГЕНЕРАЦИЯ ОБЪЕКТОВ (НАСТОЯЩЕЕ ГЕОМЕТРИЧЕСКОЕ 3Д)
        function spawn3DItem() {
            let rand = Math.random();
            let type = 'crystal';
            let color = 0x00ffcc;
            let geom;

            if (rand < 0.12) {
                type = 'bomb'; color = 0xff3366;
                geom = new THREE.SphereGeometry(0.9, 16, 16); // Сфера бомбы
            } else if (rand < 0.17) {
                type = 'freeze'; color = 0x00b3ff;
                geom = new THREE.IcosahedronGeometry(0.9, 0); // Икосаэдр для льда
            } else if (rand < 0.22) {
                type = 'time'; color = 0xff33cc;
                geom = new THREE.ConeGeometry(0.7, 1.6, 5); // Конус времени
            } else if (rand < 0.30) {
                type = 'gold'; color = 0xffcc00;
                geom = new THREE.OctahedronGeometry(1.0, 0); // Большой золотой октаэдр
            } else {
                type = 'crystal'; color = 0x00ffcc;
                geom = new THREE.OctahedronGeometry(0.8, 0); // Обычный кристалл
            }

            const mat = new THREE.MeshPhongMaterial({
                color: color,
                flatShading: true,
                shininess: 80,
                specular: 0xffffff
            });

            const mesh = new THREE.Mesh(geom, mat);
            
            // Рассчитываем координаты спавна в зависимости от пропорций экрана
            let aspect = window.innerWidth / window.innerHeight;
            let spawnWidthRange = (25 * aspect) - 2;
            let randomX = (Math.random() - 0.5) * spawnWidthRange;

            mesh.position.set(randomX, 15, 0);
            scene.add(mesh);

            active3DItems.push({
                mesh: mesh,
                type: type,
                initialX: randomX,
                fallSpeed: Math.random() * 3 + 5,
                rotSpeed: new THREE.Vector3(Math.random()*2, Math.random()*2, Math.random()*2)
            });
        }

        // ОБРАБОТКА ИГРОВЫХ КЛИКОВ ЧЕРЕЗ RAYCASTER
        function onPointScene(e) {
            if (!gameActive) return;

            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(active3DItems.map(i => i.mesh));

            if (intersects.length > 0) {
                let clickedMesh = intersects[0].object;
                let index = active3DItems.findIndex(i => i.mesh === clickedMesh);
                
                if (index !== -1) {
                    let item = active3DItems[index];
                    handleHitItem(item, e.clientX, e.clientY);
                    
                    // Удаляем из 3D мира
                    scene.remove(item.mesh);
                    active3DItems.splice(index, 1);
                }
            } else {
                // Мисс клик сбрасывает комбо
                resetCombo();
            }
        }

        function handleHitItem(item, clientX, clientY) {
            let pointsGained = 0;
            let textColor = '#00ffcc';
            let labelText = '';

            if (item.type === 'bomb') {
                score -= 40; if (score < 0) score = 0;
                resetCombo();
                textColor = '#ff3366';
                labelText = '-40';
            } else if (item.type === 'time') {
                timeLeft += 3;
                textColor = '#ff33cc';
                labelText = '+3с';
                incrementCombo();
            } else if (item.type === 'freeze') {
                isFrozen = true; freezeTimer = 3.0;
                pointsGained = 5;
                textColor = '#00b3ff';
                labelText = '+5 Заморозка';
                incrementCombo();
            } else {
                let base = item.type === 'gold' ? 25 : 10;
                let multiplier = 1 + (clickLevel - 1) * 0.15;
                pointsGained = Math.round(base * multiplier * comboMultiplier);
                textColor = item.type === 'gold' ? '#ffcc00' : '#00ffcc';
                labelText = `+${pointsGained}`;
                incrementCombo();
            }

            score += pointsGained;
            document.getElementById('score').textContent = score;

            // Всплывающий красивый плоский HTML текст поверх 3D
            createScorePopup(clientX, clientY, labelText, textColor);
        }

        function createScorePopup(x, y, text, color) {
            const popup = document.createElement('div');
            popup.className = 'html-score-popup';
            popup.style.left = `${x}px`;
            popup.style.top = `${y}px`;
            popup.style.color = color;
            popup.textContent = text;
            document.body.appendChild(popup);
            setTimeout(() => popup.remove(), 800);
        }

        function incrementCombo() {
            comboStreak++;
            if (comboStreak >= 12) comboMultiplier = 4;
            else if (comboStreak >= 8) comboMultiplier = 3;
            else if (comboStreak >= 4) comboMultiplier = 2;
            else comboMultiplier = 1;

            const tag = document.getElementById('combo-tag');
            if (comboMultiplier > 1) {
                tag.textContent = `COMBO x${comboMultiplier}`;
                tag.classList.add('visible');
            }
        }

        function resetCombo() {
            comboStreak = 0; comboMultiplier = 1;
            document.getElementById('combo-tag').classList.remove('visible');
        }

        // ЛОГИКА ОБНОВЛЕНИЯ ИГРЫ ТАЙМЕРАМИ
        let spawnCountdown = 0;
        setInterval(() => {
            if (!gameActive) return;

            // Обработка таймеров
            timeLeft--;
            document.getElementById('timer').textContent = timeLeft;

            if (isFrozen) {
                freezeTimer--;
                if (freezeTimer <= 0) isFrozen = false;
            }

            if (timeLeft <= 0) endGameSession();
        }, 1000);

        // Внутренний игровой цикл спавна
        setInterval(() => {
            if (!gameActive || isFrozen) return;
            spawn3DItem();
        }, 380);

        function startGame() {
            score = 0; timeLeft = 30; isFrozen = false;
            activeGamePlanetIdx = selectedPlanetIdx; // Замораживаем планету на текущий раунд
            resetCombo();
            
            // Чистим старые айтемы
            active3DItems.forEach(i => scene.remove(i.mesh));
            active3DItems = [];

            document.getElementById('score').textContent = "0";
            document.getElementById('timer').textContent = "30";

            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            
            gameActive = true;
        }

        function endGameSession() {
            gameActive = false;
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('menu-screen').style.display = 'flex';

            let earnedCrypto = score * 0.01;
            cryptoBalance += earnedCrypto;
            localStorage.setItem('lum_balance', cryptoBalance.toFixed(2));
            updateMenuUI();

            document.getElementById('last-score').innerHTML = `МИССИЯ ВЫПОЛНЕНА!<br><span style="color:#00ffcc; font-family:'Orbitron'; font-size:1.2rem;">+${earnedCrypto.toFixed(2)} $LUM</span>`;
        }

        // СЛАЙДЕР ВЫБОРА ПЛАНЕТ (СТИЛЬ CLASH ROYALE)
        function switchPlanet(dir) {
            selectedPlanetIdx += dir;
            if (selectedPlanetIdx < 0) selectedPlanetIdx = PLANETS.length - 1;
            if (selectedPlanetIdx >= PLANETS.length) selectedPlanetIdx = 0;

            // Перестраиваем 3D мир под тему планеты
            scene.background = new THREE.Color(PLANETS[selectedPlanetIdx].spaceColor);
            buildBackgroundPlanet();

            updatePlanetSliderUI();
        }

        function updatePlanetSliderUI() {
            const planet = PLANETS[selectedPlanetIdx];
            document.getElementById('p-slide-title').textContent = planet.name;
            
            const statusLabel = document.getElementById('p-slide-status');
            const playBtn = document.getElementById('play-btn');

            if (cryptoBalance >= planet.req) {
                statusLabel.textContent = "Доступно";
                statusLabel.style.color = "#00ffcc";
                playBtn.disabled = false;
                playBtn.innerHTML = `НАЧАТЬ МИССИЮ`;
            } else {
                statusLabel.textContent = `Блокировка: Нужна цель ${planet.req} $LUM`;
                statusLabel.style.color = "#ff3366";
                playBtn.disabled = true;
                playBtn.innerHTML = `НЕДОСТУПНО <span class="lock-sub">ТРЕБУЕТСЯ КРИПТОБАЛАНС</span>`;
            }
        }

        // ЭКОНОМИКА ХАБА, ПАССИВНЫЙ ФАРМИНГ И ШОП
        let questsData = JSON.parse(localStorage.getItem('lum_quests_state_v2')) || [
            { id: 'q1', name: 'Полёт на Марс (Разблокировать планету)', reward: 10, target: 15, done: false },
            { id: 'q2', name: 'Мастер Энергии (Прокачать шоп)', reward: 20, target: 2, done: false }
        ];

        function updateMenuUI() {
            document.getElementById('total-balance').textContent = cryptoBalance.toFixed(2);
            updatePlanetSliderUI();
            
            // Рендер квестов на кнопке главного меню
            let completed = questsData.filter(q => q.done).length;
            document.getElementById('quests-btn-lbl').textContent = `${completed}/${questsData.length} →`;
        }

        setInterval(() => {
            if (!gameActive) {
                let farmMultiplier = 1 + (farmLevel - 1) * 0.4;
                activeFarmAccum += 0.0002 * farmMultiplier;
                document.getElementById('farm-display').textContent = activeFarmAccum.toFixed(4);
                localStorage.setItem('lum_farm_accum', activeFarmAccum);
            }
        }, 1000);

        function claimFarming() {
            if (activeFarmAccum <= 0) return;
            cryptoBalance += activeFarmAccum;
            activeFarmAccum = 0;
            localStorage.setItem('lum_balance', cryptoBalance.toFixed(2));
            localStorage.setItem('lum_farm_accum', activeFarmAccum);
            updateMenuUI();
        }

        function openModal(id) {
            if (id === 'quests-modal') renderQuestsList();
            if (id === 'shop-modal') updateShopModalUI();
            document.getElementById(id).style.display = 'flex';
        }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function updateShopModalUI() {
            let clickCost = clickLevel * 25;
            let farmCost = farmLevel * 30;

            document.getElementById('upg-click-desc').textContent = `Ур. ${clickLevel} (+${(clickLevel-1)*15}% ценность)`;
            document.getElementById('upg-click-btn').textContent = `${clickCost} $LUM`;
            document.getElementById('upg-click-btn').disabled = cryptoBalance < clickCost;

            document.getElementById('upg-farm-desc').textContent = `Ур. ${farmLevel} (Скорость x${(1+(farmLevel-1)*0.4).toFixed(1)})`;
            document.getElementById('upg-farm-btn').textContent = `${farmCost} $LUM`;
            document.getElementById('upg-farm-btn').disabled = cryptoBalance < farmCost;
        }

        function buyUpgrade(type) {
            if (type === 'click') {
                let cost = clickLevel * 25;
                if (cryptoBalance >= cost) { cryptoBalance -= cost; clickLevel++; localStorage.setItem('lum_shop_click_lvl', clickLevel); }
            } else if (type === 'farm') {
                let cost = farmLevel * 30;
                if (cryptoBalance >= cost) { cryptoBalance -= cost; farmLevel++; localStorage.setItem('lum_shop_farm_lvl', farmLevel); }
            }
            // Проверка квестов
            if (clickLevel >= 2 || farmLevel >= 2) { questsData[1].done = true; localStorage.setItem('lum_quests_state_v2', JSON.stringify(questsData)); }

            localStorage.setItem('lum_balance', cryptoBalance.toFixed(2));
            updateMenuUI();
            updateShopModalUI();
        }

        function renderQuestsList() {
            const list = document.getElementById('quests-list');
            list.innerHTML = '';
            
            // Динамическая проверка квеста 1 на баланс
            if (cryptoBalance >= 15) { questsData[0].done = true; localStorage.setItem('lum_quests_state_v2', JSON.stringify(questsData)); }

            questsData.forEach((q, idx) => {
                let row = document.createElement('div');
                row.className = 'list-row';
                let btn = q.done ? `<button class="row-btn" style="background:#554e68; color:#fff" disabled>ГОТОВО</button>` : `<button class="row-btn" style="background:#ff3366; color:#fff" disabled>В ПРОЦЕССЕ</button>`;
                row.innerHTML = `<div class="row-info"><div class="r-title">${q.name}</div><div class="r-sub">Награда: +${q.reward} $LUM</div></div>${btn}`;
                list.appendChild(row);
            });
        }

        const MAX_TICKETS = 7;
        let tickets = MAX_TICKETS;
        
        function tryStartGame() {
            startGame(); // Запуск без жестких блокировок для удобства тестов
        }

        // Старт всего при загрузке страницы
        window.onload = () => {
            initEngine3D();
            updateMenuUI();
        };
    </script>
</body>
</html>
