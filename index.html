<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultra Smooth Cyber Casino</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background: radial-gradient(circle at center, #130a2a 0%, #05030a 100%);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Энергетические неоновые фоны */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 350px;
            height: 350px;
            filter: blur(160px);
            opacity: 0.15;
            z-index: -1;
        }
        body::before { background: #ff007f; top: 5%; left: 10%; }
        body::after { background: #00f2fe; bottom: 5%; right: 10%; }

        header {
            text-align: center;
            margin-bottom: 25px;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(45deg, #00f2fe, #ff007f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 40px rgba(0, 242, 254, 0.4);
        }

        /* Контейнер балансов */
        .balance-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 460px;
            margin-bottom: 30px;
        }

        .balance-card {
            background: rgba(24, 18, 43, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 16px 24px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            backdrop-filter: blur(20px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
        }

        .balance-info { display: flex; flex-direction: column; }
        .balance-text { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; color: #9d96b8; margin-bottom: 4px; }
        .balance-value { font-weight: 800; font-size: 1.4rem; color: #fff; }

        #game-balance { background: linear-gradient(to right, #ffe600, #ff9900); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        #payout-balance { background: linear-gradient(to right, #00ff88, #00f2fe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* Кнопки */
        .btn-action {
            border: none;
            color: white;
            padding: 11px 22px;
            font-weight: 700;
            font-size: 0.85rem;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.25s ease;
        }

        .btn-deposit { background: linear-gradient(90deg, #ff007f 0%, #7928ca 100%); box-shadow: 0 4px 15px rgba(255, 0, 127, 0.2); }
        .btn-deposit:hover { transform: translateY(-2px); box-shadow: 0 0 25px rgba(255, 0, 127, 0.5); }

        .btn-withdraw { background: linear-gradient(90deg, #00ff88 0%, #00eaec 100%); color: #07040d; box-shadow: 0 4px 15px rgba(0, 255, 136, 0.2); }
        .btn-withdraw:hover { transform: translateY(-2px); box-shadow: 0 0 25px rgba(0, 255, 136, 0.5); }

        .withdraw-box { display: flex; gap: 10px; align-items: center; width: 135px; }
        .withdraw-input { width: 100%; background: #05030a; border: 1px solid rgba(255, 255, 255, 0.1); color: #00ff88; padding: 9px; border-radius: 8px; font-weight: 700; text-align: center; outline: none; }

        /* Слот-Машина */
        .slot-machine {
            background: linear-gradient(145deg, #1d1635, #0c081a);
            border: 2px solid rgba(255, 0, 127, 0.25);
            border-radius: 24px;
            padding: 35px;
            width: 100%;
            max-width: 460px;
            text-align: center;
            box-shadow: 0 25px 60px rgba(0,0,0,0.7), inset 0 0 30px rgba(255,0,127,0.05);
        }

        .screen {
            background: #040207;
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 18px;
            padding: 22px;
            margin-bottom: 25px;
            box-shadow: inset 0 0 25px rgba(0,0,0,0.95);
        }

        .slots-container {
            display: flex;
            justify-content: center;
            gap: 16px;
        }

        /* Окно барабана */
        .slot-window {
            background: linear-gradient(180deg, #0a0714 0%, #1a1330 50%, #0a0714 100%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            width: 95px;
            height: 110px;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        /* Рельс с аппаратным ускорением (GPU) */
        .slot-reel {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: absolute;
            width: 100%;
            top: 0;
            left: 0;
            will-change: transform;
            transform: translate3d(0, 0, 0);
        }

        .slot-tile {
            width: 100%;
            height: 110px;
            font-size: 3.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }

        /* Плавный динамический Blur эффект */
        .blur-effect {
            filter: blur(6px);
            will-change: filter;
        }

        /* Мощная неоновая победная рамка */
        .winner-glow {
            border-color: #00ff88 !important;
            box-shadow: 0 0 25px rgba(0, 255, 136, 0.6), inset 0 0 15px rgba(0, 255, 136, 0.3);
            animation: winPulse 0.3s infinite alternate;
        }

        .control-panel { display: flex; flex-direction: column; gap: 20px; }
        .input-group { display: flex; flex-direction: column; align-items: flex-start; gap: 8px; }
        .input-label { color: #8a8a9e; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

        .bet-input {
            width: 100%;
            background: #07040d;
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: white;
            padding: 15px;
            border-radius: 14px;
            font-size: 1.25rem;
            font-weight: 700;
            text-align: center;
            outline: none;
            transition: border-color 0.2s;
        }
        .bet-input:focus { border-color: #ff007f; }

        .btn-spin {
            background: linear-gradient(135deg, #ff007f 0%, #7928ca 100%);
            border: none;
            color: white;
            padding: 18px;
            font-size: 1.35rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 14px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(255, 0, 127, 0.35);
            transition: all 0.2s ease;
        }
        .btn-spin:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(255, 0, 127, 0.5); }
        .btn-spin:disabled { background: #282336; color: #575166; box-shadow: none; cursor: not-allowed; transform: none; }

        #status-display {
            margin-top: 22px;
            font-size: 1.1rem;
            font-weight: 600;
            min-height: 28px;
        }

        .win-text { color: #00ff88; text-shadow: 0 0 20px rgba(0, 255, 136, 0.5); }
        .lose-text { color: #ff3366; }
        .info-text { color: #00f2fe; }

        @keyframes winPulse {
            from { transform: scale(1); }
            to { transform: scale(1.03); }
        }
    </style>
</head>
<body>

    <header>
        <h1>STARDUST SLOTS</h1>
        <p style="color: #6c6382; font-weight: 500;">Плавный движок • Бонус +0.1🏆 и x2⭐ при победе</p>
    </header>

    <div class="balance-container">
        <div class="balance-card">
            <div class="balance-info">
                <span class="balance-text">Игровой баланс</span>
                <span class="balance-value" id="game-balance">100 ⭐</span>
            </div>
            <a href="https://t.me/markplau" target="_blank" class="btn-action btn-deposit">Пополнить</a>
        </div>

        <div class="balance-card" style="border-color: rgba(0, 255, 136, 0.15);">
            <div class="balance-info">
                <span class="balance-text">Баланс вывода (Мин. 15 / Макс. 100)</span>
                <span class="balance-value" id="payout-balance">0 🏆</span>
            </div>
            <div class="withdraw-box">
                <input type="number" id="withdraw-amount" class="withdraw-input" value="15" min="15" max="100">
                <button class="btn-action btn-withdraw" onclick="requestWithdraw()">Вывод</button>
            </div>
        </div>
    </div>

    <div class="slot-machine">
        <div class="screen">
            <div class="slots-container">
                <div class="slot-window" id="w1"><div class="slot-reel" id="reel1"></div></div>
                <div class="slot-window" id="w2"><div class="slot-reel" id="reel2"></div></div>
                <div class="slot-window" id="w3"><div class="slot-reel" id="reel3"></div></div>
            </div>
        </div>

        <div class="control-panel">
            <div class="input-group">
                <span class="input-label">Ставка (⭐)</span>
                <input type="number" id="bet" class="bet-input" value="10" min="1">
            </div>
            <button class="btn-spin" id="spin-btn" onclick="startSpin()">ЗАПУСК</button>
        </div>

        <div id="status-display">Выбей 3 в ряд, чтобы получить умножение игровых и кубки вывода!</div>
    </div>

    <script>
        let gameBalance = 100;   
        let payoutBalance = 0;    
        
        const symbols = ['🍒', '🍋', '🍇', '🍉', '⭐', '💎', '7️⃣'];
        const TILE_HEIGHT = 110; 
        const VISIBLE_TILES = 1; 
        
        // Премиальные жесткие веса (RTP)
        const weights = [
            { sym: '🍒', weight: 26 },
            { sym: '🍋', weight: 25 },
            { sym: '🍇', weight: 20 },
            { sym: '🍉', weight: 15 },
            { sym: '⭐', weight: 9 },
            { sym: '💎', weight: 4 },
            { sym: '7️⃣', weight: 1 }
        ];

        function getRandomSymbol() {
            let num = Math.floor(Math.random() * 100);
            let sum = 0;
            for (let i = 0; i < weights.length; i++) {
                sum += weights[i].weight;
                if (num < sum) return weights[i].sym;
            }
            return symbols[0];
        }

        // Инициализация. Создаем длинную ленту для прокрутки без лагов
        function initReels() {
            for (let i = 1; i <= 3; i++) {
                const reel = document.getElementById(`reel${i}`);
                generateReelContent(reel, '🍒');
            }
        }

        function generateReelContent(reelEl, targetSymbol, totalTiles = 40) {
            let html = `<div class="slot-tile">${targetSymbol}</div>`;
            for (let j = 1; j < totalTiles; j++) {
                html += `<div class="slot-tile">${symbols[Math.floor(Math.random() * symbols.length)]}</div>`;
            }
            reelEl.innerHTML = html;
            // Исходное положение: лента сдвинута вниз через 3D Transform
            reelEl.style.transform = `translate3d(0, -${(totalTiles - 1) * TILE_HEIGHT}px, 0)`;
        }

        async function startSpin() {
            const betInput = document.getElementById('bet');
            const btn = document.getElementById('spin-btn');
            const display = document.getElementById('status-display');
            const gameBalanceEl = document.getElementById('game-balance');

            let bet = parseInt(betInput.value);

            if (isNaN(bet) || bet <= 0) {
                display.className = 'lose-text';
                display.innerText = '⚠️ Введи корректную ставку!';
                return;
            }
            if (bet > gameBalance) {
                display.className = 'lose-text';
                display.innerText = '⚠️ Недостаточно звёзд ⭐!';
                return;
            }

            btn.disabled = true;
            betInput.disabled = true;
            display.className = 'info-text';
            display.innerText = 'Спины запущены на полную мощность...';

            for(let i=1; i<=3; i++) document.getElementById(`w${i}`).classList.remove('winner-glow');

            gameBalance -= bet;
            gameBalanceEl.innerText = `${gameBalance} ⭐`;

            const finalResults = [getRandomSymbol(), getRandomSymbol(), getRandomSymbol()];

            // Запускаем аппаратную 3D-анимацию с распределением времени (Stagger)
            const p1 = animateReel(1, finalResults[0], 1.4);
            const p2 = animateReel(2, finalResults[1], 1.9);
            const p3 = animateReel(3, finalResults[2], 2.4);

            await Promise.all([p1, p2, p3]);

            btn.disabled = false;
            betInput.disabled = false;

            processResult(finalResults, bet);
        }

        function animateReel(reelNum, targetSymbol, duration) {
            return new Promise(resolve => {
                const reel = document.getElementById(`reel${reelNum}`);
                const windowEl = document.getElementById(`w${reelNum}`);
                const totalTiles = 45;

                // Полная пересборка ленты: верхний элемент — то, где остановимся
                let html = `<div class="slot-tile">${targetSymbol}</div>`;
                for (let j = 1; j < totalTiles; j++) {
                    html += `<div class="slot-tile">${symbols[Math.floor(Math.random() * symbols.length)]}</div>`;
                }
                
                // Отключаем старые переходы, мгновенно сдвигаем вниз
                reel.style.transition = 'none';
                reel.innerHTML = html;
                reel.style.transform = `translate3d(0, -${(totalTiles - 1) * TILE_HEIGHT}px, 0)`;

                // Добавляем эффект размытия (GPU-friendly)
                windowEl.classList.add('blur-effect');

                // Форсируем перерисовку браузера (Reflow) для запуска анимации
                reel.offsetHeight;

                // Запуск плавного торможения с помощью кубического Безье
                reel.style.transition = `transform ${duration}s cubic-bezier(0.1, 0.85, 0.25, 1)`;
                reel.style.transform = 'translate3d(0, 0, 0)';

                setTimeout(() => {
                    windowEl.classList.remove('blur-effect');
                    resolve();
                }, duration * 1000);
            });
        }

        function processResult(results, bet) {
            const display = document.getElementById('status-display');
            const payoutBalanceEl = document.getElementById('payout-balance');
            const gameBalanceEl = document.getElementById('game-balance');
            
            const [r1, r2, r3] = results;

            // ХАРДКОР ДЖЕКПОТ (3 в ряд)
            if (r1 === r2 && r2 === r3) {
                let basePayoutMultiplier = 3; 
                if (r1 === '⭐') basePayoutMultiplier = 6;
                if (r1 === '💎') basePayoutMultiplier = 10;
                if (r1 === '7️⃣') basePayoutMultiplier = 15;

                // 1. Игровой баланс получает x2 от ставки обратно
                let gameBonus = bet * 2;
                gameBalance += gameBonus;

                // 2. Баланс вывода получает сумму выигрыша + 0.1 кубка бонусом
                let payoutWin = (bet * basePayoutMultiplier) + 0.1;
                // Округляем до 1 знака после запятой, чтобы избежать кривых дробей в JS
                payoutBalance = parseFloat((payoutBalance + payoutWin).toFixed(1)); 

                gameBalanceEl.innerText = `${gameBalance} ⭐`;
                payoutBalanceEl.innerText = `${payoutBalance} 🏆`;

                display.className = 'win-text';
                display.innerText = `🔥 ДЖЕКПОТ! На вывод: +${payoutWin} 🏆 | На игру: +${gameBonus} ⭐ (x2)`;
                
                for(let i=1; i<=3; i++) document.getElementById(`w${i}`).classList.add('winner-glow');
            } 
            // Утешительные 2 совпадения (На вывод ничего, только 50% ставки назад)
            else if (r1 === r2 || r2 === r3 || r1 === r3) {
                let cashback = Math.floor(bet * 0.5);
                gameBalance += cashback;
                gameBalanceEl.innerText = `${gameBalance} ⭐`;
                
                display.className = 'info-text';
                display.innerText = `2 совпадения. Возвращено на игру: +${cashback} ⭐ (На вывод 0)`;
            } 
            // Проигрыш
            else {
                display.className = 'lose-text';
                display.innerText = 'Ничего не совпало. Крути еще!';
            }
        }

        function requestWithdraw() {
            const display = document.getElementById('status-display');
            const withdrawInput = document.getElementById('withdraw-amount');
            const payoutBalanceEl = document.getElementById('payout-balance');
            
            let amount = parseInt(withdrawInput.value);

            if (isNaN(amount) || amount < 15 || amount > 100) {
                display.className = 'lose-text';
                display.innerText = '⚠️ Лимиты вывода: от 15 до 100 🏆 звёзд!';
                return;
            }

            if (amount > payoutBalance) {
                display.className = 'lose-text';
                display.innerText = '⚠️ Недостаточно выбитых кубков для вывода!';
                return;
            }

            payoutBalance = parseFloat((payoutBalance - amount).toFixed(1));
            payoutBalanceEl.innerText = `${payoutBalance} 🏆`;

            display.className = 'win-text';
            display.innerText = `Заявка одобрена! Перенаправляю к @markplau...`;

            const textMessage = encodeURIComponent(`Привет! Я накопил выигрыш и хочу вывести ${amount} звёзд.`);
            const tgUrl = `https://t.me/markplau?text=${textMessage}`;

            setTimeout(() => { window.open(tgUrl, '_blank'); }, 1000);
        }

        window.onload = initReels;
    </script>
</body>
</html>
