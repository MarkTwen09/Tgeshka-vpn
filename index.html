<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SO2 Case Simulator PRO</title>
    <style>
        body {
            background-color: #0d1117;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        .header { text-align: center; margin-bottom: 20px; }
        .balance { font-size: 28px; color: #ffcc00; font-weight: bold; }

        /* РУЛЕТКА */
        .roulette-wrapper {
            position: relative;
            width: 100%;
            max-width: 800px;
            height: 180px;
            background: #161b22;
            border: 3px solid #30363d;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .pointer {
            position: absolute;
            left: 50%;
            top: 0;
            width: 4px;
            height: 100%;
            background: #ff4747;
            z-index: 10;
            transform: translateX(-50%);
            box-shadow: 0 0 20px #ff4747;
        }

        .cases-line { display: flex; position: absolute; left: 0; top: 15px; }

        .skin-card {
            min-width: 150px;
            height: 150px;
            margin: 0 5px;
            background: #21262d;
            border-bottom: 5px solid #ccc;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        /* РЕДКОСТИ */
        .common { border-color: #b0c3d9; }
        .uncommon { border-color: #5e98d9; }
        .rare { border-color: #4b69ff; }
        .epic { border-color: #8847ff; }
        .legendary { border-color: #d32ce6; }
        .arcane { border-color: #eb4b4b; text-shadow: 0 0 5px red; }

        .main-btn {
            padding: 15px 60px;
            background: linear-gradient(180deg, #ffcc00, #ff9900);
            border: none;
            border-radius: 8px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 153, 0, 0.4);
        }

        .main-btn:disabled { background: #484f58; color: #8b949e; }

        /* ИНВЕНТАРЬ */
        .inventory-section { width: 100%; max-width: 900px; margin-top: 40px; }
        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 15px;
            padding: 20px;
            border-top: 2px solid #30363d;
        }

        .inv-item {
            background: #161b22;
            padding: 10px;
            border-radius: 8px;
            border-bottom: 3px solid;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            position: relative;
        }

        .inv-item:hover { transform: scale(1.05); background: #1c222b; }
        .inv-item:active { transform: scale(0.95); }

        .price-tag { color: #ffcc00; font-size: 12px; margin-top: 5px; font-weight: bold; }
        .sell-hint { font-size: 9px; color: #8b949e; display: block; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="header">
        <h1>SO2 CASE SIMULATOR</h1>
        <div class="balance">Баланс: <span id="balanceText">1000</span> G</div>
    </div>

    <div class="roulette-wrapper">
        <div class="pointer"></div>
        <div id="line" class="cases-line"></div>
    </div>

    <button id="spinBtn" class="main-btn" onclick="openCase()">ОТКРЫТЬ КЕЙС (100 G)</button>

    <div class="inventory-section">
        <h3>МОЙ ИНВЕНТАРЬ <span style="font-size: 12px; color: #8b949e;">(нажми на скин, чтобы продать)</span></h3>
        <div id="inventory" class="inventory-grid"></div>
    </div>

    <script>
        // БАЗА СКИНОВ С ЦЕНАМИ
        const skins = [
            { id: 1, name: "G22 | Casual", rarity: "common", icon: "🔫", price: 5 },
            { id: 2, name: "USP | Genesis", rarity: "uncommon", icon: "🔫", price: 15 },
            { id: 3, name: "M4 | Tiger", rarity: "rare", icon: "🔫", price: 45 },
            { id: 4, name: "AKR | Necromancer", rarity: "epic", icon: "🔫", price: 150 },
            { id: 5, name: "AWM | Scratch", rarity: "legendary", icon: "🎯", price: 600 },
            { id: 6, name: "M9 | Universe", rarity: "arcane", icon: "🔪", price: 8500 },
            { id: 7, name: "Karambit | Gold", rarity: "arcane", icon: "🔪", price: 15000 }
        ];

        const rarityWeights = { common: 60, uncommon: 25, rare: 10, epic: 3, legendary: 1.5, arcane: 0.5 };

        let balance = parseInt(localStorage.getItem('so2_balance')) || 1000;
        let myItems = JSON.parse(localStorage.getItem('so2_inventory')) || [];

        function updateUI() {
            document.getElementById('balanceText').innerText = balance;
            localStorage.setItem('so2_balance', balance);
            
            const invDiv = document.getElementById('inventory');
            invDiv.innerHTML = '';
            
            myItems.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = `inv-item ${item.rarity}`;
                div.onclick = () => sellItem(index);
                div.innerHTML = `
                    <div style="font-size:30px">${item.icon}</div>
                    <div style="font-size:11px">${item.name}</div>
                    <div class="price-tag">${item.price} G</div>
                    <span class="sell-hint">Нажми, чтобы продать</span>
                `;
                invDiv.appendChild(div);
            });
            localStorage.setItem('so2_inventory', JSON.stringify(myItems));
        }

        function sellItem(index) {
            const item = myItems[index];
            balance += item.price;
            myItems.splice(index, 1);
            updateUI();
        }

        function getWeightedRandomSkin() {
            let totalWeight = 0;
            for (let r in rarityWeights) totalWeight += rarityWeights[r];
            let random = Math.random() * totalWeight;
            let currentWeight = 0;
            for (let r in rarityWeights) {
                currentWeight += rarityWeights[r];
                if (random < currentWeight) {
                    const filtered = skins.filter(s => s.rarity === r);
                    return {...filtered[Math.floor(Math.random() * filtered.length)]};
                }
            }
        }

        function openCase() {
            if (balance < 100) return alert("Мало голды!");
            balance -= 100;
            const btn = document.getElementById('spinBtn');
            const line = document.getElementById('line');
            btn.disabled = true;
            
            line.innerHTML = '';
            const totalCards = 60;
            const winningIndex = 55;
            let winSkin;

            for(let i=0; i < totalCards; i++) {
                let s = getWeightedRandomSkin();
                if(i === winningIndex) winSkin = s;
                const card = document.createElement('div');
                card.className = `skin-card ${s.rarity}`;
                card.innerHTML = `<div style="font-size:40px">${s.icon}</div><div>${s.name}</div>`;
                line.appendChild(card);
            }

            line.style.transition = 'none';
            line.style.transform = 'translateX(0)';
            
            setTimeout(() => {
                const cardWidth = 160; 
                const offset = (winningIndex * cardWidth) - (window.innerWidth / 2) + (cardWidth / 2);
                line.style.transition = 'transform 7s cubic-bezier(0.1, 0, 0.1, 1)';
                line.style.transform = `translateX(-${offset}px)`;
            }, 50);

            setTimeout(() => {
                btn.disabled = false;
                myItems.unshift(winSkin);
                updateUI();
            }, 7200);
        }

        updateUI();
    </script>
</body>
</html>
