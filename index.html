<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TGESHKA VPN | Прокси-браузер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: radial-gradient(ellipse at 20% 30%, #0a0f1f, #010101);
            font-family: 'Segoe UI', 'Orbitron', 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,255,255,0.03) 0px, rgba(0,255,255,0.03) 2px, transparent 2px, transparent 6px);
            pointer-events: none;
            z-index: 0;
        }

        .vpn-container {
            position: relative;
            z-index: 2;
            width: 95%;
            max-width: 1300px;
            background: rgba(8, 12, 20, 0.75);
            backdrop-filter: blur(15px);
            border-radius: 3rem;
            border: 1px solid rgba(0, 255, 255, 0.5);
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.2), inset 0 0 30px rgba(0, 255, 255, 0.05);
            padding: 2rem;
            transition: all 0.4s ease;
        }

        .magic-btn {
            display: block;
            width: 320px;
            margin: 1rem auto 2rem auto;
            padding: 1.2rem 2rem;
            font-size: 1.6rem;
            font-weight: bold;
            text-align: center;
            text-transform: uppercase;
            background: linear-gradient(135deg, #0ff, #0a4);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            border: 2px solid #0ff;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 8px #0ff, 0 0 20px #0ff;
            letter-spacing: 3px;
            backdrop-filter: blur(4px);
            text-shadow: 0 0 5px cyan;
            font-family: 'Orbitron', monospace;
        }

        .magic-btn:hover {
            transform: scale(1.03);
            box-shadow: 0 0 20px cyan, 0 0 40px cyan;
            border-color: #f0f;
        }

        .hack-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: monospace;
            font-size: 2rem;
            color: #0f0;
            text-align: center;
            backdrop-filter: blur(8px);
            transition: opacity 0.5s;
            opacity: 0;
            pointer-events: none;
        }

        .hack-text {
            background: rgba(0,0,0,0.8);
            padding: 2rem;
            border-radius: 20px;
            border: 1px solid #0f0;
            box-shadow: 0 0 40px #0f0;
            animation: blink 1s steps(2) infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .dashboard {
            display: none;
            animation: fadeSlideUp 0.7s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .search-area {
            margin: 2rem 0 1.5rem;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .search-input {
            flex: 3;
            min-width: 250px;
            background: #0a0f1c;
            border: 1px solid #0ff;
            border-radius: 60px;
            padding: 1rem 1.8rem;
            font-size: 1rem;
            font-family: 'Courier New', monospace;
            color: #0ff;
            outline: none;
            transition: 0.2s;
            letter-spacing: 1px;
        }

        .search-input:focus {
            box-shadow: 0 0 15px cyan;
            background: #000;
        }

        .search-btn {
            background: rgba(0, 255, 255, 0.2);
            border: 1px solid #0ff;
            border-radius: 60px;
            padding: 0 2rem;
            font-weight: bold;
            font-size: 1.2rem;
            color: cyan;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
        }

        .search-btn:hover {
            background: rgba(0, 255, 255, 0.5);
            box-shadow: 0 0 12px cyan;
        }

        .browser-window {
            width: 100%;
            height: 65vh;
            min-height: 500px;
            border: 2px solid rgba(0, 255, 255, 0.6);
            border-radius: 28px;
            background: #0a0e18;
            margin-top: 1rem;
            overflow: hidden;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.3);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }

        .encryption-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin: 1rem 0;
            flex-wrap: wrap;
        }

        .glowing-text {
            background: rgba(0,0,0,0.6);
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-family: monospace;
            border-left: 3px solid cyan;
            color: #0ff;
            letter-spacing: 2px;
        }

        .radar {
            width: 30px;
            height: 30px;
            background: radial-gradient(circle, rgba(0,255,255,0.3) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            animation: pulseRadar 1.2s infinite;
        }

        @keyframes pulseRadar {
            0% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(0,255,255,0.4);}
            100% { transform: scale(1.2); box-shadow: 0 0 0 10px rgba(0,255,255,0);}
        }

        footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.7rem;
            opacity: 0.7;
            color: #0ff;
        }

        @media (max-width: 700px) {
            .vpn-container { padding: 1rem; }
            .magic-btn { width: 260px; font-size: 1.2rem; }
            .browser-window { height: 55vh; }
        }
    </style>
</head>
<body>
<div class="vpn-container">
    <div style="text-align: center; font-size: 2rem; font-weight: bold; text-shadow: 0 0 12px cyan;">⚡ TGESHKA VPN ⚡</div>
    <button id="activateBtn" class="magic-btn">АКТИВИРОВАТЬ МАГИЮ TGESHKA</button>
    
    <div id="dashboard" class="dashboard">
        <div class="encryption-badge">
            <div class="radar"></div>
            <div class="glowing-text">🔒 ЗАЩИТА: AES-256 + DYNAMIC PROXY 🔒</div>
            <div class="glowing-text" id="statusMsg">СОЕДИНЕНИЕ АКТИВНО</div>
        </div>
        <div class="search-area">
            <input type="text" id="urlInput" class="search-input" placeholder="Введите адрес: google.com / youtube.com / любой сайт" value="https://google.com">
            <button id="goBtn" class="search-btn">ПЕРЕЙТИ</button>
        </div>
        <div class="browser-window">
            <iframe id="proxyFrame" src="about:blank" title="Tgeshka VPN Browser"></iframe>
        </div>
        <footer>🔥 Трафик через CORS-прокси | Блокировки сняты | Анонимно и безопасно</footer>
    </div>
</div>

<div id="hackOverlay" class="hack-overlay">
    <div class="hack-text">🔓 БЛОКИРОВКИ СНЯТЫ 🔓<br>⚡ ДОСТУП АКТИВИРОВАН ⚡</div>
</div>

<script>
    // Список надёжных CORS-прокси (работающие на момент написания)
    const PROXY_LIST = [
        "https://corsproxy.io/?url=",
        "https://api.allorigins.win/raw?url=",
        "https://cors-anywhere.herokuapp.com/"
    ];
    let currentProxyIndex = 0;
    let isActive = false;

    // Функция проверки доступности прокси (асинхронная, тестируем через fetch)
    async function testProxy(proxyUrl) {
        try {
            const testUrl = proxyUrl + encodeURIComponent("https://httpbin.org/get");
            const response = await fetch(testUrl, { method: 'HEAD', mode: 'no-cors' });
            // no-cors режим не даёт прочитать ответ, но мы проверяем, что запрос ушёл без ошибок сети
            return true;
        } catch (e) {
            return false;
        }
    }

    // Выбор работающего прокси
    async function selectWorkingProxy() {
        for (let i = 0; i < PROXY_LIST.length; i++) {
            const proxy = PROXY_LIST[i];
            const works = await testProxy(proxy);
            if (works) {
                currentProxyIndex = i;
                return proxy;
            }
        }
        // Если все не работают, вернём первый (он всё равно может работать, но без проверки)
        return PROXY_LIST[0];
    }

    // Загрузка сайта через прокси
    async function loadSite(url) {
        if (!isActive) return;
        let target = url.trim();
        if (!target.startsWith('http://') && !target.startsWith('https://')) {
            target = 'https://' + target;
        }
        const proxy = PROXY_LIST[currentProxyIndex];
        const proxyUrl = proxy + encodeURIComponent(target);
        const iframe = document.getElementById('proxyFrame');
        iframe.src = proxyUrl;
        console.log(`[TGESHKA] Загружаем через прокси: ${proxyUrl}`);
    }

    // Эффект взлома
    function showHackEffect() {
        const overlay = document.getElementById('hackOverlay');
        overlay.style.opacity = '1';
        setTimeout(() => {
            overlay.style.opacity = '0';
        }, 1800);
    }

    // Активация VPN
    async function activateVPN() {
        if (isActive) return;
        showHackEffect();
        
        // Проверяем прокси
        const workingProxy = await selectWorkingProxy();
        if (!workingProxy) {
            alert('⚠️ Не удалось найти рабочий прокси-сервер. Проверьте интернет-соединение.');
            return;
        }
        
        isActive = true;
        document.getElementById('dashboard').style.display = 'block';
        const btn = document.getElementById('activateBtn');
        btn.textContent = '⚡ МАГИЯ АКТИВНА ⚡';
        btn.style.borderColor = '#f0f';
        btn.style.boxShadow = '0 0 20px #f0f';
        
        // Загружаем стартовый сайт
        const defaultUrl = document.getElementById('urlInput').value;
        if (defaultUrl) loadSite(defaultUrl);
    }

    function deactivateVPN() {
        if (!isActive) return;
        isActive = false;
        document.getElementById('dashboard').style.display = 'none';
        const btn = document.getElementById('activateBtn');
        btn.textContent = 'АКТИВИРОВАТЬ МАГИЮ TGESHKA';
        btn.style.borderColor = '#0ff';
        btn.style.boxShadow = '0 0 8px #0ff, 0 0 20px #0ff';
        document.getElementById('proxyFrame').src = 'about:blank';
    }

    // Обработчики
    const toggleBtn = document.getElementById('activateBtn');
    toggleBtn.addEventListener('click', () => {
        if (isActive) deactivateVPN();
        else activateVPN();
    });

    const goBtn = document.getElementById('goBtn');
    const urlInput = document.getElementById('urlInput');
    goBtn.addEventListener('click', () => {
        if (!isActive) {
            alert('Сначала активируйте VPN!');
            return;
        }
        const url = urlInput.value;
        if (url) loadSite(url);
        else alert('Введите адрес сайта');
    });

    urlInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            if (!isActive) alert('Активируйте VPN');
            else loadSite(urlInput.value);
        }
    });

    // Динамический текст статуса
    setInterval(() => {
        const statusSpan = document.getElementById('statusMsg');
        if (statusSpan && isActive) {
            const variants = ['СОЕДИНЕНИЕ АКТИВНО', '🔒 ЗАЩИЩЕНО', '⚡ АНОНИМНО', '🌐 ПРОКСИ ОНЛАЙН'];
            if (Math.random() > 0.9) statusSpan.innerText = variants[Math.floor(Math.random() * variants.length)];
        }
    }, 2000);
</script>
</body>
</html>
