<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SO2: CRYSTAL HARDCORE V6</title>
    <style>
        :root {
            --bg: #0a0f1b;
            --glass: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #ffcc00;
            --blue: #00d2ff;
            --up: #00ff88;
            --down: #ff4d4d;
            --common: #b0c3d9; --uncommon: #5e98d9; --rare: #4b69ff; --epic: #8847ff; --legendary: #d32ce6; --arcane: #eb4b4b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body {
            background: var(--bg);
            background: radial-gradient(circle at 50% -10%, #1a2a4d 0%, #0a0f1b 100%);
            color: white; font-family: 'SF Pro Display', sans-serif;
            margin: 0; padding: 12px; display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow: hidden;
        }

        .header {
            background: var(--glass); backdrop-filter: blur(25px);
            width: 100%; max-width: 480px; padding: 20px; border-radius: 28px;
            border: 1px solid var(--border); margin-bottom: 20px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .balance b { font-size: 24px; color: var(--accent); text-shadow: 0 0 15px rgba(255,204,0,0.3); }

        .tabs { display: flex; gap: 8px; width: 100%; max-width: 480px; margin-bottom: 20px; }
        .tab { 
            flex: 1; padding: 14px; background: var(--glass); border: 1px solid var(--border);
            color: #777; border-radius: 18px; font-weight: 800; cursor: pointer; transition: 0.3s;
            text-transform: uppercase; font-size: 11px;
        }
        .tab.active { background: var(--blue); color: #000; border: none; box-shadow: 0 8px 20px rgba(0,210,255,0.3); }

        .view { display: none; width: 100%; max-width: 480px; animation: slideIn 0.4s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .case-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .case-btn { background: var(--glass); padding: 15px; border-radius: 22px; border: 1px solid var(--border); text-align: center; cursor: pointer; transition: 0.3s; }
        .case-btn.active { border-color: var(--blue); background: rgba(0,210,255,0.05); }

        .shake { animation: shakeCase 0.5s ease-in-out infinite; }
        @keyframes shakeCase {
            0%, 100% { transform: rotate(0); }
            25% { transform: rotate(-3deg) scale(1.05); }
            75% { transform: rotate(3deg) scale(1.05); }
        }

        .roulette-box { 
            height: 130px; background: rgba(0,0,0,0.3); border-radius: 26px; 
            position: relative; overflow: hidden; margin-bottom: 20px; border: 1px solid var(--border);
        }
        .center-line { position: absolute; left: 50%; width: 3px; height: 100%; background: #ff4747; z-index: 10; transform: translateX(-50%); box-shadow: 0 0 15px #ff4747; }
        .track { display: flex; position: absolute; left: 0; top: 15px; transition: transform 6s cubic-bezier(0.1, 0, 0, 1); }
        .t-item { 
            min-width: 100px; height: 100px; margin: 0 6px; background: var(--glass); 
            border-radius: 20px; display: flex; align-items: center; justify-content: center;
            border-bottom: 4px solid #333; font-size: 40px;
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding-bottom: 40px; overflow-y: auto; max-height: 60vh; }
        .card { 
            background: var(--glass); padding: 25px 15px; border-radius: 28px; text-align: center;
            border: 1px solid var(--border); position: relative; transition: 0.3s;
        }
        
        .btn-action { 
            width: 100%; padding: 18px; border: none; border-radius: 20px; 
            font-weight: 900; cursor: pointer; background: var(--accent); color: #000;
            text-transform: uppercase; transition: 0.2s;
        }

        .overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(5,7,12,0.92); display: none; align-items: center; justify-content: center; 
            z-index: 1000; backdrop-filter: blur(20px);
        }

        .modal-win { 
            background: transparent; text-align: center; 
            width: 90%; max-width: 400px;
            animation: winReveal 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes winReveal {
            0% { transform: scale(0.5) translateY(100px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        .win-glow {
            position: absolute; width: 300px; height: 300px;
            background: radial-gradient(circle, var(--rarity-color) 0%, transparent 70%);
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            opacity: 0.3; filter: blur(30px); z-index: -1;
            animation: glowPulse 2s infinite ease-in-out;
        }

        @keyframes glowPulse {
            0%, 100% { opacity: 0.2; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.5; transform: translate(-50%, -50%) scale(1.3); }
        }

        .win-icon {
            font-size: 110px; margin-bottom: 20px;
            filter: drop-shadow(0 0 20px var(--rarity-color));
            animation: iconFloat 3s infinite ease-in-out;
        }

        @keyframes iconFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        .win-info { animation: textAppear 1s ease-out 0.3s both; }
        @keyframes textAppear { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    </style>
</head>
<body>

    <div class="header">
        <div class="balance">
            <span style="font-size: 10px; opacity: 0.5;">БАЛАНС</span>
            <b><span id="money">0</span> G</b>
        </div>
        <div style="font-size: 8px; color: var(--blue); letter-spacing: 1px;">HARDCORE DROP V6</div>
    </div>

    <div class="tabs">
        <button class="tab active" onclick="tab('shop', event)">Кейсы</button>
        <button class="tab" onclick="tab('market', event)">Биржа</button>
        <button class="tab" onclick="tab('inv', event)">Инв</button>
    </div>

    <div id="shop" class="view" style="display: block;">
        <div class="case-grid">
            <div id="c0" class="case-btn active" onclick="setCase(0)">📦<br><small>100 G</small></div>
            <div id="c1" class="case-btn" onclick="setCase(1)">📦<br><small>250 G</small></div>
            <div id="c2" class="case-btn" onclick="setCase(2)">🔪<br><small>600 G</small></div>
        </div>
        <div id="caseBox" class="roulette-box">
            <div class="center-line"></div>
            <div id="track" class="track"></div>
        </div>
        <button id="spinBtn" class="btn-action" onclick="openCase()">ОТКРЫТЬ</button>
    </div>

    <div id="market" class="view"><div id="marketGrid" class="grid"></div></div>
    <div id="inv" class="view"><div id="invGrid" class="grid"></div></div>

    <div id="winOverlay" class="overlay">
        <div class="modal-win" id="winModal">
            <div class="win-glow" id="rarityGlow"></div>
            <div class="win-icon" id="winIcon">🔫</div>
            <div class="win-info">
                <h1 id="winName" style="margin: 0; font-size: 28px;">Item</h1>
                <p id="winRarity" style="font-weight: 900; letter-spacing: 4px; margin: 10px 0 40px; font-size: 12px;">RARITY</p>
                <button class="btn-action" onclick="take()">ЗАБРАТЬ</button>
                <button class="btn-action" style="background:none; color:#777; margin-top:10px;" onclick="sellNow()">ПРОДАТЬ ЗА <span id="winPrice">0</span> G</button>
            </div>
        </div>
    </div>

    <div id="sellOverlay" class="overlay">
        <div style="background: #121826; padding: 40px; border-radius: 35px; text-align: center; border: 1px solid var(--border); width: 85%;">
            <h3>ПРОДАТЬ ПРЕДМЕТ?</h3>
            <div id="sellPreview" style="font-size: 60px; margin: 20px 0;">🔫</div>
            <button class="btn-action" style="background: var(--down); color:white;" onclick="confirmSell()">ПРОДАТЬ</button>
            <button class="btn-action" style="background: none; color:white; margin-top:10px;" onclick="closeOverlays()">ОТМЕНА</button>
        </div>
    </div>

    <script>
        const SKINS = [
            { id: 0, name: "G22 | Casual", rar: "common", p: 20, i: "🔫", weight: 50 },
            { id: 1, name: "USP | Genesis", rar: "uncommon", p: 55, i: "🔫", weight: 30 },
            { id: 2, name: "M4 | Tiger", rar: "rare", p: 190, i: "🔫", weight: 12 },
            { id: 3, name: "AKR | Necro", rar: "epic", p: 620, i: "🔫", weight: 6 },
            { id: 4, name: "AWM | Scratch", rar: "legendary", p: 1600, i: "🎯", weight: 2 },
            { id: 5, name: "Karambit | Gold", rar: "arcane", p: 25000, i: "🔪", weight: 0.3 },
            { id: 6, name: "Butterfly | Star", rar: "arcane", p: 22000, i: "🦋", weight: 0.3 }
        ];

        let state = {
            money: parseInt(localStorage.getItem('v6_money')) || 5000,
            inv: JSON.parse(localStorage.getItem('v6_inv')) || [],
            prices: SKINS.map(s => ({ id: s.id, cur: s.p * 1.3, old: s.p * 1.3 })),
            curCase: 0,
            lastWin: null,
            pendingIdx: null
        };

        // Функция взвешенного рандома
        function getWeightedDrop(poolIds) {
            const currentPool = SKINS.filter(s => poolIds.includes(s.id));
            const totalWeight = currentPool.reduce((acc, s) => acc + s.weight, 0);
            let random = Math.random() * totalWeight;
            for (let s of currentPool) {
                if (random < s.weight) return s;
                random -= s.weight;
            }
            return currentPool[0];
        }

        function tick() {
            state.prices.forEach(p => {
                p.old = p.cur;
                p.cur = Math.floor(p.cur * (1 + (Math.random() * 0.12 - 0.06)));
            });
            if(document.getElementById('market').style.display === 'block') renderMarket();
        }
        setInterval(tick, 5000);

        function openCase() {
            const cost = [100, 250, 600][state.curCase];
            if(state.money < cost) return alert("Мало голды!");
            state.money -= cost; sync();
            
            const btn = document.getElementById('spinBtn');
            const box = document.getElementById('caseBox');
            btn.disabled = true; box.classList.add('shake');

            setTimeout(() => {
                box.classList.remove('shake');
                const track = document.getElementById('track');
                track.style.transition = 'none'; track.style.transform = 'translateX(0)';
                track.innerHTML = '';
                
                let win;
                const pools = [[0,1,2,3], [1,2,3,4,5], [3,4,5,6]]; // Какие ID могут выпасть
                const currentPoolIds = pools[state.curCase];

                for(let i=0; i<60; i++) {
                    const s = getWeightedDrop(currentPoolIds);
                    if(i === 52) win = s; // Решающий скин
                    track.innerHTML += `<div class="t-item" style="border-bottom-color:var(--${s.rar})">${s.i}</div>`;
                }

                setTimeout(() => {
                    track.style.transition = 'transform 6s cubic-bezier(0.1, 0, 0, 1)';
                    const shift = 52 * 112 - (window.innerWidth/2 - 56);
                    track.style.transform = `translateX(-${shift}px)`;
                }, 50);

                setTimeout(() => {
                    state.lastWin = win;
                    showWin(win);
                    btn.disabled = false;
                }, 6200);
            }, 600);
        }

        function showWin(win) {
            const overlay = document.getElementById('winOverlay');
            const glow = document.getElementById('rarityGlow');
            const icon = document.getElementById('winIcon');
            glow.style.setProperty('--rarity-color', `var(--${win.rar})`);
            icon.innerText = win.i;
            icon.style.setProperty('--rarity-color', `var(--${win.rar})`);
            document.getElementById('winName').innerText = win.name;
            const rarText = document.getElementById('winRarity');
            rarText.innerText = win.rar.toUpperCase();
            rarText.style.color = `var(--${win.rar})`;
            document.getElementById('winPrice').innerText = win.p;
            overlay.style.display = 'flex';
        }

        function renderMarket() {
            const g = document.getElementById('marketGrid'); g.innerHTML = '';
            SKINS.forEach(s => {
                const p = state.prices.find(x => x.id === s.id);
                const up = p.cur >= p.old;
                g.innerHTML += `<div class="card" onclick="buyMarket(${s.id}, ${p.cur})">
                    <div style="font-size:45px">${s.i}</div>
                    <div style="font-weight:bold; font-size:12px; margin-top:10px">${s.name}</div>
                    <div style="color:${up?'var(--up)':'var(--down)'}; font-weight:900; margin-top:8px">${p.cur} G</div>
                </div>`;
            });
        }

        function renderInv() {
            const g = document.getElementById('invGrid'); g.innerHTML = '';
            state.inv.forEach((it, idx) => {
                g.innerHTML += `<div class="card" onclick="openSell(${idx})">
                    <div style="font-size:45px">${it.i}</div>
                    <div style="font-size:11px; margin-top:8px">${it.name}</div>
                    <div style="color:var(--accent); font-weight:bold; margin-top:5px">${it.p} G</div>
                </div>`;
            });
        }

        function buyMarket(id, pr) {
            if(state.money < pr) return alert("Мало голды!");
            state.money -= pr;
            state.inv.unshift({...SKINS.find(x => x.id === id)});
            sync();
        }

        function openSell(idx) {
            state.pendingIdx = idx;
            document.getElementById('sellPreview').innerText = state.inv[idx].i;
            document.getElementById('sellOverlay').style.display = 'flex';
        }

        function confirmSell() {
            state.money += state.inv[state.pendingIdx].p;
            state.inv.splice(state.pendingIdx, 1);
            closeOverlays(); sync();
        }

        function take() { state.inv.unshift(state.lastWin); closeOverlays(); sync(); }
        function sellNow() { state.money += state.lastWin.p; closeOverlays(); sync(); }
        function closeOverlays() { document.querySelectorAll('.overlay').forEach(o => o.style.display = 'none'); }

        function sync() {
            document.getElementById('money').innerText = state.money.toLocaleString();
            localStorage.setItem('v6_money', state.money);
            localStorage.setItem('v6_inv', JSON.stringify(state.inv));
            renderInv(); renderMarket();
        }

        function tab(t, e) {
            document.querySelectorAll('.view, .tab').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
            document.getElementById(t).style.display = 'block';
            e.target.classList.add('active');
            sync();
        }

        function setCase(i) {
            state.curCase = i;
            document.querySelectorAll('.case-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('c'+i).classList.add('active');
        }

        sync();
    </script>
</body>
</html>
