<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GLOBAL CONQUEST: EURASIA [OFFLINE VERSION]</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #05080c; color: white; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; }
        
        /* Сетка на фоне для красоты */
        .grid { position: absolute; width: 100%; height: 100%; background-image: radial-gradient(#1a2a3a 1px, transparent 1px); background-size: 40px 40px; z-index: 1; opacity: 0.5; }

        /* Контейнер игры */
        .game-world { position: relative; width: 100vw; height: 100vh; z-index: 5; display: flex; align-items: center; justify-content: center; }

        /* Левая панель управления */
        .ui-left {
            position: absolute; top: 20px; left: 20px; width: 280px;
            background: rgba(13, 23, 34, 0.98); border: 1px solid #223344;
            border-radius: 8px; z-index: 100; padding: 15px; box-shadow: 0 0 40px #000;
        }
        .res-row { display: flex; gap: 20px; font-size: 22px; font-weight: bold; margin: 10px 0; }
        .fire { color: #ff9900; }

        .btn {
            width: 100%; padding: 12px; margin-bottom: 8px; border: none; border-radius: 4px;
            color: white; font-weight: bold; cursor: pointer; font-size: 12px; transition: 0.2s;
        }
        .btn-green { background: linear-gradient(180deg, #2b9348, #1a6d1a); }
        .btn-blue { background: linear-gradient(180deg, #007bff, #0056b3); text-transform: uppercase; }
        .btn:hover { filter: brightness(1.2); transform: scale(1.02); }

        /* Правая панель ID */
        .ui-right {
            position: absolute; top: 20px; right: 20px; width: 230px;
            background: rgba(13, 23, 34, 0.98); border-radius: 8px; z-index: 100; padding: 15px;
            border-top: 4px solid #00ccff;
        }
        .id-label { color: #00ccff; font-size: 11px; font-weight: bold; }
        .id-num { font-size: 24px; font-weight: bold; margin: 5px 0 15px 0; }

        /* Карта (SVG) */
        svg { width: 90%; height: 80%; filter: drop-shadow(0 0 15px rgba(0, 204, 255, 0.2)); }
        .country { fill: #1a2634; stroke: #00ccff; stroke-width: 2; cursor: pointer; transition: 0.4s; }
        .country:hover { fill: #243444; stroke-width: 4; }
        .my-land { fill: #004d00 !important; stroke: #00ff00 !important; }
        .enemy-land { fill: #4d0000 !important; stroke: #ff0000 !important; }

        /* Меню действий */
        #action-menu {
            display: none; position: absolute; background: #0d1722; border: 2px solid #00ccff;
            padding: 15px; border-radius: 10px; z-index: 500; min-width: 150px;
        }

        /* Чат лог */
        .log { background: rgba(0,0,0,0.4); height: 140px; margin-top: 10px; padding: 8px; font-size: 11px; overflow-y: auto; border: 1px solid #1f2d3d; font-family: monospace; }
    </style>
</head>
<body>

    <div class="grid"></div>

    <div id="action-menu">
        <b id="land-name">Территория</b><br><br>
        <button class="btn btn-blue" onclick="takeAction('peace')">🤝 МИР</button>
        <button class="btn btn-green" onclick="takeAction('trade')">💰 ТОРГОВЛЯ</button>
        <button class="btn" style="background:#cc0000" onclick="takeAction('war')">🚀 ВТОРЖЕНИЕ</button>
        <button class="btn" style="background:#333" onclick="closeMenu()">ОТМЕНА</button>
    </div>

    <div class="ui-left">
        <div style="color:#00ccff; font-weight:bold; border-bottom:1px solid #223344; padding-bottom:5px;">ДЕЙСТВИЯ И ЧАТ</div>
        <div class="res-row">
            <span class="fire">🔥 <span id="val-g">1000</span></span>
            <span>⚔️ <span id="val-a">150</span></span>
        </div>
        <button class="btn btn-green" onclick="updateRes('g', 200)">📈 РАЗВИТЬ ЭКОНОМИКУ</button><button class="btn btn-blue">🎖️ МОБИЛИЗАЦИЯ</button>
        
        <div class="log" id="game-log">
            <div><span style="color:#ffcc00">SYSTEM:</span> Карта готова. Выберите свою страну для начала.</div>
        </div>
    </div>

    <div class="ui-right">
        <div class="id-label">YOUR NETWORK ID</div>
        <div class="id-num">987654321</div>
        <div class="id-label">ID ДРУГА</div>
        <input type="text" style="width:100%; background:#000; border:1px solid #223344; color:#fff; padding:6px; margin-top:5px;" placeholder="friend_id_777">
    </div>

    <div class="game-world">
        <svg viewBox="0 0 800 400">
            <path id="reg_eu" class="country" d="M50,150 L200,50 L350,150 L200,280 Z" onclick="mapClick('ЕВРОПА', 'reg_eu')"/>
            <path id="reg_ru" class="country" d="M200,50 L550,30 L680,150 L350,150 Z" onclick="mapClick('РОССИЯ', 'reg_ru')"/>
            <path id="reg_as" class="country" d="M350,150 L680,150 L630,320 L400,360 Z" onclick="mapClick('АЗИЯ', 'reg_as')"/>
            <path id="reg_cn" class="country" d="M680,150 L780,120 L750,320 L630,320 Z" onclick="mapClick('ВОСТОК', 'reg_cn')"/>
            
            <text x="120" y="160" fill="white" style="pointer-events:none; font-weight:bold;">ЕВРОПА</text>
            <text x="400" y="100" fill="white" style="pointer-events:none; font-weight:bold;">РОССИЯ</text>
            <text x="450" y="250" fill="white" style="pointer-events:none; font-weight:bold;">АЗИЯ</text>
            <text x="680" y="230" fill="white" style="pointer-events:none; font-weight:bold;">КИТАЙ</text>
        </svg>
    </div>

    <script>
        let myId = null;
        let activeLand = null;
        let gold = 1000;

        function addLog(msg, color="#00ffcc") {
            const l = document.getElementById('game-log');
            l.innerHTML += <div><span style="color:${color}">Dmitry:</span> ${msg}</div>;
            l.scrollTop = l.scrollHeight;
        }

        function mapClick(name, id) {
            if (!myId) {
                myId = id;
                document.getElementById(id).classList.add('my-land');
                addLog("Я выбрал свою страну: " + name, "#00ff00");
                addLog("Теперь кликай на другие страны для действий.");
            } else if (id !== myId) {
                activeLand = { name, id };
                const menu = document.getElementById('action-menu');
                menu.style.display = 'block';
                menu.style.left = event.pageX + "px";
                menu.style.top = event.pageY + "px";
                document.getElementById('land-name').innerText = name;
            }
        }

        function takeAction(type) {
            if (type === 'war') {
                document.getElementById(activeLand.id).classList.add('enemy-land');
                addLog("ВОЙНА! Наступление на " + activeLand.name + " начато!", "#ff0000");
            } else if (type === 'trade') {
                gold += 200;
                document.getElementById('val-g').innerText = gold;
                addLog("Торговля с " + activeLand.name + " принесла +200 золота.");
            } else {
                addLog("Мирный договор с " + activeLand.name + " подписан.");
            }
            closeMenu();
        }

        function closeMenu() { document.getElementById('action-menu').style.display = 'none'; }
        
        function updateRes(type, val) {
            gold += val;
            document.getElementById('val-g').innerText = gold;
            addLog("Экономика улучшена на " + val);
        }
    </script>
</body>
</html>
